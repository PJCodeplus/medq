          pqData.classes.map((cls,ci)=>{
            const isOpen = !!pqClassOpen[cls.name];
            return e("div",{key:ci,style:{background:"#fff",borderRadius:8,overflow:"hidden",boxShadow:"0 2px 12px rgba(15,39,68,.08)",border:"1px solid #e0d8cc"}},
              /* Class header — clickable to toggle */
              e("button",{onClick:()=>setPqClassOpen(prev=>({...prev,[cls.name]:!isOpen})),
                style:{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",
                  background:isOpen?"#0f2744":"#fff",border:"none",cursor:"pointer",transition:"background .2s",
                  fontFamily:"Georgia,serif"}},
                e("div",{style:{display:"flex",alignItems:"center",gap:12}},
                  e("span",{style:{fontSize:"1.3rem"}},"🎓"),
                  e("div",{style:{textAlign:"left"}},
                    e("p",{style:{fontFamily:"Georgia,serif",fontWeight:700,fontSize:"1rem",color:isOpen?"#c9a84c":"#0f2744",margin:0}},cls.name),
                    e("p",{style:{fontSize:".72rem",color:isOpen?"rgba(255,255,255,.45)":"#aaa",margin:"2px 0 0"}},cls.exams.length+" exam types")
                  )
                ),
                e("span",{style:{fontSize:"1.1rem",color:isOpen?"#c9a84c":"#999",transition:"transform .2s",
                  display:"inline-block",transform:isOpen?"rotate(180deg)":"rotate(0deg)"}},"▾")
              ),
              /* Exam types list */
              isOpen && e("div",{className:"fade-up",style:{padding:"8px 16px 16px"}},
                cls.exams.map((exam,ei)=>{
                  const hasQs = exam.questions && exam.questions.length > 0;
                  return e("button",{key:ei,
                    disabled:!hasQs,
                    onClick:()=>{
                      if(hasQs){
                        setPastQExam({className:cls.name, examLabel:exam.label, questions:exam.questions});
                        setPqVotes({}); setPqAiOpen({});
                        setView("pastq_worksheet");
                      }
                    },
                    style:{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",
                      padding:"12px 14px",marginTop:6,borderRadius:6,
                      background:hasQs?"#f7f3ed":"#fafaf8",
                      border:"1px solid "+(hasQs?"#ddd6c6":"#eee8de"),
                      cursor:hasQs?"pointer":"not-allowed",
                      opacity:hasQs?1:.6,
                      transition:"background .15s,transform .15s",
                      fontFamily:"Georgia,serif"},
                    onMouseEnter:ev=>{if(hasQs){ev.currentTarget.style.background="#ede8df";ev.currentTarget.style.transform="translateX(3px)";}},
                    onMouseLeave:ev=>{if(hasQs){ev.currentTarget.style.background="#f7f3ed";ev.currentTarget.style.transform="";}},
                  },
                    e("div",{style:{display:"flex",alignItems:"center",gap:10}},
                      e("span",{style:{fontSize:".95rem"}},"📋"),
                      e("div",{style:{textAlign:"left"}},
                        e("p",{style:{fontFamily:"Georgia,serif",fontWeight:600,fontSize:".92rem",color:"#0f2744",margin:0}},exam.label),
                        e("p",{style:{fontSize:".7rem",color:"#aaa",margin:"2px 0 0"}},hasQs?exam.questions.length+" questions":"Coming soon")
                      )
                    ),
                    hasQs && e("span",{style:{color:accentCol,fontSize:"1rem"}},"→")
                  );
                })
              )
            );
          })
        )
      )
    );
  }

  /* ══════════ PAST QUESTIONS — WORKSHEET (vote + AI answer) ══════════ */
  if(view==="pastq_worksheet"){
    const wqs = pastQExam?.questions||[];
    const accentCol = course?.accent||"#ffcc80";
    const headerBg = course?.bg||"linear-gradient(135deg,#2a1f0e,#4a3820)";

    const handlePqVote = async (qi, oi, q) => {
      const prev = pqVotes[qi]!==undefined ? pqVotes[qi] : null;
      if(prev===oi) return;
      setPqVotes(p=>({...p,[qi]:oi}));
      // Optimistic update — show count immediately without waiting for Firebase
      const curCounts = pqVoteCounts[qi]||[0,0,0,0,0];
      const optimistic=[...curCounts];
      if(prev!==null&&prev>=0) optimistic[prev]=Math.max(0,optimistic[prev]-1);
      optimistic[oi]=(optimistic[oi]||0)+1;
      setPqVoteCounts(p=>({...p,[qi]:optimistic}));
      const storageKey="pq_voted_"+(pastQExam?.className||"")+"_"+(pastQExam?.examLabel||"");
      try{ const stored=JSON.parse(ls.get(storageKey)||"{}"); stored[qi]=oi; ls.set(storageKey,JSON.stringify(stored)); }catch{}
      if(window._fbPqVote&&window._pqSanitize){
        const qId="pqv_"+window._pqSanitize(q.q.slice(0,90));
        const newCounts=await window._fbPqVote(qId,oi,prev);
        if(newCounts) setPqVoteCounts(p=>({...p,[qi]:newCounts}));
      }
    };

    return e("div",{style:{minHeight:"100vh",background:"#f0ece4",paddingBottom:48}},
      e("div",{style:{background:headerBg,padding:"clamp(18px,4vw,28px) 20px 22px",position:"sticky",top:0,zIndex:50,boxShadow:"0 2px 10px rgba(0,0,0,.2)"}},
        e("div",{style:{maxWidth:760,margin:"0 auto"}},
          e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}},
            e("button",{onClick:()=>setView("pastq_system"),
              style:{background:"rgba(255,255,255,.12)",border:"none",color:"rgba(255,255,255,.85)",padding:"7px 14px",borderRadius:4,fontSize:".8rem",fontFamily:"Georgia,serif",cursor:"pointer"}},
              "\u2190 Back"),
            e("div",{style:{textAlign:"center",flex:1,minWidth:0}},
              e("p",{style:{color:"rgba(255,255,255,.45)",fontSize:".65rem",letterSpacing:".1em",textTransform:"uppercase",marginBottom:2}},pastQExam?.className||""),
              e("p",{style:{fontFamily:"Georgia,serif",fontWeight:700,color:"#fff",fontSize:"clamp(.88rem,2vw,1rem)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},pastQExam?.examLabel||"")
            ),
            e("div",{style:{background:"rgba(255,255,255,.1)",borderRadius:4,padding:"5px 12px",fontSize:".75rem",color:"rgba(255,255,255,.7)",whiteSpace:"nowrap"}},
              wqs.length+" Qs \u00b7 "+Object.keys(pqVotes).length+" voted"
            )
          )
        )
      ),
      e("div",{style:{height:3,background:"linear-gradient(90deg,"+accentCol+","+accentCol+"88)"}}),
      e("div",{style:{maxWidth:760,margin:"0 auto",padding:"20px 16px"}},
        wqs.length===0
          ? e("div",{style:{textAlign:"center",padding:"60px 20px"}},
              e("div",{style:{fontSize:"2.5rem",marginBottom:12}},"\ud83d\udcad"),
              e("p",{style:{color:"#666",fontFamily:"Georgia,serif"}},"No questions added yet for this exam.")
            )
          : wqs.map((q,qi)=>{
              const voted = pqVotes[qi]!==undefined ? pqVotes[qi] : null;
              const aiOpen = !!pqAiOpen[qi];
              const counts = pqVoteCounts[qi]||null;
              const totalVotes = counts ? counts.reduce((a,b)=>a+b,0) : 0;
              const showBars = voted!==null;

              return e("div",{key:qi,className:"fade-up",
                style:{animationDelay:(qi*25)+"ms",background:"#fff",borderRadius:8,marginBottom:16,
                  overflow:"hidden",boxShadow:"0 3px 14px rgba(15,39,68,.08)",border:"1px solid #e8e2d8"}},

                e("div",{style:{background:"linear-gradient(135deg,#0f2744,#1a3a5c)",padding:"clamp(14px,2.5vw,20px) clamp(14px,2.5vw,22px)"}},
                  e("p",{style:{color:accentCol,fontSize:".65rem",letterSpacing:".14em",textTransform:"uppercase",fontWeight:600,marginBottom:6}},
                    "Question "+(qi+1)+" of "+wqs.length
                  ),
                  e("p",{style:{color:"#e8edf4",fontSize:"clamp(.9rem,1.9vw,1.02rem)",lineHeight:1.8,fontWeight:300}},q.q)
                ),

                e("div",{style:{padding:"clamp(14px,2.5vw,20px) clamp(14px,2.5vw,22px)"}},
                  e("div",{style:{display:"flex",flexDirection:"column",gap:showBars?7:9}},
                    q.opts.map((opt,oi)=>{
                      const isVoted = voted===oi;
                      const voteCount = counts ? (counts[oi]||0) : 0;
                      const pct = totalVotes>0 ? Math.round((voteCount/totalVotes)*100) : 0;

                      if(showBars){
                        return e("div",{key:oi,
                          onClick:()=>handlePqVote(qi,oi,q),
                          style:{position:"relative",borderRadius:6,overflow:"hidden",cursor:"pointer",
                            border:"1.5px solid "+(isVoted?"#3b6fd4":"#e0d8cc"),
                            background:isVoted?"#eef3fd":"#f7f3ed",
                            transition:"border-color .2s",minHeight:44}},
                          e("div",{style:{
                            position:"absolute",top:0,left:0,height:"100%",
                            width:pct+"%",
                            background:isVoted?"rgba(59,111,212,.18)":"rgba(201,168,76,.12)",
                            transition:"width .5s ease",pointerEvents:"none"
                          }}),
                          e("div",{style:{position:"relative",display:"flex",alignItems:"center",
                            justifyContent:"space-between",padding:"10px 14px",gap:10}},
                            e("div",{style:{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}},
                              e("span",{style:{flexShrink:0,width:24,height:24,borderRadius:"50%",
                                background:isVoted?"#3b6fd4":"#c9b87a",color:"#fff",
                                display:"flex",alignItems:"center",justifyContent:"center",
                                fontSize:".64rem",fontWeight:700}},LETTERS[oi]),
                              e("span",{style:{fontSize:"clamp(.85rem,1.9vw,.93rem)",
                                color:isVoted?"#1a3d8f":"#333",lineHeight:1.5,
                                fontWeight:isVoted?600:400}},opt)
                            ),
                            e("div",{style:{flexShrink:0,textAlign:"right",minWidth:52}},
                              e("span",{style:{fontFamily:"Georgia,serif",fontWeight:700,fontSize:".82rem",
                                color:isVoted?"#3b6fd4":"#999"}},pct+"%"),
                              e("p",{style:{fontSize:".62rem",color:"#bbb",margin:0}},
                                voteCount+" vote"+(voteCount!==1?"s":""))
                            )
                          )
                        );
                      } else {
                        return e("button",{key:oi,
                          onClick:()=>handlePqVote(qi,oi,q),
                          style:{display:"flex",alignItems:"flex-start",gap:12,padding:"11px 15px",
                            background:"#f7f3ed",border:"1.5px solid #ddd6c6",borderRadius:5,
                            cursor:"pointer",textAlign:"left",fontSize:"clamp(.87rem,1.9vw,.95rem)",
                            color:"#1a1a2e",lineHeight:1.6,transition:"all .15s",width:"100%",
                            minHeight:48,fontFamily:"Georgia,serif"},
                          onMouseEnter:ev=>{ev.currentTarget.style.background="#ede8df";ev.currentTarget.style.transform="translateX(2px)";},
                          onMouseLeave:ev=>{ev.currentTarget.style.background="#f7f3ed";ev.currentTarget.style.transform="";},
                        },
                          e("span",{style:{flexShrink:0,width:26,height:26,borderRadius:"50%",
                            background:"#c9b87a",color:"#fff",display:"flex",alignItems:"center",
                            justifyContent:"center",fontSize:".66rem",fontWeight:700,marginTop:2}},LETTERS[oi]),
                          e("span",{style:{flex:1}},opt)
                        );
                      }
                    })
                  ),

                  showBars && totalVotes>0 && e("p",{style:{marginTop:8,fontSize:".7rem",color:"#aaa",textAlign:"right"}},
                    totalVotes+" total vote"+(totalVotes!==1?"s":"")+" \u00b7 Tap any option to change your vote"
                  ),
                  showBars && totalVotes===0 && e("p",{style:{marginTop:8,fontSize:".7rem",color:"#ccc",textAlign:"right"}},"Loading votes…"),

                  e("div",{style:{marginTop:14}},
                    e("button",{
                      onClick:()=>setPqAiOpen(prev=>({...prev,[qi]:!aiOpen})),
                      style:{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",
                        padding:"10px 14px",background:aiOpen?"#0f2744":"#f0ece4",
                        border:"1px solid "+(aiOpen?"#1a3a5c":"#d5cfc4"),
                        borderRadius:aiOpen?"5px 5px 0 0":"5px",cursor:"pointer",transition:"all .2s",
                        fontFamily:"Georgia,serif"}},
                      e("div",{style:{display:"flex",alignItems:"center",gap:8}},
                        e("span",{style:{fontSize:".85rem"}},"\u2728"),
                        e("span",{style:{fontFamily:"Georgia,serif",fontSize:".82rem",fontWeight:600,
                          color:aiOpen?"#c9a84c":"#555",letterSpacing:".04em"}},
                          "See AI answer and explanation"
                        )
                      ),
                      e("span",{style:{fontSize:".8rem",color:aiOpen?"#c9a84c":"#999",
                        transition:"transform .2s",display:"inline-block",
                        transform:aiOpen?"rotate(180deg)":"rotate(0deg)"}},"\u25be")
                    ),
                    aiOpen && e("div",{className:"fade-up",style:{padding:"14px 16px",
                      background:"#f9f5ee",border:"1px solid #d5cfc4",borderTop:"none",
                      borderRadius:"0 0 5px 5px"}},
                      e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:10,
                        padding:"8px 10px",background:"#e8f5ee",borderRadius:4,border:"1px solid #66bb6a"}},
                        e("span",{style:{flexShrink:0,width:24,height:24,borderRadius:"50%",
                          background:"#2e7d32",color:"#fff",display:"flex",alignItems:"center",
                          justifyContent:"center",fontSize:".66rem",fontWeight:700}},LETTERS[q.ans]),
                        e("p",{style:{fontSize:".88rem",color:"#1b5e20",fontWeight:600,margin:0}},q.opts[q.ans])
                      ),
                      e("div",null,
                        e("p",{style:{fontWeight:700,fontSize:".68rem",letterSpacing:".1em",
                          textTransform:"uppercase",color:"#7a6020",marginBottom:5}},"Explanation"),
                        e("p",{style:{fontSize:".85rem",lineHeight:1.78,color:"#444",margin:0}},q.exp)
                      )
                    )
                  )
                )
              );
            })
        ,
        wqs.length>0 && Object.keys(pqVotes).length===wqs.length &&
          e("div",{className:"fade-up",style:{marginTop:8,background:"#0f2744",borderRadius:8,padding:"16px 20px",textAlign:"center"}},
            e("p",{style:{color:"#c9a84c",fontFamily:"Georgia,serif",fontWeight:700,fontSize:"1rem",marginBottom:6}},"All questions voted \u2713"),
            e("p",{style:{color:"rgba(255,255,255,.55)",fontSize:".8rem"}},"Tap \'See AI answer and explanation\' on each question to check your selection.")
          )
      )
    );
  }

  /* ══════════ BLOCKS ══════════ */
  if(view==="blocks"){
    // ── helpers ──────────────────────────────────────────────────────────
    const blockCard=(b,key,isUnified,animIdx)=>{
      const isPQCard=b.isPastQSection;
      return e("div",{key,className:"fade-up",
        style:{animationDelay:animIdx*40+"ms",
          background:isPQCard?"linear-gradient(135deg,#2a1f0e,#4a3820)":isUnified?"linear-gradient(135deg,#0f2744,#1a3a5c)":"#fff",
          borderRadius:6,padding:"17px 20px",display:"flex",alignItems:"center",
          justifyContent:"space-between",gap:12,
          boxShadow:"0 2px 10px rgba(15,39,68,.07)",cursor:b.available?"pointer":"not-allowed",
          opacity:b.available?1:.5,border:"1px solid "+(isPQCard?"#6b4f20":isUnified?"transparent":b.available?"#e0d8cc":"#e8e3db"),
          transition:"transform .18s,box-shadow .18s",minHeight:68},
        onMouseEnter:ev=>{if(b.available){ev.currentTarget.style.transform="translateX(4px)";ev.currentTarget.style.boxShadow="0 6px 22px rgba(15,39,68,.13)";}},
        onMouseLeave:ev=>{ev.currentTarget.style.transform="";ev.currentTarget.style.boxShadow="0 2px 10px rgba(15,39,68,.07)";},
        onClick:()=>{if(b.available){if(b.isPastQSection){setPqClassOpen({});setPqVotes({});setPqAiOpen({});setPastQExam(null);setView("pastq_system");}else{setBlock(b);setQCount(Math.min(20,b.questions.length));setView("setup");}}}},
        e("div",{style:{flex:1,minWidth:0}},
          e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}},
            isPQCard&&e("span",{style:{fontSize:"1rem",marginRight:2}},"📜"),
            e("span",{style:{fontFamily:"Georgia,serif",fontWeight:700,fontSize:"1rem",color:isPQCard?"#ffcc80":isUnified?"#c9a84c":"#0f2744"}},b.name),
            isPQCard&&e("span",{style:{background:"rgba(255,204,128,.18)",color:"#ffcc80",fontSize:".63rem",padding:"2px 8px",borderRadius:10,textTransform:"uppercase",letterSpacing:".07em"}},"Enahoro"),
            !isPQCard&&b.available&&!isUnified&&e("span",{style:{background:"#e8f5ee",color:"#2e7d32",fontSize:".63rem",padding:"2px 8px",borderRadius:10,textTransform:"uppercase",letterSpacing:".07em"}},"Live"),
            !isPQCard&&!b.available&&e("span",{style:{background:"#f5f0e8",color:"#bbb",fontSize:".63rem",padding:"2px 8px",borderRadius:10,textTransform:"uppercase",letterSpacing:".07em"}},"Coming Soon")
          ),
          isPQCard
            ? e("p",{style:{color:"rgba(255,204,128,.5)",fontSize:".76rem"}},"Past exam questions by class & sitting")
            : b.available&&e("p",{style:{color:isUnified?"rgba(255,255,255,.45)":"#aaa",fontSize:".76rem"}},b.questions.length+" questions")
        ),
        b.available&&e("span",{style:{color:isPQCard?"#ffcc80":isUnified?"#c9a84c":course.accent,fontSize:"1.3rem",flexShrink:0}},"→")
      );
    };

    // ── PRECLINICAL: show level selection (200L / 300L) ──────────────────
    if(course.isPreclinical && !preclinLevel){
      return e("div",{style:{minHeight:"100vh",background:"#f0ece4"}},
        e("div",{style:{background:course.bg,padding:"clamp(24px,5vw,36px) 20px 28px",position:"relative",overflow:"hidden"}},
          e("div",{style:{position:"absolute",inset:0,backgroundImage:"repeating-linear-gradient(45deg,transparent,transparent 50px,rgba(255,255,255,.03) 50px,rgba(255,255,255,.03) 100px)"}}),
          e("div",{style:{position:"relative",maxWidth:720,margin:"0 auto"}},
            navBtn("← Back",()=>setView("home")),
            e("div",{style:{display:"flex",alignItems:"center",gap:14}},
              e("span",{style:{fontSize:"clamp(1.6rem,4vw,2.2rem)"}},course.emoji),
              e("h2",{style:{fontFamily:"Georgia,serif",fontSize:"clamp(1.4rem,4vw,1.8rem)",fontWeight:900,color:"#fff"}},course.name)
            )
          )
        ),
        e("div",{style:{height:3,background:"linear-gradient(90deg,"+course.accent+","+course.accent+"88)"}}),
        e("div",{style:{maxWidth:720,margin:"0 auto",padding:"28px 20px"}},
          e("p",{style:{fontSize:".8rem",letterSpacing:".1em",textTransform:"uppercase",color:"#999",marginBottom:16,fontWeight:600}},"Select Year"),
          e("div",{style:{display:"flex",flexDirection:"column",gap:11}},
            course.levels.map((lv,li)=>{
              const liveCount=lv.blocks.filter(b=>b.available&&b.questions.length>0).length;
              const totalQs=lv.blocks.filter(b=>b.available&&b.questions.length>0).reduce((s,b)=>s+b.questions.length,0);
              return e("div",{key:lv.id,className:"fade-up",
                style:{animationDelay:li*60+"ms",background:"#fff",borderRadius:6,padding:"20px 22px",
                  display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,
                  boxShadow:"0 2px 10px rgba(15,39,68,.07)",cursor:"pointer",
                  border:"1px solid #e0d8cc",transition:"transform .18s,box-shadow .18s",minHeight:72},
                onMouseEnter:ev=>{ev.currentTarget.style.transform="translateX(4px)";ev.currentTarget.style.boxShadow="0 6px 22px rgba(15,39,68,.13)";},
                onMouseLeave:ev=>{ev.currentTarget.style.transform="";ev.currentTarget.style.boxShadow="0 2px 10px rgba(15,39,68,.07)";},
                onClick:()=>{ setPreclinLevel(lv); setBlockSort("system"); }},
                e("div",{style:{flex:1}},
                  e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4}},
                    e("span",{style:{fontFamily:"Georgia,serif",fontWeight:700,fontSize:"1.05rem",color:"#0f2744"}},lv.label),
                    liveCount>0&&e("span",{style:{background:"#e8f5ee",color:"#2e7d32",fontSize:".63rem",padding:"2px 8px",borderRadius:10,textTransform:"uppercase",letterSpacing:".07em"}},"Live")
                  ),
                  liveCount>0
                    ? e("p",{style:{color:"#aaa",fontSize:".76rem"}},totalQs+" questions · "+liveCount+" topic"+(liveCount!==1?"s":""))
                    : e("p",{style:{color:"#ccc",fontSize:".76rem"}},"Coming soon")
                ),
                e("span",{style:{color:course.accent,fontSize:"1.3rem"}},"›")
              );
            }),
            // Past Questions card
            course.blocks.filter(b=>b.isPastQSection).map((b,bi)=>blockCard(b,"pq-"+bi,false,course.levels.length+bi))
          )
        )
      );
    }

    // ── PRECLINICAL: show blocks within selected level (with sort) ────────
    if(course.isPreclinical && preclinLevel){
      const sortBlocks=blocks=>{
        if(blockSort==="system") return blocks;
        if(blockSort==="topic"){
          const named=[...blocks].filter(b=>b.topic&&b.topic!=="").sort((a,b)=>a.topic.localeCompare(b.topic));
          return named;
        }
        if(blockSort==="lecturer"){
          const withLec=blocks.filter(b=>b.lecturer&&b.lecturer!=="Unnamed").sort((a,b)=>a.lecturer.localeCompare(b.lecturer));
          const unnamed=blocks.filter(b=>!b.lecturer||b.lecturer==="Unnamed");
          return [...withLec,...unnamed];
        }
        return blocks;
      };
      const groupedByKey=blocks=>{
        if(blockSort==="system") return [{label:null,items:blocks}];
        const key=blockSort==="topic"?"topic":"lecturer";
        const groups=[];
        const map={};
        blocks.forEach(b=>{
          const k=(b[key]&&b[key]!=="")?(blockSort==="lecturer"&&b[key]==="Unnamed"?"Unnamed":b[key]):(blockSort==="lecturer"?"Unnamed":b[key]||"Other");
          if(!map[k]){map[k]={label:k,items:[]};groups.push(map[k]);}
          map[k].items.push(b);
        });
        if(blockSort==="lecturer"){
          groups.sort((a,b)=>{ if(a.label==="Unnamed") return 1; if(b.label==="Unnamed") return -1; return a.label.localeCompare(b.label); });
        } else {
          groups.sort((a,b)=>a.label.localeCompare(b.label));
        }
        return groups;
      };
      const sorted=sortBlocks(preclinLevel.blocks);
      const grouped=groupedByKey(sorted);
      const sortBtn=(label,val)=>e("button",{onClick:()=>setBlockSort(val),style:{padding:"6px 14px",borderRadius:20,fontSize:".75rem",fontWeight:600,cursor:"pointer",border:"1.5px solid "+(blockSort===val?course.accent:"#ddd"),background:blockSort===val?course.accent+"22":"#fff",color:blockSort===val?course.accent:"#888",transition:"all .15s"}},label);
      return e("div",{style:{minHeight:"100vh",background:"#f0ece4"}},
        e("div",{style:{background:course.bg,padding:"clamp(24px,5vw,36px) 20px 28px",position:"relative",overflow:"hidden"}},
          e("div",{style:{position:"absolute",inset:0,backgroundImage:"repeating-linear-gradient(45deg,transparent,transparent 50px,rgba(255,255,255,.03) 50px,rgba(255,255,255,.03) 100px)"}}),
          e("div",{style:{position:"relative",maxWidth:720,margin:"0 auto"}},
            navBtn("← Back",()=>setPreclinLevel(null)),
            e("div",{style:{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}},
              e("span",{style:{fontSize:"clamp(1.6rem,4vw,2.2rem)"}},course.emoji),
              e("div",null,
                e("p",{style:{color:"rgba(255,255,255,.5)",fontSize:".72rem",letterSpacing:".1em",textTransform:"uppercase",marginBottom:2}},course.name),
                e("h2",{style:{fontFamily:"Georgia,serif",fontSize:"clamp(1.3rem,4vw,1.7rem)",fontWeight:900,color:"#fff"}},preclinLevel.label)
              )
            )
          )
        ),
        e("div",{style:{height:3,background:"linear-gradient(90deg,"+course.accent+","+course.accent+"88)"}}),
        e("div",{style:{maxWidth:720,margin:"0 auto",padding:"20px 20px 28px"}},
          e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:18,flexWrap:"wrap"}},
            e("span",{style:{fontSize:".75rem",color:"#999",fontWeight:600,textTransform:"uppercase",letterSpacing:".08em",marginRight:4}},"Sort by"),
            sortBtn("System","system"),
            sortBtn("Topic","topic"),
            sortBtn("Lecturer","lecturer")
          ),
          e("div",{style:{display:"flex",flexDirection:"column",gap:11}},
            grouped.map((group,gi)=>
              e("div",{key:"g-"+gi},
                group.label&&e("div",{style:{padding:"6px 4px 4px",marginTop:gi>0?8:0}},
                  e("span",{style:{fontSize:".72rem",fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:blockSort==="lecturer"&&group.label==="Unnamed"?"#bbb":course.accent}},
                    blockSort==="lecturer"&&group.label==="Unnamed"?"Unnamed Lecturer":group.label
                  )
                ),
                group.items.map((b,bi)=>blockCard(b,b.id,false,gi*10+bi))
              )
            )
          )
        )
      );
    }

    // ── STANDARD COURSE blocks view ───────────────────────────────────────
    const topicCards=getTopicCards(course);
    return e("div",{style:{minHeight:"100vh",background:"#f0ece4"}},
      e("div",{style:{background:course.bg,padding:"clamp(24px,5vw,36px) 20px 28px",position:"relative",overflow:"hidden"}},
        e("div",{style:{position:"absolute",inset:0,backgroundImage:"repeating-linear-gradient(45deg,transparent,transparent 50px,rgba(255,255,255,.03) 50px,rgba(255,255,255,.03) 100px)"}}),
        e("div",{style:{position:"relative",maxWidth:720,margin:"0 auto"}},
          navBtn("← Back",()=>setView("home")),
          e("div",{style:{display:"flex",alignItems:"center",gap:14}},
            e("span",{style:{fontSize:"clamp(1.6rem,4vw,2.2rem)"}},course.emoji),
            e("h2",{style:{fontFamily:"Georgia,serif",fontSize:"clamp(1.4rem,4vw,1.8rem)",fontWeight:900,color:"#fff"}},course.name)
          )
        )
      ),
      e("div",{style:{height:3,background:"linear-gradient(90deg,"+course.accent+","+course.accent+"88)"}}),
      e("div",{style:{maxWidth:720,margin:"0 auto",padding:"28px 20px"}},
        e("div",{style:{display:"flex",flexDirection:"column",gap:11}},
          topicCards.map((g,gi)=>{
            if(g.type==="unified") return blockCard(g.block,"unified",true,gi);
            if(g.type==="block") return blockCard(g.block,g.block.id,false,gi);
            // type==="topic"
            const hasMultiple=g.blocks.filter(b=>b.available&&b.questions.length>0).length>1;
            const singleBlock=!hasMultiple&&g.blocks.find(b=>b.available&&b.questions.length>0);
            return e("div",{key:"t-"+gi,className:"fade-up",
              style:{animationDelay:gi*40+"ms",background:"#fff",borderRadius:6,padding:"17px 20px",
                display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,
                boxShadow:"0 2px 10px rgba(15,39,68,.07)",
                cursor:g.anyAvailable?"pointer":"not-allowed",
                opacity:g.anyAvailable?1:.5,
                border:"1px solid "+(g.anyAvailable?"#e0d8cc":"#e8e3db"),
                transition:"transform .18s,box-shadow .18s",minHeight:68},
              onMouseEnter:ev=>{if(g.anyAvailable){ev.currentTarget.style.transform="translateX(4px)";ev.currentTarget.style.boxShadow="0 6px 22px rgba(15,39,68,.13)";}},
              onMouseLeave:ev=>{ev.currentTarget.style.transform="";ev.currentTarget.style.boxShadow="0 2px 10px rgba(15,39,68,.07)";},
              onClick:()=>{
                if(!g.anyAvailable) return;
                if(singleBlock){ setBlock(singleBlock);setQCount(Math.min(20,singleBlock.questions.length));setView("setup"); }
                else { setTopic(g);setView("topic_blocks"); }
              }},
              e("div",{style:{flex:1,minWidth:0}},
                e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}},
                  e("span",{style:{fontFamily:"Georgia,serif",fontWeight:700,fontSize:"1rem",color:"#0f2744"}},g.label),
                  g.anyAvailable&&e("span",{style:{background:"#e8f5ee",color:"#2e7d32",fontSize:".63rem",padding:"2px 8px",borderRadius:10,textTransform:"uppercase",letterSpacing:".07em"}},"Live"),
                  !g.anyAvailable&&e("span",{style:{background:"#f5f0e8",color:"#bbb",fontSize:".63rem",padding:"2px 8px",borderRadius:10,textTransform:"uppercase",letterSpacing:".07em"}},"Coming Soon")
                ),
                g.anyAvailable&&e("p",{style:{color:"#aaa",fontSize:".76rem"}},
                  g.totalQs+" questions"+(hasMultiple?" · "+g.blocks.filter(b=>b.available&&b.questions.length>0).length+" blocks":"")
                )
              ),
              g.anyAvailable&&e("span",{style:{color:course.accent,fontSize:"1.3rem",flexShrink:0}},hasMultiple?"›":"→")
            );
          })
        )
      )
    );
  }

  /* ══════════ TOPIC BLOCKS ══════════ */
  if(view==="topic_blocks" && topic && course){
    const topicBlocks = topic.blocks;
    const availableBlocks = topicBlocks.filter(b=>b.available&&b.questions.length>0);
    const allTopicQs = availableBlocks.flatMap(b=>b.questions);
    return e("div",{style:{minHeight:"100vh",background:"#f0ece4"}},
      e("div",{style:{background:course.bg,padding:"clamp(24px,5vw,36px) 20px 28px",position:"relative",overflow:"hidden"}},
        e("div",{style:{position:"absolute",inset:0,backgroundImage:"repeating-linear-gradient(45deg,transparent,transparent 50px,rgba(255,255,255,.03) 50px,rgba(255,255,255,.03) 100px)"}}),
        e("div",{style:{position:"relative",maxWidth:720,margin:"0 auto"}},
          navBtn("← Back",()=>setView("blocks")),
          e("div",{style:{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}},
            e("span",{style:{fontSize:"clamp(1.6rem,4vw,2.2rem)"}},course.emoji),
            e("div",null,
              e("p",{style:{color:"rgba(255,255,255,.5)",fontSize:".72rem",letterSpacing:".1em",textTransform:"uppercase",marginBottom:2}},course.name),
              e("h2",{style:{fontFamily:"Georgia,serif",fontSize:"clamp(1.3rem,4vw,1.7rem)",fontWeight:900,color:"#fff"}},topic.label)
            )
          )
        )
      ),
      e("div",{style:{height:3,background:"linear-gradient(90deg,"+course.accent+","+course.accent+"88)"}}),
      e("div",{style:{maxWidth:720,margin:"0 auto",padding:"28px 20px"}},
        e("div",{style:{display:"flex",flexDirection:"column",gap:11}},
          // All topic questions card
          availableBlocks.length>1&&e("div",{className:"fade-up",
            style:{background:"linear-gradient(135deg,#0f2744,#1a3a5c)",borderRadius:6,padding:"17px 20px",
              display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,
              boxShadow:"0 2px 10px rgba(15,39,68,.07)",cursor:"pointer",
              border:"1px solid transparent",transition:"transform .18s,box-shadow .18s",minHeight:68},
            onMouseEnter:ev=>{ev.currentTarget.style.transform="translateX(4px)";ev.currentTarget.style.boxShadow="0 6px 22px rgba(15,39,68,.13)";},
            onMouseLeave:ev=>{ev.currentTarget.style.transform="";ev.currentTarget.style.boxShadow="0 2px 10px rgba(15,39,68,.07)";},
            onClick:()=>{
              const unified={id:"unified_"+topic.label,name:"All "+topic.label+" Questions",questions:allTopicQs,available:true,isUnified:true};
              setBlock(unified);setQCount(Math.min(20,allTopicQs.length));setView("setup");
            }},
            e("div",{style:{flex:1}},
              e("span",{style:{fontFamily:"Georgia,serif",fontWeight:700,fontSize:"1rem",color:"#c9a84c"}},"All "+topic.label+" Questions"),
              e("p",{style:{color:"rgba(255,255,255,.45)",fontSize:".76rem",marginTop:3}},allTopicQs.length+" questions")
            ),
            e("span",{style:{color:"#c9a84c",fontSize:"1.3rem"}},"→")
          ),
          // Individual block cards
          ...topicBlocks.map((b,bi)=>{
            const isPQCard = b.isPastQSection;
            return e("div",{key:b.id,className:"fade-up",
            style:{animationDelay:(bi+1)*60+"ms",
              background:isPQCard?"linear-gradient(135deg,#2a1f0e,#4a3820)":"#fff",
              borderRadius:6,padding:"17px 20px",
              display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,
              boxShadow:"0 2px 10px rgba(15,39,68,.07)",cursor:b.available?"pointer":"not-allowed",
              opacity:b.available?1:.5,border:"1px solid "+(isPQCard?"#6b4f20":b.available?"#e0d8cc":"#e8e3db"),
              transition:"transform .18s,box-shadow .18s",minHeight:68},
            onMouseEnter:ev=>{if(b.available){ev.currentTarget.style.transform="translateX(4px)";ev.currentTarget.style.boxShadow="0 6px 22px rgba(15,39,68,.13)";}},
            onMouseLeave:ev=>{ev.currentTarget.style.transform="";ev.currentTarget.style.boxShadow="0 2px 10px rgba(15,39,68,.07)";},
            onClick:()=>{if(b.available){if(b.isPastQSection){setPqClassOpen({});setPqVotes({});setPqAiOpen({});setPastQExam(null);setView("pastq_system");}else{setBlock(b);setQCount(Math.min(20,b.questions.length));setView("setup");}}}},
            e("div",{style:{flex:1,minWidth:0}},
              e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4}},
                isPQCard&&e("span",{style:{fontSize:"1rem"}},"📜"),
                e("span",{style:{fontFamily:"Georgia,serif",fontWeight:700,fontSize:"1rem",color:isPQCard?"#ffcc80":"#0f2744"}},b.name),
                isPQCard&&e("span",{style:{background:"rgba(255,204,128,.18)",color:"#ffcc80",fontSize:".63rem",padding:"2px 8px",borderRadius:10,textTransform:"uppercase",letterSpacing:".07em"}},"Enahoro"),
                !isPQCard&&b.available&&b.questions.length>0&&e("span",{style:{background:"#e8f5ee",color:"#2e7d32",fontSize:".63rem",padding:"2px 8px",borderRadius:10,textTransform:"uppercase",letterSpacing:".07em"}},"Live"),
                !isPQCard&&(!b.available||b.questions.length===0)&&e("span",{style:{background:"#f5f0e8",color:"#bbb",fontSize:".63rem",padding:"2px 8px",borderRadius:10,textTransform:"uppercase",letterSpacing:".07em"}},"Coming Soon")
              ),
              isPQCard
                ? e("p",{style:{color:"rgba(255,204,128,.5)",fontSize:".76rem"}},"Past exam questions by class & sitting")
                : b.available&&b.questions.length>0&&e("p",{style:{color:"#aaa",fontSize:".76rem"}},b.questions.length+" questions")
            ),
            b.available&&(isPQCard||b.questions.length>0)&&e("span",{style:{color:isPQCard?"#ffcc80":course.accent,fontSize:"1.3rem",flexShrink:0}},"→")
          );})
        )
      )
    );
  }

  /* ══════════ PROGRESS ══════════ */
  if(showProgress){
    const byBlock={};
    allAttempts.forEach(a=>{
      const k=(a.course||"")+" · "+(a.block||"");
      if(!byBlock[k]) byBlock[k]={name:k,attempts:0,totalScore:0,totalQs:0,best:0};
      byBlock[k].attempts++;
      byBlock[k].totalScore+=a.score;
      byBlock[k].totalQs+=a.total;
      const pct=Math.round(a.score/a.total*100);
      if(pct>byBlock[k].best) byBlock[k].best=pct;
    });
    const entries=Object.values(byBlock);
    return e("div",{style:{minHeight:"100vh",background:"#f0ece4"}},
      e("div",{style:{background:"linear-gradient(135deg,#1a3020,#2e5038)",padding:"clamp(24px,5vw,36px) 20px 28px",position:"relative",overflow:"hidden"}},
        e("div",{style:{position:"absolute",inset:0,backgroundImage:"repeating-linear-gradient(45deg,transparent,transparent 50px,rgba(255,255,255,.03) 50px,rgba(255,255,255,.03) 100px)"}}),
        e("div",{style:{position:"relative",maxWidth:720,margin:"0 auto"}},
          navBtn("← Back",()=>setShowProgress(false)),
          e("div",{style:{display:"flex",alignItems:"center",gap:14}},
            e("span",{style:{fontSize:"clamp(1.6rem,4vw,2.2rem)"}},"📈"),
            e("div",null,
              e("h2",{style:{fontFamily:"Georgia,serif",fontSize:"clamp(1.4rem,4vw,1.8rem)",fontWeight:900,color:"#fff"}},"Your Progress"),
              e("p",{style:{color:"rgba(255,255,255,.5)",fontSize:".8rem",marginTop:3}},allAttempts.length+" total attempt"+(allAttempts.length!==1?"s":""))
            )
          )
        )
      ),
      e("div",{style:{height:3,background:"linear-gradient(90deg,#a5d6a7,#81c784)"}}),
      e("div",{style:{maxWidth:720,margin:"0 auto",padding:"28px 20px"}},
        allAttempts.length===0
          ? e("div",{style:{textAlign:"center",padding:"60px 20px"}},
              e("div",{style:{fontSize:"3rem",marginBottom:12}},"📈"),
              e("h3",{style:{fontFamily:"Georgia,serif",color:"#0f2744",fontSize:"1.2rem",marginBottom:8}},"No attempts yet"),
              e("p",{style:{color:"#aaa",fontSize:".9rem"}},"Complete a quiz to start tracking your progress.")
            )
          : e("div",null,
              e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10,marginBottom:24}},
                [{label:"Total Quizzes",value:allAttempts.length,icon:"📝"},
                 {label:"Avg Score",value:Math.round(allAttempts.reduce((s,a)=>s+(a.score/a.total*100),0)/allAttempts.length)+"%",icon:"🎯"},
                 {label:"Best Score",value:Math.max(...allAttempts.map(a=>Math.round(a.score/a.total*100)))+"%",icon:"🏆"},
                 {label:"Topics Done",value:entries.length,icon:"📚"},
                ].map(s=>e("div",{key:s.label,style:{background:"#fff",borderRadius:6,padding:"12px 14px",boxShadow:"0 2px 8px rgba(15,39,68,.07)"}},
                  e("p",{style:{fontSize:".68rem",color:"#aaa",letterSpacing:".07em",textTransform:"uppercase",marginBottom:4}},s.icon+" "+s.label),
                  e("p",{style:{fontFamily:"Georgia,serif",fontWeight:700,fontSize:"clamp(1.2rem,3vw,1.5rem)",color:"#0f2744"}},s.value)
                ))
              ),
              e("h3",{style:{fontFamily:"Georgia,serif",fontSize:"1rem",color:"#0f2744",marginBottom:12,paddingBottom:8,borderBottom:"2px solid #d5cfc4"}},"By Topic"),
              e("div",{style:{display:"flex",flexDirection:"column",gap:10}},
                entries.sort((a,b)=>b.attempts-a.attempts).map((entry,i)=>{
                  const avg=Math.round(entry.totalScore/entry.totalQs*100);
                  const col=avg>=70?"#2e7d32":avg>=50?"#e65100":"#c62828";
                  const bg=avg>=70?"#e8f5ee":avg>=50?"#fff3e0":"#fdecea";
                  return e("div",{key:i,style:{background:"#fff",borderRadius:6,padding:"14px 18px",boxShadow:"0 2px 8px rgba(15,39,68,.07)",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}},
                    e("div",{style:{flex:1,minWidth:0}},
                      e("p",{style:{fontFamily:"Georgia,serif",fontWeight:700,fontSize:".95rem",color:"#0f2744",marginBottom:4}},entry.name),
                      e("p",{style:{fontSize:".75rem",color:"#aaa"}},entry.attempts+" attempt"+(entry.attempts!==1?"s":"")+" · Best: "+entry.best+"%")
                    ),
                    e("div",{style:{textAlign:"right",flexShrink:0}},
                      e("div",{style:{background:bg,color:col,padding:"4px 12px",borderRadius:20,fontFamily:"Georgia,serif",fontWeight:700,fontSize:".9rem",marginBottom:2}},avg+"%"),
                      e("p",{style:{fontSize:".68rem",color:"#aaa"}},"avg")
                    )
                  );
                })
              ),
              e("div",{style:{marginTop:20,textAlign:"center"}},
                e("button",{onClick:()=>{if(confirm("Clear all progress data?")){setAllAttempts([]);try{localStorage.removeItem('medq_all_attempts');}catch{}}},
                  style:{padding:"8px 18px",background:"transparent",border:"1px solid #e0d8cc",borderRadius:4,fontSize:".78rem",color:"#c62828"}},
                  "Clear progress data")
              )
            )
      )
    );
  }


/* ══════════ SETUP ══════════ */
  if(view==="setup"){
    const maxQ=block.questions.length;
    const clampedQ=Math.min(Math.max(qCount,10),maxQ);
    const totalSecsCalc=clampedQ*secsPerQ;
    return e("div",{style:{minHeight:"100vh",background:"#f0ece4",display:"flex",flexDirection:"column",alignItems:"center",padding:"clamp(20px,4vw,48px) 20px"}},
      e("div",{className:"scale-in",style:{background:"#fff",borderRadius:8,boxShadow:"0 8px 40px rgba(15,39,68,.12)",width:"100%",maxWidth:520,overflow:"hidden"}},
        e("div",{style:{background:"linear-gradient(135deg,#0f2744,#1a3a5c)",padding:"clamp(20px,4vw,28px) clamp(20px,4vw,32px)"}},
          e("p",{style:{color:"rgba(255,255,255,.5)",fontSize:".7rem",letterSpacing:".15em",textTransform:"uppercase",marginBottom:5}},course.name),
          e("h2",{style:{fontFamily:"Georgia,serif",fontSize:"clamp(1.1rem,3vw,1.4rem)",fontWeight:900,color:"#fff"}},block.name)
        ),
        e("div",{style:{padding:"clamp(20px,4vw,32px)"}},

          /* Name */
          e("div",{style:{marginBottom:20}},
            e("label",{style:{display:"block",fontSize:".78rem",color:"#555",letterSpacing:".08em",textTransform:"uppercase",marginBottom:7,fontWeight:600}},"Your Name"),
            e("input",{type:"text",placeholder:"e.g. Mikhail Abubakar",value:studentName,
              onChange:ev=>{setStudentName(ev.target.value);setNameErr("");},
              onBlur:ev=>{if(ev.target.value&&!isValidName(ev.target.value))setNameErr("Name must be at least 4 letters (no numbers or symbols)");},
              style:{width:"100%",padding:"12px 16px",border:"1.5px solid "+(nameErr?"#ef5350":"#d5cfc4"),borderRadius:4,fontSize:"1rem",outline:"none",background:"#faf8f5",color:"#1a1a2e",WebkitAppearance:"none"},
              onFocus:ev=>ev.target.style.borderColor="#c9a84c"}),
            nameErr&&e("p",{style:{color:"#c62828",fontSize:".78rem",marginTop:5}},nameErr)
          ),

          /* Question count */
          e("div",{style:{marginBottom:20}},
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
              e("label",{style:{fontSize:".78rem",color:"#555",letterSpacing:".08em",textTransform:"uppercase",fontWeight:600}},"Number of Questions"),
              e("span",{style:{fontFamily:"Georgia,serif",fontWeight:700,color:"#0f2744",fontSize:"1rem"}},clampedQ)
            ),
            e("input",{type:"range",min:10,max:maxQ,step:1,value:clampedQ,onChange:ev=>setQCount(Number(ev.target.value))}),
            e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:".7rem",color:"#aaa",marginTop:4}},
              e("span",null,"10 (min)"),e("span",null,maxQ+" (all)")
            ),
            e("p",{style:{fontSize:".74rem",color:"#aaa",marginTop:5,fontStyle:"italic"}},"Drag slider to choose how many questions to attempt")
          ),

          /* Timer */
          e("div",{style:{marginBottom:24}},
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
              e("label",{style:{fontSize:".78rem",color:"#555",letterSpacing:".08em",textTransform:"uppercase",fontWeight:600}},"Time Per Question"),
              e("span",{style:{fontFamily:"Georgia,serif",fontWeight:700,color:"#0f2744",fontSize:"1rem"}},secsPerQ<60?secsPerQ+"s":secsPerQ===60?"1 min":Math.floor(secsPerQ/60)+"m "+(secsPerQ%60>0?secsPerQ%60+"s":""))
            ),
            e("input",{type:"range",min:30,max:120,step:15,value:secsPerQ,onChange:ev=>setSecsPerQ(Number(ev.target.value))}),
            e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:".7rem",color:"#aaa",marginTop:4}},
              e("span",null,"30s"),e("span",null,"1 min"),e("span",null,"2 min")
            ),
            e("p",{style:{fontSize:".74rem",color:"#aaa",marginTop:5,fontStyle:"italic"}},"Drag slider to adjust — max 2 minutes per question")
          ),

          /* Summary */
          e("div",{style:{background:"linear-gradient(135deg,#0f2744,#1a3a5c)",borderRadius:6,padding:"14px 18px",marginBottom:22,display:"flex",justifyContent:"space-between",alignItems:"center"}},
            e("div",null,
              e("p",{style:{color:"rgba(255,255,255,.5)",fontSize:".68rem",letterSpacing:".1em",textTransform:"uppercase",marginBottom:2}},"Total Time"),
              e("p",{style:{fontFamily:"Georgia,serif",fontSize:"clamp(1.4rem,4vw,1.8rem)",fontWeight:900,color:"#c9a84c"}},fmtTime(totalSecsCalc))
            ),
            e("div",{style:{textAlign:"right"}},
              e("p",{style:{color:"rgba(255,255,255,.5)",fontSize:".68rem",letterSpacing:".1em",textTransform:"uppercase",marginBottom:2}},"Questions"),
              e("p",{style:{fontFamily:"Georgia,serif",fontSize:"clamp(1.4rem,4vw,1.8rem)",fontWeight:900,color:"#fff"}},clampedQ)
            )
          ),

          e("div",{style:{background:"#f0f7ff",border:"1px solid #c5d8f0",borderRadius:4,padding:"11px 14px",marginBottom:20,fontSize:".82rem",color:"#1a3a5c",lineHeight:1.65}},
            "ℹ️ You can pause the test at any time. The timer also pauses automatically if you leave the app."
          ),

          /* Buttons */
          e("div",{style:{display:"flex",gap:10}},
            e("button",{onClick:()=>setView(topic?"topic_blocks":"blocks"),style:{flex:1,padding:"13px",background:"transparent",border:"1.5px solid #d5cfc4",borderRadius:4,fontSize:".9rem",color:"#666",minHeight:50}},"← Back"),
            e("button",{onClick:()=>{
              if(!isValidName(studentName.trim())){setNameErr("Name must be at least 4 letters (no numbers or symbols)");return;}
              beginQuiz();
            },
              style:{flex:2,padding:"13px",background:isValidName(studentName.trim())?"#0f2744":"#ccc",color:isValidName(studentName.trim())?"#c9a84c":"#999",border:"none",borderRadius:4,fontFamily:"Georgia,serif",fontWeight:700,fontSize:"1rem",letterSpacing:".04em",minHeight:50,cursor:isValidName(studentName.trim())?"pointer":"not-allowed"}},
              "Start Test →"
            )
          )
        )
      )
    );
  }

  /* ══════════ QUIZ ══════════ */


  // ── FLAG MODAL ──
  if(flagModal && view==="quiz"){
    const q=qs[qIdx];
    return e(React.Fragment,null,
      // render quiz behind (just the overlay)
      e("div",{style:{position:"fixed",inset:0,background:"rgba(10,25,47,.82)",zIndex:300,
        display:"flex",alignItems:"center",justifyContent:"center",padding:20},
        onClick:()=>{if(!flagSubmitting){setFlagModal(false);setPaused(false);}}},
        e("div",{style:{background:"#fff",borderRadius:8,padding:"clamp(20px,4vw,28px)",
          width:"100%",maxWidth:420,boxShadow:"0 16px 48px rgba(0,0,0,.4)"},
          onClick:ev=>ev.stopPropagation()},
          flagDone
            ? e("div",{style:{textAlign:"center",padding:"8px 0"}},
                e("div",{style:{fontSize:"2.5rem",marginBottom:12}},"✅"),
                e("h3",{style:{fontFamily:"Georgia,serif",fontWeight:700,fontSize:"1.1rem",color:"#0f2744",marginBottom:8}},"Flag submitted"),
                e("p",{style:{color:"#666",fontSize:".88rem",lineHeight:1.6,marginBottom:20}},"Your comment has been recorded. The admin will review and update this question when you next ask."),
                e("button",{onClick:()=>{setFlagModal(false);setPaused(false);},
                  style:{width:"100%",padding:"12px",background:"#0f2744",color:"#c9a84c",
                    border:"none",borderRadius:4,fontFamily:"Georgia,serif",fontWeight:700,fontSize:"1rem",minHeight:44}},
                  "Resume quiz ▶")
              )
            : e("div",null,
                e("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:14}},
                  e("span",{style:{fontSize:"1.4rem"}},"🚩"),
                  e("h3",{style:{fontFamily:"Georgia,serif",fontWeight:700,fontSize:"1.05rem",color:"#0f2744"}},"Flag this question")
                ),
                e("div",{style:{background:"#f7f3ed",borderRadius:4,padding:"10px 12px",marginBottom:14,
                  fontSize:".8rem",color:"#555",lineHeight:1.55,borderLeft:"3px solid #c9a84c"}},
                  "Q"+(qIdx+1)+": "+q.q.slice(0,100)+(q.q.length>100?"...":"")
                ),
                e("textarea",{value:flagComment,onChange:ev=>setFlagComment(ev.target.value),
                  placeholder:"Your comment (optional):\ne.g. 'Option B is a giveaway' or 'I think the answer is wrong because...'",
                  rows:3,autoFocus:true,
                  style:{width:"100%",padding:"10px 12px",border:"1.5px solid #d5cfc4",borderRadius:4,
                    fontSize:".88rem",outline:"none",resize:"vertical",fontFamily:"inherit",
                    background:"#faf8f5",boxSizing:"border-box",marginBottom:14}}),
                e("div",{style:{display:"flex",gap:10}},
                  e("button",{onClick:()=>{setFlagModal(false);setPaused(false);},
                    style:{flex:1,padding:"11px",background:"transparent",border:"1.5px solid #d5cfc4",
                      borderRadius:4,color:"#666",minHeight:44,fontSize:".88rem"}},"Cancel"),
                  e("button",{
                    onClick:async()=>{
                      setFlagSubmitting(true);
                      await saveFlag({
                        qText:q.q, qNumber:qIdx+1, totalQs:qs.length,
                        correctAns:q.opts[q.ans], studentName, 
                        block:block?.name||"", course:course?.name||"",
                        comment:flagComment.trim()||"(no comment)",
                        ts:new Date().toISOString()
                      });
                      setFlagSubmitting(false);
                      setFlagDone(true);
                    },
                    disabled:flagSubmitting,
                    style:{flex:2,padding:"11px",background:"#c62828",color:"#fff",
                      border:"none",borderRadius:4,fontFamily:"Georgia,serif",fontWeight:700,
                      fontSize:".95rem",minHeight:44,opacity:flagSubmitting?.6:1}},
                    flagSubmitting?"Submitting...":"Submit 🚩")
                )
              )
        )
      )
    );
  }


  if(view==="quiz"){
    const q=qs[qIdx];
    const progress=(qIdx/qs.length)*100;
    return e("div",{style:{minHeight:"100vh",background:"#f0ece4",paddingBottom:40}},
      /* Top bar */
      e("div",{style:{background:"#0f2744",padding:"0 16px",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,.25)"}},
        e("div",{style:{maxWidth:760,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:54}},
          /* Timer */
          e("div",{style:{display:"flex",alignItems:"center",gap:8}},
            e("div",{style:{width:30,height:30,borderRadius:"50%",border:"2.5px solid "+(paused?"#ffb300":timerColor),display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
              e("span",{style:{fontSize:".52rem",color:paused?"#ffb300":timerColor}},paused?"⏸":"⏱")
            ),
            e("span",{style:{fontFamily:"Georgia,serif",fontSize:"clamp(1.1rem,3vw,1.35rem)",fontWeight:700,color:paused?"#ffb300":timerColor,minWidth:58}},(paused?"PAUSED":fmtTime(timeLeft)))
          ),
          /* Progress */
          e("div",{style:{flex:1,margin:"0 12px"}},
            e("div",{style:{background:"rgba(255,255,255,.12)",borderRadius:10,height:5,overflow:"hidden"}},
              e("div",{style:{width:progress+"%",height:"100%",background:"linear-gradient(90deg,#c9a84c,#e8c97a)",borderRadius:10,transition:"width .4s ease"}})
            ),
            e("p",{style:{textAlign:"center",color:"rgba(255,255,255,.45)",fontSize:".63rem",marginTop:3}},(qIdx+1)+" / "+qs.length)
          ),
          /* Score + Pause */
          e("div",{style:{display:"flex",alignItems:"center",gap:10}},
            e("div",{style:{textAlign:"right"}},
              e("p",{style:{color:"rgba(255,255,255,.45)",fontSize:".6rem",letterSpacing:".08em",textTransform:"uppercase"}},"Score"),
              e("p",{style:{fontFamily:"Georgia,serif",fontWeight:700,color:"#c9a84c",fontSize:"1rem"}},correctRef.current+"/"+answeredRef.current)
            ),
            e("button",{onClick:()=>setPaused(p=>!p),
              style:{background:paused?"#c9a84c":"rgba(255,255,255,.12)",border:"none",color:paused?"#0f2744":"rgba(255,255,255,.8)",padding:"6px 12px",borderRadius:4,fontSize:".78rem",minHeight:34,flexShrink:0}},
              paused?"▶ Resume":"⏸ Pause"
            ),
            e("button",{onClick:()=>{setPaused(true);setFlagModal(true);setFlagComment("");setFlagDone(false);},
              title:"Flag this question",
              style:{background:"rgba(220,50,50,.18)",border:"1px solid rgba(220,50,50,.35)",
                color:"#ff8a80",padding:"6px 10px",borderRadius:4,fontSize:".9rem",minHeight:34,flexShrink:0}},
              "🚩"),
            e("button",{onClick:()=>qs[qIdx]&&toggleFavorite(qs[qIdx], block?.name||"", course?.name||""),
              title:(qs[qIdx]&&isFavorite(qs[qIdx]))?"Remove from favourites":"Add to favourites",
              style:{background:(qs[qIdx]&&isFavorite(qs[qIdx]))?"rgba(255,193,7,.25)":"rgba(255,255,255,.12)",
                border:"1px solid "+((qs[qIdx]&&isFavorite(qs[qIdx]))?"rgba(255,193,7,.5)":"rgba(255,255,255,.2)"),
                color:(qs[qIdx]&&isFavorite(qs[qIdx]))?"#ffc107":"rgba(255,255,255,.7)",
                padding:"6px 10px",borderRadius:4,fontSize:".9rem",minHeight:34,flexShrink:0}},
              "⭐")
          )
        )
      ),

      /* Pause overlay */
      paused && e("div",{style:{position:"fixed",inset:0,background:"rgba(10,25,47,.95)",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:20,textAlign:"center"}},
        e("div",{style:{fontSize:"3rem"}},"⏸"),
        e("h3",{style:{fontFamily:"Georgia,serif",color:"#fff",fontSize:"clamp(1.2rem,3vw,1.5rem)",fontWeight:700}},"Test Paused"),
        e("p",{style:{color:"rgba(255,255,255,.6)",fontSize:".9rem",maxWidth:300,lineHeight:1.65}},"Take a breather. Your progress is saved and the timer is stopped."),
        e("p",{style:{color:"#c9a84c",fontFamily:"Georgia,serif",fontSize:"1.1rem",fontWeight:700}},fmtTime(timeLeft)+" remaining"),
        e("button",{onClick:()=>setPaused(false),style:{marginTop:8,background:"#c9a84c",color:"#0f2744",border:"none",borderRadius:4,padding:"13px 32px",fontFamily:"Georgia,serif",fontWeight:700,fontSize:"1rem",minHeight:50}},"▶ Resume Test")
      ),

      /* Question */
      e("div",{key:qIdx,className:"slide-in",style:{maxWidth:760,margin:"0 auto",padding:"20px 16px"}},
        e("div",{style:{background:"#fff",borderRadius:6,overflow:"hidden",boxShadow:"0 4px 20px rgba(15,39,68,.09)"}},
          e("div",{style:{background:"linear-gradient(135deg,#0f2744,#1a3a5c)",padding:"clamp(16px,3vw,24px) clamp(16px,3vw,28px)"}},
            e("p",{style:{color:"#c9a84c",fontSize:".68rem",letterSpacing:".15em",textTransform:"uppercase",fontWeight:600,marginBottom:8}},"Question "+(qIdx+1)+" of "+qs.length),
            e("p",{style:{color:"#e8edf4",fontSize:"clamp(.92rem,2vw,1.05rem)",lineHeight:1.82,fontWeight:300}},q.q)
          ),
          q.img&&e("div",{style:{background:"#0a1e35",padding:"0 clamp(16px,3vw,28px) clamp(12px,2vw,18px)",textAlign:"center"}},
            e("img",{src:q.img,alt:"Clinical image",
              style:{maxWidth:"100%",maxHeight:340,borderRadius:4,border:"1px solid rgba(255,255,255,.1)",objectFit:"contain"},
              onError:ev=>{ev.target.style.display="none";}})
          ),
          e("div",{style:{padding:"clamp(16px,3vw,22px) clamp(16px,3vw,28px)"}},
            e("div",{style:{display:"flex",flexDirection:"column",gap:10}},
              q.opts.map((opt,i)=>{
                let bg="#f7f3ed",border="1.5px solid #ddd6c6",color="#1a1a2e",circBg="#0f2744";
                if(picked!==null){
                  if(i===q.ans){bg="#e8f5ee";border="1.5px solid #66bb6a";color="#1b5e20";circBg="#2e7d32";}
                  else if(i===picked){bg="#fdecea";border="1.5px solid #ef9a9a";color="#b71c1c";circBg="#c62828";}
                  else{bg="#f7f3ed";color="#bbb";border="1.5px solid #ece6dc";circBg="#bbb";}
                }
                return e("button",{key:i,disabled:picked!==null,onClick:()=>pickAnswer(i),
                  style:{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 16px",background:bg,border,borderRadius:4,cursor:picked===null?"pointer":"default",textAlign:"left",fontSize:"clamp(.88rem,2vw,.97rem)",color,lineHeight:1.6,transition:"all .15s",width:"100%",minHeight:52},
                  onMouseEnter:ev=>{if(picked===null){ev.currentTarget.style.background="#ede8df";ev.currentTarget.style.transform="translateX(2px)";}},
                  onMouseLeave:ev=>{if(picked===null){ev.currentTarget.style.background=bg;ev.currentTarget.style.transform="";}},
                },
                  e("span",{style:{flexShrink:0,width:26,height:26,borderRadius:"50%",background:circBg,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".68rem",fontWeight:700,marginTop:2,transition:"background .2s"}},LETTERS[i]),
                  e("span",{style:{flex:1}},opt)
                );
              })
            ),
            showFb&&e("div",{className:"fade-up",style:{marginTop:18,borderRadius:4,padding:"14px 18px",background:picked===q.ans?"#e8f5ee":"#fdecea",borderLeft:"4px solid "+(picked===q.ans?"#66bb6a":"#ef9a9a")}},
              e("p",{style:{fontFamily:"Georgia,serif",fontWeight:700,fontSize:"clamp(.93rem,2vw,1rem)",color:picked===q.ans?"#1b5e20":"#b71c1c",marginBottom:6}},
                picked===q.ans?"✓ Correct!":"✗ Incorrect — Answer: "+LETTERS[q.ans]+": "+q.opts[q.ans]
              ),
              e("p",{style:{fontSize:"clamp(.82rem,1.8vw,.88rem)",lineHeight:1.78,color:"#333",fontWeight:300}},
                e("span",{style:{display:"block",fontWeight:600,fontSize:".72rem",letterSpacing:".1em",textTransform:"uppercase",color:picked===q.ans?"#2e7d32":"#c62828",marginBottom:4}},"Explanation"),
                q.exp
              )
            ),
            showFb&&e("button",{className:"fade-up",onClick:nextQ,
              style:{width:"100%",marginTop:14,padding:"14px",background:"#0f2744",color:"#c9a84c",border:"none",borderRadius:4,fontFamily:"Georgia,serif",fontWeight:700,fontSize:"1rem",letterSpacing:".04em",minHeight:52},
              onMouseEnter:ev=>ev.currentTarget.style.background="#1a3a5c",
              onMouseLeave:ev=>ev.currentTarget.style.background="#0f2744"},
              qIdx+1<qs.length?"Next Question →":"Finish Test ✓"
            )
          )
        )
      )
    );
  }

  /* ══════════ RESULTS ══════════ */
  if(view==="results"&&result){
    const pct=Math.round((result.score/result.total)*100);
    const grade=pct>=80?{label:"Excellent · Pass",color:"#2e7d32",bg:"#e8f5ee"}:pct>=60?{label:"Good · Borderline",color:"#e65100",bg:"#fff3e0"}:{label:"Needs Revision",color:"#c62828",bg:"#fdecea"};
    const failedQs=result.questions.filter((_,i)=>{ const ans=result.answers.find(a=>a.qIdx===i); return ans&&!ans.correct; });

    if(reviewMode) return e("div",{style:{minHeight:"100vh",background:"#f0ece4"}},
      e("div",{style:{background:"linear-gradient(135deg,#0f2744,#1a3a5c)",padding:"clamp(18px,4vw,26px) 20px"}},
        e("div",{style:{maxWidth:760,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}},
          e("div",null,
            e("p",{style:{color:"#c9a84c",fontSize:".7rem",letterSpacing:".12em",textTransform:"uppercase",marginBottom:3}},"Review"),
            e("h2",{style:{fontFamily:"Georgia,serif",fontSize:"clamp(1.1rem,3vw,1.4rem)",fontWeight:900,color:"#fff"}},"All Questions & Answers")
          ),
          e("button",{onClick:()=>{setReviewMode(false);setReviewIdx(null);},style:{background:"rgba(255,255,255,.12)",border:"none",color:"rgba(255,255,255,.8)",padding:"8px 14px",borderRadius:4,fontSize:".8rem",minHeight:40}},"← Back to Results")
        )
      ),
      e("div",{style:{height:3,background:"linear-gradient(90deg,#c9a84c,#e8c97a)"}}),
      e("div",{style:{maxWidth:760,margin:"0 auto",padding:"24px 16px"}},
        result.questions.map((q,i)=>{
          const ans=result.answers.find(a=>a.qIdx===i);
          const pickedIdx=ans?ans.picked:null;
          const isCorrect=ans?ans.correct:null;
          const isExpanded=reviewIdx===i;
          return e("div",{key:i,className:"fade-up",style:{animationDelay:i*30+"ms",background:"#fff",borderRadius:6,marginBottom:12,overflow:"hidden",boxShadow:"0 2px 10px rgba(15,39,68,.07)",border:"1px solid "+(isCorrect===null?"#e0d8cc":isCorrect?"#66bb6a":"#ef9a9a")}},
            e("div",{onClick:()=>setReviewIdx(isExpanded?null:i),style:{padding:"14px 18px",display:"flex",alignItems:"flex-start",gap:12,cursor:"pointer"}},
              e("div",{style:{flexShrink:0,width:28,height:28,borderRadius:"50%",background:isCorrect===null?"#ccc":isCorrect?"#2e7d32":"#c62828",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".75rem",fontWeight:700,marginTop:2}},
                isCorrect===null?"—":isCorrect?"✓":"✗"
              ),
              e("div",{style:{flex:1,minWidth:0}},
                e("p",{style:{fontSize:".7rem",color:"#aaa",letterSpacing:".08em",textTransform:"uppercase",marginBottom:4}},"Q"+(i+1)+" · "+(isCorrect===null?"Not answered":isCorrect?"Correct":"Incorrect")),
                e("p",{style:{fontSize:"clamp(.88rem,2vw,.95rem)",color:"#1a1a2e",lineHeight:1.65}},q.q.length>120&&!isExpanded?q.q.slice(0,120)+"...":q.q)
              ),
              e("span",{style:{color:"#c9a84c",fontSize:"1.1rem",flexShrink:0,marginTop:4}},isExpanded?"▲":"▼")
            ),
            isExpanded&&e("div",{style:{padding:"0 18px 16px",borderTop:"1px solid #f0ece4"}},
              q.img&&e("div",{style:{textAlign:"center",margin:"14px 0 6px"}},
                e("img",{src:q.img,alt:"Clinical image",
                  style:{maxWidth:"100%",maxHeight:280,borderRadius:4,border:"1px solid #e0d8cc",objectFit:"contain"},
                  onError:ev=>{ev.target.style.display="none";}})
              ),
              e("div",{style:{display:"flex",flexDirection:"column",gap:8,marginTop:12}},
                q.opts.map((opt,oi)=>{
                  let bg="#f7f3ed",border="1.5px solid #e0d8cc",color="#555",circBg="#bbb";
                  if(oi===q.ans){bg="#e8f5ee";border="1.5px solid #66bb6a";color="#1b5e20";circBg="#2e7d32";}
                  else if(pickedIdx!==null&&oi===pickedIdx&&oi!==q.ans){bg="#fdecea";border="1.5px solid #ef9a9a";color="#b71c1c";circBg="#c62828";}
                  return e("div",{key:oi,style:{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 14px",background:bg,border,borderRadius:4}},
                    e("span",{style:{flexShrink:0,width:24,height:24,borderRadius:"50%",background:circBg,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".65rem",fontWeight:700}},LETTERS[oi]),
                    e("span",{style:{fontSize:".9rem",color,lineHeight:1.55}},opt)
                  );
                })
              ),
              e("div",{style:{marginTop:14,background:"#f5f0e8",borderRadius:4,padding:"12px 14px"}},
                e("p",{style:{fontWeight:700,fontSize:".72rem",letterSpacing:".1em",textTransform:"uppercase",color:"#8a6f30",marginBottom:4}},"Explanation"),
                e("p",{style:{fontSize:".88rem",lineHeight:1.75,color:"#333"}},q.exp)
              ),
              e("button",{onClick:()=>toggleFavorite(q, block?.name||result?.block||"", course?.name||result?.course||""),
                style:{marginTop:10,padding:"7px 14px",borderRadius:4,fontSize:".8rem",
                  background:isFavorite(q)?"#fff3cd":"#f7f3ed",
                  border:"1px solid "+(isFavorite(q)?"#ffc107":"#d5cfc4"),
                  color:isFavorite(q)?"#856404":"#666"}},
                isFavorite(q)?"⭐ Saved to Favourites":"☆ Save to Favourites")
            )
          );
        })
      )
    );

    return e("div",{style:{minHeight:"100vh",background:"#f0ece4",display:"flex",flexDirection:"column",alignItems:"center",padding:"clamp(24px,5vw,48px) 16px"}},
      e("div",{className:"scale-in",style:{background:"#fff",borderRadius:8,boxShadow:"0 8px 40px rgba(15,39,68,.12)",width:"100%",maxWidth:520,overflow:"hidden"}},
        e("div",{style:{background:"linear-gradient(135deg,#0f2744,#1a3a5c)",padding:"clamp(24px,5vw,36px) clamp(20px,5vw,32px)",textAlign:"center"}},
          e("p",{style:{color:"rgba(255,255,255,.5)",fontSize:".7rem",letterSpacing:".15em",textTransform:"uppercase",marginBottom:5}},result.course+" · "+result.block),
          e("h2",{style:{fontFamily:"Georgia,serif",fontSize:"clamp(1.3rem,3vw,1.6rem)",fontWeight:900,color:"#fff",marginBottom:8}},"Test Complete"),
          e("div",{style:{fontFamily:"Georgia,serif",fontSize:"clamp(3rem,8vw,4rem)",fontWeight:900,color:"#c9a84c",lineHeight:1}},pct+"%"),
          e("p",{style:{color:"rgba(255,255,255,.6)",marginTop:4,fontWeight:300,fontSize:"clamp(.85rem,2vw,.95rem)"}},result.score+" correct out of "+result.total)
        ),
        e("div",{style:{height:3,background:"linear-gradient(90deg,"+grade.color+"55,"+grade.color+","+grade.color+"55)"}}),
        e("div",{style:{padding:"clamp(20px,4vw,28px) clamp(20px,4vw,32px)"}},
          e("div",{style:{textAlign:"center",marginBottom:20}},
            e("span",{style:{display:"inline-block",background:grade.bg,color:grade.color,padding:"8px 22px",borderRadius:20,fontFamily:"Georgia,serif",fontWeight:700,fontSize:".93rem"}},grade.label)
          ),
          e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}},
            [{label:"Answered",value:result.answered+" / "+result.total},
             {label:"Time Used",value:fmtTime(result.timeUsed)},
             {label:"Correct",value:result.score,color:"#2e7d32"},
             {label:"Incorrect",value:result.answered-result.score,color:(result.answered-result.score)>0?"#c62828":"#2e7d32"},
             {label:"Timed Out",value:result.timedOut?"Yes":"No",warn:result.timedOut},
             {label:"Student",value:result.studentName}
            ].map(s=>e("div",{key:s.label,style:{background:"#f7f3ed",borderRadius:4,padding:"11px 14px"}},
              e("p",{style:{fontSize:".66rem",color:"#aaa",letterSpacing:".07em",textTransform:"uppercase",marginBottom:3}},s.label),
              e("p",{style:{fontFamily:"Georgia,serif",fontWeight:700,fontSize:"clamp(.9rem,2.5vw,1.05rem)",color:s.warn?"#c62828":s.color||"#0f2744",wordBreak:"break-word"}},s.value)
            ))
          ),
          /* Action buttons */
          e("div",{style:{display:"flex",flexDirection:"column",gap:10}},
            e("button",{onClick:()=>{setReviewMode(true);setReviewIdx(null);},
              style:{width:"100%",padding:"12px",background:"#f0f7ff",color:"#0f2744",border:"1.5px solid #c5d8f0",borderRadius:4,fontFamily:"Georgia,serif",fontWeight:700,fontSize:".95rem",minHeight:48}},
              "📋 Review All Questions"
            ),
            failedQs.length>0&&e("button",{onClick:()=>{beginQuiz(failedQs);},
              style:{width:"100%",padding:"12px",background:"#fff3e0",color:"#e65100",border:"1.5px solid #ffcc80",borderRadius:4,fontFamily:"Georgia,serif",fontWeight:700,fontSize:".95rem",minHeight:48}},
              "🔁 Retake Failed Questions ("+failedQs.length+")"
            ),
            e("div",{style:{display:"flex",gap:10}},
              e("button",{onClick:()=>setView("home"),style:{flex:1,padding:"12px",background:"transparent",border:"1.5px solid #d5cfc4",borderRadius:4,color:"#666",fontSize:".9rem",minHeight:48}},"Home"),
              e("button",{onClick:()=>{setPicked(null);setShowFb(false);setView("setup");},style:{flex:2,padding:"12px",background:"#0f2744",color:"#c9a84c",border:"none",borderRadius:4,fontFamily:"Georgia,serif",fontWeight:700,fontSize:"1rem",minHeight:48}},"Try Again")
            )
          )
        )
      ),
      /* Support banner — outside card so it renders on mobile too */
      e("div",{style:{width:"100%",maxWidth:520}},
        e(SupportBanner,null)
      )
    );
  }

  /* ══════════ ADMIN ══════════ */
  if(view==="admin"){
    const filtered=filterCourse==="all"?attempts:attempts.filter(a=>a.course===filterCourse);
    const avgScore=filtered.length?Math.round(filtered.reduce((s,a)=>s+(a.score/a.total*100),0)/filtered.length):0;
    const uniqueStudents=[...new Set(filtered.map(a=>a.studentName))].length;

    if(!adminOpen) return e("div",{style:{minHeight:"100vh",background:"#f0ece4",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
      e("div",{className:"scale-in",style:{background:"#fff",borderRadius:8,boxShadow:"0 8px 40px rgba(15,39,68,.12)",width:"100%",maxWidth:370,padding:"clamp(24px,5vw,36px) clamp(20px,5vw,32px)"}},
        e("div",{style:{textAlign:"center",marginBottom:24}},
          e("div",{style:{fontSize:"2.4rem",marginBottom:10}},"🔐"),
          e("h2",{style:{fontFamily:"Georgia,serif",fontSize:"1.45rem",fontWeight:900,color:"#0f2744"}},"Admin Panel"),
          e("p",{style:{color:"#888",fontSize:".85rem",marginTop:4,fontWeight:300}},"MedQ Platform — Admin")
        ),
