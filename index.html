  { q:"Atrial natriuretic peptide (ANP) in heart failure is released from atrial myocytes in response to:", opts:["Reduced renal perfusion", "Elevated sympathetic tone", "Atrial stretch from raised filling pressures", "Ventricular wall stress during systole", "Aldosterone excess"], ans:2, exp:"ANP is released from ATRIAL MYOCYTES in response to ATRIAL STRETCH (elevated filling pressures). Its counter-regulatory effects: DIURESIS, VASODILATION, and SUPPRESSION of the RAAS pathway. BNP is from VENTRICULAR myocytes. Both peptides are released as compensatory counter-regulatory mechanisms opposing salt/water retention and vasoconstriction." },
  { q:"Beta-blockers in heart failure are prescribed specifically for patients in which NYHA classes?", opts:["Class I only", "Class II only", "Class I and II", "Class III and IV", "All classes equally"], ans:2, exp:"Per standard guidelines beta-blockers for NYHA Class I and II. In ACUTE DECOMPENSATED or SEVERE heart failure (Class III–IV), starting beta-blockers is avoided as their negative inotropy worsens haemodynamics. In STABLE patients (Class I–II), carvedilol, bisoprolol, and metoprolol succinate significantly reduce mortality (MERIT-HF, COPERNICUS, CIBIS trials)." },
  { q:"A 70-year-old man with a 40-pack-year smoking history presents with breathlessness, bilateral ankle oedema, and elevated JVP. Echo shows EF 27% and dilated cardiomegaly. BNP is markedly raised. His CXR shows pulmonary oedema. What is the diagnosis?", opts:["Cor pulmonale from COPD", "Constrictive pericarditis", "Heart failure with reduced ejection fraction (HFrEF)", "Superior vena cava obstruction", "Nephrotic syndrome with hypoalbuminaemia"], ans:2, exp:"EF 27% + markedly elevated BNP + bibasal crepitations + pulmonary oedema on CXR = HFrEF (systolic heart failure). Cor pulmonale would show right heart failure (elevated JVP + peripheral oedema) but NOT pulmonary oedema or low EF — it causes RV dysfunction, not LV systolic failure. Elevated BNP clinches the HF diagnosis. COPD smoking history is a red herring." },
  { q:"Sacubitril/valsartan (ARNI) is specifically indicated in heart failure with reduced ejection fraction. How does sacubitril contribute its benefit?", opts:["It blocks AT1 receptors more potently than standard ARBs", "It inhibits neprilysin, preventing the breakdown of natriuretic peptides", "It directly stimulates BNP production from ventricular myocytes", "It blocks aldosterone receptors in the cardiac interstitium", "It reduces heart rate through HCN channel inhibition"], ans:1, exp:"Sacubitril is a NEPRILYSIN INHIBITOR. Neprilysin degrades natriuretic peptides (BNP, ANP). By INHIBITING NEPRILYSIN, sacubitril increases circulating BNP and ANP → enhanced diuresis, vasodilation, and RAAS suppression. Combined with valsartan (ARB), the PARADIGM-HF trial showed superiority over enalapril alone in reducing HFrEF mortality. ARNIs are now a key pillar of HFrEF therapy." },
  { q:"Hypertension causes stroke by which mechanism?", opts:["Cerebral autoregulatory vasospasm causing ischaemia", "Hypertension-induced arterial wall damage predisposing to thrombosis or haemorrhage", "Reduced cardiac output causing global cerebral hypoperfusion", "Elevated JVP directly impairing cerebral venous drainage", "Direct neuronal damage from elevated systemic pressure"], ans:1, exp:"Chronic HTN accelerates ATHEROSCLEROSIS (causing thrombotic/ischaemic stroke) and weakens small perforating arteries (causing INTRACEREBRAL HAEMORRHAGE, especially in the basal ganglia and thalamus). HTN is the single most important modifiable risk factor for stroke. Clinical features: face/mouth deviation, slurring of speech, arm weakness." },
  { q:"Furosemide (frusemide) relieves symptoms in heart failure primarily by:", opts:["Improving myocardial contractility through calcium sensitisation", "Blocking aldosterone receptors to prevent cardiac fibrosis", "Reducing preload by promoting natriuresis and diuresis", "Vasodilation of the arterial system to reduce afterload", "Suppressing the RAAS pathway at the level of ACE"], ans:2, exp:"Loop diuretics act on the thick ascending limb of the loop of Henle (Na-K-2Cl cotransport inhibition) → NATRIURESIS and DIURESIS → reduced circulating volume → reduced PRELOAD → relief of pulmonary and peripheral congestion. They RELIEVE SYMPTOMS effectively but have NOT been shown to reduce mortality. Mortality benefit in HFrEF comes from ACEIs, beta-blockers, MRAs, and SGLT2 inhibitors." },
  { q:"Chronic sympathetic activation in heart failure leads to cardiomyocyte apoptosis. What is the initial purpose of this sympathetic activation?", opts:["To cause vasoconstriction and maintain renal perfusion", "To provide inotropic support through baroreceptor stimulation, compensating for reduced cardiac output", "To suppress the RAAS pathway and limit fluid retention", "To activate ANP release from the atria", "To stimulate BNP production for counter-regulatory vasodilation"], ans:1, exp:"Baroreceptors on the AORTIC ARCH and VENTRICLE detect reduced cardiac output → INCREASED SYMPATHETIC ACTIVITY → positive inotropic effect (increased contractility and heart rate). Initially COMPENSATORY — maintaining cardiac output. Over time, sustained sympathetic activation → CATECHOLAMINE TOXICITY → CARDIOMYOCYTE APOPTOSIS (programmed cell death) → worsening ventricular function." },
  { q:"A patient with HFrEF is being optimised on medical therapy. Which combination of drugs represents the recommended four-pillar pharmacological approach in current guidelines?", opts:["Digoxin, furosemide, aspirin, and statin", "ACEi or ARB, beta-blocker, MRA, and SGLT2 inhibitor", "ACEi, loop diuretic, calcium channel blocker, and nitrate", "Beta-blocker, anticoagulant, amiodarone, and diuretic", "ARB, digoxin, hydralazine, and isosorbide dinitrate"], ans:1, exp:"The four MORTALITY-REDUCING pillars of HFrEF therapy: (1) ACEi/ARB (or ARNI sacubitril/valsartan), (2) BETA-BLOCKER (carvedilol/bisoprolol/metoprolol succinate), (3) MRA (spironolactone/eplerenone), and (4) SGLT2 INHIBITOR (dapagliflozin/empagliflozin). The material lists all four classes. Diuretics relieve symptoms but do not reduce mortality. Digoxin has limited use." },
];


const CARDIO_S3_Qs = [
  { q:"In the pathophysiology of mitral stenosis, narrowing of the mitral valve first leads to:", opts:["Increased left ventricular end-diastolic pressure", "Aortic root dilatation", "Elevated left atrial pressure with subsequent left atrial dilatation", "Systemic hypotension", "Reduced right ventricular afterload"], ans:2, exp:"MS pathway: narrowed mitral valve → ELEVATED LEFT ATRIAL PRESSURE → left atrial dilatation → increased pulmonary venous and arterial pressure → increased right heart pressure → pulmonary oedema and right heart failure. The LV is underloaded (underfilled) in MS, not overstretched — hence the NON-DISPLACED apex beat." },
  { q:"Anticoagulation with warfarin is specifically indicated in mitral stenosis complicated by:", opts:["Any degree of mitral valve calcification", "Concurrent aortic stenosis", "Atrial fibrillation or prior systemic emboli", "NYHA Class II symptoms", "Graham Steell murmur"], ans:2, exp:"Left atrial dilatation and especially ATRIAL FIBRILLATION create stasis in the LA → thrombus formation → SYSTEMIC EMBOLI (stroke, limb ischaemia). Warfarin anticoagulation is therefore mandated in MS with AF or a history of prior embolism. Rate control of AF is also essential. IE prophylaxis covers GI/GU infected procedures, not routine anticoagulation." },
  { q:"Which connective tissue disorder is associated with BOTH aortic regurgitation (from aortic root dilatation) and mitral regurgitation (from myxomatous mitral valve prolapse)?", opts:["Rheumatoid arthritis", "Ankylosing spondylitis", "Marfan syndrome", "Systemic lupus erythematosus", "Polyarteritis nodosa"], ans:2, exp:"MARFAN SYNDROME (FBN1 gene mutation → fibrillin-1 deficiency) causes: aortic root dilatation → AORTIC REGURGITATION and myxomatous degeneration of the mitral valve → MITRAL VALVE PROLAPSE and MR. Ankylosing spondylitis causes AR only (not MR). SLE causes Libman-Sacks endocarditis (sterile vegetations). RA causes pericarditis/aortic root involvement." },
  { q:"The ejection systolic murmur of aortic stenosis radiates to:", opts:["The left axilla", "Both the axilla and the carotids", "The carotid arteries bilaterally", "The interscapular region of the back", "The right sternal edge downward"], ans:2, exp:"AS murmur: EJECTION SYSTOLIC, loudest at the AORTIC AREA (right upper sternal edge/base), radiating to the CAROTIDS (following the direction of blood flow through the narrowed aortic valve). Radiation to axilla = MR; to interscapular region = coarctation of the aorta. Reversed splitting of S2 and an S4 gallop may also be present." },
  { q:"Trans-aortic valve replacement (TAVR) is indicated for aortic stenosis in patients who:", opts:["Are young with congenital bicuspid valve and mild symptoms", "Have active infective endocarditis of the aortic valve", "Are NOT suitable for open surgical valve replacement due to high operative risk", "Have mild AS with a normal ejection fraction", "Have co-existing severe mitral stenosis"], ans:2, exp:"TAVR (Transcatheter Aortic Valve Replacement) is indicated for SYMPTOMATIC SEVERE AS in patients who are HIGH-RISK or INOPERABLE for conventional open surgery — due to age, frailty, or significant comorbidities. Active IE and certain anatomical features are contraindications. TAVR evidence now extends to intermediate-risk patients in many guidelines." },
  { q:"A 50-year-old man presents 5 days post-inferior MI with sudden severe breathlessness and a new loud pansystolic murmur at the apex. Echo shows severe mitral regurgitation. What mechanism is most likely?", opts:["Rheumatic fever reactivated by the stress of MI", "Mitral annular calcification worsening acutely", "Papillary muscle rupture from ischaemia", "Infective endocarditis seeding during hospitalisation", "Functional MR from LV dilatation over 5 days"], ans:2, exp:"POST-MI PAPILLARY MUSCLE RUPTURE is a surgical emergency. The POSTEROMEDIAL papillary muscle (supplied by the right coronary/posterior descending artery) is most vulnerable — hence the association with INFERIOR MI. Rupture causes ACUTE SEVERE MR → acute pulmonary oedema → haemodynamic collapse. Requires emergency surgery. This is the most dramatic complication of inferior MI." },
  { q:"Which feature best suggests ACUTE rather than CHRONIC aortic regurgitation in a patient presenting with severe AR?", opts:["Presence of a collapsing pulse", "Wide pulse pressure on sphygmomanometry", "Absence of cardiomegaly on chest X-ray", "De Musset's sign (head nodding)", "Austin Flint murmur at the apex"], ans:2, exp:"In ACUTE AR (e.g., from IE or dissection), the LV has not had TIME to dilate and compensate. Despite severe regurgitation, there is NO CARDIOMEGALY (normal-sized LV on CXR) — the LV cannot accommodate the sudden volume overload, resulting in acute pulmonary oedema at high pressure. In CHRONIC AR, gradual LV dilatation (cardiomegaly) develops alongside the peripheral signs (collapsing pulse, wide PP, eponyms)." },
  { q:"A patient with chronic aortic regurgitation develops worsening exertional dyspnoea. Echo now shows EF 44% with significant LV dilatation. Lateral ECG leads show new T-wave inversion. What is the most appropriate next step?", opts:["Add a beta-blocker and recheck echo in 3 months", "Increase ACE inhibitor dose and repeat ECG in 6 months", "Refer for surgical aortic valve replacement", "Start warfarin anticoagulation", "Add a loop diuretic and monitor symptoms"], ans:2, exp:"This patient meets MULTIPLE surgery indications for chronic AR: worsening symptoms (dyspnoea), EF approaching 50% (threshold for poor post-op prognosis is <50%), enlarging heart, and new lateral T-wave inversion. Surgery should not be delayed beyond this point — once EF falls below 50% or HF has persisted >12 months, post-operative outcomes worsen significantly." },
  { q:"Patient A has a pansystolic murmur at the apex radiating to the axilla with a soft S1. Patient B has an ejection systolic murmur at the right upper sternal edge radiating to the carotids with reversed S2 splitting. What is the correct pair of diagnoses?", opts:["Patient A: Aortic stenosis; Patient B: Mitral regurgitation", "Patient A: Mitral regurgitation; Patient B: Aortic stenosis", "Patient A: Mitral stenosis; Patient B: Aortic regurgitation", "Patient A: Aortic regurgitation; Patient B: Mitral stenosis", "Patient A: Tricuspid regurgitation; Patient B: Pulmonary stenosis"], ans:1, exp:"Patient A = MITRAL REGURGITATION: pansystolic, apex, radiates to AXILLA, SOFT S1 (poor leaflet coaptation). Patient B = AORTIC STENOSIS: ejection systolic, base, radiates to CAROTIDS, REVERSED S2 splitting (prolonged LV ejection delays A2), S4 may be present. Reversed splitting (A2 after P2) is unique to AS and LBBB — a key discriminator." },
  { q:"Grade 3 hypertensive retinopathy (Keith-Wagner-Barker) is characterised by which additional feature beyond Grade 2?", opts:["Papilloedema and retinal oedema", "Mild generalised arteriolar constriction", "Flame-shaped haemorrhages, cotton-wool spots, and hard exudates", "Focal arteriolar narrowing with AV nicking only", "Complete retinal artery occlusion"], ans:2, exp:"Grade 3 = Grade 2 (focal narrowing + AV nicking) PLUS FLAME-SHAPED HAEMORRHAGES + COTTON-WOOL SPOTS + HARD EXUDATES. It indicates significant end-organ damage. Grade 4 adds PAPILLOEDEMA and/or retinal oedema. The key distinction: Grade 3 = haemorrhages/exudates WITHOUT disc swelling; Grade 4 = same PLUS papilloedema (hypertensive emergency)." },
  { q:"Renovascular hypertension most commonly causes elevated BP through:", opts:["Direct cortisol excess from bilateral adrenal hyperplasia", "Reduced renal artery perfusion activating the RAAS pathway", "Chronic renal parenchymal inflammation releasing vasopressors", "Aldosterone-independent sodium retention", "Sympathetic reflex from renal ischaemia receptor activation"], ans:1, exp:"Renal artery stenosis → REDUCED RENAL PERFUSION PRESSURE → juxtaglomerular renin secretion → angiotensin I/II → vasoconstriction + aldosterone → HTN. Commonest causes: atherosclerosis (older patients) and fibromuscular dysplasia (young women). Diagnosis: renal artery Doppler or CT/MR angiography. Revascularisation ± antihypertensive therapy." },
  { q:"Obesity contributes to hypertension primarily because:", opts:["Adipose tissue directly releases angiotensin II", "Increased total body mass requires greater blood volume and cardiac output, raising vascular wall pressure", "Obesity-related cortisol excess acts as a mineralocorticoid", "Fat deposits directly compress the renal arteries", "Leptin directly stimulates peripheral vasoconstriction"], ans:1, exp:"As body mass increases, TOTAL BLOOD VOLUME increases to perfuse the greater tissue mass → increased CARDIAC OUTPUT → sustained rise in arterial pressure. Obesity also: activates the RAAS (via adipose-derived angiotensinogen), causes sympathetic activation, and strongly predisposes to sleep apnoea — all contributing to hypertension. Weight loss reduces BP by 5–20 mmHg per 10 kg lost." },
  { q:"A 48-year-old with Grade 2 hypertension (165/102 mmHg), a 10-year cardiovascular risk of 22%, and already-optimal lifestyle measures is seen in clinic. What is the most appropriate approach?", opts:["Continue lifestyle modifications only for another 6 months", "Initiate antihypertensive drug therapy alongside lifestyle measures", "Discharge with home monitoring only", "Arrange ambulatory monitoring and defer treatment decision", "Start aspirin as monotherapy for cardiovascular risk reduction"], ans:1, exp:"GRADE 2 HTN (≥160/100 mmHg) with HIGH cardiovascular risk requires PROMPT PHARMACOLOGICAL THERAPY — lifestyle optimisation alone is insufficient. He is already on optimal lifestyle measures. Drug therapy initiation is recommended without further delay. Grade 1 HTN with LOW risk may allow a 3–6 month trial of lifestyle modification first, but Grade 2 with high risk does not." },
  { q:"A 60-year-old man with 20 years of poorly controlled hypertension has creatinine 390 µmol/L, 3+ proteinuria, and bilaterally contracted kidneys on ultrasound. What complication of hypertension is most likely?", opts:["Acute tubular necrosis from contrast nephropathy", "Renovascular hypertension (secondary cause, not complication)", "IgA nephropathy with superimposed hypertension", "Hypertensive nephrosclerosis with chronic kidney disease", "Diabetic nephropathy without a diabetes history"], ans:3, exp:"HYPERTENSIVE NEPHROSCLEROSIS: decades of uncontrolled HTN → afferent arteriolar sclerosis → ischaemic nephron loss → chronically contracted kidneys + progressive CKD + proteinuria. Key distinguishing features: LONG HTN HISTORY, BILATERALLY CONTRACTED (not enlarged) kidneys, proteinuria. Distinguishes from renovascular HTN (cause, not complication), diabetic nephropathy (needs DM history), and ATN (acute, reversible)." },
  { q:"Hyperparathyroidism causes secondary hypertension through which mechanism?", opts:["Excess PTH directly stimulating renin secretion", "Elevated serum calcium causing increased vascular smooth muscle tone", "PTH-induced aldosterone excess", "Calcitonin deficiency impairing vascular relaxation", "Calcium phosphate deposition in arteriolar walls"], ans:1, exp:"Hyperparathyroidism → excess PTH → ELEVATED SERUM CALCIUM → increased VASCULAR SMOOTH MUSCLE TONE and vasoconstriction → hypertension. Hypercalcaemia also impairs renal sodium handling, contributing to volume expansion. Parathyroidectomy can improve BP control in primary hyperparathyroidism. This is distinct from aldosteronism (excess aldosterone) or phaeochromocytoma (catecholamines)." },
  { q:"A 52-year-old woman with hypertension has Grade 3 retinopathy on fundoscopy (haemorrhages and cotton-wool spots, no disc swelling). Her BP is 195/115 mmHg. She is alert with no neurological deficits and no chest pain. Which category does this represent?", opts:["Hypertensive emergency requiring IV therapy to lower BP within the hour", "Hypertensive urgency — severe HTN without acute target organ damage", "Hypertensive emergency with Grade 4 retinopathy", "White coat hypertension requiring reassurance", "Grade 2 retinopathy requiring intensification of oral therapy"], ans:1, exp:"HYPERTENSIVE URGENCY = severely elevated BP (≥180/120 mmHg) WITHOUT acute target organ damage. Grade 3 retinopathy has NO PAPILLOEDEMA — disc swelling (Grade 4) would indicate encephalopathy/hypertensive emergency. With no neurological symptoms, no chest pain, and no AKI, this is urgency: managed with ORAL antihypertensives over hours, not emergency IV therapy. Grade 4 + organ damage = hypertensive emergency." },
  { q:"All of the following are standard first-line investigations in a newly diagnosed hypertensive patient EXCEPT:", opts:["Fasting blood glucose", "Urinalysis", "Echocardiography", "Serum urea, electrolytes, and creatinine (EUCR)", "Fasting serum lipid profile"], ans:2, exp:"Standard hypertension workup: FBG (screen for DM), URINALYSIS (proteinuria/haematuria), ECG (LVH, arrhythmia), CXR, SERUM EUCR (renal function), FASTING LIPID PROFILE, and urinary albumin/creatinine ratio. ECHOCARDIOGRAPHY is NOT a routine first-line investigation — it is reserved for suspected cardiac complications or when ECG shows LVH. Echo is more specific but costly and less accessible." },
  { q:"Why is the 'cardiac position' (sitting upright) recommended in acute heart failure?", opts:["It increases cardiac output by improving ventricular filling", "It reduces venous return (preload) by pooling blood in the dependent lower limbs", "It improves airway patency for NIPPV application", "It reduces cardiac afterload through thoracic decompression", "It improves oxygen delivery by expanding lung volumes bilaterally"], ans:1, exp:"Sitting upright uses GRAVITY to pool blood in the DEPENDENT LOWER LIMBS, reducing VENOUS RETURN (preload) to the heart and pulmonary circulation. This reduces pulmonary venous pressure and relieves breathlessness in acute pulmonary oedema. It is an IMMEDIATE non-pharmacological measure applied alongside oxygen and IV diuretics in acute decompensated HF." },
  { q:"A 62-year-old man with HFrEF (EF 32%) is in NYHA Class II, in sinus rhythm, and already on optimal doses of furosemide and ramipril. Which drug should be added next to reduce mortality?", opts:["Digoxin for additional inotropic support", "Amlodipine for vasodilation", "Bisoprolol (beta-blocker) for neurohormonal blockade", "Hydralazine and isosorbide dinitrate as the priority addition", "Amiodarone for arrhythmia prophylaxis"], ans:2, exp:"Beta-blockers (bisoprolol, carvedilol, metoprolol succinate) are indicated in NYHA Class I–II and reduce mortality in HFrEF by blunting sustained sympathetic activation and preventing apoptosis/remodelling. He is in sinus rhythm (no rate-control indication for digoxin), and amlodipine has no mortality benefit in HFrEF. Beta-blocker is the missing mortality-reducing pillar in this regimen." },
  { q:"In heart failure, the ejection fraction is defined as:", opts:["Total blood volume in the left ventricle at end-diastole", "The proportion of blood ejected from the heart with each heartbeat", "The ratio of stroke volume to heart rate", "The pressure generated by the left ventricle during systole", "The difference between systolic and diastolic filling volumes"], ans:1, exp:"EJECTION FRACTION = (STROKE VOLUME / END-DIASTOLIC VOLUME) × 100%. It represents the PROPORTION OF BLOOD EJECTED from the left ventricle per heartbeat. Normal EF is >55%. HFrEF = EF <40%; HFmrEF = EF 40–49%; HFpEF = EF ≥50% but with diastolic dysfunction. EF is measured by echocardiography and is the key parameter for classifying HF type and guiding therapy." },
  { q:"A 72-year-old man presents to A&E with acute severe breathlessness at rest, SpO2 88% on room air, grossly elevated JVP, and bilateral ankle oedema. BP is 145/90 mmHg, HR 110 bpm. CXR confirms pulmonary oedema. What is the most appropriate immediate management bundle?", opts:["Oral furosemide, lie the patient flat, and arrange urgent echo", "IV furosemide, upright positioning (cardiac position), and supplemental oxygen", "IV dobutamine, fluid challenge, and supine position", "Initiate oral ACE inhibitor, fluid restrict, and observe over 4 hours", "Emergency haemodialysis and IV beta-blocker"], ans:1, exp:"Acute decompensated HF immediate management: (1) SUPPLEMENTAL OXYGEN (target SpO2 ≥94%), (2) UPRIGHT POSITIONING (cardiac position — reduces preload), (3) IV FUROSEMIDE (faster onset than oral in fluid-overloaded state, immediate venodilation then diuresis), and NIPPV if inadequate response. Lying flat increases venous return — worsens pulmonary oedema. Fluid challenges are absolutely contraindicated." },
  { q:"SGLT2 inhibitors (dapagliflozin, empagliflozin) are used in heart failure with reduced ejection fraction. Their benefit extends to:", opts:["Only diabetic patients with HFrEF", "Only non-diabetic HFrEF patients", "Both HFrEF and HFpEF, regardless of diabetic status", "Only patients with concurrent CKD and HFrEF", "Only patients in NYHA Class III or IV"], ans:2, exp:"SGLT2 inhibitors have demonstrated benefit in BOTH HFrEF (DAPA-HF, EMPEROR-Reduced) AND HFpEF (EMPEROR-Preserved, DELIVER), and the benefit extends to patients WITHOUT diabetes. They reduce hospitalisation and cardiovascular death through mechanisms including natriuresis/glucosuria, reduced preload, improved renal outcomes, and possible direct cardioprotection. They are now a standard-of-care pillar across HF types." },
  { q:"A 63-year-old woman has orthopnoea, bilateral ankle oedema, S3 gallop, and radiographic cardiomegaly. Using Framingham criteria, the S3 gallop and radiographic cardiomegaly together:", opts:["Are both minor criteria — one more major criterion required", "Are one major plus one minor criterion — still require one more minor", "Are two major criteria — meeting the diagnostic threshold for HF", "Confirm cardiac failure only if BNP is also elevated", "Require echocardiographic confirmation before diagnosis is made"], ans:2, exp:"S3 GALLOP and RADIOGRAPHIC CARDIOMEGALY are both MAJOR Framingham criteria. Two major criteria are SUFFICIENT for diagnosis of heart failure according to Framingham — no additional criteria are needed. The diagnosis is clinical; echo is confirmatory and guides management but is not mandatory to make the initial diagnosis." },
  { q:"In the Frank-Starling mechanism applied to heart failure, initial ventricular dilatation and stretch in diastole leads to:", opts:["Immediate pump failure and reduced output", "Increased force of contraction to maintain cardiac output, which eventually fails over time", "Reflex bradycardia to protect the myocardium", "Immediate RAAS activation without any initial compensation", "Mitral regurgitation from annular dilatation"], ans:1, exp:"Frank-Starling law: increased myocardial stretch (from residual blood) → INCREASED FORCE OF CONTRACTION. In early HF, this COMPENSATES for reduced stroke volume. Over time, the myocardium operates beyond the optimal Starling curve → pump FAILS. This is why early HF may be asymptomatic — Frank-Starling compensation masks the deficit — but eventually the mechanism exhausts." },
  { q:"Left ventricular remodelling in heart failure refers to:", opts:["Replacement of myocardial cells with fibrous scar tissue only", "Changes in LV size, shape, and function (including dilatation, hypertrophy, and altered geometry) in response to haemodynamic stress", "Formation of new cardiomyocytes from stem cells", "Reversal of LV dysfunction after pharmacotherapy", "The acute changes in preload after diuretic administration"], ans:1, exp:"LV REMODELLING = progressive changes in LV SIZE, SHAPE, STRUCTURE, and FUNCTION in response to haemodynamic overload and neurohormonal activation (RAAS, sympathetic system). It includes: LV dilatation (volume overload), hypertrophy (pressure overload), altered geometry (spherical shape), and cardiomyocyte loss (apoptosis). Remodelling worsens prognosis. ACEIs, beta-blockers, and MRAs partially REVERSE remodelling (reverse remodelling)." },
  { q:"The CARDIAC OUTPUT equation (CO = SV × HR) explains which compensatory mechanism in heart failure?", opts:["ANP release from atria to promote diuresis", "Frank-Starling mechanism increasing contractility", "Tachycardia (increased heart rate) when stroke volume is reduced", "Peripheral vasoconstriction to maintain blood pressure", "Renal retention of sodium and water to increase preload"], ans:2, exp:"If STROKE VOLUME falls (as in HF), cardiac output is maintained initially by INCREASING HEART RATE (TACHYCARDIA) — an early sympathetically mediated compensatory mechanism. CO = SV × HR. Resting tachycardia in HF (seen as a SIGN on examination) reflects this compensation. Sustained tachycardia is deleterious over time → promotes adverse remodelling and worsens prognosis." },
];


const ANATOMY_Qs = [
  { q:"The pterion is considered the weakest point of the skull because it marks the junction of which four bones?", opts:["Frontal, parietal, temporal, and occipital bones", "Frontal, parietal, temporal, and sphenoid bones", "Parietal, occipital, temporal, and sphenoid bones", "Frontal, ethmoid, sphenoid, and temporal bones", "Frontal, parietal, ethmoid, and lacrimal bones"], ans:1, exp:"The PTERION is the H-shaped junction of the FRONTAL, PARIETAL, TEMPORAL, and SPHENOID bones. It is the thinnest and weakest point of the skull. The MIDDLE MENINGEAL ARTERY runs beneath it — a fracture here can lacerate this artery, causing an EXTRADURAL HAEMATOMA (blood between dura and skull), a surgical emergency." },
  { q:"The calvarium (roof of the skull) is formed by which bones?", opts:["Frontal, occipital, and two parietal bones", "Frontal, sphenoid, and two temporal bones", "Frontal, parietal, and two temporal bones", "Occipital, parietal, and two temporal bones", "Frontal, ethmoid, and two parietal bones"], ans:0, exp:"The CALVARIUM (cranial vault/roof) consists of the FRONTAL bone anteriorly, two PARIETAL bones laterally, and the OCCIPITAL bone posteriorly. The cranial BASE has 8 bones (frontal, sphenoid, ethmoid, occipital, two parietals, two temporals). The calvarium is also called the 'brain box.'" },
  { q:"Which suture connects the frontal bone to the two parietal bones?", opts:["Sagittal suture", "Lambdoid suture", "Squamosal suture", "Coronal suture", "Metopic suture"], ans:3, exp:"CORONAL SUTURE = frontal bone + two parietal bones (crown-shaped, runs coronally). SAGITTAL SUTURE = two parietal bones to each other. LAMBDOID SUTURE = occipital + two parietals. SQUAMOSAL SUTURE = temporal + parietal (laterally). METOPIC SUTURE = persisting midline of the frontal bone in adults (should not be mistaken for a fracture on imaging)." },
  { q:"The anterior fontanelle (bregma) is located at the junction of which two sutures?", opts:["Sagittal and lambdoid sutures", "Coronal and sagittal sutures", "Coronal and squamosal sutures", "Lambdoid and squamosal sutures", "Metopic and coronal sutures"], ans:1, exp:"The BREGMA (anterior fontanelle) lies at the junction of the CORONAL and SAGITTAL sutures. It normally closes by 18 months–2 years of age. The LAMBDA (posterior fontanelle) is at the sagittal + lambdoid junction and closes by the 2nd month. A SUNKEN bregma = dehydration; BULGING bregma = raised intracranial pressure/hydrocephalus. Persistent opening after 18 months suggests congenital hypothyroidism, Down syndrome, rickets, or raised ICP." },
  { q:"The pituitary gland is housed in which anatomical structure of the sphenoid bone?", opts:["Foramen ovale", "Chiasmatic groove", "Hypophyseal fossa of the sella turcica", "Cribriform plate", "Foramen rotundum"], ans:2, exp:"The HYPOPHYSEAL FOSSA is the deepest part of the SELLA TURCICA ('Turkish saddle'), a saddle-shaped depression in the body of the sphenoid bone where the PITUITARY GLAND sits. Surgical access to pituitary tumours uses the TRANS-SPHENOIDAL route (endoscopic trans-sphenoidal surgery, ETSS) — passing instruments through the sphenoid sinus, avoiding the need for craniotomy." },
  { q:"The foramen ovale, foramen rotundum, and foramen spinosum are all found in which part of the sphenoid bone?", opts:["Body of the sphenoid", "Lesser wing of the sphenoid", "Greater wing of the sphenoid", "Pterygoid process of the sphenoid", "Dorsum sellae"], ans:2, exp:"The GREATER WING of the sphenoid contains three key foramina: FORAMEN ROTUNDUM (maxillary nerve, CN V2), FORAMEN OVALE (mandibular nerve, CN V3), and FORAMEN SPINOSUM (middle meningeal vessels). The LESSER WING contains the optic canal (CN II + ophthalmic artery) at its medial border and helps form the superior orbital fissure." },
  { q:"Which part of the temporal bone contains the inner ear?", opts:["Squamous part", "Tympanic part", "Zygomatic process", "Mastoid part", "Petrous part"], ans:4, exp:"The PETROUS part (pyramid-shaped) of the temporal bone contains the INNER EAR (cochlea and semicircular canals) and the middle ear. It lies at the base of the skull. The MASTOID part contains the mastoid air cells — these can become infected in MASTOIDITIS, which may spread to the middle cranial fossa causing meningitis. The SQUAMOUS part is largest and flat; the TYMPANIC part surrounds the external auditory meatus." },
  { q:"The MASTOID PROCESS serves as an attachment point for which superficial neck muscle that is an important anatomical landmark?", opts:["Trapezius", "Masseter", "Temporalis", "Sternocleidomastoid", "Posterior belly of the digastric"], ans:3, exp:"The STERNOCLEIDOMASTOID (SCM) attaches to the MASTOID PROCESS. It is a key landmark for the anterior and posterior cervical triangles. It is involved in head rotation (contracting one side rotates head to the opposite side) and neck flexion. Other mastoid process attachments: posterior belly of digastric, splenius capitis. The SCM is also the first structure divided in some neck dissections." },
  { q:"The lateral and medial pterygoid muscles originate from which structure of the sphenoid bone?", opts:["Greater wing, lateral surface", "Lesser wing", "Lateral pterygoid plate", "Body of the sphenoid", "Pterygoid canal"], ans:2, exp:"The LATERAL PTERYGOID PLATE of the sphenoid is the site of origin of BOTH the lateral AND medial pterygoid muscles — both muscles of mastication. The medial pterygoid plate supports the posterior opening of the nasal cavity. Muscles of mastication (masseter, temporalis, medial and lateral pterygoids) are all innervated by the MANDIBULAR nerve (CN V3) via the foramen ovale." },
  { q:"Premature fusion of the sagittal suture in craniosynostosis results in which skull deformity?", opts:["Brachycephaly (short, wide head)", "Plagiocephaly (asymmetric head)", "Scaphocephaly (long, narrow head)", "Turricephaly (tall, tower-shaped head)", "Trigonocephaly (triangular forehead)"], ans:2, exp:"SCAPHOCEPHALY (dolichocephaly) = premature fusion of the SAGITTAL SUTURE → head grows long and narrow (like a boat keel — 'scaph' = boat). It is the MOST COMMON craniosynostosis. The skull cannot expand laterally so it grows anteroposteriorly. Other types: BRACHYCEPHALY = coronal; TRIGONOCEPHALY = metopic. Craniosynostosis requires surgical correction to allow normal brain development." },
];

const PHYSIO_Qs = [
  { q:"All input to the basal ganglia circuit is received via which structure?", opts:["Globus pallidus internal", "Subthalamic nucleus", "Striatum (caudate and putamen)", "VA/VL of the thalamus", "Substantia nigra pars reticulata"], ans:2, exp:"ALL INPUT to the basal ganglia comes via the STRIATUM (caudate + putamen = neostriatum). This input comes mainly from motor cortical areas using the excitatory neurotransmitter GLUTAMATE. The striatum is therefore the 'gateway' to the basal ganglia circuit. The caudate and putamen have similar functions; together they form the corpus striatum along with the globus pallidus." },
  { q:"Which segment of the globus pallidus contains the output neurons of the basal ganglia circuit?", opts:["Globus pallidus external (GPe)", "Globus pallidus internal (GPi)", "Putamen", "Subthalamic nucleus", "Substantia nigra pars compacta"], ans:1, exp:"GLOBUS PALLIDUS INTERNAL (GPi) contains the OUTPUT neurons of the basal ganglia. These GABAergic neurons project to the IPSILATERAL motor thalamic nuclei VA and VL via the ANSA LENTICULARIS pathway. GPi neurons fire tonically at ~100 Hz. The circuit is entirely IPSILATERAL — basal ganglia circuits affect movements of the CONTRALATERAL body (because motor cortex crosses)." },
  { q:"The net effect of the DIRECT pathway through the basal ganglia on motor activity is to:", opts:["Decrease thalamic activity, thereby reducing motor output", "Increase thalamic inhibition via the subthalamic nucleus", "Disinhibit the thalamus (VA/VL), thereby increasing motor cortex activity", "Directly inhibit spinal motor neurons", "Activate the indirect pathway simultaneously"], ans:2, exp:"Direct pathway: Cortex (+) → Striatum → GPi (−) → VA/VL thalamus. Striatum INHIBITS GPi. GPi normally INHIBITS VA/VL. So striatal inhibition of GPi = LESS inhibition of thalamus = DISINHIBITION of VA/VL → INCREASED motor thalamus firing → INCREASED motor cortex activity. The mnemonic: DIRECT pathway TURNS UP motor activity." },
  { q:"The INDIRECT pathway through the basal ganglia sequentially involves which structures in order?", opts:["Striatum → GPi → VA/VL → Motor cortex", "Striatum → GPe → Subthalamic nucleus → GPi → VA/VL → Motor cortex", "Striatum → Subthalamic nucleus → GPe → GPi → VA/VL", "Cortex → GPe → Striatum → GPi → VA/VL", "Striatum → Substantia nigra → GPi → VA/VL"], ans:1, exp:"Indirect pathway: STRIATUM → GPe → SUBTHALAMIC NUCLEUS → GPi → VA/VL → MOTOR CORTEX. The subthalamic nucleus uses GLUTAMATE (excitatory). The net result: INCREASED GPi inhibition → DECREASED VA/VL activity → DECREASED motor cortex firing. INDIRECT pathway TURNS DOWN motor activity. Key contrast with the direct pathway — the STN is the extra excitatory relay that reverses the effect." },
  { q:"Dopamine from the substantia nigra pars compacta modulates the striatum by:", opts:["Exciting cells of the indirect pathway via D1 receptors and inhibiting the direct pathway via D2 receptors", "Exciting cells of the direct pathway via D1 receptors and inhibiting cells of the indirect pathway via D2 receptors", "Inhibiting both direct and indirect pathway cells equally", "Exciting both pathways equally via D1 and D2 receptors", "Inhibiting the direct pathway via D1 and exciting the indirect pathway via D1 receptors"], ans:1, exp:"DOPAMINE from the NIGROSTRIATAL projection: EXCITES direct pathway cells via D1 receptors (turns UP motor activity) and INHIBITS indirect pathway cells via D2 receptors (turns OFF the 'turn-down' system). Both effects INCREASE motor activity. Memory aid: D1 = Direct, D2 = inDirect. Loss of dopamine in Parkinson's disease reduces direct pathway activity AND releases the indirect pathway from inhibition → HYPOKINESIA." },
  { q:"The effect of cholinergic interneurons in the striatum on motor activity is OPPOSITE to that of dopamine because ACh:", opts:["Excites the direct pathway via muscarinic receptors and inhibits the indirect pathway", "Inhibits the direct pathway and excites the indirect pathway, resulting in decreased motor activity", "Excites both pathways equally, producing unpredictable motor output", "Inhibits both pathways, causing complete motor paralysis", "Blocks D2 receptors, preventing dopamine from inhibiting the indirect pathway"], ans:1, exp:"ACh striatal interneurons INHIBIT direct pathway cells and EXCITE indirect pathway cells — the OPPOSITE of dopamine. Net result: DECREASED motor activity. This is why ANTICHOLINERGIC drugs (e.g., benztropine, trihexyphenidyl) IMPROVE Parkinson's disease — they reduce the unopposed ACh activity that worsens hypokinesia after dopamine is lost. The DA–ACh balance in the striatum determines the level of motor output." },
  { q:"Parkinson's disease is caused by degeneration of dopaminergic neurons in which structure, and what histological finding is characteristic?", opts:["Globus pallidus external; astrocytic plaques", "Subthalamic nucleus; neurofibrillary tangles", "Striatum; loss of GABAergic neurons", "Substantia nigra pars compacta; Lewy bodies", "Substantia nigra pars reticulata; Bunina bodies"], ans:3, exp:"Parkinson's disease = degeneration of DOPAMINERGIC neurons in the SUBSTANTIA NIGRA PARS COMPACTA (SNc). The histological hallmark is LEWY BODIES — intraneuronal eosinophilic protein deposits (alpha-synuclein). Loss of nigrostriatal dopamine → reduced direct pathway activity + overactive indirect pathway → HYPOKINESIA (bradykinesia, akinesia) + rigidity + resting tremor + postural instability." },
  { q:"Hemiballism — characterised by wild, flinging movements of one side of the body — is caused by a lesion in which structure?", opts:["Substantia nigra pars compacta", "Caudate nucleus", "Striatum projections to GPe", "Subthalamic nucleus", "Globus pallidus internal"], ans:3, exp:"HEMIBALLISM = lesion of the SUBTHALAMIC NUCLEUS (STN). The STN normally provides excitatory input to GPi, increasing GPi inhibition of VA/VL. Loss of STN → LESS excitation to GPi → LESS inhibition of VA/VL → thalamus and motor cortex are OVERACTIVE → uncontrollable, wild flinging movements (ballism). The most common cause is a small stroke (lacunar infarct) in the subthalamic nucleus." },
  { q:"Huntington's chorea involves the loss of which specific striatal cells, and this is visible on MRI as degeneration of which structure?", opts:["GABAergic cells projecting to GPi; putamen degeneration", "Dopaminergic cells in the striatum; substantia nigra atrophy", "GABAergic cells projecting to GPe (head of indirect pathway); caudate nucleus degeneration", "Cholinergic interneurons only; cortical atrophy", "Glutamatergic cells projecting to GP external; thalamic atrophy"], ans:2, exp:"Huntington's chorea: loss of GABAergic striatal cells that project to GPe — the HEAD of the INDIRECT pathway. This removes inhibition from GPe → GPe inhibits STN more → STN drives GPi less → VA/VL disinhibited → HYPERKINESIA (choreiform movements). MRI shows CAUDATE NUCLEUS degeneration (the caudate houses the striatal projections to GPe). Huntington's is autosomal dominant (CAG repeat expansion in the HTT gene)." },
  { q:"There are no descending pathways from the basal ganglia directly to the spinal cord. The basal ganglia exert their motor influence exclusively through which relay?", opts:["Cerebellum, which then projects to the spinal cord", "Motor thalamus (VA/VL), which projects to motor cortex", "Brainstem directly via the red nucleus", "Corticospinal tract originating in the basal ganglia", "Direct projections from GPi to lower motor neurons"], ans:1, exp:"The basal ganglia have NO DIRECT PROJECTIONS to the spinal cord. The entire output goes: GPi → VA/VL MOTOR THALAMUS → MOTOR CORTEX → corticospinal tract → spinal cord. This is why basal ganglia disorders cause movement abnormalities without true paralysis (upper motor neuron signs) — the corticospinal tract is intact but its cortical drive is dysregulated. All basal ganglia circuitry is IPSILATERAL; effect on the body is CONTRALATERAL (via the crossed corticospinal tract)." },
];

const BIOCHEM_Qs = [
  { q:"The RAS gene encodes a GTP-binding protein that acts as a molecular switch. In cancer, mutated RAS remains locked in the active state because it:", opts:["Binds GDP irreversibly", "Cannot hydrolyse GTP to GDP", "Loses its ability to bind GTP", "Overexpresses the upstream receptor tyrosine kinase", "Is phosphorylated by CDK4 continuously"], ans:1, exp:"Normal RAS: inactive (GDP-bound) → activated by upstream signals → binds GTP → activates MAPK and PI3K pathways → GTPase activity hydrolyses GTP back to GDP → RAS inactivated. MUTATED RAS: CANNOT HYDROLYSE GTP → PERMANENTLY ACTIVE → constitutive activation of proliferative pathways. RAS mutations are found in ~30% of all human cancers. This makes RAS a classic ONCOGENE with a gain-of-function mutation." },
  { q:"TP53 is called the 'guardian of the genome.' Its loss results in cancer progression primarily because:", opts:["It directly synthesises DNA and its loss reduces replication speed", "It normally activates p21 to cause G1/S cell cycle arrest and initiates apoptosis for irreparable damage — its loss removes these safeguards", "It encodes the BCL-2 protein that promotes apoptosis", "It is the catalytic subunit of DNA polymerase delta", "It inhibits VEGF transcription, preventing angiogenesis"], ans:1, exp:"TP53 detects DNA damage → activates p21 (CDKI) → cell cycle arrest at G1/S checkpoint (allowing repair) → if damage is irreparable, initiates APOPTOSIS. Loss of TP53: cells with damaged DNA bypass arrest → continue proliferating → accumulate further mutations → genomic instability. TP53 is mutated in ~50% of all human cancers. It is a TUMOUR SUPPRESSOR GENE — loss-of-function, recessive at cellular level." },
  { q:"The Warburg effect describes the metabolic behaviour of cancer cells whereby, even in the presence of adequate oxygen, they preferentially use:", opts:["Oxidative phosphorylation over glycolysis to maximise ATP yield", "Beta-oxidation of fatty acids for energy", "Aerobic glycolysis, converting glucose to lactate rather than using the TCA cycle", "The pentose phosphate pathway exclusively", "Glutaminolysis as the sole energy source"], ans:2, exp:"The WARBURG EFFECT (aerobic glycolysis): cancer cells convert glucose → LACTATE even in the presence of O₂, rather than using the TCA cycle and oxidative phosphorylation. This is less ATP-efficient but provides BIOSYNTHETIC PRECURSORS for rapid proliferation (nucleotides, amino acids, lipids). It explains the increased expression of GLUT1 and hexokinase in tumours and is the basis of FDG-PET SCANNING — tumours take up more ¹⁸F-fluorodeoxyglucose." },
  { q:"Methotrexate exerts its antineoplastic effect by inhibiting which enzyme, and what biosynthetic consequence results?", opts:["Inhibits ribonucleotide reductase, blocking deoxyribonucleotide synthesis", "Inhibits topoisomerase II, causing DNA double-strand breaks", "Inhibits dihydrofolate reductase (DHFR), blocking tetrahydrofolate formation and thereby halting thymidylate and purine synthesis", "Inhibits thymidylate synthase directly, blocking dTMP formation", "Alkylates DNA, crosslinking guanine residues"], ans:2, exp:"Methotrexate = ANTIMETABOLITE. It inhibits DIHYDROFOLATE REDUCTASE (DHFR), preventing the regeneration of TETRAHYDROFOLATE (THF). THF is essential for transferring one-carbon units in: (1) THYMIDYLATE SYNTHESIS (dUMP → dTMP) and (2) PURINE NUCLEOTIDE SYNTHESIS. Block = no DNA synthesis = cell cycle arrest and cell death. Since rapidly dividing cells are most affected, this is a key antiproliferative mechanism." },
  { q:"Imatinib (Gleevec) was a landmark targeted therapy for Chronic Myeloid Leukaemia (CML). Its mechanism is:", opts:["It inhibits VEGF, preventing tumour angiogenesis", "It blocks PD-1/PDL-1 interaction, restoring T-cell anti-tumour immunity", "It inhibits the BCR-ABL tyrosine kinase, produced by the Philadelphia chromosome translocation", "It crosslinks DNA strands, preventing replication in leukaemic cells", "It activates p53 by inhibiting MDM2"], ans:2, exp:"CML is caused by the PHILADELPHIA CHROMOSOME t(9;22) translocation, which fuses BCR and ABL genes → BCR-ABL fusion protein → constitutively active TYROSINE KINASE → uncontrolled proliferation. IMATINIB specifically inhibits BCR-ABL tyrosine kinase, blocking its ATP-binding site → halts proliferative signalling → apoptosis of leukaemic cells. Imatinib was the first highly successful TARGETED THERAPY and revolutionised CML treatment." },
  { q:"Proto-oncogenes differ from oncogenes in that proto-oncogenes:", opts:["Are always inactive and never expressed in normal cells", "Encode proteins that inhibit cell proliferation", "Are normal cellular genes encoding growth-promoting proteins, tightly regulated and activated only when needed", "Undergo loss-of-function mutations to promote cancer", "Are only found in viruses and are inserted into host DNA during infection"], ans:2, exp:"PROTO-ONCOGENES are NORMAL cellular genes encoding growth factors, growth factor receptors, signal transduction molecules, and transcription factors. They are tightly regulated. When they acquire GAIN-OF-FUNCTION mutations, amplification, or overexpression → they become ONCOGENES with constitutive, unregulated activity. Oncogenes act in a DOMINANT manner at the cellular level (one mutated allele is sufficient). Examples: RAS, HER2, MYC." },
  { q:"In the intrinsic (mitochondrial) apoptotic pathway, the sequence of events is:", opts:["Death receptor activation → DISC formation → Caspase 8 → Caspase 3", "Cellular stress → cytochrome c release → apoptosome → Caspase 9 → executioner caspases", "BCL-2 activation → cytochrome c release → Caspase 3", "p53 → direct caspase activation → DNA fragmentation", "AIF release from nucleus → cytochrome c → Caspase 8 activation"], ans:1, exp:"INTRINSIC pathway (mitochondrial): CELLULAR STRESS (DNA damage, hypoxia) → pro-apoptotic BCL-2 family members activated → CYTOCHROME C released from mitochondria → binds APAF-1 → forms APOPTOSOME → activates CASPASE 9 → activates EXECUTIONER CASPASES (3, 6, 7) → cell death. Cancer cells evade this by OVEREXPRESSING BCL-2 (anti-apoptotic) or LOSING TP53. Extrinsic pathway: death receptors (FAS, TNFR) → DISC → Caspase 8." },
  { q:"The role of VEGF in cancer progression is to:", opts:["Inhibit tumour cell proliferation by inducing terminal differentiation", "Recruit T-cells to destroy the tumour", "Stimulate new blood vessel formation (angiogenesis), allowing tumours beyond 1–2 mm to receive nutrients and oxygen", "Block the Warburg effect, forcing tumours to use oxidative phosphorylation", "Activate MMPs to degrade the extracellular matrix directly"], ans:2, exp:"Tumours beyond 1–2 mm require their own blood supply. Under HYPOXIA, HIF-1α is activated → transcribes VEGF → VEGF stimulates ENDOTHELIAL CELL PROLIFERATION and CAPILLARY FORMATION (angiogenesis). This provides oxygen and nutrients for tumour growth and provides a route for METASTASIS (intravasation). BEVACIZUMAB is a monoclonal antibody targeting VEGF, used in colorectal, lung, and breast cancers." },
  { q:"The RB (retinoblastoma) protein normally prevents uncontrolled cell cycle progression by:", opts:["Degrading cyclin D1 before it can activate CDK4", "Activating the p53 pathway to arrest cells in G2", "Binding and inhibiting E2F transcription factors, preventing premature entry into S phase", "Directly inhibiting DNA polymerase delta", "Activating the spindle assembly checkpoint at M phase"], ans:2, exp:"RB (retinoblastoma protein) is a TUMOUR SUPPRESSOR that controls the G1/S checkpoint. In its ACTIVE (hypophosphorylated) form, it BINDS E2F transcription factors → prevents transcription of S-phase genes → cell stays in G1. Cyclins/CDKs PHOSPHORYLATE RB → releases E2F → cell enters S phase. LOSS of RB → uncontrolled E2F activity → premature, uncontrolled S-phase entry → cancer. RB loss is the basis of RETINOBLASTOMA in children." },
  { q:"Overexpression of P-glycoprotein (P-gp) in cancer cells is a mechanism of multidrug resistance because:", opts:["It repairs alkylated DNA faster than chemotherapy can damage it", "It is an ATP-dependent efflux pump that actively expels chemotherapy drugs from the cell, reducing intracellular drug concentration", "It phosphorylates and inactivates chemotherapy drugs in the cytoplasm", "It activates the BCL-2 pathway, preventing drug-induced apoptosis", "It mutates the drug target so that targeted drugs can no longer bind"], ans:1, exp:"P-GLYCOPROTEIN (P-gp, MDR1) is an ATP-BINDING CASSETTE (ABC) TRANSPORTER that uses ATP to actively PUMP hydrophobic drugs OUT of the cell. Overexpression = lower intracellular drug concentrations → reduced cytotoxicity → MULTIDRUG RESISTANCE (MDR). Affects many structurally unrelated drugs (vincristine, doxorubicin, paclitaxel). Other resistance mechanisms: mutated drug targets, enhanced DNA repair, altered apoptosis, reduced drug uptake." },
];

const NILE_ANATOMY_Qs = [
  { q:"The fibrous pericardium is attached inferiorly to the central tendon of:", opts:["Intercostal muscles","Diaphragm","Transversus thoracis","External oblique","Serratus anterior"], ans:1, exp:"The fibrous pericardium is firmly anchored inferiorly to the CENTRAL TENDON OF THE DIAPHRAGM. Superiorly, it blends with the adventitia of the great vessels. This attachment fixes the heart in position and limits its over-distension during acute volume overload." },
  { q:"The anatomical structure passing through the foramen magnum of the skull includes:", opts:["Facial nerve and stylomastoid artery","Accessory nerve roots only","Medulla oblongata, meninges, vertebral arteries, and spinal roots of CN XI","Basilar artery and pons","Internal carotid arteries"], ans:2, exp:"The FORAMEN MAGNUM transmits: the MEDULLA OBLONGATA (continuous with the spinal cord), surrounding meninges, the VERTEBRAL ARTERIES, the anterior and posterior spinal arteries, and the SPINAL ROOTS OF THE ACCESSORY NERVE (CN XI). The basilar artery lies on the clivus above the foramen magnum, not through it." },
  { q:"The femoral triangle is bounded superiorly by the inguinal ligament, medially by the medial border of adductor longus, and laterally by the medial border of:", opts:["Rectus femoris","Vastus medialis","Sartorius","Gracilis","Tensor fasciae latae"], ans:2, exp:"The FEMORAL TRIANGLE boundaries: SUPERIORLY — inguinal ligament; MEDIALLY — medial border of adductor longus; LATERALLY — medial border of SARTORIUS. Its floor is formed by iliopsoas and pectineus. Contents from lateral to medial: femoral Nerve, femoral Artery, femoral Vein, and empty space/Lymphatics — remembered as NAVL." },
  { q:"The carpal tunnel is bounded anteriorly by the flexor retinaculum. The structure passing through it that is NOT a tendon is:", opts:["Flexor digitorum superficialis tendons","Flexor digitorum profundus tendons","Flexor carpi radialis tendon","Median nerve","Flexor pollicis longus tendon"], ans:3, exp:"The CARPAL TUNNEL contains: flexor digitorum superficialis (×4), flexor digitorum profundus (×4), flexor pollicis longus (×1) — nine tendons total — and the MEDIAN NERVE. It does NOT contain the ulnar nerve or artery (which pass superficial to the retinaculum through Guyon's canal). The median nerve is the non-tendon structure. Compression → carpal tunnel syndrome." },
  { q:"The transpyloric plane of Addison (L1) passes through all of the following structures EXCEPT:", opts:["Fundus of the gallbladder","Hilum of the kidneys","Origin of the superior mesenteric artery","Termination of the spinal cord","Pylorus of the stomach"], ans:3, exp:"The TRANSPYLORIC PLANE (L1/L2 junction) passes through: pylorus of stomach, fundus of gallbladder, hilum of kidneys (approximately), origin of superior mesenteric artery, splenic vein, neck of pancreas, and the duodenojejunal flexure. The SPINAL CORD terminates at L1–L2 (conus medullaris), roughly at the transpyloric plane — this is the correct answer as 'termination of the spinal cord' is at or near this level, making 'fundus of gallbladder' the most debated option. The origin of the SMA is actually correct for this plane — it is the gallbladder FUNDUS (not the body) that lies at this level. The correct excluded structure here is the conus medullaris termination being at L2, slightly below L1." },
];

const NILE_PHYSIO_Qs = [
  { q:"The resting membrane potential of a typical ventricular cardiomyocyte is approximately:", opts:["-55 mV","-70 mV","-90 mV","-40 mV","-110 mV"], ans:2, exp:"The resting membrane potential of ventricular myocytes is approximately -90 mV, maintained primarily by the high permeability of the resting cell to K⁺ (via inward rectifier K⁺ channels, IK1) and the Na⁺/K⁺-ATPase pump. This is more negative than skeletal muscle (-70 to -80 mV). Phase 4 of the ventricular action potential is flat (stable -90 mV), unlike the pacemaker cells of the SA node which have spontaneous diastolic depolarisation." },
  { q:"The Frank-Starling law of the heart states that, within physiological limits, stroke volume is directly related to:", opts:["Heart rate at rest","Peripheral vascular resistance","End-diastolic volume (preload)","Mean arterial pressure","Afterload"], ans:2, exp:"The FRANK-STARLING LAW: within physiological limits, the GREATER THE END-DIASTOLIC VOLUME (PRELOAD), the GREATER THE STROKE VOLUME. Increased ventricular filling stretches the sarcomeres, increasing actin-myosin overlap and force of contraction. This intrinsic mechanism allows the heart to match output to venous return without neurohormonal input. It is the basis of Starling curves used in heart failure management." },
  { q:"Hypoxic pulmonary vasoconstriction (HPV) is unique to the pulmonary circulation because, unlike systemic vessels, pulmonary arterioles:", opts:["Dilate in response to low oxygen to maximise diffusion","Constrict in response to low alveolar pO₂ to divert blood to better-ventilated alveoli","Contain more smooth muscle than systemic arterioles","Respond to CO₂ rather than O₂","Are innervated by parasympathetic fibres that respond to hypoxia"], ans:1, exp:"HYPOXIC PULMONARY VASOCONSTRICTION (HPV): uniquely, pulmonary arterioles CONSTRICT in response to LOW ALVEOLAR pO₂ (not arterial). This redirects blood flow from poorly-ventilated to better-ventilated alveoli, optimising V/Q matching. The opposite occurs in systemic vessels (hypoxia → vasodilation). If hypoxia is widespread (e.g., altitude, COPD), generalised HPV → pulmonary hypertension → cor pulmonale." },
  { q:"The glomerular filtration rate (GFR) is estimated clinically using serum creatinine because creatinine is:", opts:["Actively secreted by the proximal tubule only","Freely filtered and neither secreted nor significantly reabsorbed by the tubules","Bound to albumin and partially filtered","Synthesised at a variable rate dependent on diet","Reabsorbed in the loop of Henle"], ans:1, exp:"Creatinine is used as a GFR marker because it is: (1) FREELY FILTERED at the glomerulus, (2) NOT significantly reabsorbed, and (3) minimally secreted (tubular secretion causes a slight overestimation of GFR — hence 'creatinine clearance' slightly overestimates true GFR). Creatinine is produced at a fairly constant rate from creatine phosphate in muscle. The Cockcroft-Gault and CKD-EPI formulae use creatinine to estimate GFR." },
  { q:"During a normal swallowing reflex (deglutition), the epiglottis covers the laryngeal inlet primarily because:", opts:["Active muscular contraction of the epiglottis closes the inlet","The hyoid bone moves inferiorly, depressing the epiglottis","Elevation and anterior movement of the larynx causes the epiglottis to fold back over the glottis","Negative intrathoracic pressure sucks the epiglottis down","The bolus directly pushes the epiglottis posteriorly and inferiorly"], ans:2, exp:"During swallowing, the SUPRAHYOID MUSCLES elevate the HYOID BONE, which pulls the LARYNX UPWARD AND ANTERIORLY. This movement tips the epiglottis POSTERIORLY over the laryngeal inlet. Additionally, adduction of the vocal cords (aryepiglottic folds) and closure of the false/true vocal folds protect the airway. The laryngeal elevation is visible externally as the larynx rises in the neck during swallowing." },
];

const NILE_BIOCHEM_Qs = [
  { q:"The enzyme deficient in Phenylketonuria (PKU) that converts phenylalanine to tyrosine is:", opts:["Phenylalanine transaminase","Phenylalanine hydroxylase","Tyrosinase","Homogentisate oxidase","Fumarylacetoacetase"], ans:1, exp:"PKU is caused by deficiency of PHENYLALANINE HYDROXYLASE (PAH), which converts PHENYLALANINE → TYROSINE using tetrahydrobiopterin (BH₄) as cofactor. Deficiency → PHENYLALANINE and phenylpyruvate (phenylketone) accumulate → intellectual disability, microcephaly, seizures, mousy odour. NEWBORN SCREENING (Guthrie test/tandem MS) detects it. Treatment: phenylalanine-restricted diet. Tyrosinase deficiency → Albinism. Homogentisate oxidase deficiency → Alkaptonuria." },
  { q:"In the urea cycle, the enzyme that catalyses the condensation of ornithine and carbamoyl phosphate to form citrulline is:", opts:["Arginase","Argininosuccinate synthetase","Ornithine transcarbamylase","Carbamoyl phosphate synthetase I","Argininosuccinase"], ans:2, exp:"ORNITHINE TRANSCARBAMYLASE (OTC) catalyses: ORNITHINE + CARBAMOYL PHOSPHATE → CITRULLINE (in the mitochondria). This is the first step of the urea cycle inside mitochondria. OTC deficiency is the MOST COMMON urea cycle disorder (X-linked). Arginase cleaves arginine → ornithine + urea (final step). CPS-I synthesises carbamoyl phosphate (first step). The urea cycle: CPS-I → OTC → AS synthetase → ASase → Arginase." },
  { q:"Glucose-6-phosphate dehydrogenase (G6PD) deficiency causes haemolytic anaemia under oxidative stress because G6PD is required to:", opts:["Synthesise ATP in red cells via substrate-level phosphorylation","Maintain haemoglobin in its reduced (ferrous) Fe²⁺ state directly","Generate NADPH via the pentose phosphate pathway, needed to regenerate reduced glutathione","Activate spectrin in the red cell membrane","Produce 2,3-BPG to regulate oxygen affinity"], ans:2, exp:"G6PD is the rate-limiting enzyme of the PENTOSE PHOSPHATE PATHWAY (hexose monophosphate shunt). It generates NADPH. NADPH is required to keep glutathione in its REDUCED (active) form via glutathione reductase. Reduced glutathione neutralises hydrogen peroxide and free radicals. G6PD deficiency → reduced NADPH → oxidised glutathione → oxidative damage to Hb (Heinz bodies) and RBC membrane → haemolysis. Trigger: antimalarials, sulfonamides, fava beans, infections." },
  { q:"The rate-limiting enzyme of de novo cholesterol synthesis, which is the target of statin drugs, is:", opts:["Squalene synthase","Lanosterol synthase","HMG-CoA reductase","Mevalonate kinase","Farnesyl pyrophosphate synthase"], ans:2, exp:"HMG-CoA REDUCTASE (3-hydroxy-3-methylglutaryl-CoA reductase) is the rate-limiting enzyme of CHOLESTEROL BIOSYNTHESIS. It converts HMG-CoA → MEVALONATE. STATINS (atorvastatin, rosuvastatin, simvastatin) competitively inhibit this enzyme → decreased hepatic cholesterol synthesis → upregulation of LDL receptors → decreased plasma LDL. HMG-CoA reductase is regulated by: insulin (activates), glucagon (inhibits), and by cholesterol itself (feedback inhibition through SREBP pathway)." },
  { q:"Which of the following amino acids is both glucogenic AND ketogenic — meaning its catabolism produces both glucose and ketone precursors?", opts:["Alanine","Leucine","Phenylalanine","Glycine","Glutamine"], ans:2, exp:"PHENYLALANINE (and tyrosine, isoleucine, tryptophan, threonine, and lysine) are BOTH glucogenic and ketogenic. Their catabolism generates BOTH acetyl-CoA/acetoacetate (ketogenic → ketone bodies/fats) AND fumarate or succinyl-CoA (glucogenic → glucose via gluconeogenesis). LEUCINE and LYSINE are PURELY KETOGENIC. ALANINE, GLYCINE, and GLUTAMINE are PURELY GLUCOGENIC. Remember: PHENylALAnine has BOTH capabilities — it generates fumarate (glucogenic) AND acetoacetate (ketogenic) upon catabolism." },
];

const DERM_PSORIASIS_Qs = [
  { q:"In psoriasis, the epidermal cell cycle time is significantly reduced compared to normal skin. What is the correct reduction in cell cycle time?", opts:["From 311 hours to 36 hours","From 200 hours to 48 hours","From 150 hours to 24 hours","From 400 hours to 72 hours","From 500 hours to 96 hours"], ans:0, exp:"In normal skin, the cell cycle time is approximately 311 hours. In psoriasis, this is reduced to about 36 hours — causing keratinocytes to multiply up to 10 times faster than normal. This accelerated turnover results in the characteristic accumulation of immature keratinocytes, producing the thickened silvery scales seen on plaques. The other values are distractors — none represent the actual figures documented in psoriasis pathophysiology." },
  { q:"A 40-year-old man with known psoriasis presents with a significant flare of his skin lesions. Review of his medications reveals a recently started drug. Which of the following is the most likely culprit?", opts:["Amlodipine","Omeprazole","Metformin","Lithium","Amoxicillin"], ans:3, exp:"Recognised drug triggers of psoriasis include LITHIUM, antimalarials (e.g. chloroquine, hydroxychloroquine), and indomethacin (an NSAID). Lithium is the most classically tested — it exacerbates or precipitates psoriasis by increasing epidermal proliferation and reducing cyclic AMP. Amlodipine (calcium channel blocker), omeprazole (PPI), metformin (biguanide), and amoxicillin (penicillin antibiotic) are not recognised triggers." },
  { q:"A 35-year-old man presents with well-demarcated erythematous plaques covered by silvery scales on both elbows, knees, and his lower back. The image shows the appearance of his skin lesions. What is the most likely diagnosis?", opts:["Discoid eczema","Seborrhoeic dermatitis","Plaque psoriasis","Lichen planus","Tinea corporis"], ans:2, img:"assets/derm/plaque_psoriasis.png", exp:"Plaque psoriasis is the most common type, accounting for about 80-90% of cases. It presents with well-demarcated erythematous plaques with silvery-white scales, characteristically on EXTENSOR surfaces — elbows, knees, scalp, and lower back. Discoid eczema has a similar appearance but lesions are less well-demarcated and occur on flexural surfaces. Lichen planus features flat-topped violaceous papules with Wickham's striae. Tinea corporis shows a scaly ring with central clearing. Seborrhoeic dermatitis favours the nasolabial folds and scalp with greasy rather than silvery scales." },
  { q:"A 55-year-old man with a 20-year history of psoriasis is brought to the emergency department with widespread fiery erythema involving virtually his entire body surface, fever, and haemodynamic instability. The image shows the extent of his skin involvement. Which type of psoriasis has he developed?", opts:["Severe plaque psoriasis","Generalised pustular psoriasis","Inverse psoriasis","Erythrodermic psoriasis","Guttate psoriasis"], ans:3, img:"assets/derm/erythrodermic_psoriasis.png", exp:"Erythrodermic psoriasis is the least common but most serious type, involving more than 90% of the total body surface area. It presents with widespread fiery erythema that appears burn-like, and is a medical emergency — patients develop thermoregulatory failure, fluid loss, and high-output cardiac failure. It usually evolves from pre-existing plaque psoriasis. Generalised pustular psoriasis also causes systemic upset but is characterised by sheets of sterile pustules rather than erythema alone. Guttate psoriasis follows streptococcal infection with raindrop-like lesions and is more common in the young." },
  { q:"A patient with long-standing psoriasis develops nail changes. Which nail finding is considered pathognomonic for psoriasis?", opts:["Nail pitting","Onycholysis","Beau's lines","Salmon patch (oil drop sign)","Koilonychia"], ans:3, exp:"The SALMON PATCH (also called the oil drop sign) — a yellow-brown discolouration beneath the nail plate — is pathognomonic for psoriasis. It represents subungual psoriatic plaques causing focal onycholysis with serum exudate. Nail PITTING (small ice pick-like depressions) is common in psoriasis but also occurs in alopecia areata and eczema. Onycholysis (nail plate separation) is seen in psoriasis, thyroid disease, and trauma. Beau's lines indicate systemic illness. Koilonychia suggests iron deficiency anaemia." },
  { q:"A skin biopsy is performed on a patient with psoriasis. Which histological finding is characteristic of psoriasis and helps confirm the diagnosis?", opts:["Acanthosis with spongiosis and eosinophilic infiltrate","Parakeratosis with Munroe microabscesses and dilated dermal vessels","Subepidermal blistering with IgG deposition at the basement membrane","Granulomatous inflammation with multinucleated giant cells","Hyperkeratosis with absence of parakeratosis and normal granular layer"], ans:1, exp:"Psoriasis biopsy shows: PARAKERATOSIS (retention of nuclei in the stratum corneum due to rapid turnover), MUNROE MICROABSCESSES (collections of neutrophils within the parakeratotic stratum corneum), DILATED tortuous vessels in the dermal papillae, and ABSENCE of the granular layer (agranular layer). Spongiosis with eosinophils suggests eczema. Subepidermal blistering with IgG at the basement membrane is bullous pemphigoid. Granulomas suggest sarcoidosis or granuloma annulare." },
  { q:"A patient with psoriasis has developed widespread skin involvement not responding to topical therapy. Which systemic agent is most appropriate as first-line treatment for extensive psoriasis?", opts:["Calcipotriol","Clobetasol propionate","Anthralin","Methotrexate","Doxycycline"], ans:3, exp:"For WIDESPREAD or severe psoriasis unresponsive to topical agents, SYSTEMIC therapy is required. Methotrexate (a folate antagonist) and cyclosporin are the key systemic agents. Methotrexate reduces epidermal proliferation by inhibiting dihydrofolate reductase. Calcipotriol (vitamin D analogue) and clobetasol (high-potency topical steroid) are topical agents — insufficient for widespread disease. Anthralin is also topical. For systemic therapy, methotrexate is first-line; cyclosporin is an alternative. Biologics (e.g. anti-TNF agents) are used in refractory cases." },
];

const DERM_GENITAL_ULCER_Qs = [
  { q:"A patient presents with a first episode of genital ulcers. The lesions began as multiple large painful vesicles with clear fluid, progressed to pustules, then ruptured into erythematous ulcers covered with ragged white membranes. How long does this primary infection typically persist?", opts:["5 days","7 days","10 days","15 days","21 days"], ans:3, exp:"Primary genital herpes infection persists for approximately 15 days, with 12 days of active viral shedding. Recurrent episodes are shorter — about 1 week with 5 days of viral shedding. This distinction matters clinically when counseling patients on infectivity and when deciding on antiviral therapy duration." },
  { q:"After initial genital herpes infection, what proportion of HSV-2 patients experience recurrence within one year?", opts:["40%","55%","65%","80%","95%"], ans:3, exp:"Within one year, 80% of HSV-2 and 55% of HSV-1 patients experience recurrence. This higher recurrence rate for HSV-2 is clinically relevant — typing the infection guides prognosis counseling. A patient with HSV-2 can be told their recurrence risk is higher than if they had HSV-1, which also tends to shed asymptomatically less often." },
  { q:"The third stage of genital herpes infection is best characterized by which of the following?", opts:["Painful genital ulcers with systemic symptoms","Small recurrent vesicles at the original site","Asymptomatic viral shedding","Spontaneous resolution without treatment","Inguinal lymphadenopathy without skin lesions"], ans:2, exp:"The third stage of HSV infection is subclinical, defined by asymptomatic viral shedding — the patient has no symptoms but is infectious. This stage accounts for most sexual and vertical (mother-to-child) transmission. In women, shedding occurs at the cervix, vulva, anus, and urethra. Patients need to understand they can transmit the virus even without visible lesions." },
  { q:"Which laboratory method has the highest sensitivity for diagnosing genital herpes?", opts:["Cell culture","Tzanck smear","ELISA assay","Immunofluorescence","Polymerase chain reaction"], ans:4, exp:"PCR has 100% sensitivity and is the most accurate method for HSV detection. Cell culture, often considered the practical gold standard, has only 60–70% sensitivity. The Tzanck smear is quick and inexpensive but has only 50% sensitivity and — critically — cannot distinguish between HSV-1, HSV-2, and VZV. ELISA and immunofluorescence fall between these extremes." },
  { q:"A Tzanck smear is performed on vesicle fluid from a patient with suspected genital herpes. What is the characteristic finding?", opts:["Donovan bodies within macrophages","School-of-fish arrangement of coccobacilli","Multinucleated giant keratinocytes","Intranuclear eosinophilic inclusion bodies in fibroblasts","Gram-negative intracellular diplococci"], ans:2, exp:"The Tzanck smear from HSV vesicle base shows multinucleated giant keratinocytes — this is the defining cytological finding. Despite its low sensitivity (50%), it is useful for bedside diagnosis. It cannot distinguish HSV-1, HSV-2, or VZV. Donovan bodies are found in granuloma inguinale; the school-of-fish pattern (unreliable) is associated with chancroid on Gram stain." },
  { q:"A patient presents with a first episode of genital herpes. Which of the following is a correctly dosed recommended treatment regimen?", opts:["Acyclovir 200mg three times daily for 5 days","Acyclovir 400mg three times daily for 7–10 days","Valacyclovir 500mg once daily for 10 days","Famciclovir 125mg twice daily for 7 days","Acyclovir 800mg twice daily for 5 days"], ans:1, exp:"Acyclovir 400mg TDS for 7–10 days (or 200mg five times daily for 7–10 days) is the standard first-episode regimen. Valacyclovir 1g BD × 7–10 days and famciclovir 250mg TDS × 7–10 days are alternatives. Option D (famciclovir 125mg BD) is the episodic recurrent-episode dose, not the first-episode dose — an important distinction when prescribing." },
  { q:"Suppressive therapy for recurrent genital herpes reduces the frequency of recurrences by at least what percentage in patients with frequent episodes?", opts:["25%","40%","50%","60%","75%"], ans:4, exp:"Suppressive therapy reduces recurrence frequency by at least 75% in patients with 6–9 episodes per year. Standard regimens include acyclovir 400mg BD, valacyclovir 500mg daily, or famciclovir 250mg daily. This differs from episodic therapy (which treats individual outbreaks but does not reduce their frequency) — patients need to understand which strategy they are on." },
  { q:"The primary syphilitic lesion most characteristically presents as which of the following?", opts:["A painful ulcer with undermined, non-indurated edges","A painless, indurated ulcer","Multiple vesicles on an erythematous base","A tender papule that does not ulcerate","A pustule with surrounding erythema and warmth"], ans:1, exp:"The Hunterian chancre of primary syphilis is classically painless and indurated (hard). Painlessness explains why patients often miss it. Induration distinguishes it from chancroid, which is painful, soft (non-indurated), and has undermined edges. Multiple painful vesicles are characteristic of genital herpes. The triad of painless + indurated + heals spontaneously should immediately suggest primary syphilis." },
  { q:"Which of the following cutaneous findings is characteristic of secondary syphilis?", opts:["Painless indurated genital ulcer","Pseudobubo in the inguinal region","Moth-eaten alopecia","Noduloulcerative plaques","Groove sign"], ans:2, exp:"Moth-eaten alopecia — patchy, irregular hair loss — is a characteristic feature of secondary syphilis, along with condyloma lata, maculopapular rash, lues maligna, and syphilitic corns. Painless indurated ulcer is primary syphilis. Pseudobubo is donovanosis. Noduloulcerative lesions are tertiary syphilis. Groove sign is lymphogranuloma venereum. Each stage has its signature findings." },
  { q:"Tertiary benign syphilis manifests in three major ways. Which of the following correctly identifies one of them?", opts:["Condyloma lata","Moth-eaten alopecia","Maculopapular eruption","Gummas","Groove sign"], ans:3, exp:"Tertiary benign syphilis manifests as noduloulcerative lesions, psoriasiform plaques, or gummas (destructive granulomatous lesions). Condyloma lata, moth-eaten alopecia, and maculopapular rash are secondary syphilis features. The progression — primary chancre → secondary skin/systemic → latent → tertiary organ damage — must be known cold, as questions frequently test which finding belongs to which stage." },
  { q:"Which investigation is the diagnosis of choice for examining a primary syphilitic chancre?", opts:["VDRL","FTA-ABS","TPHA","Direct fluorescence antibody test","Dark field microscopy"], ans:4, exp:"Dark field microscopy is the investigation of choice for primary chancres and moist lesions of secondary syphilis, allowing direct visualization of live T. pallidum. It requires immediate examination of fresh specimens and is NOT useful for oral lesions (non-pathogenic oral treponemes cannot be distinguished). The direct fluorescence antibody test is an alternative — specimens can be held longer and oral/anal lesions can be tested." },
  { q:"A patient with confirmed primary syphilis has no penicillin allergy. What is the recommended treatment?", opts:["Doxycycline 100mg twice daily for 7 days","Azithromycin 1g orally stat","Ceftriaxone 250mg IM stat","Benzathine penicillin G 2.4 million units IM stat","Erythromycin 500mg four times daily for 14 days"], ans:3, exp:"Benzathine penicillin G 2.4 million units IM as a single dose is the first-line treatment for primary and secondary syphilis. Doxycycline 100mg BD for 14 days is the alternative for penicillin-allergic patients. A common error is confusing this with chancroid treatment — azithromycin 1g stat and ceftriaxone 250mg IM are used for chancroid, not syphilis." },
  { q:"Chancroid is caused by which of the following organisms?", opts:["Chlamydia trachomatis L1–L3","Treponema pallidum","Calymmatobacterium granulomatis","Haemophilus ducreyi","Klebsiella granulomatis"], ans:3, exp:"Chancroid is caused by Haemophilus ducreyi, a gram-negative streptobacillus. The five GUDs and their organisms must be known together: HSV (HSV-1/2), syphilis (T. pallidum), chancroid (H. ducreyi), donovanosis (Calymmatobacterium granulomatis/Klebsiella granulomatis), LGV (C. trachomatis L1–L3). H. ducreyi is also a cofactor for HIV transmission." },
  { q:"Which combination of features best characterizes a chancroid ulcer?", opts:["Painless, indurated, with regular borders","Painful, non-indurated, with undermined edges","Painless, highly vascular, bleeds on contact","Painful, indurated, preceded by vesicles","Painless, fluctuant, with pseudobubo"], ans:1, exp:"Chancroid ulcers are classically painful, non-indurated (soft), punched-out with undermined edges. This triad directly contrasts with syphilis (painless, indurated) — the two diseases most commonly confused. The beefy-red, painless, highly vascular description fits donovanosis. The undermined edges and non-induration are clinically palpable findings that make the diagnosis at the bedside." },
  { q:"Tender inguinal lymphadenopathy (bubo) complicates chancroid in approximately 50% of patients. After what interval from initial infection does it typically appear?", opts:["1–3 days","4–6 days","7–21 days","4–6 weeks","2–3 months"], ans:2, exp:"Painful inguinal lymphadenopathy develops 7–21 days after initial chancroid infection. Clinically important: the genital ulcer may have healed before the bubo appears — a patient presenting with a bubo and no visible ulcer can still have chancroid. Buboes may drain spontaneously. This temporal gap explains why the diagnosis is sometimes delayed." },
  { q:"What constitutes definitive diagnosis of chancroid?", opts:["PCR detection of H. ducreyi DNA","School-of-fish Gram stain pattern from ulcer base","Painful ulcer with negative dark field microscopy and negative HSV test","Isolation of H. ducreyi on special culture media","Clinical triad of ulcer, bubo, and inguinal lymphadenopathy"], ans:3, exp:"Definitive diagnosis requires isolation of H. ducreyi on special culture media. PCR detects the organism's DNA and is accurate, but in most guidelines constitutes probable rather than definitive diagnosis. The school-of-fish Gram stain pattern is rarely seen and unreliable. Probable (not definitive) diagnosis can be made clinically: painful genital ulcer + no T. pallidum on dark field + negative HSV test." },
  { q:"Which of the following is an appropriate single-dose treatment for chancroid?", opts:["Doxycycline 100mg orally stat","Erythromycin 500mg orally stat","Benzathine penicillin G 2.4 million units IM stat","Azithromycin 1g orally stat","Metronidazole 2g orally stat"], ans:3, exp:"Azithromycin 1g orally as a single dose is a recommended single-dose treatment for chancroid. Ceftriaxone 250mg IM stat is another single-dose option. Multi-day alternatives are ciprofloxacin 500mg BD × 3 days and erythromycin 500mg QDS × 7 days. Benzathine penicillin is the treatment for syphilis; doxycycline 100mg BD × 14 days is for syphilis (penicillin-allergic) — do not confuse these treatment tables." },
