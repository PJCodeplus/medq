  { q:"A 72-year-old man with known Type 2 DM presents with 6 days of worsening confusion, polydipsia, and reduced oral intake. Blood glucose is 54 mmol/L (972 mg/dL), serum osmolarity is 344 mOsm/kg, pH is 7.36, and urine ketones are trace. He is profoundly dehydrated. What is the most likely diagnosis?", opts:["Severe diabetic ketoacidosis (DKA)","Euglycaemic DKA from SGLT-2 inhibitor use","Hypoglycaemic coma from sulfonylurea accumulation","Hyperosmolar hyperglycaemic state (HHS)","Lactic acidosis from metformin toxicity"], ans:3, exp:"Glucose 54 mmol/L (> 600 mg/dL) + osmolarity 344 mOsm/kg (> 320) + NORMAL pH (7.36) + trace ketones = HYPEROSMOLAR HYPERGLYCAEMIC STATE (HHS). The absence of acidosis and minimal ketonuria distinguishes HHS from DKA. Elderly Type 2 DM patients with a prodrome of days to weeks of declining oral intake and worsening hyperglycaemia are the classic presentation. Mortality is 15-30% — higher than DKA. Treatment: careful IV fluid resuscitation (replace deficit over 24-48 hours), insulin, and electrolyte monitoring." },
  { q:"Kussmaul respirations are a clinical finding in DKA. What is the physiological mechanism underlying this breathing pattern?", opts:["Pulmonary oedema from aggressive IV fluid resuscitation impairing gas exchange","Hypoventilation to retain CO2 and compensate for metabolic alkalosis","Deep, rapid breathing to blow off CO2 as respiratory compensation for metabolic acidosis","Paradoxical breathing from respiratory muscle weakness due to severe hypokalaemia","Neurogenic hyperventilation from direct ketone toxicity to the brainstem"], ans:2, exp:"KUSSMAUL RESPIRATIONS — deep, laboured, regular, rapid breathing — represent RESPIRATORY COMPENSATION FOR METABOLIC ACIDOSIS in DKA. As ketoacids accumulate and serum bicarbonate falls (pH <7.3), the central chemoreceptors stimulate increased ventilatory rate and depth. This BLOWS OFF CO2, reducing carbonic acid load and partially restoring pH. Clinically, Kussmaul breathing is accompanied by the fruity/acetone odour of breath (from exhaled acetone). It is NOT a sign of pulmonary oedema (which would present with hypoxia and crackles). Recognising Kussmaul breathing helps identify DKA at the bedside." },
  { q:"The MOST COMMON precipitating factor for diabetic ketoacidosis (DKA) is:", opts:["Missed insulin doses due to non-compliance","Acute myocardial infarction","Infection (e.g., pneumonia, urinary tract infection, gastroenteritis)","Initiation of corticosteroid therapy","Surgical stress from elective procedures"], ans:2, exp:"INFECTION is the MOST COMMON precipitating factor for DKA, accounting for the majority of cases. Common infections: pneumonia, gastroenteritis, and UTI. Infection triggers the release of counter-regulatory hormones (glucagon, cortisol, catecholamines, GH), which increase glucose production and promote lipolysis and ketogenesis. Other precipitants: missed/reduced insulin (non-compliance), new-onset T1DM (20-30% of DKA cases), acute MI, pancreatitis, stroke, trauma, and alcohol. All patients presenting with DKA should be investigated for an underlying precipitating infection." },
  { q:"In DKA, for every 62 mg/dL rise in blood glucose above normal, serum sodium falls by approximately:", opts:["0.5 mEq/L","1.0 mEq/L","1.6 mEq/L","2.4 mEq/L","3.0 mEq/L"], ans:1, exp:"Hyperglycaemia in DKA causes DILUTIONAL HYPONATRAEMIA — osmotically active glucose draws water from the intracellular space into the extracellular space, diluting sodium. The correction factor is approximately 1 mEq/L DECREASE IN SODIUM per 62 mg/dL (3.4 mmol/L) RISE IN BLOOD GLUCOSE. As insulin therapy corrects hyperglycaemia, water re-enters cells and sodium rises correspondingly. This is pseudohyponatraemia, not true sodium deficit. Failure to account for this correction can lead to misinterpretation of electrolytes in DKA — particularly important when assessing whether hypernatraemia is developing during treatment." },
  { q:"Which of the following correctly describes the SEVERITY CLASSIFICATION of hypoglycaemia?", opts:["Mild: <45 mg/dL, adrenergic symptoms; Moderate: <70 mg/dL, cognitive impairment","Mild: <70 mg/dL, adrenergic symptoms; Moderate: <50 mg/dL, cognitive impairment; Severe: unconscious","Mild: <80 mg/dL, hunger only; Moderate: <60 mg/dL, diaphoresis; Severe: <45 mg/dL, seizures","Mild: asymptomatic low glucose; Moderate: <70 mg/dL with any symptoms; Severe: seizures only","Mild and moderate are interchangeable; only severe (unconscious) is a distinct category"], ans:1, exp:"Hypoglycaemia severity: MILD — BG <70 mg/dL (<4 mmol/L), ADRENERGIC symptoms (tachycardia, diaphoresis, tremor, palpitations, hunger) — patient can self-treat; MODERATE — BG <50 mg/dL (<3 mmol/L), NEUROGLYCOPAENIC symptoms (confusion, difficulty concentrating, blurred vision, slurred speech, poor judgement, unsteady gait) — patient cannot self-treat; SEVERE — UNCONSCIOUS or unresponsive — requires emergency IV dextrose or IM glucagon. Loss of adrenergic warning symptoms (hypoglycaemia unawareness) is a dangerous complication of repeated hypoglycaemia, particularly in Type 1 DM patients on intensive insulin therapy." },
  { q:"Regarding the RESOLUTION CRITERIA for DKA, which of the following statements is CORRECT?", opts:["Urine ketones must be completely absent before IV insulin can be stopped","Resolution is confirmed by blood glucose falling below 200 mg/dL alone","Urine ketones may remain positive after DKA resolves because acetone clears more slowly than other ketones","DKA is resolved when the patient is clinically well and no laboratory confirmation is required","Arterial blood gas must show pH >7.4 before IV insulin infusion is discontinued"], ans:2, exp:"URINE KETONES MAY REMAIN POSITIVE after DKA has biochemically resolved because ACETONE (a non-acid ketone) is metabolised more slowly than acetoacetate and beta-hydroxybutyrate. Waiting for urine ketone clearance would unnecessarily prolong insulin infusion. TRUE RESOLUTION criteria: (1) NORMAL ANION GAP; (2) patient neurologically alert and intact; (3) plasma osmolality <315 mOsm/kg; (4) patient able to tolerate oral nutrition. Once resolved: resume regular diet, add long-acting subcutaneous insulin, and STOP IV infusion 1-2 hours AFTER the subcutaneous dose to avoid rebound DKA." },
  { q:"The mortality rate of HHS is approximately:", opts:["1-3%, lower than DKA due to absence of acidosis","5%, the same as DKA","8-10%, slightly higher than DKA","15-30%, substantially higher than the 5% mortality of DKA","50% in hospitalised patients due to advanced age"], ans:3, exp:"HHS carries a MORTALITY RATE OF 15-30% — substantially higher than DKA (~5%). The higher mortality reflects: (1) older patient age (HHS predominates in elderly Type 2 DM patients); (2) greater volume depletion (8-10L deficit vs 3-6L in DKA); (3) frequent serious underlying precipitating illness; (4) comorbidities (renal disease, cardiovascular disease). Death in HHS is usually from the precipitating illness or from complications of severe dehydration (vascular thrombosis, acute kidney injury). Mortality increases substantially with advanced age and concomitant serious illness." },

const ENAHORO_INTERNAL_MID_SENIOR_Qs = [
  { q:"One of the following is NOT a feature of Typhoid fever:", opts:["Intermittent fever","Relative bradycardia","Abdominal pain","Constipation","Diarrhoea"], ans:0, exp:"Typhoid fever (Salmonella typhi) classically causes a CONTINUOUS or STEP-LADDER fever pattern — temperature rises progressively over the first week and remains elevated. Intermittent fever (temperature spiking and returning to normal) is characteristic of malaria and some other infections, NOT typhoid. All other options are recognised features: relative bradycardia (Faget's sign) is a paradoxical finding where the pulse rate is lower than expected for the degree of fever; abdominal pain reflects mesenteric adenitis and intestinal involvement; constipation is more common in the early phase; diarrhoea is more common in the later phase ('pea soup' stools)." },
  { q:"Which of these is a secondary skin lesion?", opts:["Wheal","Pustule","Plaque","Scale","Nodule"], ans:3, exp:"SCALE is a secondary skin lesion — it develops on previously altered or damaged skin as a result of abnormal keratinisation and epidermal cell turnover. Psoriasis is the classic example. Secondary lesions arise from the evolution or manipulation of primary lesions. PRIMARY lesions arise de novo on previously normal skin: wheal (transient oedematous elevation — urticaria), pustule (pus-filled elevation), plaque (raised palpable area >0.5 cm — also psoriasis, but the plaque itself is a primary lesion), and nodule (firm, deep-seated elevation) are all primary. The distinction: if the lesion is the first event on normal skin, it is primary; if it results from transformation of a prior lesion, it is secondary." },
  { q:"Features of Charcot-Marie-Tooth disease EXCLUDE:", opts:["Muscle hypertrophy","Foot drop","Limb weakness","Abnormal gait","Hypoesthesia"], ans:0, exp:"Charcot-Marie-Tooth (CMT) disease is a hereditary motor and sensory neuropathy (HMSN). It causes MUSCLE WASTING, not hypertrophy — particularly of the peroneal muscles and small muscles of the hand, producing the classic 'inverted champagne bottle' or 'stork leg' appearance. Foot drop occurs due to peroneal nerve involvement. Limb weakness affects distal > proximal muscles. Abnormal gait (steppage gait) compensates for foot drop. Hypoesthesia results from the sensory component of the neuropathy. Muscle hypertrophy suggests a myopathy or over-training, not a neuropathy." },
  { q:"Central chest pain on exertion that is relieved by rest is characteristic of:", opts:["Myocardial infarction","Pleurisy","Stable angina","Gastroesophageal reflux disease (GERD)","Pulmonary embolism"], ans:2, exp:"STABLE ANGINA is defined by chest pain that is precipitated by a predictable level of exertion and relieved within minutes by rest or sublingual nitrates. The mechanism is fixed coronary artery narrowing causing demand-supply mismatch during increased cardiac work. Myocardial infarction (NSTEMI/STEMI) presents with pain at rest that is NOT relieved by rest — this distinguishes it from stable angina. Pleurisy is sharp, positional, worsened by breathing. GERD is postprandial, burning in character, and positional. Pulmonary embolism presents acutely with dyspnoea and pleuritic pain, not predictable exertional pain." },
  { q:"A patient complains of bulky, foul-smelling, pale-coloured stools that float on water. The most likely diagnosis is:", opts:["Dysentery","Food poisoning","Enteric fever","Irritable bowel syndrome","Chronic pancreatitis"], ans:4, exp:"Bulky, pale, foul-smelling, FLOATING stools = STEATORRHOEA, which is caused by fat malabsorption. The most common cause in adults is CHRONIC PANCREATITIS — progressive destruction of exocrine pancreatic tissue reduces lipase secretion, impairing fat digestion. The undigested fat makes stools greasy, pale, and less dense than water, causing them to float. Dysentery = bloody, mucoid stools with tenesmus. Food poisoning = acute onset vomiting/diarrhoea. Enteric fever = typhoid features, not malabsorption. IBS = alternating bowel habit with pain, without steatorrhoea." },
  { q:"A new regurgitant heart murmur with fever should provoke a diagnosis of:", opts:["Heart failure","Unstable angina","Dilated cardiomyopathy","Infective endocarditis","Pericarditis"], ans:3, exp:"A NEW REGURGITANT MURMUR combined with FEVER is INFECTIVE ENDOCARDITIS (IE) until proven otherwise. The regurgitant murmur reflects valve destruction by the infecting organism or its vegetations. This combination is a Duke major criterion. Urgent blood cultures (x3 before antibiotics) and echocardiography are required. Heart failure may complicate IE but does not explain the new murmur. Unstable angina has no murmur. Dilated cardiomyopathy causes functional MR but not in the context of fever. Pericarditis presents with a FRICTION RUB (not a regurgitant murmur) and pleuritic chest pain." },
  { q:"The best-fit diagnosis for fever and dysuria with 10⁵ cfu/mL of bacteria on urine culture in a man with Diabetes Mellitus is:", opts:["Uncomplicated urinary tract infection","Complicated UTI","Urethral syndrome","Pyelonephritis","Symptomatic bacteriuria"], ans:1, exp:"A UTI is classified as COMPLICATED when it occurs in a host with factors that increase the risk of treatment failure or serious outcome. Diabetes Mellitus is a recognised complicating factor alongside pregnancy, male sex, structural urinary tract abnormality, immunosuppression, and indwelling catheter. This patient satisfies three criteria for complicated UTI: male sex, diabetes, and significant bacteriuria (≥10⁵ cfu/mL) with symptoms. Uncomplicated UTI occurs in otherwise healthy, non-pregnant women. Pyelonephritis requires upper tract signs (loin pain, costovertebral tenderness, fever, rigors). Urethral syndrome presents with symptoms but negative or low-count cultures. Symptomatic bacteriuria with DM = complicated UTI." },
  { q:"One of the following is an example of a SECONDARY headache:", opts:["Migraine with aura","Migraine without aura","Cluster headache","Tension-type headache","Cervicogenic headache"], ans:4, exp:"SECONDARY headaches have an identifiable underlying structural or systemic cause. CERVICOGENIC headache is referred pain from the cervical spine or its soft tissue structures — it is secondary by definition. The International Classification of Headache Disorders (ICHD) separates headaches into primary (no identifiable cause) and secondary (caused by another disorder). Migraine with aura, migraine without aura, cluster headache, and tension-type headache are all PRIMARY headaches — their pathophysiology is intrinsic to the headache disorder itself, with no underlying structural cause. Other secondary headaches include post-traumatic headache, headache from intracranial hypertension, and headache from meningitis." },
  { q:"One of the following antidiabetic drugs is recommended for treatment of heart failure:", opts:["Insulin","Glibenclamide","Dapagliflozin","Metformin","Linagliptin"], ans:2, exp:"SGLT-2 inhibitors — particularly DAPAGLIFLOZIN and empagliflozin — have a Class I recommendation for heart failure with reduced ejection fraction (HFrEF), regardless of diabetes status. The DAPA-HF and EMPEROR-Reduced trials demonstrated significant reductions in cardiovascular death and hospitalisation for heart failure. Their benefit in heart failure is independent of glucose lowering. Metformin is relatively contraindicated in heart failure due to risk of lactic acidosis, especially in hypoxic states. Glibenclamide (sulfonylurea) and insulin cause fluid retention and weight gain — both harmful in heart failure. Linagliptin (DPP-4 inhibitor) is neutral; some DPP-4 inhibitors (saxagliptin, alogliptin) have been associated with increased hospitalisation for heart failure." },
  { q:"According to CGA classification of chronic kidney disease, a patient with eGFR of 40 mL/min/1.73m² is at which stage?", opts:["CKD Stage G3b","CKD Stage G5","CKD Stage G3a","CKD Stage G4","CKD Stage G2"], ans:0, exp:"KDIGO CGA classification GFR stages: G1 ≥90, G2 60–89, G3a 45–59, G3b 30–44, G4 15–29, G5 <15 mL/min/1.73m². An eGFR of 40 falls in the range 30–44, which is STAGE G3b. G3 was subdivided into G3a and G3b because patients with G3b have significantly higher cardiovascular and progression risk than G3a. At G3b, complications including anaemia, mineral-bone disorder, and hypertension become increasingly prevalent and should be actively screened for." },
  { q:"One of the following antihypertensive drugs should be discontinued if serum potassium is 6.0 mmol/L:", opts:["Amlodipine","Lisinopril","Frusemide","Indapamide","Nifedipine"], ans:1, exp:"ACE INHIBITORS (e.g. lisinopril) and ARBs cause HYPERKALAEMIA by blocking angiotensin II-mediated aldosterone release, thereby reducing renal potassium excretion. A serum K⁺ of 6.0 mmol/L is severe hyperkalaemia requiring immediate cessation of all potassium-retaining drugs, of which lisinopril is the only example here. FRUSEMIDE and INDAPAMIDE are diuretics that are KALIURETIC — they increase urinary potassium loss and would actually be used to treat hyperkalaemia. AMLODIPINE and NIFEDIPINE are dihydropyridine calcium channel blockers — they are potassium-neutral and have no effect on serum potassium." },
  { q:"A patient on treatment for diabetes becomes confused with tachycardia and profuse sweating. If a glucometer is not available, what should be given immediately?", opts:["Glucose","Antibiotic therapy","Normal saline infusion","Insulin","Beta adrenergic blocking agent"], ans:0, exp:"Confusion + tachycardia + diaphoresis in a patient on antidiabetic therapy = HYPOGLYCAEMIA until proven otherwise. The triad represents adrenergic (tachycardia, sweating) and neuroglycopaenic (confusion) manifestations. When a glucometer is unavailable, you treat CLINICALLY — give GLUCOSE immediately. If the patient is conscious, oral glucose (sugary drink). If unconscious or unable to swallow, IV 50% dextrose or IM glucagon. Delaying treatment risks permanent neurological damage. Insulin would worsen hypoglycaemia and is lethal here. Beta blockers mask adrenergic symptoms and are contraindicated. Normal saline does not correct hypoglycaemia." },
  { q:"What is the OPTIMAL blood pressure in adults based on WHO classification?", opts:["Less than 160/90 mmHg","Less than 130/85 mmHg","Less than 140/90 mmHg","Less than 160/100 mmHg","Less than 120/80 mmHg"], ans:4, exp:"WHO and most major guidelines define OPTIMAL blood pressure as LESS THAN 120/80 mmHg. This is the lowest-risk category with respect to cardiovascular events. Normal: <130/85; High-normal: 130–139/85–89; Grade 1 hypertension: 140–159/90–99; Grade 2: 160–179/100–109; Grade 3: ≥180/110. <140/90 mmHg is the general treatment TARGET for most hypertensive patients, not the definition of optimal. <130/85 is a 'normal' category but not the defined optimal. <160/90 and <160/100 are not thresholds for optimal blood pressure in any current classification." },
  { q:"Signs of LEFT heart failure do NOT include:", opts:["Tachycardia","Pulsus alternans","Raised jugular venous pressure","Basal lung crepitations","Upper lobe vascular diversion on chest radiograph"], ans:2, exp:"RAISED JUGULAR VENOUS PRESSURE (JVP) is a sign of RIGHT heart failure (or cardiac tamponade/constrictive pericarditis) — it reflects elevated right atrial pressure transmitted to the jugular veins. LEFT heart failure causes pulmonary venous hypertension, not systemic venous hypertension. Signs specific to left heart failure include: tachycardia (compensatory sympathetic activation), pulsus alternans (beat-to-beat variation in pulse volume reflecting poor LV function), basal lung crepitations (pulmonary oedema from elevated left atrial pressure), and upper lobe vascular diversion on CXR (pulmonary venous hypertension redirects flow to upper lobes). In biventricular failure, raised JVP may coexist with left failure signs." },
  { q:"Skin manifestations of severe chronic kidney disease include:", opts:["Calciphylaxis","Osler's nodes","Dupuytren's contracture","Digital clubbing","Erythema gyratum repens"], ans:0, exp:"CALCIPHYLAXIS (calcific uraemic arteriolopathy) is a severe, life-threatening complication of advanced CKD characterised by calcification of dermal arterioles, causing painful ischaemic skin necrosis. It is strongly associated with CKD, particularly in dialysis patients. Other CKD skin manifestations include uraemic frost, pruritus, hyperpigmentation, and pallor. OSLER'S NODES are tender nodules on finger/toe pads — pathognomonic of infective endocarditis. DUPUYTREN'S CONTRACTURE (palmar fibromatosis) is associated with liver cirrhosis and alcohol use. DIGITAL CLUBBING in renal disease is uncommon and non-specific. ERYTHEMA GYRATUM REPENS is a paraneoplastic dermatosis associated with internal malignancy, not CKD." },
  { q:"The following are features of Bell's palsy EXCEPT:", opts:["Drooling of saliva","Inability to close the affected eye","Deviation of the angle of the mouth","Unilateral facial weakness","Unilateral limb weakness"], ans:4, exp:"Bell's palsy is a LOWER MOTOR NEURON (LMN) lesion of the facial nerve (CN VII). It affects the entire ipsilateral face because the LMN supplies both upper and lower facial muscles. LMN VII palsy causes: inability to close the eye (lagophthalmos) due to paralysis of orbicularis oculi, drooling from weak orbicularis oris, mouth deviation to the contralateral (normal) side, and unilateral facial weakness affecting forehead (distinguishing it from UMN lesion). UNILATERAL LIMB WEAKNESS implies involvement of the motor cortex, internal capsule, or corticospinal tract — this is a CENTRAL (UMN) lesion such as stroke. Bell's palsy does not cause limb weakness." },
  { q:"Which of the following most adequately defines a PANDEMIC?", opts:["A serious, sudden, unusual or unexpected event carrying public health implications beyond national borders requiring immediate international action","Worldwide spread of a new disease or event affecting a large number of people over a particular period of time","Regional outbreak of an illness that spreads unexpectedly","Sudden increase in number of cases beyond what is normally expected in a population","An illness that happens in unexpectedly high numbers"], ans:1, exp:"A PANDEMIC is defined as the WORLDWIDE SPREAD of a new disease affecting a large number of people across multiple countries or continents simultaneously. This distinguishes it from: EPIDEMIC — a sudden increase in cases beyond expected levels in a defined area or population (option D); ENDEMIC — a disease consistently present in a region at a predictable baseline rate; OUTBREAK — a localised epidemic. Option A describes a PUBLIC HEALTH EMERGENCY OF INTERNATIONAL CONCERN (PHEIC) under the International Health Regulations (IHR 2005) — this is a WHO-declared legal designation, not the definition of a pandemic. Option C describes a regional epidemic." },
  { q:"A urinalysis report of proteinuria, dysmorphic erythrocyturia, and cellular casts is in keeping with:", opts:["Acute kidney injury","Glomerulonephritis","Nephrotic syndrome","Pyelonephritis","Minimal change disease of the kidney"], ans:1, exp:"DYSMORPHIC erythrocytes (acanthocytes, echinocytes) in urine indicate that red cells have been deformed while passing through the damaged glomerular basement membrane — this is the hallmark of GLOMERULAR HAEMATURIA. Combined with PROTEINURIA (from GBM damage) and CELLULAR CASTS (RBC casts in RPGN; granular/waxy casts in chronic disease), this urinalysis pattern = GLOMERULONEPHRITIS. AKI is a functional classification, not a urinalysis pattern. Nephrotic syndrome has heavy proteinuria and oval fat bodies but NO haematuria or RBC casts. Pyelonephritis has WBC casts and bacteriuria, not dysmorphic RBCs. Minimal change disease has normal urinalysis under light microscopy — only protein on dipstick." },
  { q:"KDIGO staging of acute kidney injury does NOT include:", opts:["Concentration of serum creatinine","Concentration of serum urea","Volume of urine","Time interval of increase or decrease of relevant parameters","Need for initiation of kidney replacement therapy"], ans:1, exp:"KDIGO AKI staging criteria use THREE parameters: (1) SERUM CREATININE — rise ≥26.5 µmol/L (0.3 mg/dL) within 48 hours, OR ≥1.5× baseline within 7 days; (2) URINE OUTPUT — <0.5 mL/kg/hr for ≥6 consecutive hours; (3) NEED FOR KIDNEY REPLACEMENT THERAPY — automatically Stage 3 regardless of creatinine or urine output. Time interval is implicit in the creatinine and urine output criteria (48 hours and 7-day windows). SERUM UREA is NOT a KDIGO staging parameter — while urea is elevated in AKI and used to assess severity and indication for dialysis, it is not part of the formal staging system. Blood urea nitrogen (BUN) was previously used in older classifications but not in current KDIGO." },

const MAX_BLOCK = 100;
const shuffleArr = a => { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; };
const shuffleOpts = q => { const idx=Array.from({length:q.opts.length},(_,i)=>i); const sh=shuffleArr(idx); return {...q,opts:sh.map(i=>q.opts[i]),ans:sh.indexOf(q.ans)}; };
const fmtTime = s => { if(s<=0)return"00:00"; const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60; if(h>0)return h+":"+String(m).padStart(2,"0")+":"+String(sc).padStart(2,"0"); return String(m).padStart(2,"0")+":"+String(sc).padStart(2,"0"); };
const fmtDate = iso => { const d=new Date(iso); return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})+" "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}); };
const pctColor = p => p>=70?"#2e7d32":p>=50?"#e65100":"#c62828";

// Derive topic-level cards for the course page
const getTopicCards = course => {
  const available = course.blocks.filter(b=>b.available && (b.isPastQSection || b.questions.length>0));
  const cards = [];
  const topicMap = {};
  // unified "All" card if multiple available question blocks (exclude pastq)
  const qBlocks = available.filter(b=>!b.isPastQSection);
  if(qBlocks.length > 1){
    const allQs = qBlocks.filter(b=>b.id!=="mid_posting").flatMap(b=>b.questions);
    cards.push({type:"unified", block:{id:"unified_"+course.id, name:"All "+course.name+" Questions", questions:allQs, available:true, isUnified:true}});
  }
  course.blocks.forEach(b => {
    if(b.countOnly) return;
    if(b.topic){
      if(!topicMap[b.topic]){ topicMap[b.topic]={type:"topic",label:b.topic,blocks:[],totalQs:0,anyAvailable:false}; cards.push(topicMap[b.topic]); }
      topicMap[b.topic].blocks.push(b);
      if(b.available && b.questions.length>0){ topicMap[b.topic].totalQs+=b.questions.length; topicMap[b.topic].anyAvailable=true; }
    } else {
      cards.push({type:"block", block:b});
    }
  });
  return cards;
};

// Group blocks by topic for display
const groupBlocks = blocks => {
  const out = [];
  const topicMap = {};
  blocks.forEach(b => {
    if(b.isUnified){ out.push({type:"unified",block:b}); return; }
    if(b.topic){
      if(!topicMap[b.topic]){ const g={type:"topic",label:b.topic,blocks:[]}; topicMap[b.topic]=g; out.push(g); }
      topicMap[b.topic].blocks.push(b);
    } else { out.push({type:"block",block:b}); }
  });
  return out;
};
const getBlocks = course => {
  const available = course.blocks.filter(b=>b.available && (b.isPastQSection || b.questions.length>0));
  if(available.length === 0) return course.blocks;
  const split = [];
  course.blocks.forEach(b => {
    if(b.countOnly) return;
    if(b.isPastQSection){ split.push(b); return; }
    if(!b.available || b.questions.length===0){ split.push(b); return; }
    if(b.questions.length <= MAX_BLOCK){ split.push(b); return; }
    for(let i=0;i<b.questions.length;i+=MAX_BLOCK){
      const part=Math.floor(i/MAX_BLOCK)+1;
      split.push({...b,id:b.id+"_p"+part,name:b.name+" · Part "+part,questions:b.questions.slice(i,i+MAX_BLOCK)});
    }
  });
  const qBlocks = available.filter(b=>!b.isPastQSection);
  const allQs = qBlocks.filter(b=>b.id!=="mid_posting").flatMap(b=>b.questions);
  const unified = allQs.length>0 ? [{ id:"unified", name:"All "+course.name+" Questions", questions:allQs, available:true, isUnified:true }] : [];
  return [...unified, ...split];
};
