  {q:"Infective endocarditis is best defined as:",opts:["Inflammation of the pericardium due to viral infection","Bacterial colonisation of atheromatous plaques within coronary arteries","Infection of the cardiac valves, endocardium, prosthetic material, or intracardiac device leads","An autoimmune vasculitis affecting the cardiac conduction system","Sterile thrombus formation on cardiac valves in systemic lupus erythematosus"],ans:2,exp:"IE is an INFECTION of cardiac structures — particularly the VALVES and ENDOCARDIUM — but also prosthetic valves, pacemaker leads, defibrillator wires, and areas near congenital defects (e.g., VSD). WITHOUT TREATMENT, IE has 100% MORTALITY — this underpins the urgency of diagnosis and IV antibiotics. Pericarditis is pericardial inflammation. Libman-Sacks endocarditis (SLE) is STERILE — immune complex-mediated, not infective. The distinction between sterile and infective endocarditis is clinically critical."},
  {q:"The most common causative organism of infective endocarditis overall is:",opts:["Staphylococcus aureus","Enterococcus faecalis","Streptococcus species","Pseudomonas aeruginosa","Candida albicans"],ans:2,exp:"STREPTOCOCCUS is the most common cause of IE overall, with Staphylococcus second. Streptococcal IE includes: ORAL STREPTOCOCCI (formerly 'viridans' — S. sanguius, S. mutans), usually penicillin-sensitive, typically following dental bacteraemia; S. MILLERI GROUP (S. anginosus, S. intermedius, S. constellatus), which cause abscesses/hepatosplenomegaly and require longer treatment; and GROUP D STREPTOCOCCI (S. bovis), associated with COLON CARCINOMA. Staphylococcal IE is second most common, more acute, and more common in IV drug users, diabetics, and patients with intravascular devices."},
  {q:"Which cardiac condition confers the HIGHEST risk for infective endocarditis?",opts:["Isolated atrial septal defect","Mitral valve prolapse without regurgitation","Pulmonary stenosis","Prosthetic heart valve","Mild hypertensive heart disease"],ans:3,exp:"PROSTHETIC HEART VALVE is a HIGH-RISK condition for IE — prosthetic material disrupts normal endothelial integrity and is highly susceptible to bacterial colonisation during bacteraemia. Other high-risk conditions: PREVIOUS BACTERIAL ENDOCARDITIS, AORTIC VALVE DISEASE, MITRAL REGURGITATION, CYANOTIC CONGENITAL HEART DISEASE, and PDA. MITRAL VALVE PROLAPSE without regurgitation is LOW-RISK. PULMONARY STENOSIS and HYPERTROPHIC CARDIOMYOPATHY are MODERATE-RISK. ISOLATED ASD is low-risk. This risk stratification determines who needs antibiotic prophylaxis for dental procedures."},
  {q:"A LOW-RISK cardiac condition for infective endocarditis is:",opts:["Prosthetic heart valve","Aortic valve disease","Cyanotic congenital heart disease","Previous bacterial endocarditis","Isolated atrial septal defect"],ans:4,exp:"ISOLATED ATRIAL SEPTAL DEFECT (secundum type) is classified as LOW-RISK for IE — minimal turbulent flow means low risk of endothelial damage and bacterial seeding. Other low-risk conditions: MVP without regurgitation, tricuspid regurgitation without structural abnormality, mitral annulus calcification, permanent pacemaker, and atrial myxoma. LOW-RISK patients do NOT require antibiotic prophylaxis for dental procedures. PROSTHETIC VALVE and PREVIOUS IE are HIGH-RISK. AORTIC VALVE DISEASE, CYANOTIC CHD, and PREVIOUS IE all require prophylaxis."},
  {q:"The most frequent clinical feature of infective endocarditis is:",opts:["New regurgitant heart murmur","Embolic stroke","Splenomegaly","Fever","Osler's nodes"],ans:3,exp:"FEVER is the most FREQUENT feature of IE, occurring in approximately 90% of patients. It may be associated with rigors, chills, night sweats, weight loss, and malaise. A NEW REGURGITANT MURMUR occurs in ~85% — its presence alongside fever in a susceptible host is the classic presentation triggering urgent blood cultures and echocardiography. Splenomegaly, finger clubbing, arthralgia, and haematuria occur but less frequently. Peripheral stigmata (Osler's nodes, Janeway lesions, Roth's spots, splinter haemorrhages) are classic but not the most common features — they are found in a minority of patients."},
  {q:"Janeway lesions in infective endocarditis are:",opts:["Painful pulp infarcts on the finger and toe tips","Boat-shaped retinal haemorrhages with a pale centre","Linear haemorrhages under the fingernails","Painless erythematous macules on the palms and soles","Tender nodules on the thenar eminence"],ans:3,exp:"JANEWAY LESIONS are PAINLESS erythematous or haemorrhagic macules on the PALMS AND SOLES — classified as VASCULAR PHENOMENA (septic microemboli). Being non-tender distinguishes them from Osler's nodes. OSLER'S NODES are PAINFUL pulp infarcts on finger/toe tips — IMMUNOLOGIC phenomena (immune complex deposition). ROTH'S SPOTS are boat-shaped retinal haemorrhages with pale centres — immunologic. SPLINTER HAEMORRHAGES are linear nail lesions — vascular. The painless vs painful distinction between Janeway lesions and Osler's nodes is a classic exam differentiator."},
  {q:"Roth's spots in infective endocarditis are classified as:",opts:["Vascular phenomena caused by septic microemboli to the retina","Immunologic phenomena — boat-shaped retinal haemorrhages with a pale centre","Evidence of endocardial involvement under Major Duke's criteria","A sign specific to right-sided IE from IV drug use","Pathognomonic of Staphylococcal endocarditis only"],ans:1,exp:"ROTH'S SPOTS are BOAT-SHAPED RETINAL HAEMORRHAGES with a pale/white centre, classified under IMMUNOLOGIC PHENOMENA (Duke's minor criterion). They result from immune complex deposition in retinal vessels causing haemorrhage and central fibrin coagulation. They are visible on fundoscopy. Immunologic phenomena also include: glomerulonephritis, OSLER'S NODES, SPLINTER HAEMORRHAGES, and rheumatoid factor positivity. VASCULAR PHENOMENA include: major arterial emboli, septic pulmonary infarcts, mycotic aneurysms, intracranial haemorrhages, CONJUNCTIVAL HAEMORRHAGES, and JANEWAY LESIONS."},
  {q:"According to the Modified Duke's Criteria, a DEFINITE diagnosis of IE requires:",opts:["2 major criteria, OR 1 major + 2 minor criteria, OR 4 minor criteria","1 major and 1 minor criterion only","2 major criteria, OR 1 major + 3 minor criteria, OR 5 minor criteria","3 major criteria regardless of minor findings","Positive blood cultures plus positive echocardiogram alone"],ans:2,exp:"DEFINITE IE requires: 2 MAJOR criteria, OR 1 MAJOR + 3 MINOR criteria, OR 5 MINOR criteria. POSSIBLE IE: 1 major + 1 minor OR 3 minor criteria. MAJOR criteria: (1) positive blood culture for typical IE organisms (2 separate cultures 12h apart or ≥4/3 cultures, or single Coxiella burnetti); (2) endocardial involvement on echo (vegetation, abscess, prosthetic dehiscence) or new valvular regurgitation. MINOR criteria: predisposing condition/IV drug use, fever >38°C, vascular phenomena, immunologic phenomena, non-qualifying blood culture positive."},
  {q:"Which of the following is a MAJOR criterion in the Modified Duke's Criteria for IE?",opts:["Fever above 38°C","Vascular phenomena including Janeway lesions","New valvular regurgitation on echocardiography","Osler's nodes or Roth's spots","Predisposing cardiac condition"],ans:2,exp:"NEW VALVULAR REGURGITATION on echocardiography is a MAJOR criterion — it indicates endocardial involvement and valve destruction by the infecting organism. Other major echo findings: VEGETATION (oscillating intracardiac mass on a valve or supporting structure), ABSCESS, and new partial DEHISCENCE of a prosthetic valve. FEVER, VASCULAR PHENOMENA (Janeway lesions, emboli), IMMUNOLOGIC PHENOMENA (Osler's nodes, Roth's spots), and predisposing cardiac condition are all MINOR criteria. The distinction between major and minor criteria determines whether IE is definite, possible, or rejected."},
  {q:"The recommended blood culture protocol for suspected IE is:",opts:["1 sample from a single venepuncture before antibiotics","2 samples from the same site 30 minutes apart","3 samples from 3 different sites before starting antibiotics","4 samples only if the first two are negative","Cultures after 48 hours of empiric antibiotics if initial cultures negative"],ans:2,exp:"THREE BLOOD CULTURE SAMPLES from THREE DIFFERENT SITES before antibiotics. Multiple-site sampling reduces false positives from skin flora contamination and improves sensitivity for the CONTINUOUS BACTERAEMIA characteristic of IE. Blood cultures represent the MOST IMPORTANT diagnostic investigation. Prior antibiotic use is the most common cause of CULTURE-NEGATIVE IE — antibiotics should never be started before obtaining adequate cultures unless the patient is septic. The 85% of IE cases that are culture-positive are due predominantly to streptococci, staphylococci, and enterococci."},
  {q:"The ECG finding in IE that suggests periannular extension of infection is:",opts:["ST elevation in anterior leads","New right bundle branch block","Prolonged QTc interval","Prolonged PR interval (first-degree AV block)","Atrial fibrillation with rapid ventricular response"],ans:3,exp:"A NEW, PROLONGED PR INTERVAL in IE indicates PERIANNULAR ABSCESS — extension of infection from the valve annulus (especially aortic) toward the AV node and conduction system in the membranous septum. Serial ECGs are mandatory in all IE patients; progressive PR prolongation or development of higher-degree AV block indicates worsening perivalvular sepsis and is an INDICATION FOR SURGERY. Periannular complications are a poor prognostic marker. This ECG finding is most important in AORTIC VALVE IE given the anatomical proximity of the aortic root to the conduction system."},
  {q:"Culture-negative IE is most commonly caused by:",opts:["S. aureus after 24 hours of antibiotic therapy","Candida requiring fungal blood culture media","Prior antibiotic administration before cultures, or fastidious/intracellular organisms","Right-sided IE organisms failing to reach systemic circulation","Gram-negative organisms resistant to standard culture conditions"],ans:2,exp:"CULTURE-NEGATIVE IE has three main causes: (1) PRIOR ANTIBIOTIC USE — most common reason; antibiotics suppress bacteraemia before culture results are obtained; (2) FASTIDIOUS ORGANISMS — the HACEK group (Haemophilus, Actinobacillus, Cardiobacterium, Eikenella, Kingella) are slow-growing gram-negative rods requiring extended incubation; (3) INTRACELLULAR BACTERIA — Coxiella burnetti (Q fever), Bartonella, and Chlamydia cannot grow in standard blood media, requiring serology or PCR for diagnosis. HACEK and intracellular organisms together account for ~5% of IE cases. A single positive blood culture for Coxiella burnetti qualifies as a Major Duke's criterion."},
  {q:"Streptococcus bovis IE is classically associated with:",opts:["Dental procedures in patients with mitral regurgitation","Chronic haemodialysis and intravascular catheters","IV drug use and tricuspid valve involvement","Colon carcinoma or colorectal polyps","Recent urinary catheterisation and enterococcal bacteraemia"],ans:3,exp:"S. BOVIS (now reclassified as S. gallolyticus) bacteraemia and IE is classically associated with COLON CARCINOMA and colorectal polyps — increased colonic mucosal permeability from the tumour allows S. bovis to translocate into the bloodstream. Any patient with S. bovis bacteraemia or endocarditis MUST undergo COLONOSCOPY to exclude colorectal malignancy. S. viridans IE follows dental procedures. Staphylococcal IE is associated with IV drug use, diabetes, and intravascular devices. Enterococcal IE follows urinary or gastrointestinal procedures."},
  {q:"Treatment of native valve Staphylococcal IE in a non-penicillin-allergic patient is:",opts:["Penicillin G IV for 4 weeks","Ceftriaxone 2g IV daily for 4 weeks","Flucloxacillin or oxacillin 12g/day IV for 4–6 weeks plus gentamicin for 2 weeks","Vancomycin monotherapy IV for 4 weeks","Amoxicillin 100 mg/kg/day IV for 2 weeks"],ans:2,exp:"Native valve STAPHYLOCOCCAL IE (non-MRSA, non-penicillin-allergic) is treated with FLUCLOXACILLIN or OXACILLIN 12G/DAY IV in 4–6 divided doses for 4–6 WEEKS, plus GENTAMICIN 1mg/kg three times daily for the first 2 weeks (early synergy). For MRSA or PENICILLIN ALLERGY: VANCOMYCIN 12g/day IV for 4–6 weeks + gentamicin. For PROSTHETIC VALVE staphylococcal IE: flucloxacillin + RIFAMPICIN 1200mg/day x6 weeks + gentamicin x2 weeks. S. viridans IE is treated with penicillin G, amoxicillin, or ceftriaxone x4 weeks (±gentamicin x2 weeks for synergy)."},
  {q:"Which of the following is a definite indication for SURGERY in IE?",opts:["Oral streptococcal bacteraemia sensitive to penicillin","Fever persisting for 48 hours after starting appropriate antibiotics","Periannular abscess on echocardiography","Single embolic event with no haemodynamic compromise","Mild mitral regurgitation with preserved left ventricular function"],ans:2,exp:"PERIANNULAR ABSCESS is a clear indication for SURGERY — infection has extended beyond the valve annulus into adjacent cardiac structures, typically causing conduction abnormalities, and cannot be sterilised by antibiotics alone. Other surgical indications: HEART FAILURE from valve destruction (the most common surgical indication), PERSISTING INFECTION despite appropriate antibiotics (>1 week), FUNGAL ENDOCARDITIS, VALVULAR OBSTRUCTION by a large vegetation, REPEATED EMBOLI despite antibiotics, and UNSTABLE INFECTED PROSTHETIC VALVE. A single embolic event without haemodynamic compromise is a relative, not absolute indication."},
  {q:"Antibiotic prophylaxis for dental procedures is recommended for patients with:",opts:["Isolated mitral valve prolapse without regurgitation","Isolated secundum atrial septal defect","Hypertension on antihypertensive therapy","Prosthetic heart valve or previous IE","Moderate mitral stenosis on long-term warfarin"],ans:3,exp:"PROPHYLAXIS is indicated for HIGH-RISK patients: PROSTHETIC HEART VALVES, PREVIOUS IE, CYANOTIC CONGENITAL HEART DISEASE (unrepaired, with residual defects, or with prosthetic material or palliative shunts/conduits). The procedures requiring prophylaxis involve manipulation of gingival/periapical regions or perforation of oral mucosa. MVP without regurgitation, isolated ASD, and hypertension are NOT indications. Prophylaxis regimen: AMOXICILLIN 2G PO/IV (non-allergic); CLINDAMYCIN 600MG PO/IV (penicillin-allergic). This single pre-procedure dose reduces the risk of IE in susceptible patients undergoing bacteraemia-inducing dental work."},
  {q:"A 28-year-old IV drug user presents with 2 weeks of fever and a new tricuspid murmur. Blood cultures grow S. aureus. Which complication is most likely?",opts:["Ischaemic stroke from cerebral emboli","Septic pulmonary emboli causing pulmonary infiltrates","Aortic root abscess with heart block","Libman-Sacks endocarditis flare","Left-sided systemic embolism"],ans:1,exp:"RIGHT-SIDED IE (tricuspid valve) in IV drug users most commonly causes SEPTIC PULMONARY EMBOLI — vegetation fragments from the tricuspid valve enter the pulmonary circulation causing multiple septic pulmonary infarcts, nodular infiltrates, cavitating lesions, and empyema on chest X-ray. ISCHAEMIC STROKE occurs from LEFT-SIDED emboli (mitral or aortic valve) travelling to the brain — it does not occur in right-sided IE (emboli go to the lungs, not the systemic circulation). Aortic root abscess is a complication of AORTIC VALVE IE. Right-sided IE generally has a better prognosis than left-sided."},
  {q:"A 68-year-old man with a prosthetic aortic valve develops fever, a new regurgitant murmur, and new PR prolongation on ECG. The most likely diagnosis is:",opts:["Viral myocarditis superimposed on his valve disease","Acute aortic dissection extending into the coronary ostia","Prosthetic valve IE with periannular abscess extending to the AV node","Drug-induced lupus from anticoagulation therapy","Complete stent restenosis of a previous PCI"],ans:2,exp:"The triad of PROSTHETIC VALVE + FEVER + NEW REGURGITANT MURMUR already fulfils definite IE criteria (2 major: positive blood cultures + endocardial involvement). The addition of NEW PR PROLONGATION indicates PERIANNULAR ABSCESS extending toward the AV node — the aortic root is anatomically adjacent to the membranous septum and AV node. This combination (prosthetic valve IE + new conduction abnormality) is a SURGICAL EMERGENCY. TOE should be performed urgently to characterise the abscess. PR progression to complete heart block can occur rapidly. This scenario is a classic and high-yield exam scenario."},
  {q:"In IE, the FBC typically shows:",opts:["Microcytic hypochromic anaemia with elevated platelets","Normochromic normocytic anaemia with neutrophilia","Lymphocytosis with thrombocytopenia","Macrocytic anaemia with basophilia","Polycythaemia with neutropenia"],ans:1,exp:"IE typically causes NORMOCHROMIC NORMOCYTIC ANAEMIA (anaemia of chronic disease/inflammation) and NEUTROPHILIA (reflecting the bacterial infection and systemic inflammatory response). These are non-specific but characteristic findings. Other investigation findings: elevated ESR and CRP, microscopic HAEMATURIA on urinalysis (from immune complex glomerulonephritis), positive BLOOD CULTURES (most important), VEGETATION or abscess on echocardiography, and PROLONGED PR INTERVAL on ECG suggesting periannular extension. Microcytic anaemia would suggest iron deficiency from a bleeding source. Lymphocytosis suggests viral infection, not bacterial endocarditis."},
  {q:"The HACEK organisms are important in IE because:",opts:["They are the most common cause of left-sided native valve endocarditis","They cause the most severe form of IE with highest mortality","They are fastidious gram-negative rods causing culture-negative IE that require specialised media","They are universally resistant to beta-lactam antibiotics","They are exclusively found in IV drug users with right-sided IE"],ans:2,exp:"The HACEK GROUP (Haemophilus parainfluenzae, H. aphrophilus, Actinobacillus actinomycetemcomitans, Cardiobacterium hominis, Eikenella corrodens, Kingella kingae) are FASTIDIOUS gram-negative rods that grow slowly and require enriched media and extended incubation — they cause CULTURE-NEGATIVE IE when standard culture protocols are used. They account for approximately 5% of IE cases. They are part of normal oral/respiratory flora and typically cause subacute IE in patients with underlying valvular disease. They are generally beta-lactam SENSITIVE. Coxiella burnetti (Q fever) and Bartonella are intracellular organisms that also cause culture-negative IE but are diagnosed by serology/PCR."}
];

const FILARIASIS_Qs = [
  {q:'The causative organisms of lymphatic filariasis are:',opts:['Wuchereria bancrofti and Brugia malayi','Loa loa and Onchocerca volvulus','Mansonella streptocerca and Dracunculus medinensis','Toxocara canis and Toxocara cati','Strongyloides stercoralis and Necator americanus'],ans:0,exp:'Lymphatic filariasis is caused by WUCHERERIA BANCROFTI and BRUGIA MALAYI — nematode worms inhabiting the lymphatic system. W. bancrofti accounts for the majority of global cases. Both are transmitted by NIGHT-BITING mosquitoes (Culicine or Anopheles). Microfilariae released into the bloodstream can also become trapped in pulmonary capillaries causing tropical pulmonary eosinophilia. Loa loa causes loiasis (Chrysops fly). Onchocerca volvulus causes river blindness (Simulium fly). These three are the clinically important filarial species in tropical medicine.'},
  {q:'The vector responsible for transmitting Wuchereria bancrofti is:',opts:['The day-biting Chrysops fly','The Simulium blackfly near fast-flowing rivers','The night-biting Culicine or Anopheles mosquito','The Aedes aegypti mosquito','The Glossina (tsetse) fly'],ans:2,exp:'W. bancrofti and B. malayi are transmitted by NIGHT-BITING mosquitoes — Culicine (e.g., Culex quinquefasciatus) or Anopheles species. This is clinically important: microfilariae exhibit NOCTURNAL PERIODICITY, concentrating in peripheral blood AT NIGHT when the vector feeds. Blood films for diagnosis must therefore be taken at night. Chrysops (day-biting) transmits Loa loa. Simulium (blackfly, near rivers) transmits Onchocerca volvulus. Aedes aegypti transmits dengue and yellow fever. Tsetse fly transmits African trypanosomiasis.'},
  {q:'Microfilariae of Wuchereria bancrofti are best detected by peripheral blood film taken:',opts:['At any time — microfilariae show no periodicity','During the morning between 6–10 AM','During midday','At night — nocturnal periodicity','Immediately after vigorous exercise'],ans:3,exp:'W. bancrofti microfilariae exhibit NOCTURNAL PERIODICITY — they concentrate in peripheral blood at NIGHT (typically 10 PM–2 AM) coinciding with their night-biting vector. Blood films must be taken AT NIGHT to maximise diagnostic yield. In contrast, LOA LOA microfilariae exhibit DIURNAL periodicity, concentrating in blood DURING THE DAY (when the Chrysops fly feeds). This periodicity difference — and its link to the vector\'s feeding time — is one of the most tested facts in filariasis and reflects an elegant parasite adaptation to maximise transmission.'},
  {q:'Adult worms of lymphatic filariasis reside in:',opts:['Subcutaneous tissues forming palpable nodules','The lymphatic system of the human host','Pulmonary capillaries causing eosinophilic pneumonitis','The conjunctiva and anterior chamber of the eye','Skeletal muscle fibres causing myositis'],ans:1,exp:'Adult W. bancrofti and B. malayi worms live in the LYMPHATIC SYSTEM — lymphatic vessels and nodes. Their inflammatory and obstructive effects drive the clinical course: lymphangitis → lymphoedema → elephantiasis. Microfilariae circulate in blood and can also be trapped in pulmonary capillaries (causing tropical pulmonary eosinophilia). Adult worms in subcutaneous nodules = onchocerciasis (onchocercomas). Worm crossing the eye = Loa loa. Skeletal muscle = Trichinella spiralis.'},
  {q:'Elephantiasis in lymphatic filariasis is caused by:',opts:['Haematogenous spread of microfilariae to subcutaneous fat','Progressive lymphatic obstruction leading to chronic oedema with skin coarsening, corrugation, and irreversible changes','Direct toxicity of DEC on lymphatic endothelium','Allergic granuloma formation around trapped microfilariae in skin','Autoimmune destruction of lymphatic valves'],ans:1,exp:'ELEPHANTIASIS is end-stage lymphatic filariasis. Progression: acute filarial lymphangitis → lymph node enlargement → oedema (initially pitting and temporary) → oedema becomes persistent → skin COARSENING, CORRUGATION, FISSURING → superimposed bacterial infections → irreversible massive ELEPHANTIASIS of limb or scrotum. Once established, antiparasitic treatment does not reverse elephantiasis — prevention of secondary bacterial infection and limb hygiene are the management focus. Inflammation of the spermatic cord and epididymis is also common in acute filariasis.'},
  {q:'Tropical pulmonary eosinophilia (TPE) is caused by:',opts:['Eosinophilic granulomas from Ascaris larval migration','Hypersensitivity reaction to microfilariae trapped in pulmonary capillaries in lymphatic filariasis','Direct invasion of lung parenchyma by adult W. bancrofti','Loeffler syndrome from Strongyloides stercoralis','Allergic bronchospasm from Chrysops fly antigens'],ans:1,exp:'TROPICAL PULMONARY EOSINOPHILIA (TPE) is a hypersensitivity response to MICROFILARIAE TRAPPED IN PULMONARY CAPILLARIES in W. bancrofti or B. malayi infection. Key diagnostic features: markedly elevated IgE (very high — a defining feature), CXR showing MILIARY OR MOTTLED OPACITIES bilaterally, RESTRICTIVE PATTERN on lung function testing, and very high blood eosinophilia (>3000/µL). TPE responds well to DEC. Loeffler syndrome is transient eosinophilic pneumonia from Ascaris larval migration — a distinct entity with a milder, self-limiting course.'},
  {q:'In tropical pulmonary eosinophilia, which combination of findings is most characteristic?',opts:['Low IgE, unilateral pleural effusion, obstructive lung function','Very high IgE, bilateral miliary/mottled opacities on CXR, restrictive lung function','Normal IgE, lobar consolidation, mixed obstructive-restrictive pattern','Elevated IgM, hilar lymphadenopathy, normal lung function','High IgG, upper lobe cavitation, obstructive pattern'],ans:1,exp:'TROPICAL PULMONARY EOSINOPHILIA is characterised by the triad: VERY HIGH IgE, BILATERAL MILIARY OR MOTTLED OPACITIES on chest X-ray, and RESTRICTIVE PATTERN on spirometry (reduced TLC and FVC). Blood eosinophilia is also markedly elevated. In the context of a patient from a filarial-endemic area presenting with cough, wheeze, and nocturnal symptoms, this triad is diagnostic. TPE may be misdiagnosed as asthma or TB if the parasitic aetiology is not considered. Treatment with DEC results in rapid clinical and radiological improvement.'},
  {q:'The treatment of choice for lymphatic filariasis, killing both adult worms and microfilariae, is:',opts:['Ivermectin 150 µg/kg single dose','Albendazole 400 mg for 3 days','Diethylcarbamazine (DEC) 6 mg/kg/day in 3 divided doses for 12 days','Praziquantel 40 mg/kg single dose','Mebendazole 500 mg twice daily for 5 days'],ans:2,exp:'DIETHYLCARBAMAZINE (DEC) 6 MG/KG/DAY in 3 DIVIDED DOSES FOR 12 DAYS kills BOTH ADULT WORMS AND MICROFILARIAE in lymphatic filariasis. Ivermectin and albendazole kill microfilariae only (not adult worms) and are used for mass drug administration in control programmes. Doxycycline (targeting Wolbachia endosymbionts) sterilises female worms and kills adults slowly and is used as an adjunct. Praziquantel targets trematodes and cestodes. The MacRofilaricidal activity of DEC distinguishes it from ivermectin and albendazole in this context.'},
  {q:'The Mazzotti reaction after DEC treatment is caused by:',opts:['Direct hepatotoxicity of DEC','Immune response to antigens released by dying microfilariae','Anaphylaxis to DEC as a drug allergen','Cytokine release from eosinophil degranulation triggered by DEC itself','Endotoxin release from gram-negative bacterial co-infection'],ans:1,exp:'The MAZZOTTI REACTION is an adverse reaction following DEC — caused by IMMUNE RESPONSE TO ANTIGENS FROM DYING MICROFILARIAE (not a reaction to DEC itself). Features: fever, headache, arthralgia, and prostration, occurring within hours of the first dose. Managed with ANTIHISTAMINES and CORTICOSTEROIDS while DEC is continued. A more severe version occurs in onchocerciasis (including dangerous ocular reactions), which is why DEC is AVOIDED in onchocerciasis. The Mazzotti reaction is analogous to the Jarisch-Herxheimer reaction in spirochaetal infections — a systemic inflammatory response to dying parasite antigens.'},
  {q:'Doxycycline is used as an adjunct in all three major filarial infections because it targets:',opts:['Microfilariae directly by inhibiting their protein synthesis','Wolbachia — obligate bacterial endosymbionts essential for filarial worm fertility and survival','Eosinophil-activating cytokines','The adult worm cuticle causing paralysis','Secondary bacterial infections of the lymphatics'],ans:1,exp:'DOXYCYCLINE targets WOLBACHIA — obligate intracellular bacterial endosymbionts (Rickettsia-like bacteria) present in W. bancrofti, B. malayi, Loa loa, and Onchocerca volvulus. Wolbachia are essential for filarial worm fertility, larval development, and survival. Depleting Wolbachia with doxycycline STERILISES female worms and eventually kills adult worms — providing a macrofilaricidal effect that ivermectin and albendazole lack. Doxycycline also reduces inflammatory reactions by depleting the Wolbachia that stimulate host immune responses.'},
  {q:'The vector of Loa loa (loiasis) is:',opts:['The night-biting Anopheles mosquito','The Simulium blackfly near fast-flowing rivers','The Chrysops fly — a day-biting deerfly','The Culex mosquito in urban settings','The sandfly in arid zones'],ans:2,exp:'LOA LOA is transmitted by the CHRYSOPS FLY — a day-biting (diurnal) deerfly/mango fly found in rainforests of West and Central Africa. The day-biting behaviour of Chrysops drives the DIURNAL PERIODICITY of Loa loa microfilariae — they are found in peripheral blood during the day. Blood films must be taken DURING THE DAY for Loa loa diagnosis. The Chrysops–daytime–diurnal periodicity association is one of the highest yield distinctions in filariasis. Simulium (blackfly) transmits Onchocerca volvulus. Anopheles/Culicine transmit lymphatic filariasis.'},
  {q:'Calabar swelling, the pathognomonic feature of loiasis, is best described as:',opts:['Permanent unilateral leg oedema from lymphatic obstruction','Painful subcutaneous nodules containing coiled adult worms over bony prominences','Transient localised soft tissue swelling near a joint, resolving spontaneously in days to weeks','Confluent pruritic plaques on the trunk from microfilarial dermatitis','Firm cervical lymphadenopathy with fever and night sweats'],ans:2,exp:'CALABAR SWELLING is the hallmark of LOA LOA — a TRANSIENT, LOCALISED, possibly painful soft tissue swelling typically appearing NEAR A JOINT. It appears suddenly, persists for days to 3 weeks, then resolves spontaneously, recurring elsewhere as the worm migrates. Urticaria may also occur. The pathognomonic sign is the WORM WRIGGLING VISIBLE UNDER THE SKIN or CROSSING THE EYE under the conjunctiva. Permanent leg oedema = elephantiasis (lymphatic filariasis). Subcutaneous nodules over bony prominences = onchocercomas (onchocerciasis). Cervical lymphadenopathy with night sweats suggests lymphoma or TB.'},
  {q:'Loa loa microfilariae are detected on a blood film taken:',opts:['At night between 10 PM–2 AM','Early morning on waking','During the day — diurnal periodicity','After exercise regardless of time of day','At any time, as Loa loa has no fixed periodicity'],ans:2,exp:'LOA LOA microfilariae exhibit DIURNAL PERIODICITY — they are present in peripheral blood in high numbers DURING THE DAY, coinciding with the activity period of their vector, the day-biting Chrysops fly. Blood films should be taken DURING DAYTIME HOURS. Eosinophilia is also a characteristic finding in loiasis. This directly contrasts with W. bancrofti (NOCTURNAL periodicity — blood film at night). The periodicity of each filarial species is directly matched to the feeding time of its specific vector — a key evolutionary adaptation.'},
  {q:'The treatment of loiasis uses DEC at a dose different from lymphatic filariasis:',opts:['DEC 6 mg/kg in 3 divided doses for 12 days','DEC 9–12 mg/kg daily for 21 days plus corticosteroids','Ivermectin 150 µg/kg single dose every 3 months','Praziquantel 40 mg/kg single dose','Albendazole 400 mg daily for 21 days'],ans:1,exp:'LOIASIS is treated with DEC at 9–12 MG/KG DAILY FOR 21 DAYS — a HIGHER DOSE and LONGER DURATION than for lymphatic filariasis (6 mg/kg × 12 days). CORTICOSTEROIDS are given concurrently to suppress the inflammatory reaction from dying microfilariae. IVERMECTIN must be used with CAUTION in loiasis — at high microfilarial loads (>8000/µL) rapid killing can cause severe encephalopathy. The DEC dose distinction between lymphatic filariasis and loiasis is high yield. Doxycycline can also be used targeting Wolbachia.'},
  {q:'The vector of onchocerciasis (river blindness) is:',opts:['The night-biting Anopheles mosquito near stagnant water','The Chrysops fly in rainforest areas','The Simulium blackfly breeding in fast-flowing rivers','The Culicine mosquito in urban settings','The sandfly in dry arid zones'],ans:2,exp:'ONCHOCERCIASIS is transmitted by the SIMULIUM BLACKFLY, which breeds exclusively in FAST-FLOWING, WELL-OXYGENATED RIVERS and streams — hence "RIVER BLINDNESS." Simulium bites during the day. Onchocerca volvulus adult worms live in subcutaneous nodules (onchocercomas), releasing microfilariae that migrate through skin and into the eyes. The geographical distribution follows river valleys. Control programmes historically targeted Simulium breeding sites with insecticides alongside mass ivermectin distribution (MECTIZAN Donation Programme).'},
  {q:'The classic chronic skin signs of onchocerciasis include all EXCEPT:',opts:['Leopard skin (patchy depigmentation)','Lizard skin (hyperkeratosis and skin thickening)','Elephant skin (loose pendulous skin)','Onchocercomas (subcutaneous nodules over bony prominences)','Calabar swelling (transient soft tissue oedema near joints)'],ans:4,exp:'CALABAR SWELLING is specific to LOA LOA — transient localised oedema near joints from migrating adult worms. It is NOT a feature of onchocerciasis. Chronic onchocerciasis skin signs include: LEOPARD SKIN (patchy depigmentation from microfilarial damage to melanocytes), LIZARD SKIN (hyperkeratotic thickening), ELEPHANT SKIN (atrophic, pendulous skin), and ONCHOCERCOMAS (firm subcutaneous nodules containing coiled adult worms, especially over bony prominences — sacrum, greater trochanter). Early skin signs: severe pruritus and papular urticaria. These chronic changes reflect decades of microfilarial-induced skin damage and inflammation.'},
  {q:'The pathognomonic eye finding in onchocerciasis is:',opts:['Cherry-red spot on the macula','Boat-shaped retinal haemorrhages with pale centres','Snowflake deposits at the edges of the cornea','Drusen deposits at the optic disc','Blue sclera'],ans:2,exp:'SNOWFLAKE DEPOSITS (fluffy white opacities) at the EDGES OF THE CORNEA are the CLASSICAL/PATHOGNOMONIC eye sign of onchocerciasis. They represent dead microfilariae in the corneal stroma surrounded by inflammatory infiltrates. Ocular progression: itching → lacrimation → conjunctivitis → sclerosing keratitis (most common cause of blindness) → pannus formation → uveitis → glaucoma → cataracts. Sclerosing keratitis from chronic microfilarial invasion and death causes irreversible corneal opacity. Cherry-red spot = central retinal artery occlusion. Boat-shaped retinal haemorrhages = Roth\'s spots (infective endocarditis).'},
  {q:'The treatment of onchocerciasis is:',opts:['DEC 6 mg/kg in 3 divided doses for 12 days','DEC 9–12 mg/kg daily for 21 days','Ivermectin 150–200 µg/kg single dose, repeated every 3 months','Praziquantel 40 mg/kg stat','Mebendazole 400 mg twice daily for 3 days'],ans:2,exp:'IVERMECTIN 150–200 µg/KG SINGLE DOSE is the treatment for onchocerciasis. Because adult worms continuously produce microfilariae, treatment must be REPEATED EVERY 3 MONTHS to prevent relapse. DOXYCYCLINE (targeting Wolbachia) kills adult worms over time. DEC is specifically CONTRAINDICATED in onchocerciasis — it causes a severe Mazzotti reaction including dangerous OCULAR REACTIONS (anterior uveitis, corneal oedema) from rapid killing of microfilariae in ocular tissues. Ivermectin causes a milder reaction without the severe ocular complications. Mass ivermectin distribution via the MECTIZAN programme has dramatically reduced the global burden of river blindness.'},
  {q:'A 35-year-old man from Cameroon presents with migratory swellings near his wrist that appear and disappear over days. He reports seeing something moving across his eye. A daytime blood film shows microfilariae. The most likely diagnosis is:',opts:['Lymphatic filariasis from W. bancrofti','Loiasis from Loa loa','Onchocerciasis from Onchocerca volvulus','Mansonellosis','Dracunculiasis'],ans:1,exp:'Classic LOA LOA: migratory CALABAR SWELLING near a joint, worm VISIBLE CROSSING THE EYE under the conjunctiva (pathognomonic), and microfilariae on a DAYTIME blood film (diurnal periodicity). Central African rainforest (Cameroon) = Chrysops habitat. The visible ocular worm is the hallmark — no other filarial species crosses the external eye surface like this. Lymphatic filariasis causes elephantiasis/TPE, not Calabar swelling or ocular worm migration. Onchocerciasis causes snowflake corneal deposits — the worm does not cross the conjunctival surface. Treatment: DEC 9–12 mg/kg daily × 21 days + corticosteroids.'},
  {q:'A 45-year-old man from rural Edo State presents with severe pruritus, firm nodules over his hips, progressive visual loss, and fluffy deposits at the corneal margins on slit-lamp examination. The most likely diagnosis is:',opts:['Lymphatic filariasis with tropical pulmonary eosinophilia','Loiasis with Calabar swelling','Onchocerciasis (river blindness)','Toxocariasis with visceral larva migrans','Schistosomiasis'],ans:2,exp:'Classic ONCHOCERCIASIS: severe PRURITUS, ONCHOCERCOMAS (firm subcutaneous nodules over bony prominences), PROGRESSIVE VISUAL LOSS, and SNOWFLAKE DEPOSITS at the corneal margins. Edo State (south-south Nigeria) has documented onchocerciasis foci near fast-flowing rivers — Simulium breeding territory. Treatment: IVERMECTIN 150–200 µg/kg every 3 months + DOXYCYCLINE for Wolbachia. DEC must be AVOIDED — it causes severe ocular Mazzotti reaction. Not Loa loa: Calabar swelling is transient and near joints, not fixed nodules; and the classic Loa loa sign is the worm crossing the eye surface, not corneal snowflake deposits.'},
  {q:'A patient develops fever, headache, arthralgia, and prostration within hours of starting DEC for filariasis. The appropriate management is:',opts:['Stop DEC permanently and switch to ivermectin','Continue DEC and add IV antibiotics for sepsis','Manage with antihistamines and corticosteroids while continuing DEC','Admit for adrenaline — this is anaphylaxis','Stop all treatment and perform blood cultures'],ans:2,exp:'These features describe the MAZZOTTI REACTION — immune response to antigens from DYING MICROFILARIAE after DEC. It is expected and manageable. Treatment: ANTIHISTAMINES and CORTICOSTEROIDS while DEC is CONTINUED. It is not anaphylaxis (adrenaline not indicated). Stopping DEC is not necessary. The reaction is analogous to the Jarisch-Herxheimer reaction in spirochaetal infections — dying parasites release antigens triggering systemic inflammation. In onchocerciasis, the ocular component of the Mazzotti reaction is dangerous (anterior uveitis, corneal oedema), which is why ivermectin — with a milder Mazzotti reaction — is used instead of DEC for that condition.'}
];

const MALNUTRITION_Qs = [
  {q:"Malnutrition is best defined as:",opts:["A state of inadequate food intake causing underweight and wasting","Deficiency or excess of nutrient intake, imbalance in essential nutrients, and/or impaired nutrient utilisation that adversely affects body form, function, and clinical outcomes","Caloric deficiency resulting in a BMI below 18.5 kg/m²","Protein-energy malnutrition causing muscle wasting and oedema","Any condition in which a patient requires enteral or parenteral nutritional support"],ans:1,exp:'Malnutrition encompasses three mechanisms — deficiency OR excess of intake, imbalance in essential nutrients, and/or impaired utilisation — any of which adversely affects body FORM, FUNCTION, and CLINICAL OUTCOMES. This broad definition deliberately includes UNDER-nutrition AND OVER-nutrition. It is not limited to low BMI or caloric deficiency alone. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"Which best describes the double burden of malnutrition?",opts:["Simultaneous occurrence of wasting and stunting within the same child","Coexistence of protein deficiency and micronutrient deficiency in one patient","Coexistence of under-nutrition and over-nutrition within the same geographic area, household, or even individual","Combined burden of malnutrition-related communicable and non-communicable diseases globally","Presence of both anaemia and obesity in the same patient"],ans:2,exp:'The DOUBLE BURDEN OF MALNUTRITION is the coexistence of UNDER-nutrition and OVER-nutrition within the same geographic area, household, or individual. Populations experiencing food insecurity may simultaneously have wasting (insufficient food) AND obesity (cheap energy-dense, nutrient-poor foods). It is particularly a challenge in LMICs undergoing nutritional transition. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"Sarcopenic obesity is characterised by:",opts:["Low BMI with normal muscle mass and minimal fat stores","High fat mass with low muscle mass, tendency to frailty, increased metabolic risk, and possible micronutrient deficiencies despite obesity","Morbid obesity with preserved skeletal muscle mass and normal grip strength","Normal BMI with markedly elevated visceral fat on body composition scan","Severe muscle wasting with minimal fat stores in a critically ill patient"],ans:1,exp:'SARCOPENIC OBESITY is the clinically important interplay between under- and over-nutrition: HIGH FAT MASS with LOW MUSCLE MASS. Despite the obese appearance, patients are FRAIL, have increased metabolic risk, and may be DEFICIENT in micronutrients (Vitamin D, iron, B12) because their diet is calorie-dense but nutrient-poor. BMI alone misses this — body composition tools (DEXA, BIA) are needed. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"A BMI of 36.5 kg/m² in an adult classifies as:",opts:["Overweight","Obesity Class I","Obesity Class II","Obesity Class III (Morbid Obesity)","Upper limit of normal range"],ans:2,exp:'BMI CLASSIFICATION: Underweight <18.5; Normal 18.5–24.9; Overweight 25.0–29.9; Obesity Class I 30.0–34.9; OBESITY CLASS II 35.0–39.9; Obesity Class III ≥40.0. BMI 36.5 = Class II. Class II with significant comorbidities is an indication for bariatric surgery. BMI thresholds are LOWER for Asian populations. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"Subjective Global Assessment (SGA) Grade C indicates:",opts:["Well-nourished patient — no abnormalities on history or examination","Mildly malnourished — borderline nutritional intake only","Moderately malnourished — moderate deficits on history and examination","Severely malnourished — significant nutritional depletion on history and physical examination","Critically malnourished requiring immediate parenteral nutrition"],ans:3,exp:'SGA combines HISTORY (weight change, dietary intake, GI symptoms, functional capacity, disease metabolic stress) and PHYSICAL EXAM (subcutaneous fat, muscle wasting, oedema). GRADE A = well nourished. GRADE B = moderately malnourished. GRADE C = SEVERELY MALNOURISHED — significant depletion requiring urgent intervention and monitoring for refeeding syndrome. SGA requires no laboratory tests. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"The GLIM criteria for diagnosing malnutrition require:",opts:["At least two phenotypic criteria regardless of aetiology","At least one aetiologic criterion alone is sufficient for diagnosis","At least one phenotypic criterion PLUS at least one aetiologic criterion","A positive MUST or NRS-2002 screening score alone","BMI below 20 combined with weight loss greater than 10%"],ans:2,exp:'GLIM (2019) uses 3 steps: STEP 1 = screening (MUST, NRS-2002, MNA); STEP 2 = DIAGNOSIS requires ≥1 PHENOTYPIC criterion (unintentional weight loss >5% in 6 months, low BMI <20 if <70yr / <22 if ≥70yr, or reduced muscle mass) PLUS ≥1 AETIOLOGIC criterion (reduced food intake/absorption OR inflammation/disease burden); STEP 3 = severity staging. Screening alone is NOT diagnostic. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"A 72-year-old woman with active rheumatoid arthritis has lost 7% of her body weight unintentionally over 5 months and has reduced food intake. Which GLIM criteria does she satisfy?",opts:["Phenotypic only — weight loss alone satisfies both criteria simultaneously","Aetiologic only — chronic inflammation alone is sufficient for diagnosis","Both phenotypic and aetiologic — weight loss (phenotypic) plus active inflammatory disease (aetiologic)","Neither — the weight loss threshold for patients over 70 requires greater than 10%","GLIM cannot be applied without formal DEXA body composition measurement"],ans:2,exp:'PHENOTYPIC criterion met — unintentional weight loss >5% within 6 months (7% in 5 months qualifies). AETIOLOGIC criterion met — active rheumatoid arthritis = CHRONIC INFLAMMATION AND DISEASE BURDEN. One of each is required. Her age ≥70 also lowers the BMI phenotypic threshold to <22 kg/m². The weight loss threshold does NOT increase with age — remains >5% in 6 months for all adults. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"Enteral nutrition is specifically indicated when:",opts:["The GI tract is non-functional due to short bowel syndrome","Oral intake is insufficient but the GI tract is functional and accessible — particularly when oral intake cannot meet ≥50% of estimated requirements for more than 7 days","All patients with BMI below 18.5 regardless of oral intake capacity","A patient requires more than 2000 kcal/day that food alone cannot easily meet","Any patient admitted to hospital with documented weight loss in the previous 3 months"],ans:1,exp:'Nutritional support hierarchy: ORAL first (food-first, high-protein high-calorie, oral nutritional supplements) → ENTERAL if oral insufficient but GI functional → PARENTERAL if GI non-functional or inaccessible. ENTERAL indicated when oral intake cannot meet ≥50% of requirements for >7 DAYS. Delivered via NG, NJ, or gastrostomy tube. PARENTERAL indications: short bowel syndrome, high-output fistulae, prolonged GI failure. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"The hallmark electrolyte abnormality in refeeding syndrome is:",opts:["Hypernatraemia from insulin-driven sodium reabsorption","Hypokalaemia from aldosterone-mediated urinary losses","Hypophosphataemia from insulin-driven shift of phosphate into cells","Hypocalcaemia from reduced parathyroid hormone response","Hypomagnesaemia causing ventricular arrhythmias"],ans:2,exp:'REFEEDING SYNDROME: severely malnourished patients are depleted of intracellular electrolytes. Reintroducing carbohydrates triggers INSULIN release, driving glucose + phosphate + potassium + magnesium INTO CELLS. The hallmark is PROFOUND HYPOPHOSPHATAEMIA. Consequences: cardiac failure, arrhythmias, respiratory failure (diaphragmatic weakness), Wernicke\'s encephalopathy (from thiamine deficiency), seizures. Golden rule: START LOW AND GO SLOW — 10 kcal/kg/day. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"Which patient is at HIGHEST risk of refeeding syndrome?",opts:["A 38-year-old post-appendicectomy patient nil by mouth for 36 hours","A 25-year-old with BMI 19.5 on a 600 kcal/day diet for 10 days","A 60-year-old with BMI 14, no meaningful nutritional intake for 12 days, and low baseline phosphate","A 70-year-old diabetic admitted with UTI and reduced appetite for 4 days","A 35-year-old with Crohn\'s disease who paused oral feeds during a 5-day flare"],ans:2,exp:'HIGH-RISK for refeeding: BMI <16, weight loss >15% in 3–6 months, LITTLE OR NO INTAKE FOR ≥10 DAYS, low baseline K/PO4/Mg, alcohol use disorder. This patient: BMI 14 (<16), >10 days minimal intake, AND low baseline phosphate — three concurrent risk factors. For BMI <14, start even LOWER than 10 kcal/kg/day. Replace THIAMINE before carbohydrates. Frequent electrolyte monitoring throughout. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"The very first step before initiating nutritional support in a high-risk refeeding patient is:",opts:["Start calories at 10 kcal/kg/day immediately","Give IV phosphate to correct depleted stores","Replace thiamine (Vitamin B1) 200–300 mg/day before introducing carbohydrates","Administer a high-protein oral supplement to test GI tolerance","Restrict fluids to prevent insulin-driven oedema"],ans:2,exp:'THIAMINE (Vitamin B1) must be replaced BEFORE carbohydrates — 200–300 mg/day orally (or IV). Carbohydrate metabolism via pyruvate dehydrogenase is THIAMINE-DEPENDENT; in a depleted patient, refeeding without B1 precipitates WERNICKE\'S ENCEPHALOPATHY (ophthalmoplegia, ataxia, altered consciousness). After thiamine: give B complex + other vitamins, then start calories at 10 kcal/kg/day with gradual increase, monitoring and replacing K, PO4, and Mg throughout. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"Wernicke's encephalopathy in refeeding syndrome is caused by:",opts:["Hypophosphataemia depleting intracellular ATP in neurons","Hypokalaemia causing brainstem membrane instability","Thiamine (Vitamin B1) deficiency precipitated by rapid carbohydrate reintroduction","Hypomagnesaemia reducing NMDA receptor function","Osmotic demyelination from rapid glucose infusion"],ans:2,exp:'WERNICKE\'S ENCEPHALOPATHY — triad of OPHTHALMOPLEGIA, ATAXIA, CONFUSION — is caused by THIAMINE DEFICIENCY. When carbohydrates are reintroduced without thiamine, pyruvate dehydrogenase is blocked (thiamine-dependent), collapsing neuronal energy supply. Untreated, it progresses to KORSAKOFF SYNDROME (irreversible anterograde amnesia, confabulation). Thiamine ALWAYS before carbohydrates in malnourished patients. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"The gold standard body composition tool for differentiating fat mass from lean mass is:",opts:["BMI calculation from weight and height","Waist circumference at the iliac crest","Skinfold thickness using triceps calipers","DEXA (Dual Energy X-ray Absorptiometry) scan","Mid-upper arm circumference (MUAC)"],ans:3,exp:'DEXA is the GOLD STANDARD for body composition — measures fat mass, lean (fat-free) mass, and bone mineral density precisely. BIA is a practical alternative. BMI is widely used clinically but cannot distinguish fat from muscle — a muscular athlete and a sarcopenic obese patient may have identical BMIs. DEXA is essential when sarcopenic obesity is clinically suspected. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"Acanthosis nigricans in an obese patient is a clinical indicator of:",opts:["Cushing\'s syndrome from cortisol-driven skin changes","Haemochromatosis with cutaneous iron deposition","Insulin resistance associated with adipocyte dysfunction and excess adiposity","Hypothyroidism causing myxoedematous skin changes","Vitamin B12 deficiency causing generalised hyperpigmentation"],ans:2,exp:'ACANTHOSIS NIGRICANS — hyperpigmented, velvety skin in body folds (neck, axillae, groins) — is a clinical marker of INSULIN RESISTANCE. Adipocyte dysfunction causes hyperinsulinaemia which stimulates keratinocyte and fibroblast proliferation via IGF-1 receptors. SKIN TAGS (acrochordons) are also associated with insulin resistance. Both are clinical cues to screen for metabolic syndrome. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"Metabolic Dysfunction-Associated Steatotic Liver Disease (MASLD) was previously known as:",opts:["Alcoholic steatohepatitis (ASH)","Non-alcoholic fatty liver disease (NAFLD)","Non-alcoholic steatohepatitis (NASH) only — not the full NAFLD spectrum","Primary biliary cirrhosis","Metabolic syndrome hepatopathy"],ans:1,exp:'MASLD is the 2023 RENAMING of NAFLD to reduce stigma and better reflect metabolic pathophysiology. It is hepatic fat accumulation driven by insulin resistance, excess adiposity, and dysfunctional adipokine signalling. Spectrum: simple steatosis → steatohepatitis (MASH, formerly NASH) → fibrosis → cirrhosis → HCC. One of the most common liver diseases globally and a direct complication of excess adiposity. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"The obesity paradox refers to:",opts:["The observation that visceral fat is more dangerous than subcutaneous fat at identical BMIs","The counter-intuitive finding that in specific populations such as chronic heart failure, overweight or obese patients may have better prognosis than lean patients","The paradox that caloric restriction in obese patients increases rather than lowers metabolic rate","The finding that bariatric surgery increases short-term mortality despite improving long-term outcomes","The observation that BMI underestimates adiposity in muscular individuals"],ans:1,exp:'The OBESITY PARADOX: in SPECIFIC POPULATIONS — particularly CHRONIC HEART FAILURE and end-stage disease — overweight/obese patients have BETTER SURVIVAL and fewer re-hospitalisations than lean patients. Proposed mechanisms: greater METABOLIC RESERVE for catabolic states, paradoxically lower inflammatory responses, and protective lean mass stores. Clinically: caution against aggressive weight reduction in all obese patients with serious chronic illness. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"Bariatric surgery is indicated in a patient with:",opts:["BMI ≥25 with hypertension and dyslipidaemia uncontrolled on two medications","BMI ≥30 in all patients with type 2 diabetes","BMI ≥35 with significant obesity-related comorbidities, OR BMI ≥40 alone","BMI ≥40 only — lower BMI thresholds are not accepted indications","Any BMI when dietary and pharmacological interventions have both failed for more than 2 years"],ans:2,exp:'BARIATRIC SURGERY indications: BMI ≥40 alone; OR BMI ≥35 with SIGNIFICANT OBESITY-RELATED COMORBIDITIES (type 2 diabetes, hypertension, sleep apnoea, severe joint disease); OR BMI ≥30 with SEVERE COMORBIDITIES in selected cases. Options: sleeve gastrectomy, Roux-en-Y gastric bypass — managed by a MULTIDISCIPLINARY bariatric team. Most effective long-term intervention for severe obesity and metabolic complications. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"The most clinically important complication of enteral nutrition via nasogastric tube is:",opts:["Hypercapnia from excess carbon dioxide production due to carbohydrate overfeeding","Catheter-related bloodstream infection from line contamination","Hypophosphataemia from insulin-driven intracellular shifts triggered by high-carbohydrate feeds","Aspiration pneumonia from regurgitation of feeds into the airway","Metabolic alkalosis from excessive bicarbonate generation"],ans:3,exp:'ASPIRATION PNEUMONIA is the most important complication of enteral nutrition — gastric contents reflux and are aspirated into the lungs causing chemical pneumonitis and secondary bacterial pneumonia. Prevention: 30–45° head elevation, post-pyloric feeding in high-risk patients, monitoring gastric residuals. HYPERCAPNIA occurs from CARBOHYDRATE OVERFEEDING and can worsen respiratory failure in ventilated patients. CATHETER-RELATED BLOODSTREAM INFECTION is a complication of PARENTERAL nutrition. <em style="color:#aaa">Source: Esther\'s Notes</em>'},
  {q:"In over-nutrition, adipocyte dysfunction drives systemic cardiometabolic risk primarily through:",opts:["Adipocyte hypertrophy depleting circulating albumin causing hypoproteinaemia","Release of excess pro-inflammatory cytokines (TNF-α, interleukins), ectopic fat deposition, and systemic insulin resistance from dysfunctional adipocytes","Enlarged adipocytes compressing the inferior vena cava and increasing right heart preload","Visceral fat hyperplasia reducing hepatic bile acid synthesis","Adipocyte-derived cortisol excess suppressing HPA axis feedback"],ans:1,exp:'In over-nutrition, adipocyte HYPERTROPHY and HYPERPLASIA produce DYSFUNCTIONAL adipocytes releasing excess PRO-INFLAMMATORY CYTOKINES (TNF-α, interleukins) and depositing fat ECTOPICALLY in liver and visceral organs. This drives SYSTEMIC INSULIN RESISTANCE and CHRONIC LOW-GRADE INFLAMMATION — the central link between excess adiposity and cardiometabolic complications (hypertension, coronary disease, type 2 diabetes, MASLD). <em style="color:#aaa">Source: Esther\'s Notes</em>'}
];

const TYPHOID_Qs = [
  {q:"Typhoid fever is caused by:",opts:["Salmonella enterica serovar Enteritidis, a gram-negative rod causing primarily gastroenteritis","Salmonella enterica serovar Typhi, a gram-negative motile facultative anaerobic bacillus of the Enterobacteriaceae family","Shigella dysenteriae, a non-motile gram-negative rod causing bloody dysentery","Yersinia enterocolitica, a gram-negative coccobacillus causing mesenteric adenitis","Salmonella enterica serovar Typhimurium, the leading cause of non-typhoidal salmonellosis"],ans:1,exp:"Typhoid fever is caused by SALMONELLA ENTERICA SEROVAR TYPHI — gram-negative, MOTILE, non-spore-forming, FACULTATIVE ANAEROBIC bacillus of the Enterobacteriaceae family. PARATYPHOID fever (caused by S. Paratyphi A, B, C) is similar but milder. Together they are ENTERIC FEVER. Non-typhoidal Salmonella (Enteritidis, Typhimurium) primarily causes gastroenteritis and is distinct from typhoid."},
  {q:"Enteric fever is transmitted primarily through:",opts:["Bite of infected Anopheles mosquitoes during a blood meal","Inhalation of aerosolised S. Typhi from infected patients","The '4 Fs' — contaminated food, fomites, feces, and flies via the faecal-oral route","Direct skin contact with infected individuals in endemic areas","Sexual transmission via mucous membrane exposure"],ans:2,exp:"S. Typhi spreads via the '4 Fs': FLIES (transfer organisms to food), FINGERS (poor hand hygiene), FECES (contaminated water from cases/carriers), FOMITES. Specific sources: shellfish from sewage-polluted water, raw fruit/vegetables fertilised with human excreta, contaminated milk. LACK OF CLEAN WATER, SANITATION, AND HYGIENE (WASH) is the key driver. Sexual transmission among MSM has been rarely documented."},
  {q:"The characteristic fever pattern in typhoid fever is:",opts:["Quotidian fever peaking every 24 hours then returning to normal","Remittent fever with marked diurnal variation and drenching night sweats","Step-ladder (continuously rising) fever typically exceeding 39.4°C","Saddle-back fever with two peaks separated by a brief afebrile period","Intermittent tertian fever recurring every 48 hours"],ans:2,exp:"Typhoid presents with a STEP-LADDER FEVER PATTERN — temperature rises progressively over the first week, typically exceeding 39.4°C, without returning to baseline between spikes. This contrasts with malaria (tertian/quartan intermittent fever), dengue (saddle-back), and brucellosis (undulant). Step-ladder fever in a patient from an endemic area is a classic clinical trigger for typhoid workup."},
  {q:"Relative bradycardia (Faget's sign) in typhoid fever is:",opts:["A paradoxically low heart rate relative to the degree of fever, occurring in up to 50% of cases","Paradoxical slowing of heart rate on standing from a lying position","Heart rate below 60 bpm in all patients with typhoid regardless of temperature","Tachycardia that resolves to normal after antipyretics","Irregularly irregular pulse from typhoid-related atrial fibrillation"],ans:0,exp:"FAGET'S SIGN is a PARADOXICALLY LOW HEART RATE for the degree of fever — patients are febrile but the pulse is inappropriately slow. Occurs in <50% of cases. The mechanism involves S. Typhi endotoxin-mediated effects on cardiac rate. Relative bradycardia in a febrile patient from an endemic area should raise typhoid on the differential (alongside yellow fever, brucellosis, drug fever). Not all typhoid patients have it — its absence does not exclude the diagnosis."},
  {q:"Rose spots in typhoid fever represent:",opts:["Erythematous scaling plaques from immune complex vasculitis","Small blanching erythematous macules on the chest and abdomen representing bacterial emboli to the dermis","Petechiae on the palate from thrombocytopenia and bone marrow suppression","Painful nodules on fingertip pulps from septic microemboli","Confluent purpuric lesions from disseminated intravascular coagulation"],ans:1,exp:"ROSE SPOTS are small (2–4 mm), slightly raised, BLANCHING erythematous macules on the chest and abdomen in ~30% of patients. They represent BACTERIAL EMBOLI to the dermis — cutaneous bacteraemia. They blanch on pressure (distinguishing them from purpura). More visible on light-skinned patients. Their presence is a useful clinical clue; their absence does not exclude typhoid. Importantly, CORTICOSTEROIDS used in complicated typhoid can MASK physical signs."},
  {q:"The most dangerous intestinal complication of typhoid fever results from:",opts:["Intussusception from enlarged mesenteric lymph nodes","Necrosis of Peyer's patches causing transmural bowel perforation and peritonitis","Toxic megacolon from S. Typhi invasion of colonic smooth muscle","Mesenteric ischaemia from S. Typhi-mediated thrombosis","Enterocutaneous fistula from terminal ileum ulceration"],ans:1,exp:"S. Typhi invades PEYER'S PATCHES in the terminal ileum causing progressive inflammation → necrosis → ulceration → TRANSMURAL PERFORATION → PERITONITIS. This is potentially fatal. Signs of peritonitis may be MASKED by corticosteroids used for neurological typhoid. Intestinal HAEMORRHAGE from ulceration can also be fatal. Surgery (simple closure; bowel resection for multiple perforations) is required. Plain AXR showing free subdiaphragmatic air confirms perforation."},
  {q:"The most sensitive diagnostic test for typhoid fever overall — including in patients who have already received antibiotics — is:",opts:["Blood culture in the first week","Stool culture in the second and third weeks","Bone marrow culture","Widal test with titre above 1:160 for O antigen","Typhidot rapid IgM/IgG assay"],ans:2,exp:"BONE MARROW CULTURE has sensitivity ≥90% and is crucially NOT AFFECTED by prior antibiotic use. This makes it invaluable when antibiotics have already been started (reducing blood culture yield). BLOOD CULTURE is 85–90% sensitive in the FIRST WEEK — gold standard for EARLY diagnosis, yield falls once antibiotics start. STOOL CULTURE (50%) is useful from the 2nd–3rd week and for identifying carriers. URINE CULTURE (30–40%) is a late low-yield test. Bone marrow culture is invasive but definitively diagnostic when other tests fail."},
  {q:"The Widal test detects:",opts:["S. Typhi DNA in blood by polymerase chain reaction","IgM antibodies against the outer membrane protein (OmpC) of S. Typhi","Agglutinating antibodies against the O (somatic) and H (flagellar) antigens of S. Typhi","Vi antigen in urine by lateral flow immunochromatography","S. Typhi IgG as a marker of past exposure or vaccination"],ans:2,exp:"The WIDAL TEST detects AGGLUTINATING ANTIBODIES against the O (somatic) and H (flagellar) antigens of S. Typhi. TO titre >1:160 suggests ACTIVE infection; TH titre >1:160 suggests PAST infection or immunisation. A FOUR-FOLD RISE in paired sera is considered diagnostic. However: LOW sensitivity, LOW specificity, variable predictive values — cross-reactions with other Salmonella serovars and Enterobacteriaceae occur. Still used at some centres (e.g. IUTH) with locally determined cutoff points but NOT the gold standard."},
  {q:"Typhidot differs from the Widal test in that it:",opts:["Detects O and H antigens directly from stool rather than antibodies in serum","Detects both IgM and IgG antibodies against the outer membrane protein (OmpC) of S. Typhi, becoming positive within 2–3 days of infection","Measures a four-fold rise in antibody titres over paired sera one week apart","Detects IgM antibodies against O9 antigen only","Uses complement fixation rather than agglutination"],ans:1,exp:"TYPHIDOT is a rapid dot ELISA detecting BOTH IgM AND IgG antibodies against the OUTER MEMBRANE PROTEIN (OmpC) of S. Typhi. Positive within 2–3 DAYS of infection. Easy to perform, no special equipment needed. Studies show Typhidot is MORE SENSITIVE AND SPECIFIC than Widal: sensitivity ~96% vs ~72%, specificity ~89.5% vs ~87%, PPV ~95% vs ~87%. It is therefore diagnostically superior and identifies acute (IgM) vs past/late (IgG) infection separately."},
  {q:"The neuropsychiatric manifestation of typhoid fever characterised by apathy, confusion, and psychosis in the third week is called:",opts:["Typhoid meningitis from direct meningeal invasion","Cerebral abscess from haematogenous seeding of brain parenchyma","The typhoid state — a toxic encephalopathy from systemic toxaemia and cytokine-mediated brain dysfunction","Wernicke\'s encephalopathy from thiamine deficiency in a malnourished host","Korsakoff syndrome from prolonged hippocampal ischaemia"],ans:2,exp:"The TYPHOID STATE is a toxic encephalopathy appearing in the THIRD WEEK — APATHY, CONFUSION, DISORIENTATION, and frank PSYCHOSIS from S. Typhi LPS (endotoxin) and cytokine-mediated cerebral dysfunction rather than direct CNS invasion. For SEVERE TYPHOID WITH NEUROLOGICAL FEATURES (hallucinations, altered mental status, or shock): DEXAMETHASONE IV — 3 mg/kg initial dose then 1 mg/kg every 6 hours for 2 days (8 doses) — dramatically reduces mortality."},
  {q:"The first-line treatment for uncomplicated typhoid fever with no fluoroquinolone resistance is:",opts:["Azithromycin 1 g once daily for 7 days","Ceftriaxone 2 g IV once daily for 14 days","Ciprofloxacin 500 mg twice daily in adults (15 mg/kg twice daily in children)","Amoxicillin 1 g three times daily for 14 days","Co-trimoxazole 800/160 mg twice daily for 14 days"],ans:2,exp:"FLUOROQUINOLONES (CIPROFLOXACIN) remain first-line for FLUOROQUINOLONE-SUSCEPTIBLE uncomplicated typhoid. Adults: 500 mg TWICE DAILY. Children: 15 mg/kg TWICE DAILY (max 1g/day) — with caution. AZITHROMYCIN (1g once daily) or CEFIXIME are used for ciprofloxacin-resistant strains. CHLORAMPHENICOL, AMOXICILLIN, and CO-TRIMOXAZOLE are now second-line only for CONFIRMED SUSCEPTIBLE strains — widespread MDR has largely displaced them."},
  {q:"Multidrug-resistant (MDR) typhoid is defined as resistance to:",opts:["Ciprofloxacin, azithromycin, and ceftriaxone simultaneously","Chloramphenicol, ampicillin/amoxicillin, and co-trimoxazole","Ceftriaxone, ciprofloxacin, and azithromycin — the current first-line agents","Chloramphenicol and ciprofloxacin","Azithromycin, carbapenem, and any third-generation cephalosporin"],ans:1,exp:"MDR TYPHOID = resistance to ALL THREE CLASSIC FIRST-LINE AGENTS: CHLORAMPHENICOL + AMPICILLIN/AMOXICILLIN + CO-TRIMOXAZOLE. XDR (EXTENSIVELY DRUG-RESISTANT) additionally has resistance to FLUOROQUINOLONES AND THIRD-GENERATION CEPHALOSPORINS — leaving only AZITHROMYCIN and CARBAPENEMS. First XDR outbreak: Sindh, Pakistan 2016. For MDR: azithromycin or ceftriaxone. For XDR: azithromycin + carbapenem. An estimated 2.5 million MDR and 7.4 million FQNS S. Typhi infections occurred globally in 2019."},
  {q:"Dexamethasone is specifically indicated in typhoid fever for:",opts:["All cases of uncomplicated typhoid to prevent progression","Typhoid with intestinal perforation to reduce post-surgical inflammation","Severe typhoid with neurological features — altered mental status, hallucinations, or shock","Any patient with positive blood culture to accelerate bacteraemia clearance","Typhoid in pregnancy to prevent placental damage from high fever"],ans:2,exp:"DEXAMETHASONE is indicated ONLY in SEVERE TYPHOID WITH NEUROLOGICAL FEATURES (hallucinations, altered mental status) or SHOCK. Dosing: 3 MG/KG IV initial dose, then 1 MG/KG every 6 hours for 2 DAYS (8 doses). This regimen dramatically reduces mortality in severe neurological typhoid. It is NOT indicated for uncomplicated typhoid. In intestinal perforation it is AVOIDED as it masks peritoneal signs and impairs wound healing."},
  {q:"An asymptomatic chronic typhoid carrier is defined as someone who:",opts:["Has detectable S. Typhi IgG antibodies more than 6 months after recovery without ever having symptoms","Tests Widal-positive at titres above 1:320 for more than 3 months post-treatment","Excretes S. Typhi in stool for ≥12 months after clinical recovery, usually with organisms harbouring in the gallbladder","Has relapsing typhoid fever within 1–3 weeks of clinical recovery requiring further antibiotics","Tests positive on bone marrow culture despite completed treatment and clinical cure"],ans:2,exp:"A CHRONIC CARRIER excretes S. Typhi in stool for ≥12 MONTHS — occurring in 1–4% of treated patients — usually with organisms persisting in the GALLBLADDER (Typhoid Mary is the classic example). Eradication requires PROLONGED ANTIBIOTIC COURSE (ciprofloxacin, amoxicillin, or co-trimoxazole). CHOLECYSTECTOMY if antibiotics fail — though not always successful due to hepatic infection. RELAPSE (recurrence within 1–3 weeks) is distinct — same infection, not chronic carriage."},
  {q:"A 14-year-old girl presents with 8 days of step-ladder fever, headache, and constipation. Temperature is 39.8°C, there is relative bradycardia, faint rose spots on the abdomen, and mild splenomegaly. The most appropriate diagnostic investigation is:",opts:["Thick and thin blood film for malaria parasites","Widal test — O antigen titre above 1:160 confirms typhoid","Blood culture — gold standard for early typhoid diagnosis in the first week","Stool culture — highest sensitivity in the first week of illness","Bone marrow culture — should be performed before any antibiotics are started"],ans:2,exp:"Classic TYPHOID FEVER: step-ladder fever, relative bradycardia, ROSE SPOTS (~30% of cases), and splenomegaly in a child from an endemic setting. BLOOD CULTURE is the most appropriate investigation in the FIRST WEEK — 85–90% sensitivity, gold standard for EARLY diagnosis. Yield drops sharply once antibiotics start. Widal has low specificity and cross-reactions. Stool culture is more useful from the 2nd–3rd week. Bone marrow culture (most sensitive overall) is reserved for patients who have already received antibiotics."},
  {q:"Which typhoid vaccine consists of 4 oral capsules taken on alternate days and is contraindicated in immunocompromised patients and those on antibiotics?",opts:["Vi capsular polysaccharide injectable vaccine (Typhim Vi)","Typbar-TCV conjugate vaccine given as a single IM injection","Live attenuated Ty21a oral vaccine (Vivotif)","BCG vaccine given at birth as part of the immunisation schedule","Oral cholera vaccine providing cross-protection against typhoid"],ans:2,exp:"LIVE ATTENUATED TY21A ORAL VACCINE (Vivotif): 4 CAPSULES on ALTERNATE DAYS. Booster: every 5 years. Licensed ≥6 years. CONTRAINDICATED in immunocompromised patients (including HIV), pregnant women, acute febrile illness, and acute gastroenteritis — it is a live vaccine. CRITICAL: antibiotics inhibit the live strain — delay vaccination >72 HOURS after antibiotics; no antibiotics ≤72 hours after the last dose. Atovaquone-proguanil only ≥10 days after the last Vivotif dose. VPCPS (Typhim Vi): single IM injection, booster every 2 years, safe in immunocompromised."}
];

/* ═══════════ ANATOMY — GROSS ANATOMY OF THE STOMACH (ANA202a) ═══════════ */
const ANA_STOMACH_Qs = [
  { q:"Which of the following best describes the position of the stomach within the peritoneal cavity?", opts:["Retroperitoneal throughout","Intraperitoneal","Secondarily retroperitoneal","Extraperitoneal","Subperitoneal"], ans:1, exp:"The stomach is entirely INTRAPERITONEAL — it is covered by visceral peritoneum on all surfaces and suspended by mesenteric ligaments (omenta). Retroperitoneal organs (e.g. kidneys, duodenum, pancreas) lie behind the peritoneum. Secondarily retroperitoneal organs (e.g. ascending colon) were originally intraperitoneal but fused to the posterior wall during development. The stomach's intraperitoneal position allows it considerable mobility." },
  { q:"The stomach is the widest and most distensible part of the gastrointestinal tract. Its capacity in an adult is approximately:", opts:["500 mL to 1 L","1.5 L to 2 L","2.5 L to 3 L","3 L to 4 L","300 mL to 500 mL"], ans:1, exp:"The adult stomach has a capacity of approximately 1.5 to 2 litres. At rest it is J-shaped and roughly 25 cm long. Its distensibility allows it to expand significantly after a meal. A capacity significantly below 1.5 L may suggest surgical resection or pathological contraction; well above 2 L is seen in gastroparesis or outlet obstruction." },
  { q:"The cardia of the stomach, which surrounds the opening of the oesophagus, is situated at the level of which vertebra?", opts:["T9","T10","T11","T12","L1"], ans:2, exp:"The cardia of the stomach — the region surrounding the gastro-oesophageal junction — lies at the level of T11. The oesophageal hiatus in the diaphragm is at T10, but the actual gastric cardia is at T11. This distinction matters clinically: the diaphragmatic contribution to the lower oesophageal sphincter mechanism operates at T10, while the gastric cardia proper is at T11." },
  { q:"Which part of the stomach is described as the dilated superior region that lies above the level of the cardial orifice?", opts:["Cardia","Body","Fundus","Pyloric antrum","Pyloric canal"], ans:2, exp:"The FUNDUS is the dilated superior part of the stomach that balloons superiorly and to the left above the level of the cardial orifice. On an erect chest X-ray, the fundus normally contains a gas bubble. The cardia merely surrounds the oesophageal opening. The body is the largest central region. The pyloric antrum and canal are the distal components of the pyloric part." },
  { q:"The angular notch (incisura angularis) of the stomach is located at which site?", opts:["Superior angle where the oesophagus joins the stomach","Junction of the fundus and body on the greater curvature","Junction of the body and pyloric part on the lesser curvature","Junction of the pyloric canal and the first part of the duodenum","Midpoint of the greater curvature"], ans:2, exp:"The ANGULAR NOTCH is a distinct bend on the LESSER CURVATURE marking the junction between the body and the pyloric part of the stomach. It is an important radiological landmark on barium meal studies. The cardial notch is the superior angle at the oesophago-gastric junction. The pyloro-duodenal junction is at the distal end of the pyloric canal and is marked externally by the prepyloric vein of Mayo." },
  { q:"The cardial notch of the stomach is formed at which anatomical location?", opts:["Junction of the body and pyloric antrum on the lesser curvature","Angle between the greater curvature and the duodenum","Superior angle created where the oesophagus enters the stomach","Bend on the lesser curvature between the body and pylorus","Junction of the pyloric canal and the duodenum"], ans:2, exp:"The CARDIAL NOTCH is the acute superior angle created between the left wall of the oesophagus and the fundus of the stomach where the oesophagus enters. It is on the left side of the gastro-oesophageal junction and helps maintain the flap-valve mechanism that contributes to prevention of reflux. The angular notch, in contrast, is on the lesser curvature." },
  { q:"The greater curvature of the stomach is a point of attachment for which two structures?", opts:["Lesser omentum and falciform ligament","Gastrosplenic ligament and greater omentum","Hepatogastric ligament and hepatoduodenal ligament","Transverse mesocolon and lesser omentum","Coronary ligament and greater omentum"], ans:1, exp:"The GREATER CURVATURE — the long, convex, lateral border of the stomach — gives attachment to the GASTROSPLENIC LIGAMENT (connecting it to the spleen) and the GREATER OMENTUM (a large fatty apron that hangs down from it and attaches to the posterior abdominal wall). The lesser omentum, hepatogastric, and hepatoduodenal ligaments all attach to the LESSER curvature and the first part of the duodenum." },
  { q:"The lesser omentum connects the lesser curvature and first part of the duodenum to which structure?", opts:["Anterior abdominal wall","Spleen","Diaphragm","Liver","Transverse colon"], ans:3, exp:"The LESSER OMENTUM runs from the LESSER CURVATURE of the stomach and the first part of the duodenum to the undersurface of the LIVER. It is composed of two ligaments: the hepatogastric ligament (liver to stomach) and the hepatoduodenal ligament (liver to duodenum). The hepatoduodenal ligament contains the portal triad: portal vein, hepatic artery, and bile duct. The greater omentum attaches to the posterior abdominal wall." },
  { q:"Which two ligaments collectively constitute the lesser omentum?", opts:["Gastrosplenic and gastrocolic ligaments","Hepatogastric and hepatoduodenal ligaments","Gastrophrenic and falciform ligaments","Phrenicosplenic and hepatogastric ligaments","Coronary and triangular ligaments"], ans:1, exp:"The LESSER OMENTUM is formed by the HEPATOGASTRIC LIGAMENT (from the liver to the lesser curvature of the stomach) and the HEPATODUODENAL LIGAMENT (from the liver to the first part of the duodenum). The hepatoduodenal ligament is clinically significant as it forms the anterior boundary of the epiploic foramen (foramen of Winslow) and transmits the portal vein, hepatic artery proper, and common bile duct." },
  { q:"The stomach has three muscular layers unique among gastrointestinal organs. Which layer is found in the stomach but absent in most other parts of the gut?", opts:["Outer longitudinal layer","Middle circular layer","Inner mucosal layer","Innermost oblique layer","Submucosal layer"], ans:3, exp:"The stomach possesses THREE muscular layers: outer longitudinal, middle circular, and an INNERMOST OBLIQUE layer. The oblique layer is UNIQUE TO THE STOMACH and is absent in other segments of the GI tract, which have only two layers (longitudinal and circular). The oblique fibres fan out from the cardia and help churn gastric contents. The middle circular layer thickens distally to form the PYLORIC SPHINCTER." },
  { q:"Which of the following is NOT a recognised component of the stomach bed?", opts:["Pancreas","Left suprarenal gland","Left kidney","Gallbladder","Transverse mesocolon"], ans:3, exp:"The STOMACH BED consists of structures that form the posterior relation of the stomach, separated from it by the lesser sac. Its 8 components are: left crus of diaphragm, left suprarenal gland, left kidney, splenic artery, spleen (sometimes), pancreas, transverse mesocolon, and splenic flexure of colon. The GALLBLADDER is an ANTERIOR relation of the stomach, not posterior — it lies anterior-inferior to the stomach along with the abdominal wall, left costal margin, diaphragm, and left lobe of liver." },
  { q:"The left gastric artery, the dominant supply to the lesser curvature, is a branch of which vessel?", opts:["Hepatic artery","Splenic artery","Gastroduodenal artery","Coeliac artery","Superior mesenteric artery"], ans:3, exp:"The LEFT GASTRIC ARTERY is a direct branch of the COELIAC ARTERY (coeliac trunk). It supplies the upper lesser curvature and also gives oesophageal branches. The right gastric artery is a branch of the hepatic artery and supplies the lower lesser curvature. Together, left and right gastric arteries form an anastomotic arcade along the lesser curvature. The coeliac trunk also gives the splenic and common hepatic arteries." },
  { q:"The right gastroepiploic artery, supplying the greater curvature from the right side, is a branch of which vessel?", opts:["Coeliac artery","Splenic artery","Right gastric artery","Gastroduodenal artery","Superior mesenteric artery"], ans:3, exp:"The RIGHT GASTROEPIPLOIC ARTERY is a branch of the GASTRODUODENAL ARTERY, which itself arises from the common hepatic artery. It runs along the greater curvature from right to left. The LEFT GASTROEPIPLOIC ARTERY is a branch of the SPLENIC ARTERY and runs from left to right along the greater curvature. Together they form an anastomotic arcade along the greater curvature, though this arcade is often incomplete." },
  { q:"Into which vessel do the right and left gastric veins drain?", opts:["Superior mesenteric vein","Inferior vena cava","Portal vein","Splenic vein","Azygos vein"], ans:2, exp:"The RIGHT and LEFT GASTRIC VEINS (which correspond to the right and left gastric arteries along the lesser curvature) drain directly into the PORTAL VEIN. This is clinically important: in portal hypertension, the left gastric vein develops collaterals with oesophageal veins, leading to oesophageal varices — a major complication. The right gastroepiploic vein drains to the superior mesenteric vein (SMV); the left gastroepiploic vein drains to the splenic vein." },
