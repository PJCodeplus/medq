  { q:"Non-proliferative glomerulonephritis typically presents with nephrotic syndrome and includes all of the following EXCEPT:", opts:["Minimal change disease", "Focal segmental glomerulosclerosis", "Membranous glomerulonephritis", "IgA nephropathy", "Thin membrane disease"], ans:3, exp:"IgA nephropathy is a PROLIFERATIVE glomerulonephritis (proliferative = glomerular cell proliferation, typically presenting with NEPHRITIC syndrome). Non-proliferative GN types include: minimal change disease, focal segmental glomerulosclerosis, membranous GN, thin membrane disease, and fibronectin glomerulopathy. Non-proliferative types are characterised by LACK of glomerular cell proliferation and NEPHROTIC presentation." },
  { q:"Secondary causes of focal segmental glomerulosclerosis (FSGS) include all of the following EXCEPT:", opts:["HIV nephropathy (HIVAN)", "Morbid obesity", "Sickle cell disease", "Heroin use", "Hepatitis C infection"], ans:4, exp:"Hepatitis C is associated with MEMBRANOPROLIFERATIVE GN (Type I, especially via cryoglobulinaemia) — NOT FSGS. Secondary FSGS causes include: HIV nephropathy, morbid obesity, sickle cell disease, heroin nephropathy, congenital cyanotic heart disease, unilateral renal agenesis, renal ablation, and ageing kidney. Hepatitis B is associated with membranous GN." },
  { q:"The most common presentation of IgA nephropathy associated with skin, joint, and intestinal involvement — occurring more frequently in children — is:", opts:["Syn-pharyngitic haematuria", "Asymptomatic microscopic haematuria", "Henoch-Schönlein purpura", "Nephrotic syndrome", "Rapidly progressive glomerulonephritis"], ans:2, exp:"HENOCH-SCHÖNLEIN PURPURA (HSP) is the SYSTEMIC form of IgA nephropathy, involving skin (purpuric rash), joints (arthralgia), and intestines (abdominal pain, GI bleeding), as well as the kidneys. It occurs more frequently in children than adults. IgA nephropathy may also present as syn-pharyngitic haematuria (concurrent with URTI), or asymptomatic microscopic haematuria." },
  { q:"The Streptozyme test for post-streptococcal GN comprises all of the following EXCEPT:", opts:["Anti-DNase B (ADB)", "Antistreptolysin O (ASO)", "Antistreptokinase", "Antihyaluronidase", "Anti-glomerular basement membrane antibody (anti-GBM)"], ans:4, exp:"Anti-GBM antibody is NOT part of the Streptozyme test — it is measured separately for Goodpasture syndrome and RPGN Type 1. The Streptozyme test comprises: Anti-DNase B (for skin infections), ASO (for throat infections), antistreptokinase, and antihyaluronidase. Anti-DNase B is more sensitive than ASO for skin streptococcal infections, where ASO titre may not rise." },
  { q:"The normal serum creatinine ranges are:", opts:["Men: 0.5–1.0 mg/dL; Women: 0.4–0.9 mg/dL", "Men: 0.7–1.3 mg/dL; Women: 0.6–1.1 mg/dL", "Men: 1.0–1.5 mg/dL; Women: 0.8–1.2 mg/dL", "Men: 0.6–1.2 mg/dL; Women: 0.5–1.0 mg/dL", "Men and Women: 0.8–1.4 mg/dL equally"], ans:1, exp:"Normal serum creatinine is Men: 0.7–1.3 mg/dL; Women: 0.6–1.1 mg/dL. Women have lower values because creatinine is a waste product of muscle breakdown, and women generally have less muscle mass. Serum creatinine rises with decreasing kidney function and is used alongside eGFR to stage CKD and monitor response to therapy." },
  { q:"CT scanning with intravenous contrast should be avoided in patients with renal impairment because:", opts:["CT contrast causes direct glomerular inflammation", "IV contrast significantly increases the risk of AKI, especially in patients with moderate to severe CKD, with dehydration further worsening this risk", "Contrast agents cause permanent nephron loss even in a single exposure", "CT contrast is only safe in patients with GFR >90 mL/min/1.73 m²", "CT contrast causes acute tubular hyperplasia"], ans:1, exp:"IV contrast significantly increases the risk of contrast-induced AKI in CKD patients, particularly those with moderate to severe disease. Dehydration markedly amplifies this risk. Alternatives include MRI (with caution — gadolinium-based contrast causes nephrogenic systemic fibrosis in CKD), non-contrast CT, or renal ultrasound. Before procedures using contrast, ACE inhibitors, ARBs, and NSAIDs should be withheld." },
  { q:"Radionuclide renal scans are considered UNRELIABLE in patients with GFR below:", opts:["60 mL/min/1.73 m²", "45 mL/min/1.73 m²", "30 mL/min/1.73 m²", "15 mL/min/1.73 m²", "10 mL/min/1.73 m²"], ans:2, exp:"Renal radionuclide scans are unreliable in patients with GFR <30 mL/min/1.73 m² (i.e., Stage 4–5 CKD). They are primarily used to screen for renal artery stenosis (when performed with captopril administration) and to quantify the differential renal contribution to total GFR. They are not reliable in advanced CKD because insufficient tracer is filtered and excreted." },
  { q:"The RIFLE classification system was the FIRST widely adopted staging system for AKI. What does the acronym RIFLE stand for?", opts:["Renal Impairment, Failure, Loss, End-stage kidney disease", "Risk, Injury, Failure, Loss of kidney function, End-stage kidney disease", "Renal Inflammation, Fibrosis, Loss, End-stage", "Risk, Injury, Failure, Loss, Excretion failure", "Renal Ischaemia, Fibrosis, Loss, End-stage"], ans:1, exp:"RIFLE stands for: Risk, Injury, Failure, Loss of kidney function, End-stage kidney disease. It was the first standardised AKI staging system, later superseded/supplemented by AKIN (Acute Kidney Injury Network) and KDIGO (Kidney Disease: Improving Global Outcomes) criteria, which refined the definitions. The change from 'acute renal failure' to 'AKI' was formalised because AKI represents a spectrum — not a static, all-or-nothing failure." },
  { q:"In preventing AKI in high-risk patients undergoing procedures, the following interventions are appropriate EXCEPT:", opts:["Substituting MRI or non-contrast CT for CT with iodinated contrast, where possible", "Using CO2 angiography instead of standard iodinated contrast angiography", "Withholding ACE inhibitors and ARBs before procedures using iodinated contrast", "Routinely proceeding with cardiac surgery immediately after coronary angiography", "Using analgesics other than NSAIDs for pain management"], ans:3, exp:"Cardiac or aortic surgery should be AVOIDED IMMEDIATELY AFTER coronary angiography to prevent contrast-induced AKI from the compounding insults of contrast exposure and perioperative haemodynamic instability. All other options are correct AKI prevention strategies. Aminoglycosides should also be avoided in favour of alternative antibiotics when possible, and cardiopulmonary bypass duration should be minimised." },
  { q:"Management goals for CKD patients include all of the following EXCEPT:", opts:["Retard the progression of CKD", "Treat the underlying causes", "Cure CKD through intensive diuretic therapy", "Treat complications of CKD", "Replace total and permanent kidney failure with RRT"], ans:2, exp:"CKD is a SLOW, PROGRESSIVE, and IRREVERSIBLE condition — there is no cure through diuretics or other medical therapy. The four management goals are: (1) RETARD PROGRESSION, (2) TREAT UNDERLYING CAUSES, (3) TREAT COMPLICATIONS, and (4) REPLACE kidney function with RRT (haemodialysis, peritoneal dialysis, or transplant) once kidney failure occurs. Diuretics may be used to treat fluid overload but do not retard CKD progression." },
  { q:"Skin manifestations of advanced CKD include all of the following EXCEPT:", opts:["Dry skin and pruritus", "Uremic frost (late sign)", "Lindsay's nails (half-and-half nails)", "Erythema nodosum", "Pallor and pigmentation changes"], ans:3, exp:"Erythema nodosum is NOT a CKD skin manifestation — it is a panniculitis associated with sarcoidosis, tuberculosis, inflammatory bowel disease, and drugs. CKD skin manifestations include: dry skin, pruritus, nail changes (Lindsay's/half-and-half nails, Terry's nails, Beau's lines, brown nails), bullous eruptions, pallor, pigmentation, and uremic frost (a late and severe sign representing urea crystallisation on skin)." },
  { q:"A modifiable factor that contributes to CKD progression and can be addressed by blood pressure control and RAAS blockade is:", opts:["Underlying cause of the kidney disease", "Patient's race", "Degree of proteinuria", "Rate of tubulointerstitial fibrosis", "Patient's age at CKD onset"], ans:2, exp:"DEGREE OF PROTEINURIA is a key modifiable CKD progression factor. Proteinuria causes direct nephrotoxicity to proximal convoluted tubule cells and drives further fibrosis. ACE inhibitors and ARBs reduce intraglomerular pressure and proteinuria, slowing CKD progression — this is their primary indication in CKD, independent of their antihypertensive effect. Hyperphosphatemia, dyslipidaemia, metabolic acidosis, anaemia, and smoking are also modifiable factors." },
  { q:"Regarding the prognosis of IgA nephropathy, which of the following is CORRECT?", opts:["All patients progress to kidney failure within 5 years", "About 40% have progressive kidney function deterioration, with half of those progressing to kidney failure in 20 years", "The majority (>80%) pursue a benign course with no deterioration", "Steroid therapy prevents all progression to kidney failure", "Kidney failure occurs within 1 year in most patients"], ans:1, exp:"IgA nephropathy prognosis: approximately 40% have PROGRESSIVE DETERIORATION of kidney function, with half of those (i.e., 20% overall) progressing to kidney failure over 20 years. However, approximately 30% pursue a BENIGN COURSE characterised by chronic microscopic haematuria and non-nephrotic range proteinuria. The remaining patients have intermediate courses. Poor prognostic markers include heavy proteinuria, hypertension, elevated creatinine, and crescents on biopsy." },
  { q:"In the treatment of glomerulonephritis, which of the following antihypertensive classes is specifically preferred because of its vasodilatory properties?", opts:["Beta-blockers (e.g., metoprolol)", "Alpha-blockers (e.g., prazosin)", "Dihydropyridine calcium channel blockers (e.g., amlodipine, felodipine)", "Loop diuretics (e.g., frusemide)", "Central alpha-2 agonists (e.g., methyldopa)"], ans:2, exp:"DIHYDROPYRIDINE CALCIUM CHANNEL BLOCKERS such as amlodipine and felodipine are specifically mentioned as preferred antihypertensives in GN because of their VASODILATORY properties. They reduce systemic vascular resistance without the adverse renal haemodynamic effects of some other agents. ACE inhibitors/ARBs are preferred for their antiproteinuric effects. Steroids and cytotoxic drugs are reserved for severe post-streptococcal or rapidly progressive GN." },
  { q:"Which immunosuppressive agent, classified as a calcineurin inhibitor, is used in steroid-resistant or frequently relapsing nephrotic syndrome and recurs in kidney transplants of FSGS?", opts:["Cyclophosphamide", "Mycophenolate mofetil", "Cyclosporine (Ciclosporin)", "Rituximab", "Azathioprine"], ans:2, exp:"CYCLOSPORINE (and its relative TACROLIMUS) are CALCINEURIN INHIBITORS used in steroid-resistant nephrotic syndrome and FSGS that recurs after kidney transplantation. They suppress T-cell mediated immunity by inhibiting calcineurin, reducing interleukin-2 production. Cyclophosphamide is an alkylating agent used in minimal change relapse and membranous GN. Mycophenolate and azathioprine are antimetabolites used in post-transplant immunosuppression." },
  { q:"Treatment with steroids and cyclophosphamide for at least 6 months is the standard approach for which glomerulonephritis?", opts:["Minimal change disease", "IgA nephropathy (mild form)", "Membranous glomerulonephritis with persistent nephrotic syndrome", "Post-streptococcal glomerulonephritis (uncomplicated)", "Thin membrane disease"], ans:2, exp:"MEMBRANOUS GLOMERULONEPHRITIS with persistent nephrotic syndrome is treated with steroids + cyclophosphamide for AT LEAST 6 MONTHS. Uncomplicated post-streptococcal GN is usually self-limiting and does not require steroids/cytotoxic drugs. Minimal change disease is treated with 8 WEEKS of steroids alone initially. IgA nephropathy mild form needs close observation with RAAS blockade. Thin membrane disease is benign and needs no specific treatment." },
  { q:"A 28-year-old female medical student is found to have 1+ proteinuria on routine dipstick urinalysis during a medical camp. She has no symptoms, no hypertension, and her serum creatinine is normal. The proteinuria is confirmed on two repeat tests. A split urine collection shows elevated protein in the daytime specimen but normal protein concentration in the overnight specimen. What is the most likely diagnosis?", opts:["Focal segmental glomerulosclerosis", "Minimal change disease", "Orthostatic proteinuria", "IgA nephropathy", "Diabetic nephropathy"], ans:2, exp:"Orthostatic (postural) proteinuria is characterized by protein excretion that is elevated in the upright position but normalizes when the patient is supine, as demonstrated by split urine collections. It is a benign condition predominantly seen in individuals under 30 years, with protein excretion less than 2 g/day and normal creatinine clearance. Glomerular diseases such as FSGS, minimal change, and IgA nephropathy would not show this postural pattern and typically have other clinical features." },
  { q:"A 68-year-old woman with a history of recurrent kidney stones undergoes urinalysis. Urine pH is consistently 7.8, and urine culture grows Proteus mirabilis. Which type of kidney stone is she most likely forming?", opts:["Uric acid stones", "Calcium oxalate stones", "Struvite stones", "Cystine stones", "Calcium phosphate stones from primary hyperparathyroidism"], ans:2, exp:"Struvite (magnesium ammonium phosphate) stones form in the presence of urease-producing organisms such as Proteus mirabilis, which alkalinize urine. A urine pH above 6.0-6.5 with bacteriuria strongly suggests struvite stone disease. Uric acid and calcium oxalate stones form in acidic urine. Calcium phosphate stones occur in alkaline urine but are associated with renal tubular acidosis rather than infection. Cystine stones are related to cystinuria and occur across a range of urine pH values." },
  { q:"A 24-year-old woman presents with frothy urine and bilateral leg swelling for 3 weeks. Urine dipstick shows 4+ protein. 24-hour urine protein is 4.8 g. Serum albumin is 21 g/L. Serum creatinine is 0.9 mg/dL, and the renal biopsy shows effacement of foot processes on electron microscopy. What is the most likely underlying glomerular pathology?", opts:["Focal segmental glomerulosclerosis", "Membranous nephropathy", "Minimal change disease", "Mesangioproliferative glomerulonephritis", "Diffuse proliferative lupus nephritis"], ans:2, exp:"Minimal change disease (MCD) is characterized by diffuse podocyte foot process effacement on electron microscopy with no changes visible on light microscopy, and is the most common cause of nephrotic syndrome in children and young adults. FSGS shows focal and segmental scarring on light microscopy. Membranous nephropathy shows subepithelial immune deposits with GBM thickening. Lupus nephritis typically presents with systemic features and immune complex deposits. MCD characteristically spares the GFR, consistent with the normal creatinine here." },
  { q:"A 71-year-old man with a 5-year history of benign prostatic hyperplasia presents with decreased urine output for 3 days. Renal ultrasonography shows bilateral hydronephrosis and post-void residual urine of 220 mL (normal: <100 mL). Serum creatinine is 3.1 mg/dL (normal men: 0.7–1.3 mg/dL). What is the most likely type of AKI?", opts:["Pre-renal AKI due to volume depletion", "Intrinsic renal AKI — acute tubular necrosis", "Intrinsic renal AKI — glomerular type", "Post-renal AKI due to bladder outlet obstruction", "Pre-renal AKI due to cardiac failure"], ans:3, exp:"Post-void residual urine >100 mL with bilateral hydronephrosis in an elderly man with BPH confirms POST-RENAL (obstructive) AKI. Prostatic enlargement is the most common cause of urinary outflow obstruction in older men. Prompt relief of obstruction restores renal function in most cases. AKI is reversible if the diagnosis is made early." },
  { q:"A 29-year-old man presents with 3 days of oliguria and rising creatinine. Peripheral blood smear shows numerous schistocytes (fragmented red cells). Platelet count is 42 × 10⁹/L (normal: 150–400 × 10⁹/L). He has no proteinuria or haematuria. What diagnosis should be strongly suspected?", opts:["Post-streptococcal glomerulonephritis", "IgA nephropathy", "Haemolytic uraemic syndrome or thrombotic thrombocytopenic purpura", "Goodpasture syndrome", "Pre-renal AKI from dehydration"], ans:2, exp:"Schistocytes on peripheral smear + AKI + thrombocytopaenia = THROMBOTIC MICROANGIOPATHY. This should raise the possibility of haemolytic uraemic syndrome (HUS) or thrombotic thrombocytopenic purpura (TTP). The slide emphasises that this combination should prompt immediate consideration of HUS/TTP. Post-streptococcal GN would show haematuria and RBC casts, not schistocytes." },
  { q:"A 10-year-old boy develops coca-cola coloured urine, periorbital oedema, and hypertension 12 days after recovering from a sore throat. Urine microscopy shows red cell casts. ASO titre is elevated. Serum complement C3 is reduced (normal: 0.9–1.8 g/L). What is the most likely diagnosis?", opts:["IgA nephropathy", "Minimal change disease", "Post-streptococcal glomerulonephritis", "Membranoproliferative glomerulonephritis", "Focal segmental glomerulosclerosis"], ans:2, exp:"Classic triad: child + antecedent sore throat + latent period 1–2 weeks + haematuria + oedema + hypertension + RBC casts + elevated ASO titre + LOW C3 = POST-STREPTOCOCCAL GN, the most common GN in children aged 3–12 years. Complement C3 returns to normal within 6 weeks — failure to normalise by 8 weeks should prompt investigation for MPGN." },
  { q:"A 38-year-old man presents with haemoptysis, haematuria, and rapidly worsening renal function over 3 weeks. Urine microscopy shows red cell casts. Serology reveals strongly positive antibodies targeting the alpha-3 subunit of type IV collagen. What is the most likely diagnosis?", opts:["Granulomatosis with polyangiitis (Wegener's)", "Systemic lupus erythematosus nephritis", "IgA nephropathy", "Goodpasture syndrome", "Membranoproliferative glomerulonephritis"], ans:3, exp:"The combination of glomerulonephritis + pulmonary haemorrhage + anti-GBM antibody targeting the ALPHA-3 SUBUNIT OF TYPE IV COLLAGEN (Goodpasture antigen) = GOODPASTURE SYNDROME. It is Type 1 RPGN. Treatment requires IMMEDIATE plasma exchange + immunosuppression (steroids + cyclophosphamide). Prognosis is better if serum creatinine <3 mg/dL and fewer than 30% crescents." },
  { q:"A 20-year-old woman presents with 3 months of marked facial and ankle swelling. Urine dipstick: 4+ protein, no blood. Serum albumin 15 g/L (normal: 35–50 g/L). Total cholesterol 10.2 mmol/L (normal: <5.2 mmol/L). Urine microscopy shows oval fat bodies. Serum creatinine and complement C3 are both normal. What is the most likely diagnosis?", opts:["Post-streptococcal glomerulonephritis", "IgA nephropathy", "Nephrotic syndrome", "Nephritic syndrome", "Rapidly progressive glomerulonephritis"], ans:2, exp:"Massive proteinuria + hypoalbuminaemia + hyperlipidaemia + generalised oedema + oval fat bodies + NORMAL C3 + NORMAL creatinine + NO haematuria = NEPHROTIC SYNDROME. Normal C3 excludes post-streptococcal GN and MPGN. Absent haematuria excludes nephritic syndrome. In a young woman of this age, minimal change disease is the most likely underlying cause." },
  { q:"A 34-year-old man with a 5-year history of HIV infection (currently on ARVs with undetectable viral load) develops 3+ proteinuria, serum albumin 18 g/L (normal: 35–50 g/L), and eGFR 55 mL/min/1.73 m². Renal biopsy shows segmental glomerular scarring with collapsed glomeruli. What is the most likely diagnosis?", opts:["HIV-associated membranous nephropathy", "Membranoproliferative GN from cryoglobulinaemia", "HIV-associated nephropathy (HIVAN) — a secondary form of FSGS", "Post-infectious GN from opportunistic infection", "Minimal change disease triggered by ARV therapy"], ans:2, exp:"Collapsing variant of FSGS in an HIV-positive patient = HIV-ASSOCIATED NEPHROPATHY (HIVAN) — a well-recognised secondary cause of FSGS. Even with suppressed viral load, HIVAN can persist, partly due to APOL1 gene variants in individuals of African ancestry. Membranous GN is associated with Hepatitis B and C. MPGN is associated with Hepatitis C/cryoglobulinaemia." },
  { q:"A 6-year-old boy with nephrotic syndrome develops abdominal pain and fever. Ascitic fluid analysis shows WBC 450/mm³ (>80% polymorphs) and gram-positive cocci in pairs on culture. What is the most likely complicating diagnosis?", opts:["Peritoneal tuberculosis", "Staphylococcal peritonitis from a skin breach", "Gram-negative spontaneous bacterial peritonitis", "Spontaneous bacterial peritonitis due to Streptococcus pneumoniae", "Secondary peritonitis from a perforated viscus"], ans:3, exp:"SPONTANEOUS BACTERIAL PERITONITIS (SBP) in nephrotic children is typically caused by STREPTOCOCCUS PNEUMONIAE (gram-positive diplococci) — a pneumococcus. This differs from SBP in cirrhosis which is predominantly gram-negative (E. coli, Klebsiella). In nephrotic syndrome, the mechanism is urinary loss of opsonins and immunoglobulins, impairing defence against encapsulated organisms. Pneumococcal vaccination is important in nephrotic children." },
  { q:"A 19-year-old woman who has never had urinary symptoms is noted incidentally to have 3+ protein on urine dipstick done at a student health screening. She reports no facial puffiness, leg swelling, or haematuria. Blood pressure is 110/70 mmHg. Serum albumin is 38 g/L (normal: 35–50 g/L) and creatinine is 0.7 mg/dL (normal women: 0.6–1.1 mg/dL). Urinalysis at 9 AM after 4 hours of activity: protein positive. Urinalysis from overnight sample: protein negative. What is the most appropriate next step?", opts:["Urgent renal biopsy", "Commence ACE inhibitor to reduce proteinuria", "Diagnose orthostatic proteinuria and reassure — no treatment required", "Start corticosteroids for likely minimal change disease", "Refer for immediate nephrologist review for suspected FSGS"], ans:2, exp:"Young patient + elevated daytime protein + absent overnight protein + normal albumin + normal creatinine + no oedema or haematuria = ORTHOSTATIC PROTEINURIA. This is a benign condition requiring REASSURANCE and no treatment. Renal biopsy, ACE inhibitor, or corticosteroids would be inappropriate. Serial monitoring is reasonable but the prognosis is excellent." },
  { q:"A 14-year-old boy develops facial oedema and frothy urine 3 days after receiving a routine vaccination. Urine protein is 4+ with no blood. Serum albumin is 18 g/L (normal: 35–50 g/L). Complement C3 is normal. Creatinine is normal. Renal biopsy under light microscopy appears completely normal. What is the most likely diagnosis?", opts:["Post-infectious glomerulonephritis", "Membranous glomerulonephritis", "Minimal change disease", "FSGS", "IgA nephropathy"], ans:2, exp:"Minimal change disease characteristically: (1) occurs in children (most common 2–8 years but can follow vaccination or URTI in adolescents); (2) shows NORMAL light microscopy (hence the name); (3) presents as NEPHROTIC syndrome with NO haematuria; (4) has NORMAL complement. Electron microscopy would show diffuse podocyte foot process effacement. Almost all patients respond to 8 weeks of steroids." },
  { q:"A 48-year-old man is admitted with a 3-week history of worsening kidney function, haematuria, and occasional haemoptysis. He has no history of streptococcal infection. His serum creatinine is 5.4 mg/dL (normal men: 0.7–1.3 mg/dL). ANCA is strongly positive (c-ANCA / PR3-ANCA pattern). Renal biopsy shows >50% glomerular crescents with NO significant immune deposits on immunofluorescence. What is the most likely diagnosis?", opts:["Goodpasture syndrome (Type 1 RPGN)", "Immune-complex RPGN (Type 2)", "Pauci-immune ANCA-associated RPGN — granulomatosis with polyangiitis (Type 3)", "Post-streptococcal crescentic GN", "SLE nephritis"], ans:2, exp:"PAUCI-IMMUNE (no immune deposits) + ANCA-positive (c-ANCA/PR3) + crescentic GN + pulmonary involvement = GRANULOMATOSIS WITH POLYANGIITIS (GPA, formerly Wegener's), which is Type 3 RPGN. Goodpasture (Type 1) has LINEAR IgG deposits and anti-GBM antibody, not ANCA. SLE has granular immune deposits. Post-streptococcal GN follows streptococcal infection and has immune complex deposits. c-ANCA/PR3-ANCA is characteristic of GPA." },
  { q:"A 50-year-old woman is admitted with 5 days of oliguria and confusion following a 3-day history of severe vomiting from a gastrointestinal illness. Her serum creatinine was 0.9 mg/dL (normal women: 0.6–1.1 mg/dL) 1 week ago. Today it is 1.7 mg/dL — a rise of 0.8 mg/dL. Her urine output has been <400 mL/day for 5 days. What is the most likely classification of her kidney dysfunction?", opts:["CKD Stage 3a — chronic kidney disease", "AKD (Acute Kidney Disease) — duration 3–90 days", "AKI — serum creatinine rise ≥0.3 mg/dL within 48 hours AND oliguria for ≥6 hours", "NKD (No Kidney Disease) — creatinine within normal limits previously", "Stage 5 CKD requiring immediate dialysis"], ans:2, exp:"AKI criteria: creatinine rise ≥0.3 mg/dL (26.5 µmol/L) within 48 hours OR ≥50% rise within 7 days OR oliguria <0.5 mL/kg/hr for ≥6 hours. This patient has: rise of 0.8 mg/dL (>0.3) + oliguria for 5 days = AKI. Duration ≤7 days = AKI (not AKD which is <3 months but >7 days). The cause is pre-renal from severe volume depletion (vomiting). IV fluid resuscitation should be the immediate first step." },
  { q:"A 55-year-old woman with a 20-year history of poorly controlled type 2 diabetes presents with fatigue, periorbital oedema, and bilateral leg swelling. Blood pressure: 168/98 mmHg. Investigations: serum creatinine 3.8 mg/dL (normal women: 0.6–1.1 mg/dL), eGFR 14 mL/min/1.73 m², serum phosphate 2.5 mmol/L (normal: 0.8–1.5 mmol/L), intact PTH elevated, serum calcium 1.6 mmol/L (normal: 2.0–2.5 mmol/L). Renal ultrasound shows normal-sized kidneys bilaterally. What is the most likely diagnosis and CKD stage?", opts:["AKI from diabetic ketoacidosis — not CKD", "CKD Stage 4 from diabetic nephropathy with CKD-MBD", "CKD Stage 5 from diabetic nephropathy with CKD-MBD", "CKD Stage 3b with early mineral bone disorder", "Acute glomerulonephritis complicating diabetes"], ans:2, exp:"eGFR 14 mL/min/1.73 m² = CKD STAGE 5 (GFR <15 mL/min/1.73 m²). NORMAL KIDNEY SIZE despite advanced disease is characteristic of DIABETIC NEPHROPATHY (kidneys remain normal-to-large even in advanced stages, unlike other causes of CKD where kidneys shrink). CKD-MBD is confirmed by low Ca (1.6 mmol/L), high phosphate (2.5 mmol/L), and elevated PTH. This patient requires urgent nephrology referral and preparation for RRT." },
  { q:"A 68-year-old man with CKD Stage 4 (eGFR 18 mL/min/1.73 m²) is evaluated for kidney transplantation. Which of the following is an ABSOLUTE contraindication to transplant?", opts:["Suppressed HIV viral load on antiretroviral therapy", "Controlled hypertension requiring 3 antihypertensive agents", "Morbid obesity (BMI 42 kg/m²)", "Active pulmonary tuberculosis diagnosed 2 weeks ago", "History of well-treated non-melanoma skin cancer 5 years ago with no recurrence"], ans:3, exp:"ACTIVE INFECTION/SEPSIS is an ABSOLUTE CONTRAINDICATION to kidney transplant. Active tuberculosis must be fully treated before transplantation. HIV with suppressed viral load is NO LONGER a contraindication. Morbid obesity is only a RELATIVE contraindication. Well-treated, fully resolved malignancy (especially non-melanoma skin cancer with years of disease-free survival) may not be an absolute contraindication depending on institutional protocol. Active, untreated malignancy is absolute." },
  { q:"A 16-year-old boy develops macroscopic haematuria simultaneously with an episode of tonsillitis — no latent period. Urine microscopy shows RBC casts. Complement C3 is normal. He has a purpuric rash over his buttocks and lower limbs, arthralgia of his knees, and colicky abdominal pain. What is the most likely diagnosis?", opts:["Post-streptococcal glomerulonephritis", "Goodpasture syndrome", "IgA nephropathy — Henoch-Schönlein Purpura (systemic form)", "Membranoproliferative glomerulonephritis", "Anti-GBM disease"], ans:2, exp:"SYN-PHARYNGITIC HAEMATURIA (simultaneous with infection — no latent period) + purpuric rash (buttocks/lower limbs) + arthralgia + abdominal pain + normal C3 in a teenager = HENOCH-SCHÖNLEIN PURPURA — the SYSTEMIC FORM of IgA nephropathy. It involves skin, joints, GI tract, and kidneys. Post-streptococcal GN has a 1–2 week latent period after throat infection and LOW C3. MPGN also has low C3. Goodpasture would involve pulmonary haemorrhage and anti-GBM antibody." },
  { q:"A 17-year-old boy presents to the clinic for a school medical examination and is found to have persistent microscopic haematuria and mild proteinuria on two separate urinalyses 2 months apart. He is completely asymptomatic. Blood pressure, serum creatinine, and complement C3 are all normal. There is a family history of hearing loss and haematuria in his father and paternal grandfather, who required dialysis in their 50s. What is the most likely diagnosis?", opts:["IgA nephropathy", "Thin membrane disease", "Post-streptococcal glomerulonephritis", "Alport syndrome — a genetic nephritis with hearing and vision involvement", "Minimal change disease"], ans:3, exp:"Familial haematuria + sensorineural hearing loss (family history) + progression to kidney failure (grandfather, father on dialysis) in a young male = ALPORT SYNDROME — a heredofamilial GN caused by mutations in type IV collagen genes (COL4A3/A4/A5), affecting the GBM, cochlea, and lens. It is one of the genetic causes of GN listed in the slides. X-linked inheritance is most common (COL4A5 mutation). Thin membrane disease causes benign haematuria without progression and NO hearing loss." },
  { q:"A 29-year-old pregnant woman at 34 weeks gestation develops severe headache, blood pressure of 158/104 mmHg, and 3+ proteinuria. Serum creatinine is 1.3 mg/dL (normal women: 0.6–1.1 mg/dL). Platelet count is 88 × 10⁹/L (normal: 150–400 × 10⁹/L). Liver enzymes are elevated. Urine output begins to decline. What is the most likely diagnosis causing her kidney involvement?", opts:["Post-infectious glomerulonephritis", "IgA nephropathy flare in pregnancy", "Pre-eclampsia with severe features (including AKI)", "Goodpasture syndrome presenting in pregnancy", "Lupus nephritis flare"], ans:2, exp:"Hypertension + proteinuria after 20 weeks gestation + thrombocytopaenia + elevated liver enzymes + declining urine output = PRE-ECLAMPSIA WITH SEVERE FEATURES (including HELLP syndrome features). Pre-eclampsia is a recognised cause of nephrotic-range proteinuria and AKI. It is listed as a cause of nephrotic syndrome in the slides. The only definitive treatment is delivery of the baby. Lupus nephritis flare is possible but the triad of features is more classic for pre-eclampsia/HELLP." },
  { q:"A 45-year-old man is being evaluated for a potential kidney donation to his brother with ESKD. His left kidney is confirmed by imaging to be slightly larger with a longer renal vein, making it the preferred harvest site. Which of the following is TRUE regarding living kidney donation?", opts:["The right kidney is preferred because the right renal vein is longer", "The left kidney is usually removed from living donors because of its longer renal vein", "Both kidneys are removed simultaneously in living donor nephrectomy", "The donor's GFR returns to exactly 100% within 3 months", "Living donor nephrectomy must always be performed by open (not laparoscopic) approach"], ans:1, exp:"The LEFT KIDNEY is usually preferred in living donor nephrectomy because of its LONGER RENAL VEIN, which facilitates the vascular anastomosis during transplantation. The donor typically experiences a 25% rise in creatinine post-operatively, which is expected to return to near-baseline within 3 months. Laparoscopic donor nephrectomy (via trans- or retroperitoneal route) is an established approach alongside open surgery. The harvested organ in deceased donors includes: kidney, perinephric fat, renal artery with aortic cuff, and renal vein with IVC cuff." },
];

const HIV_Qs = [
  { q:"Nigeria's HIV burden ranks second globally, after which country?", opts:["South Africa", "Kenya", "Zambia", "Zimbabwe", "Uganda"], ans:0, exp:"Nigeria has the second highest number of people living with HIV globally after South Africa. Both countries bear a disproportionate share of the global HIV burden." },
  { q:"Which of the following correctly describes HIV-2 relative to HIV-1?", opts:["More virulent and widespread globally", "Less common with a more indolent clinical course", "The dominant strain in sub-Saharan Africa", "More efficiently transmitted sexually", "Responsible for most global infections"], ans:1, exp:"HIV-2 is less common, less virulent, and follows a more indolent course. HIV-1 is more virulent and responsible for the vast majority of global infections. HIV-2 is predominantly found in West Africa." },
  { q:"All of the following are recognised routes of HIV transmission EXCEPT:", opts:["Heterosexual intercourse", "Blood transfusion", "Sharing of needles", "Vertical mother-to-child transmission", "Casual household contact"], ans:4, exp:"HIV is transmitted via sexual contact (hetero- and homosexual), blood products, contaminated sharps, and vertically from mother to child. Casual household contact — sharing utensils, hugging, or living together — does NOT transmit HIV." },
  { q:"HIV is a single-stranded RNA virus belonging to which viral family?", opts:["Herpesviridae", "Flaviviridae", "Retroviridae", "Picornaviridae", "Paramyxoviridae"], ans:2, exp:"HIV belongs to the family Retroviridae. Retroviruses carry the enzyme reverse transcriptase, which converts their RNA genome into DNA that is then integrated into the host cell genome — the defining feature of this family." },
  { q:"What is the FIRST step in HIV's 9-step mechanism of disease at the cellular level?", opts:["Fusion with the host membrane", "Reverse transcription", "Integration into host DNA", "Attachment to the CD4 receptor", "Binding to co-receptor"], ans:3, exp:"The 9 steps in order are: Attachment → Binding → Fusion → Reverse transcription → Integration → Transcription → Translation → Proteolysis → Cleavage. Attachment to the CD4 receptor on T-helper cells is the initiating event." },
  { q:"The HIV replication cycle at the cellular level proceeds through how many defined steps?", opts:["5", "7", "9", "11", "12"], ans:2, exp:"HIV replication involves exactly 9 steps: Attachment, Binding, Fusion, Reverse transcription, Integration, Transcription, Translation, Proteolysis, and Cleavage. Each step is a potential target for antiretroviral intervention." },
  { q:"Which of the following correctly identifies the three systems used to stage HIV?", opts:["WHO (I–IV), CDC (1–4), Functional (A–C)", "WHO (I–IV), CDC (A–C), Functional (1–4)", "WHO (A–C), CDC (I–IV), Functional (1–4)", "WHO (1–4), CDC (A–C), Functional (I–IV)", "WHO (I–IV), CDC (I–IV), Functional (A–C)"], ans:1, exp:"Three staging systems exist: WHO stages I–IV, CDC stages A–C, and a Functional classification of 1–4. The WHO system is most widely used in sub-Saharan Africa and globally." },
  { q:"Persistent generalised lymphadenopathy (PGL) in WHO Stage 1 HIV requires enlarged nodes at a minimum of how many anatomical sites, for how long?", opts:["1 site for more than 3 months", "2 sites for more than 6 months", "2 sites for more than 3 months", "3 sites for more than 6 months", "Any number of sites for more than 1 year"], ans:1, exp:"PGL is defined as enlarged lymph nodes at ≥2 extra-inguinal sites for more than 6 months. Inguinal nodes are specifically EXCLUDED because they are commonly enlarged in the general population and are non-specific." },
  { q:"All of the following are features of WHO Stage 2 HIV EXCEPT:", opts:["Unexplained weight loss less than 10%", "Recurrent upper respiratory tract infections", "Angular cheilitis", "Unexplained fever for more than one month", "Seborrheic dermatitis"], ans:3, exp:"Unexplained fever for more than one month is a feature of WHO Stage 3, not Stage 2. Stage 2 (mildly symptomatic) features include weight loss <10%, recurrent RTIs, angular cheilitis, oral ulcers, and seborrheic dermatitis." },
  { q:"The unexplained weight loss threshold that marks transition from WHO Stage 2 to Stage 3 is:", opts:["5% of body weight", "8% of body weight", "10% of body weight", "15% of body weight", "20% of body weight"], ans:2, exp:"Stage 2 includes unexplained weight loss LESS THAN 10%. Stage 3 includes weight loss MORE THAN 10% of body weight. This 10% threshold is a key differentiating criterion between the two stages." },
  { q:"Which of the following cancers is a recognised AIDS-defining malignancy in WHO Stage 4?", opts:["Hepatocellular carcinoma", "Kaposi sarcoma", "Testicular lymphoma", "Oesophageal carcinoma", "Non-melanoma skin cancer"], ans:1, exp:"WHO Stage 4 AIDS-defining malignancies include Kaposi sarcoma (caused by HHV-8), invasive cervical carcinoma, and aggressive non-Hodgkin lymphoma. Hepatocellular carcinoma is not an AIDS-defining malignancy." },
  { q:"Skin manifestations occur in approximately what proportion of HIV patients?", opts:["30%", "50%", "70%", "90%", "All patients (100%)"], ans:3, exp:"Up to 90% of HIV patients develop skin manifestations. Skin disease is often the EARLIEST clinical indicator of immune suppression and includes infections (herpes zoster, molluscum), inflammatory dermatoses (seborrheic dermatitis), and malignancies (Kaposi sarcoma)." },
  { q:"In HIV patients, the severity of skin manifestations correlates most closely with which parameter?", opts:["Viral load", "Duration of infection", "Declining CD4 count", "Patient age", "Current HAART regimen"], ans:2, exp:"Skin severity directly correlates with declining CD4 count. As immune suppression deepens, dermatological conditions become more severe and treatment-resistant. CD4 count is thus a useful predictor of dermatological burden in HIV." },
  { q:"Which investigation is used as the INITIAL screening test for HIV?", opts:["Western blot", "PCR", "CD4 count", "ELISA", "Viral load"], ans:3, exp:"ELISA (Enzyme-Linked Immunosorbent Assay) is the initial HIV screening test — it is highly SENSITIVE but less specific. A reactive ELISA must then be confirmed with a Western blot, which is highly SPECIFIC and acts as the confirmatory test." },
  { q:"A positive ELISA screening result for HIV must be confirmed with which investigation?", opts:["CD4 count", "Viral load", "Repeat ELISA from a separate sample", "Western blot", "PCR"], ans:3, exp:"Western blot is the CONFIRMATORY test after a positive ELISA. It detects antibodies to specific HIV proteins (gp120, gp41, p24) and is highly specific. PCR and viral load are used for monitoring disease progression and treatment response, not confirmation." },
  { q:"Which of the following belongs to the Nucleoside Reverse Transcriptase Inhibitor (NRTI) class?", opts:["Efavirenz", "Nevirapine", "Dolutegravir", "Ritonavir", "Tenofovir"], ans:4, exp:"NRTIs include lamivudine, zidovudine, abacavir, tenofovir, and emtricitabine. They act as chain terminators during reverse transcription. Efavirenz and nevirapine are NNRTIs; dolutegravir is an integrase inhibitor; ritonavir is a protease inhibitor." },
  { q:"Dolutegravir belongs to which antiretroviral drug class?", opts:["Nucleoside reverse transcriptase inhibitor", "Non-nucleoside reverse transcriptase inhibitor", "Protease inhibitor", "Integrase inhibitor", "CCR5 inhibitor"], ans:3, exp:"Dolutegravir (with raltegravir) is an integrase strand transfer inhibitor (INSTI). It blocks integration — the step where viral DNA is inserted into the host genome. It is a preferred component of first-line HAART due to its high barrier to resistance." },
  { q:"HAART involves how many antiretroviral drugs targeting at least how many different mechanisms?", opts:["Two drugs, one mechanism", "Two drugs, two mechanisms", "Three drugs, two mechanisms", "Three drugs, three mechanisms", "Four drugs, two mechanisms"], ans:2, exp:"HAART = 3 antiretroviral drugs combining at least 2 different mechanisms. Standard options: 2 NRTIs + 1 NNRTI, or 2 NRTIs + 1 integrase inhibitor. The multi-mechanism approach prevents resistance and maximally suppresses viral replication." },
  { q:"Tenofovir + lamivudine + dolutegravir is a commonly used first-line HAART regimen. This combination represents which drug class structure?", opts:["2 NRTIs + 1 NNRTI", "2 NRTIs + 1 integrase inhibitor", "2 NRTIs + 1 protease inhibitor", "1 NRTI + 1 NNRTI + 1 integrase inhibitor", "3 NRTIs"], ans:1, exp:"Tenofovir and lamivudine are both NRTIs; dolutegravir is an integrase inhibitor. This gives 2 NRTIs + 1 integrase inhibitor — a preferred first-line combination in WHO and Nigerian national guidelines." },
  { q:"In second-line HAART, lopinavir is administered alongside which drug to achieve a therapeutic 'boosted' plasma level?", opts:["Efavirenz", "Nevirapine", "Ritonavir", "Tenofovir", "Emtricitabine"], ans:2, exp:"Ritonavir acts as a pharmacokinetic booster — it inhibits CYP3A4 enzymes that metabolise lopinavir, raising lopinavir plasma levels to therapeutically effective concentrations. This combination (lopinavir/ritonavir) is used in second-line HAART regimens." },
  { q:"Virological treatment failure is defined as a detectable HIV viral load (>20–70 copies/µL) after at least how many months of compliant HAART?", opts:["1 month", "3 months", "6 months", "9 months", "12 months"], ans:2, exp:"Virological failure = persistent detectable viral load (>20–70 copies/µL) after ≥6 months of compliant HAART. The other categories are: immunological failure (declining CD4 despite compliance) and clinical failure (new AIDS-defining events despite ≥6 months of compliant HAART)." },
  { q:"A 30-year-old woman tests positive for HIV on routine screening. She has no symptoms. Examination reveals bilateral firm cervical and axillary lymphadenopathy, present for approximately 9 months. CD4 count is 680 cells/µL [reference: >500]. Which WHO stage applies?", opts:["Stage 1", "Stage 2", "Stage 3", "Stage 4", "Cannot be staged without a viral load"], ans:0, exp:"WHO Stage 1 = asymptomatic infection OR persistent generalised lymphadenopathy (PGL) at ≥2 extra-inguinal sites for >6 months. This patient has PGL at two sites (cervical + axillary) for 9 months with no symptoms — a textbook Stage 1 presentation. Patients can remain in Stage 1 for several years." },
  { q:"A 31-year-old man with known HIV presents with 11% weight loss over 3 months, diarrhoea for 6 weeks, and unexplained fever for 7 weeks. There are no identifiable opportunistic infections. Which WHO stage best applies?", opts:["Stage 1", "Stage 2", "Stage 3", "Stage 4", "Staging not possible without CD4 count"], ans:2, exp:"WHO Stage 3 criteria include: weight loss >10%, unexplained diarrhoea >1 month, and unexplained fever >1 month. This patient meets ALL THREE. The absence of AIDS-defining opportunistic infections or malignancies means Stage 4 does not yet apply." },
  { q:"A 42-year-old man with HIV presents with severe headache, neck stiffness, and photophobia. Lumbar puncture shows encapsulated yeast on India ink staining. Which WHO stage does this represent?", opts:["Stage 1", "Stage 2", "Stage 3", "Stage 4", "This finding is unrelated to HIV staging"], ans:3, exp:"Cryptococcal meningitis (encapsulated Cryptococcus neoformans, seen on India ink stain) is an AIDS-defining opportunistic CNS infection, placing the patient in WHO Stage 4. Other Stage 4 CNS conditions include toxoplasmosis, HIV encephalopathy, and CNS lymphoma." },
  { q:"A doctor sustains a deep needlestick injury from an HIV-positive, treatment-naïve patient with visible blood on the needle. This is classified as HIGH-RISK exposure. Which PEP regimen is most appropriate?", opts:["Observation and HIV testing at 6 weeks only", "Truvada alone", "2 NRTIs + nevirapine", "2 NRTIs + an integrase inhibitor", "Single-dose nevirapine"], ans:3, exp:"High-risk PEP = 2 NRTIs + 1 NNRTI (NOT nevirapine) OR 2 NRTIs + 1 integrase inhibitor. Nevirapine is SPECIFICALLY EXCLUDED from PEP because it causes severe hepatotoxicity and rash in individuals with normal CD4 counts. Truvada alone is used for LOW-risk exposures only." },
  { q:"A nurse accidentally splashes HIV-positive blood onto intact forearm skin. There is no visible skin break. The source patient is on HAART with an undetectable viral load. This is classified as LOW-RISK exposure. What is the appropriate management?", opts:["2 NRTIs + an integrase inhibitor", "2 NRTIs + nevirapine", "Truvada (tenofovir + emtricitabine)", "No intervention required as risk is negligible", "Single NRTI for 28 days"], ans:2, exp:"Low-risk exposures (splash with no visible blood, intact skin, or source on HAART with undetectable viral load) are managed with Truvada (tenofovir + emtricitabine). Full 3-drug regimens are reserved for high-risk exposures such as deep needlestick injuries from treatment-naïve patients." },
  { q:"A 36-year-old woman with HIV has been fully compliant with HAART for 7 months. Her viral load at follow-up is 120 copies/µL. Which category of treatment failure does this represent?", opts:["Immunological failure", "Clinical failure", "Pharmacological failure", "Virological failure", "This does not constitute treatment failure"], ans:3, exp:"Virological failure = persistent detectable viral load (>20–70 copies/µL) after ≥6 months of compliant HAART. This patient is 7 months in with a viral load of 120 copies/µL — meeting the definition. Immunological failure = declining CD4 despite compliance. Clinical failure = new AIDS-defining events despite treatment." },
  { q:"A 27-year-old man with HIV is started on HAART. At his 6-week review, he reports fatigue. FBC shows Hb 8.1 g/dL [reference: 13.5–17.5 g/dL] with a raised MCV. Which drug in his regimen most likely accounts for this picture?", opts:["Lamivudine", "Dolutegravir", "Tenofovir", "Efavirenz", "Zidovudine"], ans:4, exp:"Zidovudine (AZT) is associated with bone marrow suppression causing macrocytic anaemia (raised MCV) — it inhibits both viral and mitochondrial DNA synthesis. Additional side effects include hyperpigmentation and hypertrichosis. Tenofovir causes nephrotoxicity, not anaemia. Full blood count monitoring is mandatory on zidovudine." },
  { q:"A 45-year-old man on a protease inhibitor-containing HAART regimen for 2 years develops increased abdominal girth, thinning of the limbs and face, and a fasting blood glucose of 8.9 mmol/L [reference: 3.9–5.5 mmol/L]. Which side effect profile does this represent?", opts:["Zidovudine bone marrow toxicity", "Tenofovir nephrotoxicity", "Protease inhibitor metabolic effects", "Immune reconstitution inflammatory syndrome", "Abacavir hypersensitivity"], ans:2, exp:"Protease inhibitors cause: hyperglycaemia (insulin resistance), dyslipidaemia, and lipodystrophy — characterised by central fat accumulation (truncal obesity) and peripheral fat wasting (lipoatrophy of limbs and face). This is distinct from zidovudine's haematological toxicity or tenofovir's nephrotoxicity." },
  { q:"A 24-year-old HIV-negative woman is in a relationship with an HIV-positive partner and is concerned about acquiring infection. She is counselled about pre-exposure prophylaxis (PrEP). Which of the following best describes the pharmacological basis of PrEP?", opts:["A single-dose regimen taken immediately after potential exposure", "A 28-day course of 3 ARV drugs taken after each high-risk encounter", "Daily antiretroviral medication taken by an HIV-negative person at ongoing risk", "A topical antibiotic cream to prevent viral entry", "A vaccine series administered once to confer lasting immunity"], ans:2, exp:"PrEP (Pre-Exposure Prophylaxis) involves daily ARV medication — typically Truvada (tenofovir + emtricitabine) or tenofovir-based vaginal preparations — taken by HIV-NEGATIVE individuals at ongoing high risk of infection. It is distinct from PEP (post-exposure), which is a time-limited course started AFTER exposure. PrEP has been shown to significantly reduce HIV acquisition risk." },
];

const CARDIO_S1_Qs = [
  { q:"All of the following are recognised causes of mitral stenosis EXCEPT:", opts:["Rheumatic fever following Group A beta-haemolytic streptococcal infection", "Mucopolysaccharidosis", "Endocardial fibroelastosis", "Marfan syndrome", "Congenital malformation"], ans:3, exp:"Marfan syndrome causes aortic root dilatation leading to aortic regurgitation, and mitral valve prolapse leading to MR — NOT mitral stenosis. Recognised MS causes are: rheumatic fever (commonest in young adults), congenital, mucopolysaccharidosis, and endocardial fibroelastosis." },
  { q:"Symptoms of mitral stenosis typically develop when the mitral valve area falls below:", opts:["4 cm²", "3 cm²", "2 cm²", "1 cm²", "0.5 cm²"], ans:2, exp:"Normal mitral valve area is 4–6 cm². Symptoms (dyspnoea, fatigue, palpitations, haemoptysis) typically begin when the valve area narrows to below 2 cm². Below 1 cm² represents critical stenosis with severe haemodynamic compromise." },
  { q:"The murmur of mitral stenosis is best characterised as:", opts:["Ejection systolic at the base, radiating to the carotids", "High-pitched early diastolic, loudest when leaning forward", "Pansystolic at the apex, radiating to the left axilla", "Rumbling mid-diastolic, loudest at the apex on expiration", "Late systolic, preceded by a mid-systolic click"], ans:3, exp:"MS produces a RUMBLING MID-DIASTOLIC murmur heard best at the apex in the left lateral decubitus position, loudest on EXPIRATION. Severity correlates with duration, not intensity — a longer murmur indicates more severe stenosis. Ejection systolic to carotids = AS; pansystolic to axilla = MR; early diastolic leaning forward = AR." },
  { q:"Which ECG finding in mitral stenosis reflects left atrial enlargement?", opts:["P pulmonale", "P mitrale", "Right bundle branch block", "Delta waves", "Q waves in inferior leads"], ans:1, exp:"P mitrale = broad, bifid P wave (≥0.12s) reflecting delayed, prolonged left atrial depolarisation from LA enlargement — hallmark of MS. P pulmonale (tall, peaked P waves >2.5mm) = RIGHT atrial enlargement. RVH and right axis deviation also occur in MS complicated by pulmonary hypertension." },
  { q:"On chest X-ray, left atrial enlargement in mitral stenosis produces:", opts:["Boot-shaped cardiac silhouette", "Double shadow on the LEFT cardiac border", "Double shadow on the RIGHT cardiac border", "Widening of the superior mediastinum", "Prominent aortic knuckle"], ans:2, exp:"The enlarged left atrium extends beyond the right heart border, producing a DOUBLE SHADOW on the RIGHT cardiac silhouette. It also straightens the LEFT heart border. Boot-shaped heart = tetralogy of Fallot; widened mediastinum = aortic dissection; prominent aortic knuckle = AR or aortic disease." },
  { q:"The pansystolic murmur of mitral regurgitation radiates characteristically to:", opts:["The right carotid artery", "The left sternal edge", "The left axilla", "The epigastrium", "The back, between the scapulae"], ans:2, exp:"MR produces a PANSYSTOLIC murmur loudest at the APEX, radiating to the LEFT AXILLA (following the direction of the regurgitant jet). A thrill may be palpable. Radiation to the carotids = AS; to the left sternal edge = VSD or AR; to the back = aortic coarctation." },
  { q:"The commonest cause of aortic stenosis in adults over 70 years is:", opts:["Congenital bicuspid aortic valve", "Rheumatic fever", "Senile degenerative calcification", "Infective endocarditis", "Radiation-induced valvular disease"], ans:2, exp:"SENILE (degenerative) CALCIFICATION of a normal tricuspid aortic valve is the commonest cause of AS overall. Congenital bicuspid aortic valve is the second cause, presenting earlier (typically age 40–60). Rheumatic AS almost always co-exists with mitral valve disease and rarely occurs in isolation." },
  { q:"The classic symptomatic triad of aortic stenosis that indicates a poor prognosis without surgery is:", opts:["Palpitations, fatigue, and ankle oedema", "Haemoptysis, malar flush, and emboli", "Angina, syncope, and heart failure", "Dyspnoea, cough, and orthopnoea", "Fever, new murmur, and emboli"], ans:2, exp:"ANGINA + SYNCOPE + HEART FAILURE is the classic AS triad. Once symptomatic: angina/syncope = 2–3 year survival without surgery; heart failure = 1–2 year survival. This poor prognosis makes urgent valve replacement (or TAVR if unfit for surgery) the priority once symptoms develop." },
  { q:"A 32-year-old woman presents with dyspnoea and palpitations. She has a malar flush, tapping apex beat, loud S1 with an opening snap, and a rumbling murmur audible at the apex. ECG shows broad bifid P waves. What is the most likely underlying aetiology?", opts:["Degenerative annular calcification", "Congenital bicuspid mitral valve", "Previous Group A beta-haemolytic streptococcal infection", "Systemic lupus erythematosus", "Infective endocarditis from IV drug use"], ans:2, exp:"Classic mitral stenosis in a young adult is almost always RHEUMATIC in origin, caused by previous rheumatic fever from Group A beta-haemolytic streptococcal pharyngitis. The malar flush (reduced CO), tapping apex beat, loud S1, opening snap, and rumbling mid-diastolic murmur are pathognomonic. Degenerative calcification causes AS, not MS, in the elderly." },
  { q:"A 45-year-old man with known aortic regurgitation has rhythmic head nodding with each heartbeat. This eponymous sign is named:", opts:["Corrigan's sign", "Quincke's sign", "Traube's sign", "De Musset's sign", "Duroziez's sign"], ans:3, exp:"DE MUSSET'S SIGN = head nodding with each heartbeat, from transmitted aortic pulsations. Corrigan's sign = visible carotid pulsation. Quincke's sign = capillary pulsation at the nail bed. Traube's sign = pistol-shot sound over femoral arteries. Duroziez's sign = systolic + diastolic femoral murmur elicited by arterial compression." },
  { q:"Hypertension is defined as:", opts:["SBP ≥130 mmHg on a single reading", "SBP ≥140 mmHg and/or DBP ≥90 mmHg, or current antihypertensive use", "SBP ≥160 mmHg on one reading regardless of DBP", "DBP ≥100 mmHg alone", "SBP ≥140 mmHg only if confirmed by ambulatory monitoring"], ans:1, exp:"Hypertension = SBP ≥140 mmHg AND/OR DBP ≥90 mmHg on at least 2 measurements, OR current use of antihypertensive medication. The ACC/AHA 2017 guidelines use ≥130/80 mmHg, but WHO/ESC/Nigerian guidelines use the ≥140/90 mmHg threshold, which is the standard used in this material." },
  { q:"All of the following are recognised causes of secondary hypertension EXCEPT:", opts:["Phaeochromocytoma", "Primary aldosteronism", "Coarctation of the aorta", "Addison's disease", "Cushing's syndrome"], ans:3, exp:"Addison's disease (primary adrenal insufficiency) causes HYPOTENSION due to aldosterone and cortisol deficiency. All others cause hypertension: phaeochromocytoma (catecholamine excess), aldosteronism (excess aldosterone), coarctation of the aorta (mechanical), and Cushing's syndrome (glucocorticoid excess)." },
  { q:"Which grade of the Keith-Wagner-Barker classification of hypertensive retinopathy is characterised by generalised arteriolar narrowing ONLY — without focal changes, haemorrhages, or disc swelling?", opts:["Grade 1", "Grade 2", "Grade 3", "Grade 4", "Grade 0 (normal)"], ans:0, exp:"Grade 1 = MILD GENERALISED CONSTRICTION of retinal arterioles (copper/silver wiring) only. Grade 2 = focal narrowing + AV nicking. Grade 3 = Grade 2 + flame haemorrhages + cotton-wool spots + hard exudates. Grade 4 = Grade 3 + papilloedema or retinal oedema (hypertensive emergency)." },
  { q:"Why is hypertension described as a 'silent killer'?", opts:["It invariably causes sudden cardiac death without prior warning", "Uncomplicated hypertension typically produces no symptoms", "BP cannot be accurately measured without specialist equipment", "Hypertensives deliberately conceal symptoms from doctors", "Antihypertensive drugs cause more harm than hypertension itself"], ans:1, exp:"Uncomplicated hypertension is largely ASYMPTOMATIC — patients feel well and may go undiagnosed for years. When symptoms occur (headache, dizziness, tinnitus, blurred vision), they are usually from end-organ damage (complications), not from the elevated pressure itself. This asymptomatic nature contributes to poor rates of detection and treatment." },
  { q:"All of the following are established risk factors for hypertension EXCEPT:", opts:["Excessive dietary sodium intake", "Family history of hypertension", "Regular vigorous aerobic exercise", "Obesity", "Chronic alcohol excess"], ans:2, exp:"Regular aerobic exercise is a PROTECTIVE factor against hypertension — it reduces sympathetic tone, promotes vascular compliance, and aids weight management. It is also a recommended TREATMENT for hypertension. All others are established risk factors: salt, family history, obesity, and excess alcohol all raise blood pressure." },
  { q:"A 38-year-old woman has hypertension with hypokalaemia, metabolic alkalosis, no oedema, and a markedly elevated plasma aldosterone-to-renin ratio. No medications. Which diagnosis explains all these findings?", opts:["Phaeochromocytoma", "Cushing's syndrome", "Primary aldosteronism", "Renovascular hypertension", "Coarctation of the aorta"], ans:2, exp:"Primary aldosteronism (Conn's syndrome) causes HTN from excess aldosterone → sodium retention + potassium wasting → hypokalaemia and metabolic alkalosis. The elevated aldosterone-to-renin ratio is the diagnostic hallmark. Phaeochromocytoma causes episodic HTN with catecholamine symptoms. Renovascular HTN causes high renin, not suppressed renin." },
  { q:"A patient with longstanding poorly controlled hypertension is found to have papilloedema, flame-shaped haemorrhages, cotton-wool spots, and hard exudates on fundoscopy. His BP is 230/130 mmHg. Which grade of hypertensive retinopathy is present?", opts:["Grade 1", "Grade 2", "Grade 3", "Grade 4", "This does not fit the Keith-Wagner-Barker classification"], ans:3, exp:"Grade 4 = Grade 3 findings (haemorrhages + cotton-wool spots + hard exudates + AV nicking) PLUS PAPILLOEDEMA and/or retinal oedema. With this degree of hypertension and target organ involvement, this is a HYPERTENSIVE EMERGENCY requiring prompt BP reduction (IV antihypertensives) to prevent irreversible end-organ damage." },
  { q:"Which blood pressure treatment target applies to a patient with hypertension AND chronic kidney disease?", opts:["<150/90 mmHg", "<140/90 mmHg", "<130/80 mmHg", "<120/70 mmHg", "<135/85 mmHg"], ans:2, exp:"<130/80 mmHg is the recommended target in patients with DIABETES or CHRONIC KIDNEY DISEASE, given their higher cardiovascular and renal risk at standard BP levels. The general population target is <140/90 mmHg. Tighter control in these groups slows nephropathy progression and reduces cardiovascular events." },
  { q:"A 19-year-old man is found to have hypertension in his upper limbs with weak femoral pulses, low BP in his legs, and radio-femoral delay. Which secondary cause is most likely?", opts:["Phaeochromocytoma", "Renal artery stenosis", "Coarctation of the aorta", "Primary aldosteronism", "Cushing's syndrome"], ans:2, exp:"COARCTATION OF THE AORTA = congenital narrowing of the aorta (typically just distal to the left subclavian artery). Classic findings: hypertension in the UPPER limbs, hypotension and weak/absent pulses in the LOWER limbs, radio-femoral delay, and rib notching on CXR (from collateral vessel erosion). It is surgically correctable and an important cause of secondary HTN in young patients." },
  { q:"A 29-year-old primigravida at 36 weeks gestation develops BP 160/104 mmHg, proteinuria 3+ on dipstick, and a severe occipital headache. Which condition does this represent?", opts:["Essential hypertension first presenting in pregnancy", "White-coat hypertension", "Gestational hypertension", "Pre-eclampsia", "Chronic hypertension with superimposed pre-eclampsia"], ans:3, exp:"PRE-ECLAMPSIA = NEW-ONSET hypertension after 20 weeks gestation WITH proteinuria and/or systemic features (headache, visual disturbance, RUQ pain, thrombocytopenia). This is distinct from gestational hypertension (HTN after 20 weeks WITHOUT proteinuria) and chronic hypertension (present before 20 weeks). Pre-eclampsia is a recognised pregnancy-related cause of secondary hypertension." },
  { q:"Which investigation is specifically used to detect hypertensive end-organ damage to the kidneys in routine workup?", opts:["Serum uric acid", "Renal artery Doppler", "Urinary albumin excretion or albumin/creatinine ratio", "24-hour urinary catecholamines", "Anti-nuclear antibody (ANA)"], ans:2, exp:"Urinary albumin excretion OR albumin/creatinine ratio detects MICROALBUMINURIA — an early marker of hypertensive nephropathy and glomerular damage. Standard hypertension workup includes: FBG, urinalysis, ECG, CXR, serum EUCR, fasting lipid profile, and urinary albumin/creatinine. Specialised tests (catecholamines, Doppler) are only for suspected secondary causes." },
  { q:"Heart failure is most accurately defined as:", opts:["An ejection fraction below 40% on echocardiography", "Biventricular failure with S3 gallop and bibasal crepitations", "A syndrome of structural or functional cardiac disorder impairing the heart's ability to pump, or doing so only at elevated filling pressures", "Pulmonary oedema secondary to left ventricular systolic dysfunction", "Bilateral leg oedema with an elevated JVP"], ans:2, exp:"Heart failure is a SYNDROME — not a single sign or value. It results from any structural or functional disorder impairing the heart's pump function OR maintaining it only at elevated filling pressures. This definition encompasses both HFrEF (reduced EF) and HFpEF (preserved EF with diastolic dysfunction). A low EF alone does not define HF." },
  { q:"Brain natriuretic peptide (BNP), despite its name, is predominantly secreted by:", opts:["Cerebral ventricles in response to raised intracranial pressure", "Atrial myocytes in response to atrial stretch", "Ventricular myocytes in response to increased wall stress", "The kidneys in response to reduced perfusion", "Hepatocytes in response to venous congestion"], ans:2, exp:"BNP was FIRST DISCOVERED in the brain — hence the name — but it is PREDOMINANTLY SECRETED BY VENTRICULAR MYOCYTES in response to increased wall stress and stretch. ANP is secreted by ATRIAL myocytes. BNP and NT-proBNP are key diagnostic and prognostic biomarkers in heart failure; elevated levels reflect ventricular overload." },
  { q:"A patient with heart failure can perform normal daily activities but becomes breathless climbing two flights of stairs. Which NYHA class applies?", opts:["Class I", "Class II", "Class III", "Class IV", "NYHA classification requires objective exercise testing"], ans:1, exp:"NYHA Class II = MILD limitation. Comfortable at rest, comfortable with mild exertion (e.g., walking on flat), but symptomatic with MODERATE physical activity (e.g., climbing stairs, walking uphill). Class I = no limitation; Class III = marked limitation (symptomatic on minimal exertion); Class IV = symptoms at rest." },
  { q:"According to the Framingham criteria, heart failure is diagnosed when:", opts:["Three major criteria are present", "Two major criteria OR one major plus two minor criteria are concurrently present", "One major criterion alone suffices", "Any four criteria (major or minor combined) are present", "Two minor criteria alone are sufficient"], ans:1, exp:"Framingham requires: 2 MAJOR criteria OR 1 MAJOR + 2 MINOR criteria concurrently. Major criteria: PND, raised JVP, rales, S3 gallop, acute pulmonary oedema, hepatojugular reflux, weight loss ≥4.5 kg in response to treatment, CVP >16 cmH₂O, radiographic cardiomegaly. Minor: ankle oedema, nocturnal cough, pleural effusion, tachycardia ≥120 bpm, hepatomegaly, dyspnoea on exertion." },
  { q:"Which of the following is a MAJOR (not minor) Framingham criterion for heart failure?", opts:["Bilateral ankle oedema", "Nocturnal cough", "Hepatomegaly", "Hepatojugular reflux", "Tachycardia ≥120 bpm"], ans:3, exp:"HEPATOJUGULAR REFLUX is a MAJOR criterion. The major criteria are: PND, neck vein distension, rales/bibasal crepitations, S3 gallop, acute pulmonary oedema, hepatojugular reflux, weight loss ≥4.5 kg in 5 days with treatment, CVP >16 cmH₂O, and radiographic cardiomegaly. Bilateral ankle oedema, nocturnal cough, hepatomegaly, and tachycardia are MINOR criteria." },
  { q:"A 58-year-old hypertensive man has echocardiographic LVH with diastolic dysfunction but no breathlessness, oedema, or fatigue. He has never been hospitalised for cardiac symptoms. Which ACC/AHA stage and NYHA class apply?", opts:["Stage A, Class I", "Stage B, Class I", "Stage C, Class I", "Stage B, Class II", "Stage A, Class II"], ans:1, exp:"Structural heart disease (LVH + diastolic dysfunction) WITHOUT SYMPTOMS = ACC/AHA Stage B + NYHA Class I. Stage A = risk factors only, no structural disease. Stage C = structural disease WITH symptoms. Stage D = refractory HF. The ACC/AHA staging captures pre-symptomatic structural disease (Stages A & B) unlike NYHA, which only classifies symptomatic patients." },
];


const CARDIO_S2_Qs = [
  { q:"A 67-year-old woman with stable heart failure on diuretics presents with acute decompensation 3 days after starting ibuprofen for knee pain. Her weight is 4 kg above baseline. What is the most likely precipitant?", opts:["New onset atrial fibrillation from electrolyte disturbance", "NSAID-induced sodium and water retention blunting diuretic efficacy", "Occult pneumonia worsening cardiac function", "Pulmonary embolism", "Non-compliance with her existing diuretic dose"], ans:1, exp:"NSAIDs inhibit prostaglandin-mediated renal afferent arteriolar dilation → REDUCED GFR + SODIUM AND WATER RETENTION → fluid overload + blunted diuretic efficacy. NSAIDs and corticosteroids are recognised PRECIPITANTS of HF decompensation. She should stop ibuprofen and use paracetamol instead. The 4 kg weight gain confirms fluid accumulation." },
  { q:"The Graham Steell murmur in severe mitral stenosis is produced by:", opts:["Increased flow across the stenosed mitral valve in diastole", "Functional tricuspid regurgitation from right heart dilatation", "Pulmonary regurgitation secondary to pulmonary hypertension", "Aortic regurgitation from aortic root dilatation", "Turbulence at the site of a calcified mitral annulus"], ans:2, exp:"The Graham Steell murmur is a HIGH-PITCHED EARLY-TO-MID DIASTOLIC murmur at the left sternal edge, caused by PULMONARY REGURGITATION secondary to dilatation of the pulmonary valve ring from severe pulmonary hypertension. It complicates advanced MS. It can be confused with AR but distinguishes by context (pulmonary HTN in MS vs aortic pathology)." },
  { q:"Balloon mitral valvuloplasty is the preferred intervention for mitral stenosis when the valve is:", opts:["Heavily calcified with subvalvular fusion", "Associated with moderate to severe mitral regurgitation", "Viable, mobile, and non-calcified", "Complicated by active infective endocarditis", "Affected in the context of severe pulmonary hypertension"], ans:2, exp:"Balloon valvuloplasty is suitable for VIABLE, MOBILE, NON-CALCIFIED mitral valves — the Wilkins echocardiographic score assesses morphology. Calcified valves, significant MR, or severe subvalvular disease require surgical valve replacement. Active IE and left atrial thrombus are absolute contraindications." },
  { q:"Which feature BEST distinguishes mitral regurgitation from mitral stenosis on clinical examination?", opts:["Presence of atrial fibrillation on ECG", "Tapping apex beat", "Displaced hyperdynamic apex versus tapping non-displaced apex", "Loudness of S1", "Presence of pulmonary hypertension"], ans:2, exp:"MS: TAPPING, NON-DISPLACED apex beat (the dilated right ventricle underlies the palpated area; the LV is underloaded). MR: DISPLACED, HYPERDYNAMIC apex beat (LV volume overload causes dilatation and displacement). AF occurs in both. S1 is LOUD in MS (snapping valve) and SOFT in MR (poor valve closure). Pulmonary hypertension complicates both severe cases." },
  { q:"Which of the following is correctly classified as a cause of ACUTE aortic regurgitation?", opts:["Ankylosing spondylitis", "Systemic lupus erythematosus", "Ascending aortic dissection", "Rheumatoid arthritis", "Syphilitic aortitis"], ans:2, exp:"ACUTE AR causes: infective endocarditis (leaflet destruction), ascending aortic DISSECTION (separating the aortic root from valve support), and chest TRAUMA. All others — ankylosing spondylitis, SLE, RA, syphilitic aortitis — are CHRONIC causes that produce AR gradually via aortic root or leaflet disease." },
  { q:"The collapsing (water hammer) pulse of aortic regurgitation results from:", opts:["Reduced stroke volume from a failing left ventricle", "Rapid ejection of a large stroke volume followed by diastolic collapse as blood regurgitates back", "Peripheral vasodilation from catecholamine excess", "Aortic stenosis causing a rapid rise followed by a plateau", "Atrial fibrillation producing variable stroke volumes"], ans:1, exp:"In AR, the LV ejects a LARGE STROKE VOLUME (including the regurgitant volume) → rapid rise in pulse pressure. In diastole, blood regurgitates from the aorta back into the LV → rapid DROP in diastolic pressure. This produces the WIDE PULSE PRESSURE and COLLAPSING PULSE characteristic of AR. Slow rising/plateau pulse = AS." },
  { q:"Which is the correct ECG finding in aortic stenosis?", opts:["Right ventricular hypertrophy with right axis deviation", "Left ventricular hypertrophy with left axis deviation", "P pulmonale and right bundle branch block", "ST elevation in anterior leads", "Broad bifid P waves (P mitrale)"], ans:1, exp:"Aortic stenosis → LV PRESSURE OVERLOAD → LVH (tall R in lateral leads, deep S in V1/V2) + LEFT AXIS DEVIATION ± LBBB in advanced cases. The ECG in AS may also show P mitrale from secondary LA dilatation. RVH with right axis deviation is found in pulmonary hypertension or MS; right bundle branch block is non-specific." },
  { q:"Indications for surgical intervention in chronic aortic regurgitation include all of the following EXCEPT:", opts:["Worsening symptoms of heart failure", "Enlarging left ventricle on serial echocardiography", "Inverted T waves on lateral ECG leads", "Ejection fraction consistently above 60% on serial echos", "Infective endocarditis refractory to medical therapy"], ans:3, exp:"Surgery is indicated for: worsening symptoms, enlarging heart on CXR/echo, worsening ECG (inverted T waves on lateral leads), and IE refractory to medical therapy. An EF consistently ABOVE 60% is REASSURING and is NOT an indication for surgery — surgery is triggered when EF falls towards or below 50% (a recognised poor post-operative prognostic marker)." },
  { q:"Poor post-operative survival following aortic valve replacement for AR is predicted by all of the following EXCEPT:", opts:["Ejection fraction below 50%", "NYHA Class 3 or 4 symptoms", "Duration of symptomatic heart failure greater than 12 months", "Left ventricular dilatation on echocardiography", "Presence of sinus rhythm"], ans:4, exp:"Poor post-op prognostic factors: EF <50%, NYHA Class 3 or 4, and duration of HF >12 months. SINUS RHYTHM is not a negative prognostic marker — it is the normal rhythm. LV dilatation is associated with worse outcomes but presence of sinus rhythm has no specific negative impact. Surgery should ideally be timed before EF falls below 50%." },
  { q:"A 72-year-old man presents with chest pain on exertion and two blackout episodes. Examination shows a slow rising pulse, a heaving non-displaced apex, an aortic thrill, and an ejection systolic murmur loudest at the right upper sternal edge radiating to the carotids. What is the most urgent next step?", opts:["Start warfarin for presumed atrial fibrillation with embolism", "Commence bisoprolol for symptom control", "Refer for echocardiography and urgent surgical assessment", "Initiate digoxin and diuretics for heart failure", "Administer sublingual nitrate and observe"], ans:2, exp:"Classic symptomatic severe AORTIC STENOSIS with the AS triad (chest pain/angina + syncope + impending heart failure). Once symptomatic: angina/syncope = 2–3 year survival; HF = 1–2 year survival without surgery. Urgent ECHO and SURGICAL REFERRAL is the priority. Beta-blockers reduce contractility against a fixed obstruction. Nitrates reduce preload and can cause dangerous hypotension in AS." },
  { q:"During examination of a patient with aortic regurgitation, firm compression of the femoral artery 2 cm proximal to the stethoscope produces a systolic murmur, and 2 cm distal produces a diastolic murmur. Which sign is this?", opts:["Traube's sign", "Corrigan's sign", "Quincke's sign", "Austin Flint murmur", "Duroziez's sign"], ans:4, exp:"DUROZIEZ'S SIGN: compression of the femoral artery 2 cm PROXIMAL = SYSTOLIC murmur (forward flow); 2 cm DISTAL = DIASTOLIC murmur (retrograde flow as blood oscillates back during diastole). This demonstrates anterograde AND retrograde femoral flow from severe AR. Traube's = pistol-shot femoral sound; Austin Flint = apical diastolic murmur from anterior mitral leaflet fluttering." },
  { q:"Phaeochromocytoma causes hypertension through excess secretion of:", opts:["Aldosterone and cortisol", "Adrenaline and noradrenaline", "Growth hormone and cortisol", "Parathyroid hormone", "Renin and angiotensin II directly"], ans:1, exp:"Phaeochromocytoma is a rare adrenal (or extra-adrenal paraganglioma) tumour secreting excess CATECHOLAMINES — ADRENALINE and NORADRENALINE — causing paroxysmal or sustained hypertension, with headache, sweating, and palpitations (the '3 Ps'). It accounts for <1% of HTN but is surgically curable. Diagnosis: urinary/plasma catecholamines or metanephrines." },
  { q:"Which of the following lifestyle interventions is recommended for PREVENTION of hypertension?", opts:["Increasing dietary sodium for improved renal function", "Avoiding all physical exertion to reduce cardiac demand", "Increasing consumption of fruits and vegetables and limiting alcohol", "Daily low-dose aspirin in all adults over 40", "Prophylactic antihypertensive therapy for all obese individuals"], ans:2, exp:"Lifestyle modifications for hypertension prevention and treatment include: lose weight, increase PHYSICAL ACTIVITY, REDUCE SALT intake, STOP SMOKING, limit fats and cholesterol, INCREASE FRUITS AND VEGETABLES, and LIMIT ALCOHOL. These measures lower BP by 5–15 mmHg and reduce overall cardiovascular risk." },
  { q:"A 55-year-old hypertensive man presents with progressive breathlessness on exertion and bilateral ankle oedema over 4 months. CXR shows cardiomegaly and pulmonary venous congestion. BP is 175/110 mmHg. Which complication of hypertension has developed?", opts:["Hypertensive encephalopathy", "Hypertensive retinopathy Grade 3", "Ischaemic stroke", "Hypertensive heart failure", "Hypertensive nephrosclerosis"], ans:3, exp:"Chronic uncontrolled hypertension → LV pressure overload → LVH → diastolic then systolic dysfunction → HEART FAILURE. This is the commonest cause of heart failure in sub-Saharan Africa. The clinical picture (exertional dyspnoea + bilateral oedema + cardiomegaly + pulmonary congestion) alongside a long hypertensive history is characteristic. Requires treatment of both HTN and HF simultaneously." },
  { q:"A 34-year-old woman is found to have BP 158/98 mmHg on two readings. She takes no medications except the combined oral contraceptive pill (OCP). What is the most appropriate management?", opts:["Start amlodipine 5 mg and continue the OCP", "Switch to a progesterone-only pill and recheck BP in 2 weeks", "Stop the OCP, advise alternative contraception, and recheck BP in 1–3 months", "Refer for renal artery Doppler to exclude renovascular disease", "Start an ACE inhibitor alongside the OCP"], ans:2, exp:"Combined OCP (oestrogen component) causes hypertension via increased hepatic angiotensinogen → RAAS activation. In a young woman with new hypertension and no other risk factors, the OCP should be STOPPED and BP rechecked after 1–3 months. If BP normalises, OCP was the cause. Starting antihypertensives without removing the precipitant is premature and exposes the patient to unnecessary medication." },
  { q:"Hypertension-related kidney failure presents with all of the following EXCEPT:", opts:["Painless bilateral leg oedema", "Facial swelling", "Reduced urine output", "Frothy (foamy) urine", "Unilateral leg swelling with a warm tender calf"], ans:4, exp:"Hypertensive renal failure presents with: bilateral leg oedema, facial swelling, reduced urine output, frothy urine (proteinuria), nocturia (excessive urination at night), anaemia ('shortage of blood'), and generalised weakness. UNILATERAL calf swelling with warmth = deep vein thrombosis — not a feature of hypertensive nephropathy." },
  { q:"Hypertension complicating pregnancy as pre-eclampsia differs from gestational hypertension in that pre-eclampsia:", opts:["Always begins before 20 weeks gestation", "Is milder and resolves without treatment", "Also involves proteinuria and systemic features", "Is treated exclusively with methyldopa", "Never causes foetal compromise"], ans:2, exp:"GESTATIONAL HYPERTENSION = new HTN after 20 weeks WITHOUT proteinuria or systemic features. PRE-ECLAMPSIA = new HTN after 20 weeks WITH PROTEINURIA and/or systemic features (headache, visual disturbance, RUQ pain, thrombocytopenia, elevated LFTs). Pre-eclampsia carries higher maternal/foetal risk. Both resolve postpartum. Chronic HTN predates 20 weeks." },
  { q:"Which of the following is a CAUSE of heart failure (not a precipitant of decompensation)?", opts:["Non-compliance with diuretics", "Pneumonia", "Ischaemic heart disease", "High dietary salt intake", "NSAID use"], ans:2, exp:"CAUSES damage the heart structurally: IHD, hypertension, valvular disease, cardiomyopathy, congenital HD, arrhythmias, pericardial disease. PRECIPITANTS trigger decompensation in pre-existing HF without directly causing it: infections, arrhythmias, NSAIDs, steroids, non-compliance, high salt/fluid intake, thyroid dysfunction, PE, pericardial tamponade." },
  { q:"By what mechanism does reduced cardiac output in heart failure trigger the RAAS?", opts:["Direct aldosterone secretion from baroreceptor stimulation", "Reduced renal artery pressure activating juxtaglomerular renin secretion", "High BNP levels directly stimulating adrenal cortex", "Hyperkalaemia from diuretic use activating angiotensin II", "Sympathetic activation directly stimulating angiotensin-converting enzyme"], ans:1, exp:"Reduced CO → REDUCED RENAL PERFUSION PRESSURE → juxtaglomerular cells release RENIN → cleaves angiotensinogen to angiotensin I → ACE converts to angiotensin II → vasoconstriction + aldosterone release → salt and water retention. Initially compensatory, this cascade becomes maladaptive — the target of ACEIs, ARBs, and MRAs." },
