  { q:"The sympathetic innervation of the stomach is derived from which spinal cord segments?", opts:["T1 to T5","T3 to T8","T5 to T10","T7 to T12","T10 to L2"], ans:2, exp:"Sympathetic innervation of the stomach is via the GREATER SPLANCHNIC NERVE, which arises from spinal segments T5 to T10. These fibres synapse in the coeliac ganglion, and post-ganglionic fibres travel along blood vessels to reach the stomach. Sympathetic stimulation inhibits gastric motility and secretion. The vagus nerve (CN X) provides PARASYMPATHETIC innervation, and approximately 90% of its fibres in the vagal trunk are AFFERENT (carrying sensory information from the stomach to the CNS)." },
  { q:"Lymph draining from the proximal portion of the lesser curvature of the stomach drains first into which lymph node group?", opts:["Suprapyloric nodes","Pancreaticosplenic nodes","Subpyloric nodes","Superior gastric nodes","Paraaortic nodes"], ans:3, exp:"Lymph from the PROXIMAL LESSER CURVATURE drains along the left gastric vessels to the SUPERIOR GASTRIC LYMPH NODES, which surround the left gastric artery. The DISTAL lesser curvature drains to SUPRAPYLORIC NODES. The proximal GREATER CURVATURE drains to PANCREATICOSPLENIC NODES. The ANTRAL greater curvature drains to SUBPYLORIC and OMENTAL nodes. All gastric lymphatics ultimately drain to coeliac lymph nodes and then to the cisterna chyli." },
  { q:"A patient is found to have a hiatus hernia in which the lower oesophageal sphincter remains in its normal position below the diaphragm, but a portion of the gastric fundus herniates into the chest alongside the oesophagus. Which type of hiatus hernia does this describe?", opts:["Sliding hiatus hernia","Congenital hiatus hernia","Para-oesophageal (rolling) hiatus hernia","Mixed type hiatus hernia","Traumatic diaphragmatic hernia"], ans:2, exp:"This describes a PARA-OESOPHAGEAL (ROLLING) HIATUS HERNIA, in which the LOWER OESOPHAGEAL SPHINCTER REMAINS IN PLACE below the diaphragm while a portion of the STOMACH (usually the fundus) herniates alongside the oesophagus through the hiatus. This type is less common but more dangerous — it is more likely to require surgery due to risk of gastric volvulus and strangulation. In a SLIDING hiatus hernia, the gastro-oesophageal junction slides superiorly through the hiatus, which is the more common type and is associated with reflux." },
  { q:"Which of the following is NOT among the three main causes of gastro-oesophageal reflux disease?", opts:["Dysfunction of the lower oesophageal sphincter","Delayed gastric emptying","Hiatal hernia","H. pylori infection of the gastric mucosa","All three options A, B and C are recognised causes"], ans:3, exp:"The three main recognised causes of GORD are: (1) DYSFUNCTION OF THE LOWER OESOPHAGEAL SPHINCTER — loss of the high-pressure zone preventing reflux; (2) DELAYED GASTRIC EMPTYING — prolonged gastric distension increases pressure and promotes reflux; (3) HIATAL HERNIA — particularly sliding type, where the LES migrates above the diaphragm, losing the diaphragmatic contribution to sphincter competence. H. PYLORI infection primarily causes gastritis and peptic ulcer disease — it does not directly cause GORD and may actually be inversely associated with it in some studies." },
];

const PAEDS_NEPHROLOGY_Qs = [
  { q:"Nephrotic syndrome is defined by a tetrad of features. Which of the following correctly completes this tetrad: heavy proteinuria, hypoproteinaemia, generalized edema, and ___?", opts:["Haematuria","Hypertension","Hyperlipidaemia","Hyponatraemia","Hyperkalemia"], ans:2, exp:"The four defining features of nephrotic syndrome are heavy proteinuria, hypoproteinaemia, generalized edema, and hyperlipidaemia. Blood pressure is characteristically normal in uncomplicated nephrotic syndrome, and haematuria is not a defining feature." },
  { q:"The commonest histological variant of primary nephrotic syndrome in temperate countries is:", opts:["Focal glomerulosclerosis","Membranous nephropathy","Membranoproliferative glomerulonephritis","Minimal change lesion","Mesangial proliferative glomerulonephritis"], ans:3, exp:"Minimal change lesion (MCL) is the commonest variant in temperate regions. It shows normal histology on light microscopy but fusion of foot processes on electron microscopy. It also carries the best prognosis among all five histological variants." },
  { q:"In the pathophysiology of nephrotic syndrome, edema formation is primarily driven by which sequence of events?", opts:["Salt retention → increased oncotic pressure → fluid shifts into interstitium","Increased glomerular permeability → hypoalbuminaemia → reduced oncotic pressure → edema","Reduced GFR → fluid overload → hydrostatic pressure increase → edema","Hyperaldosteronism → hypertension → increased capillary hydrostatic pressure → edema","Increased vasopressin → water retention → dilutional hypoalbuminaemia → edema"], ans:1, exp:"Increased glomerular permeability leads to loss of albumin into urine, causing hypoalbuminaemia, which reduces plasma oncotic pressure, driving fluid into the interstitium and causing edema. Secondary RAAS activation and hyperaldosteronism then worsen salt and water retention." },
  { q:"Which of the following laboratory findings would be expected in uncomplicated nephrotic syndrome?", opts:["Elevated serum creatinine and urea","Reduced complement C3 levels","Elevated ASO titre","Normal electrolytes, urea and creatinine","Elevated ASO titre with reduced C3"], ans:3, exp:"In uncomplicated nephrotic syndrome, electrolytes, urea, and creatinine are normal. Complement C3 is also normal, as is the ASO titre. Reduced C3 and elevated ASO titre would point toward post-streptococcal glomerulonephritis, which causes nephritic rather than nephrotic syndrome." },
  { q:"The standard first-line steroid regimen for nephrotic syndrome in children begins with prednisolone at 60 mg/m²/day for 4–6 weeks, followed by:", opts:["Complete cessation of steroids after the initial phase","40 mg/m²/dose on alternate days for 4–6 weeks, making total treatment 12 weeks","Increasing the dose to 80 mg/m²/day for a further 4 weeks","Switching to IV methylprednisolone for 6 weeks","Introducing cyclophosphamide alongside reducing prednisolone dose"], ans:1, exp:"After the initial daily phase of 60 mg/m²/day for 4–6 weeks, prednisolone is given at 40 mg/m²/dose on alternate days for another 4–6 weeks, bringing the total treatment duration to approximately 12 weeks (3 months)." },
  { q:"Which of the following is the most life-threatening complication of nephrotic syndrome related to altered blood coagulability?", opts:["Primary peritonitis","Acute kidney injury","Thromboembolic phenomena","Steroid-induced hypertension","Hyponatraemic seizures"], ans:2, exp:"Thromboembolic phenomena result from increased blood coagulability in nephrotic syndrome, caused by urinary loss of anticoagulant proteins and increased hepatic synthesis of procoagulant factors. Primary peritonitis is another key complication but is infectious rather than coagulation-related." },
  { q:"Which of the following steroid-sparing agents used in nephrotic syndrome belongs to the calcineurin inhibitor class?", opts:["Cyclophosphamide","Chlorambucil","Mycophenolate mofetil","Levamisole","Cyclosporine"], ans:4, exp:"Cyclosporine and Tacrolimus are both calcineurin inhibitors used as steroid-sparing agents in nephrotic syndrome. Cyclophosphamide and Chlorambucil are alkylating agents; Levamisole is an antihelminthic with immunomodulatory properties; Mycophenolate mofetil is an antimetabolite." },
  { q:"A 3-year-old boy is brought with a 2-week history of facial puffiness, worse in the mornings, and progressive swelling of the legs. His blood pressure is 90/60 mmHg. Urinalysis shows 4+ proteinuria. Serum albumin is 18 g/L. Complement C3 is normal and ASO titre is normal. Which histological variant is most likely responsible for his condition?", opts:["Membranoproliferative glomerulonephritis","Focal glomerulosclerosis","Membranous nephropathy","Minimal change lesion","Mesangial proliferative glomerulonephritis"], ans:3, exp:"This child's age (2–5 years, temperate pattern), normal blood pressure, heavy proteinuria, hypoalbuminaemia, normal C3, and normal ASO titre are all consistent with primary nephrotic syndrome from minimal change lesion. MCL is the commonest variant in this age group and carries the best prognosis." },
  { q:"A 5-year-old girl with nephrotic syndrome on prednisolone develops progressive abdominal pain and fever. Her abdomen is diffusely tender. There is no history of trauma. Which complication has most likely occurred, and what organism is most commonly responsible?", opts:["Thromboembolic phenomenon; Staphylococcus aureus","Primary peritonitis; Streptococcus pneumoniae","Secondary peritonitis; Escherichia coli","Steroid-induced peptic ulcer; no organism involved","Mesenteric adenitis; Mycobacterium tuberculosis"], ans:1, exp:"Primary peritonitis is a recognised complication of nephrotic syndrome, commonly caused by Streptococcus pneumoniae. Children with nephrotic syndrome are susceptible due to urinary loss of immunoglobulins and complement factors, impaired opsonisation, and ascitic fluid providing a culture medium." },
  { q:"A 4-year-old boy with known nephrotic syndrome presents with sudden onset of left leg pain and swelling. The leg is cool and pale distally. His platelet count is normal. Which underlying mechanism best explains this presentation?", opts:["Steroid-induced hypertension causing arterial spasm","Hypoalbuminaemia causing peripheral vasoconstriction","Increased blood coagulability due to urinary loss of anticoagulant proteins and elevated procoagulants","Hyperlipidaemia causing acute arterial occlusion","Diuretic-induced electrolyte imbalance causing vascular smooth muscle contraction"], ans:2, exp:"Thromboembolic phenomena in nephrotic syndrome result from a hypercoagulable state: urinary loss of antithrombin III and other anticoagulant proteins, combined with increased hepatic synthesis of clotting factors and fibrinogen. This predisposes to both arterial and venous thrombosis." },
  { q:"UTI is the second most common infection in children. Which organism accounts for 75–90% of all cases?", opts:["Klebsiella pneumoniae", "Proteus mirabilis", "Escherichia coli", "Staphylococcus aureus", "Pseudomonas aeruginosa"], ans:2, exp:"E. coli causes 75–90% of all paediatric UTIs. Other gram-negative organisms include Klebsiella, Proteus, Pseudomonas, and Citrobacter. Gram-positive organisms (Enterococci, Staph. aureus/epidermidis) account for the minority. E. coli's virulence factors (P-fimbriae, haemolysin) facilitate periurethral colonisation and ascending infection." },
  { q:"Which finding on urine culture is accepted as diagnostic of UTI in a specimen obtained by suprapubic puncture?", opts:["Growth of >10⁵ bacteria/µL", "Growth of >10⁴ bacteria/µL", "Growth of >10³ bacteria/µL", "Any growth regardless of colony count", "Pyuria with >10 WBC/mL only"], ans:3, exp:"Any growth on suprapubic puncture culture is diagnostic of UTI — because the bladder is normally sterile, any bacterial growth from a suprapubic specimen is significant. The >10⁵/µL threshold applies to clean-catch/MSU specimens. For catheter specimens, >10⁴ is diagnostic. Bag urine: a negative result is reliable but positive requires confirmation." },
  { q:"The risk of UTI is 10–20 times higher in uncircumcised males because:", opts:["The foreskin produces antibacterial secretions that paradoxically attract uropathogens", "The presence of the foreskin is associated with increased periurethral bacterial colonisation", "Circumcision prevents vesicoureteral reflux from developing", "Uncircumcised boys have shorter urethras than girls", "The phimotic ring obstructs urine flow in all uncircumcised boys"], ans:1, exp:"The foreskin harbours periurethral uropathogens (especially E. coli), increasing colonisation and ascending infection risk. This explains why UTI in the first year of life is male-predominant (M:F = 4:1), with uncircumcised males at highest risk. After 1 year, as the foreskin retracts and girls' short urethra becomes the dominant risk factor, the ratio reverses to M:F = 1:10." },
  { q:"Voiding cystourethrogram (VCUG) is the investigation of choice to demonstrate:", opts:["Renal scarring from previous pyelonephritis", "Renal parenchymal uptake defects", "Vesicoureteral reflux (VUR)", "Post-void residual urine volume", "Hydronephrosis secondary to PUJ obstruction"], ans:2, exp:"VCUG (also called MCUG — micturating cystourethrogram) demonstrates VESICOURETERAL REFLUX by introducing contrast into the bladder and imaging during voiding. VUR → reflux nephropathy → renal scarring → hypertension and CKD. DMSA (Tc-99m dimercaptosuccinic acid) scan detects RENAL SCARRING and parenchymal defects. USS detects hydronephrosis." },
  { q:"A 2-year-old girl presents with fever, dysuria, and frequency. Urine microscopy shows >10 WBC/mL, nitrite-positive dipstick, and a bag urine culture grows E. coli 10⁶/mL. What is the most appropriate next step?", opts:["Treat as confirmed UTI immediately with this bag result", "Collect MSU or suprapubic aspirate for confirmatory culture before commencing antibiotics", "Initiate long-term prophylaxis as this is a first episode", "Arrange urgent VCUG before any antibiotic treatment", "Repeat bag urine to see if growth is consistent"], ans:1, exp:"Bag urine: a NEGATIVE result is reliable (good to rule out UTI), but a POSITIVE result requires confirmation by catheter specimen or suprapubic aspirate before antibiotics, as contamination is common. Gold standard is quantitative culture on a properly collected specimen BEFORE commencing antibiotics. Commencing treatment on a bag positive alone risks treating colonisation rather than true infection." },
  { q:"The latent period between streptococcal sore throat and the development of post-streptococcal UTI-related complications such as glomerulonephritis is approximately:", opts:["24–48 hours", "3–5 days", "1–2 weeks", "3–4 weeks", "6–8 weeks"], ans:2, exp:"This is a classic recall point — the latent period post-PHARYNGITIS is 1–2 WEEKS, while post-PYODERMA (skin infection/impetigo) is ≥3 weeks. This latency reflects the time needed for immune complex formation and deposition in the glomeruli. This also distinguishes AGN from IgA nephropathy, which presents with synpharyngitic haematuria (no latent period)." },
  { q:"Complications of untreated or recurrent UTI in children include all of the following EXCEPT:", opts:["Renal scarring in approximately 20% of cases", "Hypertension in approximately 10% of cases", "End-stage renal failure in approximately 10% of cases", "Nephrotic syndrome from immune complex deposition", "Reflux nephropathy leading to CKD"], ans:3, exp:"Stated complications of UTI in children: renal scarring (20%), hypertension (10%), ESRF (10%), and reflux nephropathy → CKD. NEPHROTIC SYNDROME is not a complication of UTI — it results from podocyte injury (MCD, FSGS, membranous GN) or systemic diseases, not bacterial urinary infection. Confusing this with post-infectious AGN (which causes nephritic syndrome) is a common error." },
  { q:"A 7-week-old male infant presents with fever, poor feeding, jaundice, and irritability. Urine culture grows E. coli >10⁵/mL. For how long should antibiotics be administered?", opts:["3 days", "5 days", "7–10 days", "14–21 days", "28 days"], ans:3, exp:"In NEONATES, UTI treatment requires 14–21 DAYS because neonates have immature immune defences, higher risk of haematogenous spread, bacteraemia, and serious sequelae. Older children receive 7–10 days. Neonatal UTI presentations are non-specific (fever, jaundice, irritability, poor feeding, vomiting/diarrhoea, weight loss) — UTI must always be excluded in any febrile neonate." },
  { q:"The commonest cause of AKI in children in developing countries is:", opts:["Intrinsic renal AKI from Hemolytic Uremic Syndrome", "Post-renal AKI from posterior urethral valves", "Pre-renal AKI from hypovolemia (gastroenteritis/diarrhoea)", "Hospital-acquired sepsis in the ICU", "Acute tubular necrosis from nephrotoxic drugs"], ans:2, exp:"PRE-RENAL AKI is the commonest type in children globally, caused by HYPOVOLEMIA — predominantly from gastroenteritis (diarrhoea/vomiting) in developing countries. Circulatory failure (sepsis, shock, burns, haemorrhage, nephrotic syndrome) also causes pre-renal AKI. Hospital-acquired AKI (ICU, post-surgery, multiorgan failure) is commoner in developed countries." },
  { q:"Hemolytic Uremic Syndrome (HUS) classically presents as a triad of:", opts:["Haematuria, proteinuria, and hypertension", "Microangiopathic haemolytic anaemia, thrombocytopenia, and AKI", "Oliguria, haematuria, and oedema", "Thrombocytopenia, DIC, and renal vein thrombosis", "Anaemia, jaundice, and splenomegaly"], ans:1, exp:"HUS = MICROANGIOPATHIC HAEMOLYTIC ANAEMIA (MAHA) + THROMBOCYTOPENIA + AKI. The clotting time is NORMAL (unlike DIC), distinguishing HUS from disseminated intravascular coagulation. It follows 3–7 days of BLOODY DIARRHOEA from verocytotoxin-producing E. coli O157:H7 or Shigella. The toxin causes endothelial injury → microvascular thrombosis → consumption of platelets → haemolytic anaemia." },
  { q:"In paediatric AKI, oliguria in children beyond infancy is defined as urine output less than:", opts:["2 ml/kg/hour for >4 hours", "1 ml/kg/hour for >6 hours", "0.5 ml/kg/hour for >6 hours", "0.3 ml/kg/hour for >8 hours", "1 ml/kg/day"], ans:2, exp:"In children (beyond infancy): oliguria = urine output <0.5 ml/kg/hour for >6 hours. In infants: <1 ml/kg/hour for >6 hours (higher because of obligate water and solute excretion in relation to body mass). Anuria = <1 ml/kg/DAY. Non-oliguric AKI: output is maintained despite deteriorating renal function — may carry a better prognosis." },
  { q:"The pRIFLE 'Failure' class is defined by a reduction in estimated creatinine clearance of:", opts:["↓ by 25% or UO <0.5 ml/kg/hr ×8 hours", "↓ by 50% or UO <0.5 ml/kg/hr ×16 hours", "↓ by 75% or eCCl <35 ml/1.73m²/min or UO <0.3 ml/kg/hr ×24 hours or anuria >12 hours", "↓ by 90% or UO <0.1 ml/kg/hr ×12 hours", "↓ by 60% or UO <0.3 ml/kg/hr ×8 hours"], ans:2, exp:"pRIFLE: Risk = ↓25% eCCl; Injury = ↓50%; Failure = ↓75% OR eCCl <35 ml/1.73m²/min OR UO <0.3 ml/kg/hr ×24h OR anuria >12h; Loss = failure >4 weeks; ESRD = failure >12 weeks/3 months. eCCl is calculated by the SCHWARTZ FORMULA. pRIFLE modified adult RIFLE criteria for use in children." },
  { q:"In the management of AKI, the EARLIEST ECG change of hyperkalaemia is:", opts:["Widened QRS complex", "ST segment depression", "Ventricular fibrillation", "Peaked (tall, tented) T waves", "Absent P waves"], ans:3, exp:"ECG progression in hyperkalaemia: PEAKED T WAVES (earliest, K⁺ ~5.5–6.5) → flattened P waves → widened QRS → sine-wave pattern → ventricular fibrillation → asystole. Peaked T waves at K⁺ >6 mmol/L is the trigger to treat urgently. IV 10% CALCIUM GLUCONATE stabilises the myocardial membrane immediately but does NOT lower K⁺ — it buys time for other measures." },
  { q:"The appropriate immediate management of pre-renal AKI in a child with hypovolaemia is:", opts:["Strict fluid restriction to prevent pulmonary oedema", "Peritoneal dialysis to clear uraemic toxins", "IV 0.9% normal saline 20 ml/kg bolus repeated as needed to correct hypovolaemia", "High-dose IV furosemide 4 mg/kg to promote diuresis", "Oral rehydration salts only"], ans:2, exp:"Pre-renal AKI is REVERSIBLE by correcting the underlying hypovolaemia. Management: IV 0.9% Normal Saline 20 ml/kg BOLUS ×2 as needed. This urgently restores effective circulating volume and renal perfusion. Failure to correct hypovolaemia rapidly leads to ATN (intrinsic renal AKI). Furosemide is NOT first-line — it is only considered AFTER volume is restored. Fluid RESTRICTION is for circulatory overload." },
  { q:"The preferred mode of dialysis in children with AKI is:", opts:["Intermittent haemodialysis", "Continuous renal replacement therapy (CRRT)", "Peritoneal dialysis", "Sustained low-efficiency dialysis (SLED)", "Haemofiltration"], ans:2, exp:"PERITONEAL DIALYSIS is the preferred modality in children because: it can be performed by parents at home, is less disruptive to family life and schooling, does not require vascular access or anticoagulation, and is technically simpler. Both continuous ambulatory PD (CAPD — manual exchanges ×24h) and continuous cycling PD (overnight machine) are options. Haemodialysis is used when PD is not feasible." },
  { q:"A 4-year-old presents with 5 days of bloody diarrhoea followed by oliguria, pallor, and petechiae. FBC: Hb 6.2 g/dL with fragmented RBCs; platelets 45×10⁹/L; normal PT/APTT; creatinine elevated. Which diagnosis fits best?", opts:["Disseminated intravascular coagulation (DIC)", "Immune thrombocytopenic purpura (ITP) with incidental renal vein thrombosis", "Henoch-Schönlein Purpura nephritis", "Haemolytic Uraemic Syndrome (HUS)", "Acute post-streptococcal glomerulonephritis"], ans:3, exp:"Classic HUS: bloody diarrhoea prodrome (E. coli O157:H7) → MAHA (fragmented RBCs on film) + thrombocytopenia + AKI. NORMAL clotting (PT/APTT) distinguishes HUS from DIC (where clotting is deranged). ITP causes thrombocytopenia without haemolytic anaemia. HSP purpura is palpable/non-fragmening. AGN does not cause MAHA. The triad + normal clotting = HUS." },
  { q:"In children, the commonest cause of CKD accounting for approximately 40% of cases is:", opts:["Glomerulonephritis", "Hereditary nephropathies (e.g. Alport syndrome)", "Congenital anomalies of the kidney and urinary tract (CAKUT)", "Nephrotic syndrome", "Reflux nephropathy from recurrent UTI"], ans:2, exp:"CAKUT (congenital anomalies of the kidney and urinary tract) — including obstructive uropathy, bilateral hypoplastic/dysplastic kidneys, and polycystic kidney disease — accounts for ~40% of childhood CKD. Glomerulonephritis = 25%; hereditary nephropathies = 20%; systemic diseases = 10%; miscellaneous/unknown = 5%. In contrast to adults, where acquired diseases (diabetic nephropathy, hypertensive nephrosclerosis) predominate." },
  { q:"CKD Stage 5 (kidney failure) in children is defined as GFR:", opts:["<60 ml/min/1.73m²", "<45 ml/min/1.73m²", "<30 ml/min/1.73m²", "<15 ml/min/1.73m²", "<10 ml/min/1.73m²"], ans:3, exp:"KDOQI staging: Stage 1 ≥90, Stage 2 = 60–89, Stage 3 = 30–59, Stage 4 = 15–29, Stage 5 (kidney failure) = <15 ml/min/1.73m² or on dialysis. In children, eGFR is calculated by the MODIFIED SCHWARTZ FORMULA: 36.5 × Height (cm) / Serum Creatinine (µmol/L). Stage 5 is the indication for renal replacement therapy (dialysis or transplantation)." },
  { q:"The mechanism by which CKD causes anaemia in children is primarily:", opts:["Iron deficiency from GI blood loss", "Haemolysis from uraemic toxins fragmenting red cells", "Bone marrow suppression by uraemic toxins and reduced erythropoietin production", "Folate deficiency from restricted diet", "Autoimmune destruction of red cells"], ans:2, exp:"CKD anaemia: REDUCED ERYTHROPOIETIN (from scarred kidneys) + uraemic toxins suppressing bone marrow + mucosal damage causing haemorrhage. The anaemia is normocytic, normochromic. It responds to RECOMBINANT ERYTHROPOIETIN (rEPO). This is a key management target — EPO therapy improves quality of life, cardiac function, and growth in children with CKD." },
  { q:"Renal osteodystrophy (renal rickets) in CKD results from which sequence of events?", opts:["Reduced calcium absorption from dietary deficiency → rickets", "Excess calcium loss in urine → hypocalcaemia → osteomalacia", "Phosphate retention → hypocalcaemia → secondary hyperparathyroidism → bone disease", "Vitamin D excess from failed renal degradation → hypercalcaemia → bone resorption", "Uraemic toxins directly inhibiting osteoblast function"], ans:2, exp:"CKD → PHOSPHATE RETENTION (GFR↓ → less phosphate excretion) → phosphate binds calcium → HYPOCALCAEMIA → impaired 1-hydroxylation of Vit D (renal failure) → SECONDARY HYPERPARATHYROIDISM → PTH stimulates bone resorption → osteitis fibrosa + osteomalacia = RENAL OSTEODYSTROPHY. Treatment: phosphate binders (calcium carbonate), ACTIVATED Vitamin D (calcitriol)." },
  { q:"Peritoneal dialysis is preferred over haemodialysis in children with CKD for all of the following reasons EXCEPT:", opts:["It can be performed by parents at home", "It is less disruptive to family routines and schooling", "It achieves faster solute clearance per session than haemodialysis", "It does not require vascular access or anticoagulation", "Continuous ambulatory and cycling variants are available"], ans:2, exp:"Haemodialysis provides FASTER per-session solute clearance — it is preferred in acute severe hyperkalaemia or uraemia. However, peritoneal dialysis achieves ADEQUATE ongoing clearance continuously (24 hours) and is preferred in children because: home-based, parents can operate it, no vascular access needed, no anticoagulation, minimal disruption to school/family. The advantage of PD is not speed but lifestyle compatibility." },
  { q:"A 9-year-old with CKD has poor linear growth despite adequate calories. His IGF-1 is low but GH levels are elevated. The most appropriate intervention is:", opts:["Zinc supplementation to improve appetite", "Anabolic steroids to stimulate growth", "Recombinant human growth hormone (rGH)", "Testosterone therapy", "Increasing dietary protein beyond recommended levels"], ans:2, exp:"CKD causes GH RESISTANCE — GH levels are elevated but peripheral response is impaired (reduced IGF-1 production). Children have delayed puberty and subnormal pubertal growth spurt. RECOMBINANT HUMAN GH (rGH) effectively improves growth velocity in children with CKD. It is given subcutaneously and is a proven intervention — poor growth in CKD children is not simply a nutritional problem." },
  { q:"The pathogenic process of adaptive hyperfiltration in CKD ultimately leads to progressive nephron loss because:", opts:["Increased blood flow causes tubular atrophy from excess oxygen delivery", "Compensatory hyperfiltration in remaining nephrons raises intraglomerular pressure, damaging podocytes and causing focal segmental glomerulosclerosis", "Hypertension from RAAS activation directly destroys glomerular basement membrane", "Proteinuria from hyperfiltration triggers interstitial fibrosis exclusively", "Angiotensin II causes direct nephron apoptosis independent of pressure"], ans:1, exp:"Nephron loss → ANGIOTENSIN II-mediated ADAPTIVE HYPERFILTRATION in surviving nephrons (increased glomerular blood flow and filtration) → ELEVATED INTRAGLOMERULAR CAPILLARY PRESSURE → mechanical injury to podocytes, endothelial, and mesangial cells → loss of selectivity of the GBM → PROTEINURIA → focal/segmental → global GLOMERULOSCLEROSIS → progressive CKD. This is why ACEi/ARBs (reducing Ang II) slow CKD progression." },
  { q:"The latent period between streptococcal pharyngitis and the development of post-streptococcal AGN is approximately:", opts:["24–72 hours (same as IgA nephropathy)", "1 week", "1–2 weeks", "3–4 weeks", "6–8 weeks"], ans:2, exp:"Latent period: PHARYNGITIS → AGN = 1–2 WEEKS; PYODERMA (skin infection) → AGN = ≥3 WEEKS. The latency reflects the time for antibody-antigen complex formation and glomerular deposition. This distinguishes APSGN from IgA NEPHROPATHY (synpharyngitic haematuria — haematuria simultaneous with or within 1–2 days of URTI, no latent period) and from rapidly progressive GN." },
  { q:"The characteristic urine finding in the oliguric phase of acute post-streptococcal glomerulonephritis is:", opts:["Waxy/broad casts with nephrotic-range proteinuria", "Cola/tea-coloured urine with RBC casts and 1+–2+ proteinuria", "Sterile pyuria with white cell casts", "Frothy urine with selective proteinuria and fat bodies", "Haemoglobinuria with no RBCs on microscopy"], ans:1, exp:"APSGN urine: COLA/TEA/SMOKY-COLOURED URINE (gross haematuria) + RBC casts (pathognomonic of glomerular bleeding) + granular casts + 1+–2+ proteinuria (non-nephrotic). RBC CASTS are the hallmark of glomerulonephritis — they confirm the source is glomerular, not lower urinary tract. Heavy proteinuria (>3.5 g/day) with fat bodies = nephrotic syndrome." },
  { q:"Which serological finding is most useful for confirming post-PHARYNGITIS streptococcal AGN?", opts:["Anti-DNase B titre", "Anti-hyaluronidase titre", "Anti-streptolysin O (ASO) titre", "C3 level", "Anti-GBM antibody"], ans:2, exp:"ANTI-STREPTOLYSIN O (ASO): elevated after PHARYNGITIS (throat infection). ANTI-DNASE B and ANTI-HYALURONIDASE: elevated after PYODERMA (skin infection — ASO often NOT elevated post-skin). C3 is REDUCED in APSGN (complement consumption by immune complexes), normalising within 6–8 weeks. Anti-GBM = Goodpasture disease. Knowing which antibody titre correlates with which site of antecedent infection is a classic SBA distinction." },
  { q:"The peak age and sex distribution of acute post-streptococcal AGN following pharyngitis is:", opts:["1–3 years, equal sex distribution", "4–10 years, males predominate", "4–10 years, equal sex (M:F 1:1)", ">12 years, females predominate", "All ages equally, no sex predilection"], ans:1, exp:"Post-PHARYNGITIS APSGN: age 4–10 years, MALES PREDOMINATE (M>F). Post-PYODERMA APSGN: M:F = 1:1 (equal). The M>F predominance in post-pharyngitis cases may reflect higher GABHS pharyngitis rates and exposure in boys. Knowing both the age and the sex distribution by site of antecedent infection is high-yield for SBAs." },
  { q:"Hypertensive encephalopathy complicating AGN requires immediate treatment with:", opts:["Oral captopril and bed rest", "IM paraldehyde alone", "IV diazoxide or IV hydralazine combined with IV diazepam or IM paraldehyde", "Oral methyldopa and observation", "IV mannitol to reduce intracranial pressure"], ans:2, exp:"Hypertensive encephalopathy (HTN + seizures/altered consciousness) = EMERGENCY requiring IV antihypertensives. Treatment: IV DIAZOXIDE or IV HYDRALAZINE (rapid BP lowering) + IV DIAZEPAM or IM PARALDEHYDE (seizure control). Mild hypertension in AGN: bed rest + sedation. More severe: hydralazine/methyldopa/captopril orally. The distinction between mild, moderate, and encephalopathic HTN management is a common SBA." },
  { q:"The prognosis of acute post-infectious AGN in children is:", opts:["Poor — majority progress to CKD within 5 years", "Variable — 50% resolve, 50% progress", "Guarded — all require long-term immunosuppression", "Excellent — >95% experience complete resolution", "Fair — recurrence is common and leads to progressive decline"], ans:3, exp:">95% of children with APSGN achieve COMPLETE RESOLUTION. <5% progress to CKD. Key markers of resolution: oedema resolves in 5–10 days, BP normalises within 2 weeks, gross haematuria resolves in 1–2 weeks, microscopic haematuria may persist for months. C3 normalises by 6–8 weeks — persistent low C3 beyond 8 weeks suggests MPGN or another diagnosis. The excellent prognosis distinguishes APSGN from most other GN types." },
  { q:"A 6-year-old boy presents 12 days after a sore throat with periorbital oedema, dark urine, and BP 148/96 mmHg. Urine shows 2+ blood, 2+ protein, and RBC casts. ASO titre is elevated, C3 is reduced. Which management is NOT indicated at this stage?", opts:["Strict fluid balance monitoring", "Furosemide for fluid overload", "Dietary protein and salt restriction", "Penicillin to eradicate residual streptococcal infection", "Long-term immunosuppression with cyclophosphamide"], ans:4, exp:"APSGN management: bed rest, fluid restriction (previous day's output + insensible losses), LOW SALT diet, protein restriction, diuretics (furosemide 1–2 mg/kg/day), antihypertensives, and ANTIBIOTICS (penicillin/amoxycillin to eradicate residual GABHS). IMMUNOSUPPRESSION is NOT indicated — APSGN is immune-complex-mediated and self-limiting. Steroids/cyclophosphamide are reserved for rapidly progressive GN with crescents on biopsy, not routine APSGN." },
];



/* ═══════════ GASTROENTEROLOGY — MALABSORPTION ═══════════ */
const GI_MALABSORPTION_Qs = [
  { q:"Which segment of the small intestine is specifically responsible for absorption of vitamin B12 and bile salts?", opts:["Duodenum","Proximal jejunum","Distal jejunum","Terminal ileum","Ascending colon"], ans:3, exp:"The TERMINAL ILEUM is the specific site for active absorption of vitamin B12 (bound to intrinsic factor, via cubilin receptors) and conjugated bile salts. The duodenum receives pancreatic enzymes and bicarbonate. The jejunum absorbs carbohydrates, proteins, fat-soluble vitamins, and most minerals. Disease or resection of the terminal ileum (e.g., Crohn's disease, ileal resection) causes B12 deficiency and bile salt malabsorption — leading to fat malabsorption and steatorrhoea." },
  { q:"Malabsorption is mechanistically classified into intraluminal, mucosal, and post-mucosal phases. Which of the following represents a MUCOSAL phase defect?", opts:["Chronic pancreatitis causing lipase deficiency","Small intestinal bacterial overgrowth (SIBO)","Intestinal lymphangiectasia","Coeliac disease","Post-gastrectomy dumping syndrome"], ans:3, exp:"COELIAC DISEASE is a mucosal phase defect — it is an autoimmune disorder triggered by gluten causing villous atrophy and crypt hyperplasia, destroying the intestinal epithelium that absorbs digested nutrients. Chronic pancreatitis and SIBO are intraluminal defects (inadequate digestion/mixing). Intestinal lymphangiectasia is a post-mucosal transport defect (impaired lymphatic drainage). Post-gastrectomy dumping is an intraluminal defect (inadequate mixing time)." },
  { q:"In Small Intestinal Bacterial Overgrowth (SIBO), fat malabsorption occurs primarily because excess intraluminal bacteria:", opts:["Destroy intestinal villi by direct cytotoxic effect","Prematurely deconjugate bile acids, impairing fat emulsification","Competitively inhibit pancreatic lipase at the duodenal lumen","Obstruct mesenteric lymphatics preventing chylomicron transport","Secrete toxins that increase intestinal motility and reduce absorption time"], ans:1, exp:"In SIBO, excess bacteria in the small intestine PREMATURELY DECONJUGATE bile acids (normally conjugated in the liver and only deconjugated in the terminal ileum). Conjugated bile acids are essential for forming micelles that emulsify fat for lipase activity. When deconjugated early, they become ineffective at fat emulsification, causing fat malabsorption and steatorrhoea. Bacteria also consume nutrients directly. SIBO is treated with rifaximin." },
  { q:"A 38-year-old woman presents with chronic diarrhoea, bloating, and weight loss. Duodenal biopsy shows subtotal villous atrophy, crypt hyperplasia, and increased intraepithelial lymphocytes. Anti-tissue transglutaminase antibodies are strongly positive. What is the cornerstone of management?", opts:["Tetracycline and folate supplementation for 6 months","Rifaximin and probiotics for 4 weeks","Pancreatic enzyme replacement therapy indefinitely","Lifelong strict gluten-free diet","High-dose prednisolone and azathioprine"], ans:3, exp:"The biopsy findings (villous atrophy, crypt hyperplasia, increased IELs) with positive anti-tTG antibodies confirm COELIAC DISEASE. The ONLY effective treatment is a LIFELONG STRICT GLUTEN-FREE DIET — eliminating wheat, barley, and rye. This allows villous regeneration and symptom resolution. Tetracycline/folate treats tropical sprue. PERT treats pancreatic insufficiency. Corticosteroids are reserved for refractory coeliac disease, not initial management." },
  { q:"The specific treatment for TROPICAL SPRUE is:", opts:["Metronidazole for 10 days","Rifaximin plus prokinetics for 4 weeks","Tetracycline and folate supplementation for 3-6 months","Ceftriaxone followed by co-trimoxazole (TMP-SMX) for 1 year","Pancreatic enzyme replacement therapy and alcohol cessation"], ans:2, exp:"TROPICAL SPRUE is treated with TETRACYCLINE AND FOLATE for 3-6 months. This regimen addresses both the infectious/environmental aetiology and corrects the folate deficiency that accompanies it. Metronidazole treats Giardia. Rifaximin treats SIBO. Ceftriaxone followed by TMP-SMX treats Whipple's disease. PERT treats chronic pancreatitis. These distinctions are commonly tested." },
  { q:"The D-xylose absorption test is used to assess:", opts:["Exocrine pancreatic secretory function","Enterohepatic circulation of bile acids","Small intestinal mucosal absorptive function","Colonic transit time and water reabsorption","Gastric emptying rate and antral motility"], ans:2, exp:"The D-XYLOSE TEST assesses SMALL INTESTINAL MUCOSAL ABSORPTIVE FUNCTION. D-xylose is a pentose sugar absorbed passively by intestinal epithelium without requiring pancreatic enzymes or bile salts. After oral administration, serum and urine xylose levels are measured. A normal result suggests intact mucosa. Low levels indicate mucosal damage (e.g., coeliac disease, tropical sprue). Since bile and pancreatic enzymes are not required, a low result points specifically to mucosal disease rather than intraluminal defects." },
  { q:"Whipple's disease is caused by which organism?", opts:["Giardia duodenalis","Cryptosporidium parvum","Tropheryma whipplei","Mycobacterium avium complex","Strongyloides stercoralis"], ans:2, exp:"WHIPPLE'S DISEASE is caused by TROPHERYMA WHIPPLEI, a gram-positive actinobacterium. It is a rare systemic infection affecting middle-aged men, characterised by malabsorption, diarrhoea, weight loss, arthralgias, lymphadenopathy, and systemic manifestations (CNS involvement, cardiac involvement). Duodenal biopsy shows PAS-positive macrophages in the lamina propria containing the organism. Treatment: long-term antibiotics — ceftriaxone followed by TMP-SMX." },
  { q:"Which of the following drugs is a recognised CAUSE of malabsorption?", opts:["Amoxicillin","Omeprazole","Amlodipine","Colchicine","Furosemide"], ans:3, exp:"Drugs recognised as causes of malabsorption include COLCHICINE (impairs enterocyte function and disrupts intestinal microtubule assembly), TETRACYCLINE, and CHOLESTYRAMINE (binds bile acids and fat-soluble vitamins in the gut). Colchicine is most commonly cited. Amoxicillin (antibiotic) and omeprazole (PPI) are not direct causes of malabsorption, though PPIs can predispose to SIBO with chronic use. Amlodipine and furosemide have no direct role in causing malabsorption." },
  { q:"Absorption of nutrients into the bloodstream has occurred, but delivery to circulation is impaired. This post-mucosal transport defect is caused by which condition?", opts:["Chronic pancreatitis","Coeliac disease","Tropical sprue","Intestinal lymphangiectasia","Lactase deficiency"], ans:3, exp:"POST-MUCOSAL (transport phase) malabsorption occurs when nutrients are absorbed into enterocytes but cannot be transported to the bloodstream or lymphatics. INTESTINAL LYMPHANGIECTASIA — primary or secondary obstruction of intestinal lymphatics — prevents chylomicrons and fat-soluble vitamins from entering the lymphatic system. This results in protein-losing enteropathy, oedema, steatorrhoea, and lymphopaenia. Systemic diseases causing venous congestion (e.g., right heart failure) also cause post-mucosal malabsorption by this mechanism." },
  { q:"A 50-year-old man presents with progressive diarrhoea, weight loss, skin hyperpigmentation, arthralgia, and neurological symptoms including cognitive decline. Duodenal biopsy shows PAS-positive macrophages in the lamina propria. What is the most appropriate treatment?", opts:["Lifelong gluten-free diet","Metronidazole or tinidazole for 10 days","Tetracycline and folate for 3-6 months","Long-term antibiotics: ceftriaxone followed by TMP-SMX","Pancreatic enzyme replacement and alcohol cessation"], ans:3, exp:"The combination of malabsorption, arthralgias, neurological involvement, skin hyperpigmentation, and PAS-POSITIVE MACROPHAGES on biopsy = WHIPPLE'S DISEASE caused by Tropheryma whipplei. Treatment is LONG-TERM ANTIBIOTICS: initially ceftriaxone (IV, 2 weeks) for CNS disease, followed by co-trimoxazole (TMP-SMX) for at least 1 year to prevent relapse. Gluten-free diet treats coeliac. Metronidazole treats Giardia. Tetracycline/folate treats tropical sprue. PERT treats chronic pancreatitis." },
  { q:"A 28-year-old man from Kano presents with 3 months of watery diarrhoea, bloating, abdominal cramps, and weight loss. Stool microscopy shows trophozoites and cysts of a flagellated protozoan. His symptoms worsen significantly after dairy. The most appropriate first-line treatment is:", opts:["Tetracycline and folate for 3-6 months","Rifaximin for SIBO","Metronidazole or tinidazole","Ceftriaxone followed by TMP-SMX","Pancreatic enzyme replacement therapy"], ans:2, exp:"Flagellated protozoan (trophozoites and cysts) in stool of a patient with chronic watery diarrhoea, bloating, and dairy intolerance = GIARDIA DUODENALIS (Giardia lamblia). It is the most common intestinal parasitic cause of malabsorption in LMICs and commonly causes secondary lactase deficiency. First-line treatment is METRONIDAZOLE or TINIDAZOLE (or nitazoxanide as alternative). Tetracycline/folate treats tropical sprue. Rifaximin treats SIBO. Ceftriaxone/TMP-SMX treats Whipple's disease." },
  { q:"A 48-year-old with a 20-year alcohol history presents with pale, greasy, floating stools, significant weight loss, and new-onset diabetes. Serum amylase is mildly elevated. CT abdomen shows pancreatic calcifications and parenchymal atrophy. Faecal elastase is markedly reduced. What is the most appropriate treatment for his steatorrhoea?", opts:["Metronidazole for suspected Giardia","Lifelong gluten-free diet","Rifaximin for SIBO","Pancreatic enzyme replacement therapy (PERT) and alcohol cessation","Ceftriaxone followed by TMP-SMX"], ans:3, exp:"Chronic alcohol use + pancreatic calcifications on CT + markedly reduced faecal elastase = CHRONIC PANCREATITIS with exocrine pancreatic insufficiency (EPI). Reduced lipase, amylase, and proteases cause maldigestion of fat, carbohydrates, and protein. Treatment is PANCREATIC ENZYME REPLACEMENT THERAPY (PERT) taken with meals to supplement missing enzymes, PLUS ALCOHOL CESSATION to slow disease progression. New-onset diabetes here reflects endocrine insufficiency (Type 3c DM). PERT also corrects malnutrition and fat-soluble vitamin deficiency." },
  { q:"Malabsorption syndrome can cause specific micronutrient deficiencies. Osteomalacia and tetany in a patient with chronic malabsorption are most likely due to deficiency of:", opts:["Iron and folate","Vitamin B12 and thiamine","Vitamin K and zinc","Vitamin D and calcium","Vitamin C and niacin"], ans:3, exp:"OSTEOMALACIA (defective bone mineralisation in adults) results from VITAMIN D DEFICIENCY — fat-soluble vitamins (A, D, E, K) are malabsorbed in steatorrhoea. Vitamin D deficiency leads to reduced intestinal calcium absorption and secondary hyperparathyroidism, causing HYPOCALCAEMIA and tetany. Iron and folate deficiency cause anaemia. Vitamin B12 deficiency causes megaloblastic anaemia and neuropathy. Vitamin K deficiency causes bleeding disorders. Fat-soluble vitamin deficiencies are a hallmark complication of fat malabsorption." },
  { q:"Lactose intolerance is caused by deficiency of which brush border enzyme?", opts:["Sucrase","Maltase","Trehalase","Lipase","Lactase"], ans:4, exp:"LACTASE is the brush border enzyme (disaccharidase) on enterocytes that cleaves lactose into glucose and galactose for absorption. Lactase deficiency — primary (genetic, common in Africans and Asians) or secondary (post-gastroenteritis, coeliac disease) — causes undigested lactose to reach the colon, where bacteria ferment it, producing gas, bloating, osmotic diarrhoea, and cramps. Treatment: lactose-free diet or lactase enzyme supplements. Sucrase, maltase, and trehalase cleave other disaccharides. Lipase is a pancreatic enzyme." },
  { q:"Congestive heart failure can cause malabsorption through which mechanism?", opts:["Direct destruction of intestinal villi by low cardiac output","Reduced hepatic bile salt synthesis due to hepatic congestion only","Venous congestion impairing nutrient absorption and transport at the post-mucosal level","Increased intestinal motility from sympathetic activation reducing absorption time","Pancreatic ischaemia reducing enzyme secretion"], ans:2, exp:"Congestive heart failure causes POST-MUCOSAL (transport phase) malabsorption. Elevated venous pressure from right heart failure causes intestinal venous congestion and mesenteric oedema, impeding the transport of absorbed nutrients from the intestinal wall into the portal circulation and lymphatics. While hepatic congestion also impairs bile synthesis, the primary malabsorption mechanism in cardiac failure is venous congestion at the transport level. This is listed alongside intestinal lymphangiectasia and scleroderma as post-mucosal causes." },
];

/* ═══════════ ENDOCRINOLOGY — DIABETES MELLITUS ═══════════ */
const ENDO_DM_Qs = [
  { q:"According to the WHO 1999 definition, diabetes mellitus is best described as:", opts:["A condition of fasting hyperglycaemia due to absolute insulin deficiency","A metabolic disorder of multiple etiologies characterised by chronic hyperglycaemia with disturbances of carbohydrate, fat and protein metabolism resulting from defects in insulin secretion, action, or both","A syndrome of impaired glucose tolerance occurring exclusively in obese adults over 40 years","A disease defined solely by HbA1c above 6.5% on two separate measurements","A condition of recurrent hyperosmolar states requiring hospitalisation"], ans:1, exp:"The WHO 1999 definition emphasises: (1) METABOLIC DISORDER, (2) MULTIPLE ETIOLOGIES, (3) CHRONIC HYPERGLYCAEMIA, and (4) disturbances in carbohydrate, fat AND protein metabolism — from defects in INSULIN SECRETION, ACTION, or BOTH. This distinguishes DM from simple hyperglycaemia and encompasses both Type 1 (secretion defect) and Type 2 (resistance + relative secretion defect). HbA1c >6.5% is a diagnostic criterion but not the definition. Absolute insulin deficiency applies only to Type 1A." },
  { q:"What is the fasting plasma glucose threshold that confirms a diagnosis of diabetes mellitus?", opts:["≥ 5.6 mmol/L (100 mg/dL)","≥ 6.1 mmol/L (110 mg/dL)","≥ 6.5 mmol/L (117 mg/dL)","≥ 7.0 mmol/L (126 mg/dL)","≥ 8.0 mmol/L (144 mg/dL)"], ans:3, exp:"A FASTING PLASMA GLUCOSE of ≥ 7.0 mmol/L (126 mg/dL) on two separate occasions confirms diabetes mellitus. Fasting means no caloric intake for at least 8 hours. ≥5.6 mmol/L = impaired fasting glucose (IFG) threshold by ADA; ≥6.1 mmol/L = IFG by WHO. ≥6.5% HbA1c also diagnoses DM. Random glucose ≥11.1 mmol/L with symptoms diagnoses DM. The 2-hour OGTT threshold is also ≥11.1 mmol/L. Knowing both the fasting and OGTT thresholds is critical." },
  { q:"In Type 1A diabetes, beta cell destruction occurs through:", opts:["Progressive peripheral insulin resistance overwhelming beta cell compensatory capacity","Amyloid deposition within islets causing mechanical beta cell compression","Autoimmune destruction triggered by genetic and environmental factors over months to years","Direct pancreatic damage from chronic alcohol-induced pancreatitis","Glucotoxicity from prolonged hyperglycaemia in Type 2 DM"], ans:2, exp:"Type 1A DM develops from the SYNERGISTIC EFFECTS OF GENETIC, ENVIRONMENTAL, AND IMMUNOLOGIC FACTORS that destroy beta cells. The sequence: (1) genetic susceptibility (HLA region); (2) triggering environmental event (viral infection); (3) autoimmune response with immunologic markers appearing; (4) progressive beta cell loss over months-years while glucose remains normal; (5) frank diabetes when >80% of beta cells are destroyed. Features of insulin deficiency emerge only when the remaining functional beta cells are insufficient to maintain glucose tolerance." },
  { q:"The THREE core pathophysiologic defects in Type 2 diabetes mellitus are:", opts:["Absolute insulin deficiency, diabetic ketoacidosis, and peripheral lipolysis","Beta cell autoimmune destruction, glucagonopenia, and hepatic steatosis","Impaired insulin secretion, peripheral insulin resistance, and excessive hepatic glucose production","Hyperinsulinaemia, reactive hypoglycaemia, and progressive beta cell hyperplasia","Amyloid deposition, alpha cell hyperplasia, and renal glucose wasting"], ans:2, exp:"The three pathophysiologic pillars of T2DM are: (1) IMPAIRED INSULIN SECRETION — initially mild, then progressive; (2) PERIPHERAL INSULIN RESISTANCE — particularly in muscle and liver, strongly associated with visceral obesity; (3) EXCESSIVE HEPATIC GLUCOSE PRODUCTION — failure of hyperinsulinaemia to suppress gluconeogenesis, causing fasting hyperglycaemia. These develop in sequence: insulin resistance precedes secretory defects; diabetes manifests when secretion cannot compensate for resistance." },
  { q:"Metformin's primary mechanism of action includes:", opts:["Stimulating pancreatic beta cells to secrete more insulin","Blocking SGLT-2 in the proximal renal tubule to promote glycosuria","Reducing hepatic glucose output and improving peripheral insulin sensitivity","Inhibiting DPP-4 to prevent incretin (GLP-1 and GIP) degradation","Binding to peroxisome proliferator activator receptors to redistribute adipose tissue"], ans:2, exp:"Metformin (biguanide) acts primarily by: (1) REDUCING HEPATIC GLUCOSE OUTPUT (inhibiting gluconeogenesis) and (2) IMPROVING PERIPHERAL INSULIN SENSITIVITY. It also reduces intestinal glucose absorption and has anorexiant effects. Crucially, it does NOT stimulate insulin secretion — so it does NOT cause hypoglycaemia alone and is associated with weight loss or neutrality. It is the FIRST-LINE drug for T2DM. It is contraindicated in CKD stages 3-5 (risk of lactic acidosis) and moderate-severe heart failure." },
  { q:"Metformin is CONTRAINDICATED in patients with:", opts:["Obesity and polycystic ovary syndrome","Pre-diabetes (impaired fasting glucose)","Stable, well-controlled Type 2 DM with normal renal function","CKD Stage 3, 4, or 5","Type 1 DM requiring insulin co-therapy"], ans:3, exp:"Metformin is CONTRAINDICATED IN CKD STAGES 3, 4, AND 5. Metformin is renally cleared; in reduced GFR, it accumulates and causes LACTIC ACIDOSIS — a potentially fatal complication. It is also contraindicated in moderate/severe heart failure (tissue hypoxia promotes lactate accumulation). Metformin is actually RECOMMENDED for pre-diabetes, obesity with T2DM, and PCOS (reduces insulin resistance). It may be used cautiously in Type 1 DM as adjunct. The CKD contraindication is the most tested clinical point." },
  { q:"SGLT-2 inhibitors lower blood glucose primarily by:", opts:["Directly stimulating pancreatic beta cells to release more insulin","Suppressing pancreatic glucagon secretion","Inhibiting glucose reabsorption in the proximal renal tubule, leading to glycosuria","Delaying gastric emptying and reducing postprandial glucose absorption","Reducing hepatic glucose output by inhibiting gluconeogenesis"], ans:2, exp:"SGLT-2 (sodium-glucose co-transporter 2) INHIBITORS — dapagliflozin, empagliflozin, canagliflozin — block SGLT-2 in the PROXIMAL RENAL TUBULE, which normally reabsorbs ~90% of filtered glucose. Inhibition causes glucosuria of 45-80g/day. This mechanism is insulin-independent, so it works in Type 1 and 2 DM. Benefits beyond glucose: weight loss, BP reduction, and landmark cardiovascular/renal benefits (EMPA-REG, DAPA-HF, CREDENCE trials). Side effects: UTIs, genital mycotic infections, DKA risk (even with near-normal glucose — 'euglycaemic DKA')." },
  { q:"Which antidiabetic drug class is associated with WEIGHT GAIN and MODERATE TO SEVERE HYPOGLYCAEMIA as its main adverse effects?", opts:["Metformin (biguanide)","SGLT-2 inhibitors","DPP-4 inhibitors","Alpha-glucosidase inhibitors","Sulfonylureas"], ans:4, exp:"SULFONYLUREAS (e.g., glibenclamide, glipizide, gliclazide, glimepiride) stimulate pancreatic beta cells to release insulin INDEPENDENTLY OF BLOOD GLUCOSE — so they cause insulin secretion even when glucose is normal or low, leading to moderate to severe HYPOGLYCAEMIA and WEIGHT GAIN. Metformin causes weight loss. SGLT-2 inhibitors cause mild weight loss. DPP-4 inhibitors are weight-neutral. Alpha-glucosidase inhibitors cause modest weight loss. Sulfonylureas also carry risk in elderly patients and in those with renal disease." },
  { q:"DPP-4 (dipeptidyl peptidase-4) inhibitors lower blood glucose by which mechanism?", opts:["Directly binding to and activating GLP-1 receptors on beta cells","Stimulating pancreatic beta cells independent of blood glucose","Preventing inactivation of GLP-1 and GIP by DPP-4, thereby prolonging incretin activity","Binding to nuclear PPAR-gamma receptors to redistribute adipose tissue","Inhibiting SGLT-2 in the proximal renal tubule"], ans:2, exp:"DPP-4 is a serine protease that rapidly inactivates GLP-1 and GIP (within 1-2 minutes of release) by cleaving their N-terminal amino acids. DPP-4 INHIBITORS (sitagliptin, saxagliptin, vildagliptin, linagliptin) prevent this degradation, PROLONGING INCRETIN ACTIVITY. This increases glucose-stimulated insulin secretion and suppresses glucagon. Because their effect is glucose-dependent, they rarely cause hypoglycaemia alone. GLP-1 receptor agonists (liraglutide, exenatide) directly activate GLP-1 receptors — they are injectable, not DPP-4 inhibitors." },
  { q:"MODY (Maturity-Onset Diabetes of the Young) is classified under which main category of the WHO DM classification?", opts:["Type 1 diabetes — immune-mediated beta cell destruction","Type 2 diabetes — insulin resistance with relative deficiency","Gestational diabetes mellitus (GDM)","Other specific types — genetic defects of beta-cell function","Secondary diabetes due to exocrine pancreatic disease"], ans:3, exp:"MODY is caused by single-gene mutations affecting BETA CELL FUNCTION — it is classified under 'OTHER SPECIFIC TYPES OF DIABETES: Genetic defects of beta-cell function.' MODY types 1-6 involve mutations in hepatocyte nuclear factors, glucokinase, IPF-1, NeuroD1, and mitochondrial DNA. MODY typically presents in young, non-obese individuals with autosomal dominant inheritance and no autoantibodies (distinguishing it from T1DM). Glucokinase MODY (MODY 2) is mild and often requires no pharmacotherapy." },
  { q:"A 52-year-old obese man presents with fasting glucose of 9.4 mmol/L confirmed on repeat, BMI 32 kg/m², no ketones, and eGFR 82 mL/min/1.73m². What is the MOST APPROPRIATE initial pharmacological management?", opts:["Basal-bolus insulin regimen","Glibenclamide (sulfonylurea)","Dapagliflozin (SGLT-2 inhibitor)","Metformin (biguanide)","Liraglutide (GLP-1 receptor agonist)"], ans:3, exp:"METFORMIN is FIRST-LINE pharmacotherapy for Type 2 DM, especially in obese patients. It reduces hepatic glucose output and improves insulin sensitivity without causing hypoglycaemia or weight gain (often causes weight loss). Contraindications are absent here (eGFR 82 = normal, no severe heart failure). Sulfonylureas are second-line (hypoglycaemia risk, weight gain). SGLT-2 inhibitors and GLP-1 agonists are excellent add-ons but not first-line in most guidelines. Insulin is for failure of oral therapy or severe hyperglycaemia with symptoms." },
  { q:"Which of the following correctly states the 2-hour plasma glucose threshold during an oral glucose tolerance test (OGTT) that DIAGNOSES diabetes mellitus?", opts:["≥ 7.0 mmol/L (126 mg/dL)","≥ 7.8 mmol/L (140 mg/dL)","≥ 9.0 mmol/L (162 mg/dL)","≥ 11.1 mmol/L (200 mg/dL)","≥ 13.9 mmol/L (250 mg/dL)"], ans:3, exp:"The 2-HOUR OGTT (75g oral glucose) threshold for diagnosing DM is ≥ 11.1 mmol/L (200 mg/dL). The full diagnostic criteria: (1) Fasting PG ≥ 7.0 mmol/L; (2) 2-hr OGTT ≥ 11.1 mmol/L; (3) Random PG ≥ 11.1 mmol/L with symptoms; (4) HbA1c ≥ 6.5%. Impaired glucose tolerance (IGT) = 2-hr OGTT 7.8-11.0 mmol/L. 7.8 mmol/L is the IGT lower threshold, not the DM threshold. ≥7.0 is fasting, not OGTT. These are the most commonly confused values in DM diagnostics." },
  { q:"Thiazolidinediones (e.g., pioglitazone) exert their glucose-lowering effect by:", opts:["Stimulating pancreatic beta cells via sulfonylurea receptor binding","Blocking SGLT-2 to promote urinary glucose excretion","Binding to peroxisome proliferator activator receptors (PPAR-gamma) in the nucleus, reducing peripheral insulin resistance","Inhibiting DPP-4 to prevent incretin degradation","Delaying intestinal carbohydrate absorption via alpha-glucosidase inhibition"], ans:2, exp:"Thiazolidinediones (TZDs) are INSULIN SENSITISERS that bind to PPAR-GAMMA receptors in the cell nucleus, increasing gene transcription that improves peripheral insulin sensitivity in muscle and adipose tissue. They cause redistribution of fat from viscera to subcutaneous tissue. Adverse effects include weight gain, fluid retention, increased fracture risk (especially humeral fractures in women), and higher risk of heart failure exacerbation. Pioglitazone has been associated with bladder cancer risk. Rosiglitazone was withdrawn from European markets due to cardiovascular concerns." },
  { q:"A 60-year-old man with Type 2 DM and CKD Stage 4 (eGFR 20 mL/min) presents for medication review. Which drug should be STOPPED immediately?", opts:["Insulin glargine (long-acting insulin)","Sitagliptin (dose-reduced DPP-4 inhibitor)","Metformin","Repaglinide (meglitinide, use with caution)","Linagliptin (DPP-4 inhibitor — no dose adjustment in CKD)"], ans:2, exp:"METFORMIN IS CONTRAINDICATED IN CKD STAGES 3, 4, AND 5. At eGFR 20 mL/min (Stage 4), metformin accumulates due to reduced renal clearance, greatly increasing the risk of LACTIC ACIDOSIS — potentially fatal. Insulin can be used in CKD with dose reduction. Sitagliptin requires dose reduction but can be used. Linagliptin requires no dose adjustment and is safe in CKD. Repaglinide is primarily hepatically cleared and is used cautiously. The metformin/CKD contraindication is a critical pharmacology safety point." },
  { q:"Glucocorticoids (e.g., prednisolone, dexamethasone) cause secondary hyperglycaemia. Under which category of the WHO DM classification does steroid-induced diabetes fall?", opts:["Type 1 diabetes — idiopathic","Type 2 diabetes — predominantly insulin resistance","Gestational diabetes mellitus","Drug- or chemical-induced — other specific types of diabetes","Genetic defect of insulin action"], ans:3, exp:"Steroid-induced diabetes falls under 'OTHER SPECIFIC TYPES OF DIABETES — DRUG OR CHEMICAL INDUCED.' Glucocorticoids cause hyperglycaemia primarily by inducing PERIPHERAL INSULIN RESISTANCE (reducing GLUT-4 translocation in muscle) and increasing HEPATIC GLUCONEOGENESIS. They also impair insulin secretion. Other drugs in this category include: nicotinic acid, thiazides, beta-blockers, phenytoin, protease inhibitors, pentamidine, and alpha-interferon. These are tested as secondary causes of DM in pharmacology and endocrinology." },
  { q:"Alpha-glucosidase inhibitors (e.g., acarbose, miglitol, voglibose) are CONTRAINDICATED in which of the following conditions?", opts:["Obesity with impaired glucose tolerance","Type 2 DM on combination metformin therapy","Malabsorption syndromes","Mild CKD (eGFR 45-60 mL/min)","Patients receiving concurrent sulfonylurea therapy"], ans:2, exp:"ALPHA-GLUCOSIDASE INHIBITORS inhibit brush border disaccharidases (sucrase, maltase, glucoamylase), delaying complex carbohydrate breakdown and reducing postprandial glucose spikes. They are CONTRAINDICATED IN MALABSORPTION SYNDROMES because undigested carbohydrates reaching the colon are fermented by bacteria, dramatically worsening bloating, flatulence, and osmotic diarrhoea. Side effects even in normal patients include flatulence and abnormal liver function tests. They reduce HbA1c by 0.5-0.8%, cause modest weight loss, and are actually useful in pre-diabetes." },
  { q:"Non-sulfonylurea insulin secretagogues (meglitinides), such as repaglinide, are characteristically taken:", opts:["Once daily at bedtime as a single dose","Twice daily with the two largest meals of the day","Three times daily immediately before each main meal","Continuously via subcutaneous insulin pump","Once weekly as a long-acting depot injection"], ans:2, exp:"REPAGLINIDE (meglitinide, also called non-sulfonylurea insulin secretagogue) is dosed at 0.5-4mg THREE TIMES DAILY, taken IMMEDIATELY BEFORE EACH MAIN MEAL. Like sulfonylureas, meglitinides stimulate pancreatic beta cells, but their onset is much faster and duration shorter — making them meal-specific secretagogues that reduce postprandial glucose. Maximum dose is 16mg/day. Nateglinide is another member. Because they are meal-linked, they are particularly suitable for patients with irregular meal schedules." },
  { q:"Which of the following correctly describes the macrovascular complications of diabetes mellitus?", opts:["Diabetes doubles the risk of pulmonary embolism and increases atrial fibrillation by 5x","Diabetes increases the risk of stroke by 2x and coronary heart disease by 2-4x","Diabetes triples the risk of aortic stenosis and doubles mitral regurgitation","Diabetes increases pericarditis risk by 3x and cardiomyopathy by 6x","Macrovascular disease in diabetes affects only the coronary arteries"], ans:1, exp:"MACROVASCULAR complications of DM include: STROKE (occurs 2x more often), CORONARY HEART DISEASE (2-4x more likely), and PERIPHERAL VASCULAR DISEASE (~1/3 of diabetic patients with advanced disease). These result from accelerated atherosclerosis driven by hyperglycaemia, dyslipidaemia, and hypertension. Cardiovascular disease is the leading cause of death in both Type 1 and Type 2 DM. Intensive glucose control reduces microvascular risk more dramatically than macrovascular risk — additional BP control and statins are essential." },
  { q:"Insulin is REQUIRED FOR SURVIVAL in which of the following patients?", opts:["A 58-year-old obese man with well-controlled Type 2 DM on metformin alone","A 30-year-old woman with gestational diabetes controlled by diet modification","A 15-year-old boy with Type 1 DM","A 62-year-old man with MODY 2 (glucokinase mutation) managed with dietary adjustment","A 50-year-old woman with impaired fasting glucose who exercises regularly"], ans:2, exp:"INSULIN IS REQUIRED FOR SURVIVAL in TYPE 1 DM. Absolute destruction of beta cells means no endogenous insulin — without exogenous insulin, these patients develop fatal DKA within days to weeks. In contrast, Type 2 DM patients retain some beta cell function and can initially manage without insulin. GDM may not require insulin if diet-controlled. MODY 2 is typically mild and diet-managed. Only T1DM has the characteristic of insulin being life-sustaining rather than optional or second-line." },
  { q:"A 44-year-old woman with acromegaly due to a GH-secreting pituitary adenoma develops persistent fasting hyperglycaemia. Under which WHO DM category does her condition fall?", opts:["Type 1 diabetes — immune-mediated beta cell destruction","Type 2 diabetes — predominantly insulin resistance","Gestational diabetes mellitus","Other specific types — endocrinopathies","Other specific types — genetic defects of beta-cell function"], ans:3, exp:"Acromegaly (growth hormone excess) is a recognised ENDOCRINOPATHY causing secondary DM, falling under 'OTHER SPECIFIC TYPES OF DIABETES — ENDOCRINOPATHIES.' GH is a major counter-regulatory hormone that promotes insulin resistance in peripheral tissues and stimulates hepatic glucose production. Other endocrinopathies in this category: Cushing's syndrome (cortisol excess), glucagonoma, phaeochromocytoma, hyperthyroidism, somatostatinoma, and aldosteronoma. Treating the underlying endocrinopathy (e.g., pituitary surgery) can sometimes reverse or improve glucose tolerance." },
  { q:"In the natural history of Type 2 DM, which statement correctly describes the temporal relationship between insulin resistance and insulin secretory defect?", opts:["Insulin secretory defect develops first and causes compensatory hyperinsulinaemia, which leads to insulin resistance","Both defects develop simultaneously from birth due to polygenic inheritance","Insulin resistance precedes the insulin secretory defect; diabetes only manifests when beta cell secretion becomes inadequate to compensate","Autoimmune beta cell damage causes the secretory defect, which then unmasks pre-existing insulin resistance","Glucose toxicity from early hyperglycaemia is the primary driver of both defects"], ans:2, exp:"Most studies support that INSULIN RESISTANCE PRECEDES the insulin secretory defect. In the early stage, beta cells COMPENSATE by secreting more insulin (relative hyperinsulinaemia) — maintaining normal glucose tolerance. T2DM manifests ONLY WHEN BETA CELL SECRETION BECOMES INADEQUATE to overcome the resistance. This explains why lifestyle modification (reducing resistance via exercise/weight loss) can prevent progression from pre-diabetes to T2DM, and why metformin — which targets resistance — is first-line therapy." },
  { q:"Which of the following is a recognised major risk factor for developing Type 2 DM?", opts:["Regular moderate alcohol consumption of 2-4 units per day","HDL cholesterol ≤ 35 mg/dL or triglycerides ≥ 250 mg/dL","A personal history of Type 1 DM in first-degree relatives only","Body mass index between 20-24.9 kg/m²","Habitual coffee consumption of more than 3 cups per day"], ans:1, exp:"Recognised MAJOR RISK FACTORS for T2DM include: overweight (BMI ≥25 kg/m²), physical inactivity, HDL ≤35 mg/dL AND/OR TG ≥250 mg/dL, hypertension (≥140/90 mmHg), history of GDM or delivery of baby >4.1 kg, PCOS, IFG or IGT, age, and certain race/ethnicities. Low HDL and high triglycerides reflect insulin resistance-associated dyslipidaemia and metabolic syndrome. Normal BMI (20-24.9 kg/m²) is not a risk factor. Moderate alcohol consumption and coffee are not established risk factors for T2DM." },
  { q:"Which of the following insulin preparations is classified as INTERMEDIATE-ACTING?", opts:["Insulin aspart","Regular insulin (soluble insulin)","NPH insulin (isophane insulin)","Insulin glargine","Insulin degludec"], ans:2, exp:"Insulin classification by duration: RAPID-ACTING analogs (aspart, lispro, glulisine) — onset 15 min, duration 4-6 hrs; SHORT-ACTING (Regular/soluble insulin) — onset 30-60 min, duration 6-8 hrs; INTERMEDIATE-ACTING (NPH/isophane) — onset 1-3 hrs, duration ~12 hrs; LONG-ACTING (glargine, detemir) — onset 1-2 hrs, duration ~24 hrs; EXTENDED LONG-ACTING (degludec) — duration >24 hrs; PREMIXED (e.g., 70/30 = 70% NPH + 30% regular). NPH is the prototype intermediate-acting insulin and forms the basis of most premixed formulations." },
  { q:"Alpha-glucosidase inhibitors lower postprandial blood glucose by which primary mechanism?", opts:["Stimulating pancreatic beta cells in response to carbohydrate ingestion","Inhibiting intestinal brush border enzymes that break down complex carbohydrates, reducing postprandial glucose absorption","Blocking SGLT-2 in the proximal renal tubule to promote urinary glucose excretion","Increasing peripheral insulin sensitivity via nuclear PPAR-gamma receptor binding","Delaying gastric emptying via GLP-1 receptor activation in the gut wall"], ans:1, exp:"ALPHA-GLUCOSIDASE INHIBITORS (acarbose, miglitol, voglibose) INHIBIT BRUSH BORDER ENZYMES — specifically the alpha-glucosidases (sucrase, maltase, glucoamylase) on intestinal epithelial cells. These enzymes normally cleave complex carbohydrates and disaccharides into absorbable monosaccharides. Inhibition DELAYS and REDUCES postprandial carbohydrate absorption, blunting postprandial glucose spikes. They do not stimulate insulin secretion, so hypoglycaemia is rare as monotherapy. Main side effects: flatulence (colonic carbohydrate fermentation) and abnormal liver function tests." },
  { q:"A 26-year-old woman develops hyperglycaemia at 30 weeks of gestation. Her fasting glucose is 6.9 mmol/L. She has no prior DM diagnosis. After delivery, her glucose normalises completely. What category of diabetes did she have, and what is her future risk?", opts:["Type 2 diabetes unmasked by pregnancy — no increased future risk","Secondary diabetes from placental hormones — resolves with no further implications","Gestational diabetes mellitus (GDM) — significant increased lifetime risk of developing Type 2 DM","Pre-diabetes — requires immediate metformin initiation post-delivery","Transient hyperglycaemia of pregnancy — not a recognised DM category"], ans:2, exp:"GESTATIONAL DIABETES MELLITUS (GDM) is WHO Category IV — glucose intolerance with onset or FIRST RECOGNITION DURING PREGNANCY. It resolves after delivery (distinguishing it from pre-existing T2DM unmasked by pregnancy). GDM carries a SIGNIFICANT LIFETIME RISK of developing Type 2 DM — approximately 50% within 10 years. It is also a risk factor for the offspring developing obesity and T2DM. History of GDM is itself a recognised major risk factor for future T2DM. Post-delivery glucose testing at 6-12 weeks is recommended for all women with GDM." },

];

/* ═══════════ ENDOCRINOLOGY — ACUTE DM COMPLICATIONS ═══════════ */
const ENDO_ACUTE_DM_Qs = [
  { q:"The biochemical definition of diabetic ketoacidosis (DKA) includes all of the following EXCEPT:", opts:["Blood glucose > 250 mg/dL","Arterial pH < 7.3","Serum bicarbonate < 15 mEq/L","Moderate to severe ketonemia","Effective serum osmolarity > 320 mOsm/kg"], ans:4, exp:"DKA is defined by: (1) blood glucose > 250 mg/dL; (2) arterial pH < 7.3; (3) serum bicarbonate < 15 mEq/L; (4) moderate/severe ketonemia/ketonuria; (5) increased anion gap. Effective serum osmolarity > 320 mOsm/kg is the defining feature of HYPEROSMOLAR HYPERGLYCAEMIC STATE (HHS), not DKA. In HHS, ketonuria is absent or minimal (≤1+), glucose is > 600 mg/dL, and pH is > 7.3. Confusing DKA and HHS criteria is a common exam trap." },
  { q:"The plasma glucose and effective serum osmolarity thresholds that define Hyperosmolar Hyperglycaemic State (HHS) are:", opts:["Glucose > 250 mg/dL; osmolarity > 280 mOsm/kg","Glucose > 350 mg/dL; osmolarity > 300 mOsm/kg","Glucose > 500 mg/dL; osmolarity > 310 mOsm/kg","Glucose > 600 mg/dL; osmolarity > 320 mOsm/kg","Glucose > 800 mg/dL; osmolarity > 350 mOsm/kg"], ans:3, exp:"HHS is defined by: (1) plasma glucose > 600 mg/dL; (2) effective serum osmolarity > 320 mOsm/kg; (3) serum pH > 7.3; (4) absent or minimal ketonuria (≤1+). In contrast, DKA has glucose > 250 mg/dL, pH < 7.3, and significant ketonemia. HHS occurs predominantly in Type 2 DM (often elderly patients) and carries higher mortality (15-30%) compared to DKA (5%). The degree of coma correlates with the level of hyperosmolarity." },
  { q:"The average estimated fluid deficit in HHS is approximately:", opts:["2-3 litres","3-6 litres (same as DKA)","5-7 litres","8-10 litres","12-15 litres"], ans:3, exp:"The fluid deficit in HHS is APPROXIMATELY 8-10 LITRES — significantly greater than in DKA (3-6 litres). This reflects the profound osmotic diuresis from extreme hyperglycaemia (>600 mg/dL) over days to weeks before presentation. The massive dehydration is responsible for the hyperosmolarity, haemoconcentration, and altered consciousness. Fluid resuscitation is the cornerstone of treatment — one-half of the deficit is replaced in the first 12 hours and the remaining half over the next 24 hours." },
  { q:"Potassium supplementation is NOT added to the FIRST litre of IV fluid in DKA management because:", opts:["Serum potassium is invariably low in DKA and adding it to the first litre delays other fluids","Potassium causes peripheral vasoconstriction when infused with isotonic saline","Initial serum potassium may be normal or elevated; adding potassium risks fatal ventricular arrhythmia","Insulin must be given before potassium to drive it intracellularly","Potassium is physically incompatible with normal saline in the IV bag"], ans:2, exp:"In DKA, initial serum potassium is FREQUENTLY NORMAL OR HIGH despite severe total body potassium depletion (3-5 mEq/kg deficit). This is because metabolic acidosis drives intracellular K+ into the extracellular space (K+/H+ exchange). If potassium is added to the first litre and the initial K+ is already high or normal, the patient risks SEVERE HYPERKALAEMIA leading to fatal VENTRICULAR TACHYCARDIA OR FIBRILLATION. Serum K+ must be checked before starting KCl replacement." },
  { q:"In DKA, serum potassium is initially normal or elevated despite severe total body depletion. The primary mechanism for this is:", opts:["Reduced aldosterone secretion in acidosis causing renal potassium retention","Intracellular exchange of potassium for hydrogen ions during metabolic acidosis","Release of potassium from lysed red blood cells during acute illness","Diminished renal potassium excretion due to severe volume depletion","Hyperglycaemia directly stimulating potassium efflux from adipocytes"], ans:1, exp:"In metabolic acidosis, the body buffers excess H+ ions by moving them INTRACELLULARLY in exchange for K+ moving OUT of cells (K+/H+ exchange). This raises serum K+ even though total body potassium is severely depleted from osmotic diuresis, vomiting, and insulin deficiency. After insulin therapy begins, K+ re-enters cells rapidly (insulin activates Na+/K+-ATPase), causing serum K+ to fall sharply. This is why regular K+ monitoring (every 2-4 hours) and timely replacement are essential in DKA management." },
  { q:"Why is significant ketoacidosis ABSENT in HHS despite severe hyperglycaemia?", opts:["The very high glucose concentration itself directly inhibits hepatic ketogenesis","Patients with HHS clear ketone bodies more efficiently via enhanced renal excretion","Higher residual endogenous insulin levels in HHS inhibit lipolysis sufficiently to prevent clinically significant ketosis","HHS exclusively affects Type 2 diabetics whose beta cells cannot produce the insulin needed for ketosis","Lactic acidosis from tissue hypoperfusion chemically neutralises ketone bodies before they accumulate"], ans:2, exp:"The absence of ketoacidosis in HHS is not fully understood but is most attributed to HIGHER RESIDUAL ENDOGENOUS INSULIN LEVELS in Type 2 DM patients — just enough to strongly INHIBIT LIPOLYSIS, preventing significant free fatty acid release and subsequent hepatic ketogenesis. The hyperosmolar state itself may also directly inhibit lipolysis. Lower counter-regulatory hormone levels (glucagon, catecholamines) compared to DKA also contribute. Any acidosis in HHS is more likely from lactic acidosis, starvation ketosis, or azotaemia rather than ketoacidosis." },
  { q:"The MOST IMPORTANT initial management step in BOTH DKA and HHS is:", opts:["Immediate IV regular insulin bolus at 0.1 units/kg","IV sodium bicarbonate to correct metabolic acidosis","IV fluid resuscitation with isotonic (normal) saline","Subcutaneous long-acting insulin and close monitoring","IV potassium chloride to replenish total body deficit"], ans:2, exp:"IV FLUID RESUSCITATION with ISOTONIC SALINE is the INITIAL priority in both DKA and HHS. Fluid replacement alone can reduce blood glucose by 35-70 mg/dL/hour by improving renal perfusion and dilution of glucose. It restores tissue perfusion, reduces counter-regulatory hormone levels, and corrects haemodynamic instability before insulin is given. Insulin is NOT given until fluid resuscitation is underway and serum K+ is confirmed. Bicarbonate is reserved for severe acidosis (pH < 6.9). The cardinal principle: fluids first, then insulin, then electrolytes." },
  { q:"A diabetic patient is found unconscious. After confirming an airway, what is the MOST APPROPRIATE immediate treatment for presumed hypoglycaemia?", opts:["IM regular insulin 10 IU stat","IV normal saline 1 litre over 30 minutes","IV 50-100 mL of 50% dextrose (glucose) stat, then maintain with 10% dextrose","Oral sugary drink via nasogastric tube immediately","Subcutaneous glucagon only — IV dextrose is not safe without confirmation"], ans:2, exp:"In an UNCONSCIOUS patient with suspected hypoglycaemia, give IV 50-100 mL OF 50% DEXTROSE STAT (then maintain on 10% dextrose until conscious). If IV access cannot be obtained, IM/SC/IV glucagon 0.5-1mg is an alternative. Never give anything by mouth to an unconscious patient (aspiration risk). Never give insulin to someone hypoglycaemic. IV dextrose is the primary treatment — it acts within minutes. After recovery, investigate and treat the underlying cause of hypoglycaemia." },
  { q:"Which of the following best describes Whipple's triad for the diagnosis of hypoglycaemia?", opts:["Blood glucose < 45 mg/dL, diaphoresis, and tachycardia that self-resolve","Symptoms consistent with hypoglycaemia, a low plasma glucose confirmed by a precise method, and relief of symptoms after raising blood glucose","Plasma glucose < 70 mg/dL, adrenergic features, and positive HbA1c > 6.5%","Fasting glucose < 2.5 mmol/L, neurological symptoms, and insulin level > 5 µU/mL","Confusion, seizures, and reversal with IV glucagon within 2 minutes"], ans:1, exp:"WHIPPLE'S TRIAD: (1) SYMPTOMS consistent with hypoglycaemia (adrenergic: sweating, tachycardia, tremor; neuroglycopaenic: confusion, seizure); (2) LOW PLASMA GLUCOSE confirmed by a PRECISE METHOD (not a glucose monitor alone); (3) RELIEF OF SYMPTOMS after raising blood glucose. All three components must be present. The triad is the gold standard for confirming true hypoglycaemia and separating it from pseudohypoglycaemia. In diabetics, the glucose threshold for symptoms is higher (~70 mg/dL) than in non-diabetics (~45 mg/dL)." },
  { q:"A 19-year-old with known Type 1 DM presents with 2 days of vomiting, abdominal pain, and missed insulin. Blood glucose is 22 mmol/L, pH 7.15, bicarbonate 8 mEq/L, and K+ is 5.9 mEq/L with 3+ urine ketones. What is the MOST APPROPRIATE immediate first step?", opts:["IV insulin bolus 10 IU immediately","IV potassium chloride 40 mmol in 500 mL normal saline","IV sodium bicarbonate 100 mmol for severe acidosis","IV isotonic (normal) saline — fluid resuscitation first","Subcutaneous insulin glargine and oral rehydration"], ans:3, exp:"This is DKA (glucose > 250 mg/dL, pH < 7.3, bicarbonate < 15, ketonuria). The FIRST STEP is IV FLUID RESUSCITATION with isotonic saline — before insulin. Serum K+ is 5.9 mEq/L (elevated); giving insulin first would drive K+ intracellularly causing dangerous hypokalaemia, and potassium should not be added until K+ falls below 5.5 mEq/L. Bicarbonate is controversial and reserved for pH < 6.9. Subcutaneous insulin is inadequate in DKA. IV regular insulin infusion (0.1 units/kg/hr) begins AFTER fluid resuscitation is underway." },
  { q:"Cerebral oedema is a recognised complication of DKA management. What is the recommended treatment?", opts:["IV potassium chloride and continued aggressive fluid resuscitation","Immediate discontinuation of all IV fluids and insulin","IV mannitol","IV sodium bicarbonate to rapidly correct acidosis","IV phenytoin for associated seizures"], ans:2, exp:"CEREBRAL OEDEMA occurs in the first 24 hours of DKA treatment, more commonly in children. It is thought to result from rapid osmotic shifts during fluid correction. Features: mental status deterioration, headache, bradycardia, and altered pupillary response during treatment. Treatment is IV MANNITOL (osmotic agent to reduce cerebral oedema), intubation with hyperventilation, and possibly neurosurgical review. Aggressive over-hydration is a risk factor, so fluids should be titrated carefully. Continuing or accelerating fluids would worsen the oedema. Bicarbonate does not treat cerebral oedema." },
