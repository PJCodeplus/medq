  { q:"Which of the following best distinguishes granuloma inguinale from other genital ulcer diseases?", opts:["Painful ulcer with tender inguinal lymphadenopathy","Painless ulcer with groove sign above the inguinal ligament","Painless, highly vascular ulcer without true inguinal lymphadenopathy","Painful bubo with spontaneous rupture in two-thirds of cases","Painless ulcer with indurated edges and spontaneous healing"], ans:2, exp:"Granuloma inguinale (donovanosis) presents as a painless, progressive, highly vascular ulcer with a beefy-red appearance that bleeds easily on contact. The critical distinguishing feature is the absence of true regional lymphadenopathy — a pseudobubo (subcutaneous granulomatous nodule) may occur but is not true lymph node enlargement. Groove sign and true lymphadenopathy point to LGV, not donovanosis." },
  { q:"Diagnosis of granuloma inguinale is confirmed by demonstrating which of the following?", opts:["Multinucleated giant keratinocytes on Tzanck smear","School-of-fish gram stain pattern","Gram-negative diplococci within neutrophils","Donovan bodies on lesional biopsy","T. pallidum on dark field microscopy"], ans:3, exp:"Donovan bodies — intracellular encapsulated organisms visible within macrophages on lesional biopsy — are pathognomonic for donovanosis. Each GUD has its signature diagnostic finding: multinucleated giant keratinocytes (HSV Tzanck smear), T. pallidum on dark field (syphilis), H. ducreyi on culture (chancroid definitive), Donovan bodies (donovanosis). Knowing these is a reliable source of exam questions." },
  { q:"Lymphogranuloma venereum (LGV) is caused by which serovars of Chlamydia trachomatis?", opts:["A, B, C","D, E, F","G, H, I","J, K","L1, L2, L3"], ans:4, exp:"LGV is caused by C. trachomatis serovars L1, L2, and L3. Serovars A–C cause trachoma (ocular disease); D–K cause non-LGV urogenital infections (the most common bacterial STI globally). The L serovars are uniquely invasive — they infect lymphoid tissue rather than just surface epithelium, explaining why LGV causes lymphadenopathy-dominant disease rather than a simple ulcer." },
  { q:"The groove sign in LGV is caused by which of the following?", opts:["Fusion of ipsilateral inguinal and femoral lymph nodes","Simultaneous enlargement of lymph nodes above and below the inguinal ligament","Fibrosis of the inguinal canal from chronic infection","Spontaneous rupture of a fluctuant inguinal bubo","Obliteration of pelvic lymphatics with retroperitoneal spread"], ans:1, exp:"The groove sign results from simultaneous enlargement of lymph nodes above and below the inguinal ligament (Poupart's ligament), which creates a groove along the ligament between the two swollen node groups. It is characteristic of LGV secondary stage (inguinal syndrome). The groove is the ligament itself between node masses — it is NOT caused by node fusion, which is a common misconception." },
  { q:"Esthiomene is a late complication of LGV characterized by which of the following?", opts:["Perirectal abscess with rectovaginal fistula","Elephantiasis of the female external genitalia","Scarring alopecia of the mons pubis","Bilateral inguinal fibrosis with lymph node calcification","Chronic scrotal lymphoedema in males"], ans:1, exp:"Esthiomene is massive lymphedematous swelling (elephantiasis) of the female external genitalia, occurring 1–20 years after LGV infection. It results from progressive fibrosis and obliteration of lymphatic drainage as the infection subsides. The anogenital syndrome (perirectal abscess, rectovaginal fistulas) is a separate late complication seen in patients who practiced receptive anal intercourse." },
  { q:"Which of the following correctly describes the primary genital lesion in LGV?", opts:["Painful indurated ulcer persisting for several weeks","Painless unindurated ulcer healing within a few days","Multiple painful vesicles on an erythematous base","A painless, highly vascular, beefy-red ulcer","A tender papule that does not progress to ulceration"], ans:1, exp:"The primary lesion of LGV is a painless, unindurated (soft) ulcer that heals spontaneously within a few days — it is transient and often unnoticed. The disease then spreads to regional lymphatics, producing the secondary stage (inguinal syndrome) which dominates the clinical picture. Many patients present only with lymphadenopathy because the primary ulcer has already resolved." },
  { q:"What is the recommended treatment for lymphogranuloma venereum?", opts:["Benzathine penicillin G 2.4 million units IM stat","Ciprofloxacin 500mg twice daily for 3 days","Ceftriaxone 250mg IM stat","Doxycycline 100mg twice daily for 7 days","Acyclovir 400mg three times daily for 7 days"], ans:3, exp:"Doxycycline 100mg BD for 7 days is the recommended treatment for LGV; azithromycin 1g stat is an alternative. Although azithromycin 1g stat also treats chancroid, LGV as an intracellular organism (Chlamydia) requires a full course — the single-dose option for LGV is azithromycin only because of its prolonged tissue half-life. Acyclovir is for HSV; benzathine penicillin is for syphilis." },
];

const DERM_SKIN_FAILURE_Qs = [
  { q:"Skin failure is defined as a life-threatening condition in which the skin loses its ability to perform its vital functions. Which of the following is NOT one of those functions?", opts:["Barrier protection","Thermoregulation","Haematopoiesis","Immune defense","Fluid balance"], ans:2, exp:"The vital functions of the skin are barrier protection, thermoregulation, immune defense, sensation, and fluid balance — all of which are impaired in skin failure. Haematopoiesis (blood cell production) occurs in the bone marrow, not the skin. When all five skin functions fail simultaneously, the result is life-threatening — analogous to the failure of any other vital organ." },
  { q:"Which of the following conditions is a recognized cause of skin failure?", opts:["Vitiligo","Erythroderma","Alopecia areata","Localized contact dermatitis","Melasma"], ans:1, exp:"Erythroderma (widespread erythema and scaling involving >90% of the body surface) is a recognized cause of skin failure, as are severe psoriasis, pemphigoid, toxic epidermal necrolysis, and extensive burns. Vitiligo, alopecia areata, and melasma are limited to specific skin functions (pigmentation, hair, colour) and do not cause systemic skin failure. Localized contact dermatitis is insufficient in extent." },
  { q:"In the initial management of a patient presenting with skin failure, which of the following is the most appropriate approach?", opts:["Immediate systemic immunosuppression","Empirical antifungal therapy","Topical corticosteroids to all affected areas","Fluid management and treatment of the underlying cause","Narrowband UVB phototherapy"], ans:3, exp:"The ABC approach applies: stabilize the patient first, correct fluid losses (skin failure causes massive transepidermal water loss similar to burns), and treat the underlying cause (e.g., IV antibiotics for sepsis, stopping the offending drug in drug-induced erythroderma). Jumping to immunosuppression or phototherapy before addressing fluids and the precipitant is both incorrect and potentially dangerous." },
];

const DERM_SKIN_LESIONS_Qs = [
  { q:"A lesion is flat, non-palpable, and measures 3mm in diameter, differing only in colour from surrounding skin. How is it classified?", opts:["Patch","Papule","Macule","Plaque","Vesicle"], ans:2, exp:"A macule is a flat, non-palpable lesion ≤5mm (≤0.5cm) that differs only in colour from surrounding skin — no change in texture or consistency. A patch is identical in character but >5mm. Freckles are classic macules. The distinction between macule and patch is purely one of size, which makes it a reliable exam question." },
  { q:"What is the sole distinguishing feature between a macule and a patch?", opts:["Macules are palpable; patches are not","Patches involve dermal change; macules are epidermal only","Patches are >5mm; macules are ≤5mm","Macules are transient; patches persist","Patches have a change in consistency; macules do not"], ans:2, exp:"Both macules and patches are flat, non-palpable, and differ only in colour from surrounding skin — no change in skin consistency. The only difference is size: macule ≤5mm, patch >5mm. Vitiligo is a classic patch; freckles are classic macules. Options involving palpability, depth, or consistency are wrong — those features would reclassify the lesion entirely." },
  { q:"A palpable, elevated lesion measuring 0.3cm in diameter is best classified as which of the following?", opts:["Macule","Papule","Nodule","Plaque","Vesicle"], ans:1, exp:"A papule is an elevated, palpable lesion <0.5cm (5mm) in diameter. The lesion described (0.3cm, elevated, palpable) fits this definition. Nodules are similar but extend into the dermis or subcutaneous tissue. Plaques are >0.5cm in diameter. Vesicles are fluid-filled. Macules are flat, not elevated. Some lesions of acne are classic papules." },
  { q:"Which of the following correctly defines a plaque?", opts:["A flat lesion >5mm with colour change only","A fluid-filled blister >5mm in diameter","A palpable lesion >0.5cm with a change in skin consistency","A firm lesion extending into the dermis or subcutaneous tissue","A transient, well-circumscribed, pruritic raised lesion"], ans:2, exp:"A plaque is a palpable lesion >0.5cm that is elevated or depressed compared to the surrounding skin surface, with a change in skin consistency. This distinguishes it from a patch (also >5mm but flat, no consistency change) and a nodule (firm, extends into dermis). Psoriasis is the classic example of plaques. The change in consistency — being able to feel the lesion — is what separates a plaque from a patch." },
  { q:"A nodule differs from a papule primarily in which of the following respects?", opts:["Nodules are fluid-filled; papules are solid","Nodules are transient; papules are persistent","Nodules extend into the dermis or subcutaneous tissue","Nodules are always larger than 2cm in diameter","Nodules are non-palpable; papules are palpable"], ans:2, exp:"Both nodules and papules are firm, palpable, elevated lesions. The key distinction is depth — nodules extend into the dermis or subcutaneous tissue, while papules are more superficial. Neurofibromatosis is a classic example of nodules. Size alone is not the defining criterion; a small but deep lesion is still a nodule. This depth concept explains why nodules are often firmer on palpation." },
  { q:"A fluid-filled blister measuring 8mm is best described as which of the following?", opts:["Vesicle","Pustule","Wheal","Bulla","Cyst"], ans:3, exp:"Vesicles are clear fluid-filled blisters ≤5mm (characteristic of herpes infections), while bullae are larger, >5mm — as in bullous pemphigoid. At 8mm, this is a bulla. A pustule is pus-filled, not clear fluid; a wheal is a transient pruritic elevation without a fluid cavity; a cyst is an encapsulated sac. The 5mm threshold separating vesicle from bulla is a standard exam value." },
  { q:"A patient develops pruritic, erythematous, raised lesions that appear and disappear within 2 hours. These are best classified as which of the following?", opts:["Papules","Vesicles","Bullae","Pustules","Wheals"], ans:4, exp:"Wheals are well-circumscribed, pruritic, erythematous papules or plaques that are characteristically transient — disappearing within minutes to hours. Urticaria is the classic clinical example. The transient nature is the defining feature that separates wheals from all other primary lesions. If the lesion persists beyond 24 hours, reconsider the diagnosis — a persistent urticarial-looking lesion may be urticarial vasculitis." },
  { q:"Scale, as a secondary skin lesion, is best defined as which of the following?", opts:["Dried serum or pus overlying damaged epidermis","Linear cleavage extending into the dermis","Excess dead epidermal cells from abnormal keratinization","Thinning of the skin with loss of normal markings","Loss of epidermis down to the basal layer"], ans:2, exp:"Scale is excess dead epidermal cells produced by abnormal keratinization — also called desquamation. Psoriasis is the classic example. The most common error is confusing scale with crust: crust forms from dried exudate (blood, serum, pus) over damaged skin, while scale is purely an epidermal turnover abnormality with no external fluid involved. Impetigo produces crust; psoriasis produces scale." },
  { q:"A crust forms when which of the following dries over an impaired epidermis?", opts:["Excess keratin and dead epidermal cells","Fibroblast-derived collagen","Fluid from a ruptured bulla only","Exudate composed of blood, serum, or pus","Melanin released from damaged melanocytes"], ans:3, exp:"Crust forms from dried exudate — which may be blood, serum, or pus — overlying damaged epidermis. Impetigo is the classic example (honey-coloured crust from dried serous/purulent exudate). Distinguishing crust from scale: scale is purely keratin/dead cells with no exudate; crust always has an exudate origin. Students frequently confuse the two — the composition is the giveaway." },
  { q:"Which of the following correctly distinguishes an ulcer from an erosion?", opts:["Erosions are always painful; ulcers are always painless","Erosions involve full-thickness skin loss; ulcers are superficial","Ulcers extend deeper than the epidermis into the dermis or beyond; erosions are limited to epidermal loss","Ulcers are primary lesions; erosions are secondary","Erosions heal with scarring; ulcers heal without scarring"], ans:2, exp:"An erosion involves loss of some or all of the epidermis (up to the basal layer), leaving a denuded surface — it does NOT breach the dermis. An ulcer is a complete deficiency of skin tissue extending into the dermis or deeper. Because ulcers reach the dermis, they heal with scarring; erosions typically do not. This depth distinction has direct implications for wound management and the likelihood of permanent scarring." },
  { q:"A hypertrophic scar differs from a keloid in which of the following ways?", opts:["Hypertrophic scars extend beyond the wound margins; keloids stay within them","Hypertrophic scars stay within the original wound margins; keloids extend beyond them","Hypertrophic scars contain type III collagen; keloids contain type I only","Keloids resolve spontaneously within one year; hypertrophic scars do not","Hypertrophic scars occur only after burns; keloids follow any wound"], ans:1, exp:"Hypertrophic scars (HTS) are thickened scars confined within the original wound margins, while keloids extend beyond the wound site into surrounding normal skin. This extension beyond wound boundaries is the defining feature of keloids and explains their higher recurrence rate after excision — simple excision often triggers a larger keloid. Both represent reactive dermal collagen proliferation, but their behaviour and management differ." },
  { q:"A fissure is best described as which of the following?", opts:["Thinning of the skin with loss of surface markings","Scratch marks from pruritus limited to the stratum corneum","Loss of epidermis to the basal layer in a circumscribed area","A linear crack in the skin that may extend into the dermis","Premature cell death from autolysis following vascular compromise"], ans:3, exp:"A fissure is a linear cleavage or crack in the skin, sometimes extending into the dermis. It commonly occurs on dry, thickened skin — the heels and fingertips are typical sites. When fissures bleed, they have extended into the dermis. It differs from excoriation (scratch marks from pruritus, stratum corneum) and erosion (epidermal loss without the linear pattern)." },
  { q:"If excoriation from pruritus is limited to the stratum corneum, what is the expected outcome upon healing?", opts:["Keloid formation","Permanent scar","Scaling","Ulcer formation","Crust formation"], ans:2, exp:"Excoriations limited to the stratum corneum heal with scaling. If the scratch extends into the dermis, fluid or blood exudes and healing may leave a scar. This depth-dependent healing pattern is clinically important — patients with chronic pruritic conditions who scratch repeatedly and deeply are at real risk of permanent scarring, a key point for patient education." },
  { q:"Skin atrophy is best defined as which of the following?", opts:["Excess proliferation of reactive dermal collagen","Premature death of epidermal cells from autolysis","Thinning of the skin, which may be epidermal, dermal, or both","Loss of epidermis down to the basal layer","Abnormal keratinization with excess dead epidermal cells"], ans:2, exp:"Skin atrophy is thinning of the skin — it may be epidermal (loss of surface markings), dermal (loss of collagen), or both. Long-term topical corticosteroid use is a classic cause. It is distinct from erosion (actual tissue loss, not just thinning) and from scale (epidermal cell excess, not thinning). Excess dermal collagen is the opposite — hypertrophic scar or keloid." },
  { q:"A cyst differs from a vesicle in which of the following key respects?", opts:["Cysts are always filled with pus; vesicles contain serous fluid","Vesicles are larger than cysts in most cases","Cysts extend into the subcutaneous tissue; vesicles are always epidermal","Cysts are encapsulated sac-like structures; vesicles are superficial fluid collections without a membrane","Vesicles resolve spontaneously; cysts require surgical excision"], ans:3, exp:"A cyst is a sac-like pocket of membranous tissue — an enclosed structure containing fluid, keratin, sebum, or other material. A vesicle is a superficial, clear fluid-filled blister ≤5mm, not enclosed in a membrane. Cysts can contain varied material depending on type (epidermal, sebaceous, ganglion, etc.). Both differ from pustules (pus-filled) and wheals (transient, no fluid collection)." },
];

const MALARIA_Qs = [
  {q:"A malaria parasite inoculated by a feeding Anopheles mosquito first invades which host tissue?",opts:["Red blood cells","Platelets","Hepatocytes","Lymph nodes","Splenic sinusoids"],ans:2,exp:"Sporozoites injected by the mosquito enter the bloodstream and, within minutes, invade HEPATOCYTES — the pre-erythrocytic (liver) phase. Over 7–10 days, sporozoites replicate asexually in hepatocytes forming hepatic schizonts; this phase is completely asymptomatic. Only after hepatic schizonts rupture do merozoites enter the bloodstream and invade RBCs (erythrocytic phase), triggering clinical illness. The spleen, lymph nodes, and platelets are not primary invasion targets during the liver phase."},
  {q:"The periodicity of fever in malaria directly results from:",opts:["Sporozoite replication in hepatocytes","Interval between consecutive mosquito bites","Synchronised rupture of erythrocytic schizonts releasing merozoites into the blood","Gametocyte maturation in peripheral blood","Hypnozoite activation in the liver"],ans:2,exp:"Fever is caused by the SYNCHRONISED RUPTURE of erythrocytic schizonts, releasing merozoites, hemozoin, and parasite products that trigger massive cytokine release (TNF-α, IL-1, IL-6) and prostaglandin production via COX-2 upregulation. The fever interval mirrors the erythrocytic cycle duration: 24h in P. knowlesi, 48h in P. falciparum/vivax/ovale, 72h in P. malariae. The liver phase and gametocyte maturation do not directly cause fever."},
  {q:"Which of the following correctly explains hemozoin's contribution to malarial anaemia?",opts:["Hemozoin directly haemolyses RBCs by inserting into the erythrocyte membrane","Hemozoin activates complement causing opsonisation of parasitised cells","Hemozoin induces apoptosis of developing erythroid precursors in the bone marrow","Hemozoin competitively inhibits erythropoietin receptor binding","Hemozoin causes splenic sequestration of mature erythrocytes"],ans:2,exp:"HEMOZOIN (malaria pigment) is produced during haemoglobin digestion by the parasite inside RBCs. Beyond triggering cytokine release via TLR-9 → COX-2 → fever, hemozoin has been specifically linked to APOPTOSIS of developing erythroid precursors in the bone marrow, impairing new RBC production. This central suppression contributes to malarial anaemia independently of haemolysis from schizont rupture. The complement, erythropoietin receptor, and splenic sequestration mechanisms are not the primary hemozoin-mediated pathways."},
  {q:"Hypnozoites in Plasmodium vivax and P. ovale are found in:",opts:["Peripheral blood erythrocytes","Hepatocytes of the human host","Salivary glands of the female Anopheles mosquito","Macrophages of the spleen","Intestinal epithelium of the mosquito"],ans:1,exp:"HYPNOZOITES are dormant liver-stage forms unique to P. VIVAX and P. OVALE. After hepatocyte invasion, some sporozoites become quiescent hypnozoites instead of undergoing schizogony. They persist in hepatocytes for weeks to months before reactivating to cause RELAPSE — recurrence of blood-stage infection from persisting liver stages after the initial parasitaemia has been cleared. This is why primaquine or tafenoquine (hypnozoitocidal drugs) are required for RADICAL CURE. P. falciparum and P. malariae do not form hypnozoites."},
  {q:"P. vivax is uncommon in West Africa primarily because:",opts:["The climate does not support efficient Anopheles gambiae breeding","P. falciparum competitively excludes P. vivax in co-infections","Most West Africans lack the Duffy antigen required for P. vivax RBC entry","Chloroquine resistance eliminates P. vivax before clinical illness develops","The dominant West African vector does not carry P. vivax sporozoites"],ans:2,exp:"P. vivax requires the DUFFY ANTIGEN (DARC — Duffy Antigen Receptor for Chemokines) on RBCs to gain entry via its merozoite surface protein (PvDBP). Most West Africans carry the Duffy-null phenotype (Fy^a^- Fy^b^-) and entirely lack this receptor, making their RBCs resistant to P. vivax invasion. This represents natural selection conferring population-level resistance. P. falciparum uses different invasion pathways (sialic acid-dependent) and is not affected by Duffy status — hence its dominance in West Africa."},
  {q:"A patient presents with fever recurring every 72 hours. Which Plasmodium species is responsible?",opts:["Plasmodium falciparum","Plasmodium vivax","Plasmodium ovale","Plasmodium malariae","Plasmodium knowlesi"],ans:3,exp:"P. MALARIAE has a 72-hour erythrocytic cycle, producing fever every fourth day — BENIGN QUARTAN malaria (counting includes both the fever day and the two intervening days). P. falciparum and P. vivax/ovale each have 48-hour cycles (tertian). P. knowlesi has a 24-hour cycle (quotidian — daily fever). P. malariae is also notable for causing membranoproliferative glomerulonephritis in children through immune complex deposition, and can persist as very low-level parasitaemia for decades."},
  {q:"Which Plasmodium species primarily infects non-human primates, causes a quotidian fever pattern, and is found only in forested areas of South-East Asia?",opts:["Plasmodium vivax","Plasmodium ovale wallickeri","Plasmodium malariae","Plasmodium knowlesi","Plasmodium falciparum"],ans:3,exp:"P. KNOWLESI is a zoonotic malaria parasite with natural hosts in macaque primates, transmitted by Anopheles latens/hackeri in forested areas of South-East Asia (particularly Malaysia and Borneo). It has a 24-hour erythrocytic cycle producing QUOTIDIAN (daily) fever — the fastest cycle of all Plasmodium species. Severe knowlesi malaria differs: hyperparasitaemia threshold is >100,000/µL, or jaundice with parasitaemia >20,000/µL. P. ovale is widespread in tropical Africa. P. falciparum predominates in sub-Saharan Africa."},
  {q:"Regarding malaria blood film microscopy, which statement is correct?",opts:["Thin films are more sensitive than thick films for detecting parasites","Thick films are preferred for species identification due to preserved cell morphology","Thick films are more sensitive for parasite detection but more difficult to read","A single negative blood smear excludes malaria in all symptomatic patients","Blood film results should be available within 6 hours of collection"],ans:2,exp:"THICK blood films concentrate more blood per microscopic field, making them MORE SENSITIVE for detecting low parasitaemia — but cell and parasite morphology is disrupted, making them harder to read. THIN blood films preserve morphology and are essential for SPECIES IDENTIFICATION. A single negative film does not exclude malaria; in non-immune individuals, smears should be repeated every 12–24 hours for THREE sets before ruling out malaria. Results must be available within 2 hours — not 6 hours."},
  {q:"A patient was treated for malaria 12 days ago and now re-presents with fever. Which diagnostic test is most appropriate?",opts:["PfHRP2-based rapid diagnostic test","pLDH-based rapid diagnostic test","Thick and thin blood film microscopy","Urine malaria test device","Serum anti-malarial antibody titre"],ans:2,exp:"MICROSCOPY is the preferred test in patients treated within the past TWO WEEKS. PfHRP2-based RDTs detect the HRP2 antigen, which persists in circulation for UP TO FIVE WEEKS after parasite clearance — causing false positives in recently treated patients. pLDH-based RDTs detect only viable parasites and turn negative faster, but the guideline specifically recommends microscopy over any RDT in recently treated patients. Microscopy also allows species identification, quantification, and differentiation of recrudescence from re-infection."},
  {q:"A PfHRP2-based rapid diagnostic test returns positive in an asymptomatic patient 5 weeks after malaria treatment. The most likely explanation is:",opts:["Asymptomatic P. vivax parasitaemia from hypnozoite reactivation","Residual circulating HRP2 antigen from the previously treated P. falciparum infection","Antibody cross-reactivity with other protozoal infections","Emergence of artemisinin-resistant P. falciparum","P. knowlesi co-infection acquired recently"],ans:1,exp:"PfHRP2 PERSISTS in plasma for UP TO FIVE WEEKS after successful treatment and parasite clearance, because the antigen outlasts the viable parasite. A positive PfHRP2-based RDT in an asymptomatic patient 5 weeks post-treatment almost certainly represents residual antigen, not active infection — a FALSE POSITIVE. This is a key limitation of this RDT type. pLDH-based tests require VIABLE parasites and avoid this problem. The correct approach in any recently treated patient is blood film microscopy for definitive diagnosis."},
  {q:"The dominant malaria vector in sub-Saharan Africa is:",opts:["Anopheles stephensi","Anopheles dirus","Anopheles gambiae complex","Anopheles minimus","Anopheles sundaicus"],ans:2,exp:"ANOPHELES GAMBIAE COMPLEX is the dominant vector species (DVS) in sub-Saharan Africa, responsible for intense P. falciparum transmission. This sibling species complex exhibits high anthropophily, adaptation to human-created breeding habitats (stagnant water), and indoor resting behaviour — characteristics that maximise vectorial efficiency. A. stephensi dominates in South Asia and the Arabian Peninsula. A. dirus and A. minimus are important South-East Asian vectors. Of 512 recognised Anopheles species, only ~50 are designated malaria vectors; A. gambiae complex accounts for the majority of African transmission."},
  {q:"The first-line treatment for uncomplicated malaria in Nigeria is:",opts:["Quinine plus doxycycline for 7 days","Chloroquine monotherapy","Artesunate-amodiaquine","Artemether-lumefantrine","Dihydroartemisinin-piperaquine"],ans:3,exp:"ARTEMETHER-LUMEFANTRINE (AL) is the combination of choice for uncomplicated malaria in Nigeria per the National Malaria Treatment Guideline. ACTs pair a rapidly-acting short-lived artemisinin derivative with a longer-acting partner drug — improving efficacy and preventing resistance. AL is given TWICE DAILY FOR 3 DAYS. Artesunate-amodiaquine is an alternative ACT. Chloroquine is no longer effective against P. falciparum in Nigeria due to widespread pfcrt/pfmdr1 mutations. Quinine + doxycycline is a second-line option, not first-line, and was previously used in first-trimester pregnancy."},
  {q:"An adult patient weighing 42 kg is to be treated with artemether-lumefantrine (20/120 mg tablets). The correct regimen is:",opts:["1 tablet twice daily for 3 days","2 tablets twice daily for 3 days","3 tablets twice daily for 3 days","4 tablets twice daily for 3 days","2 tablets once daily for 5 days"],ans:3,exp:"For patients weighing MORE THAN 35 KG, the AL regimen using 20/120mg tablets is 4 TABLETS TWICE DAILY FOR 3 DAYS. Weight-based dosing: 5–<15kg = 1 tab BD x3d; 15–<25kg = 2 tabs BD x3d; 25–<35kg = 3 tabs BD x3d; >35kg = 4 tabs BD x3d. Higher-strength formulations (40/240mg and 80/480mg) provide equivalent dosing with fewer tablets for >35kg patients — 2 tabs and 1 tab BD x3d respectively. AL tablets should be taken with food or a fatty drink to enhance lumefantrine absorption."},
  {q:"Which ACT is CONTRAINDICATED in the first trimester of pregnancy due to its antifolate component?",opts:["Artemether-lumefantrine","Artesunate-amodiaquine","Artesunate-sulfadoxine/pyrimethamine","Dihydroartemisinin-piperaquine","Artesunate-mefloquine"],ans:2,exp:"ARTESUNATE-SULFADOXINE/PYRIMETHAMINE (A-SP) is contraindicated in the first trimester because sulfadoxine-pyrimethamine is an ANTIFOLATE — folate antagonism during organogenesis (especially neural tube closure) is teratogenic. Antifolates are broadly contraindicated in the first trimester. Similarly, artesunate-pyronaridine is not recommended in the first trimester. WHO (2025 guidelines) now recommends ARTEMETHER-LUMEFANTRINE as safe and appropriate even in the first trimester, replacing the previous quinine-based approach. DHP and artesunate-mefloquine are used in the second and third trimesters."},
  {q:"The purpose of adding a single low dose of primaquine to an ACT for P. vivax in low-transmission areas is:",opts:["Treating concurrent P. falciparum infection","Preventing P. vivax relapse from hypnozoites","Reducing onward malaria transmission by eliminating gametocytes","Covering for chloroquine-resistant P. vivax strains","Improving artemisinin partner drug absorption"],ans:2,exp:"A SINGLE DOSE of primaquine 0.25 mg/kg added to ACT in low-transmission settings is specifically to eliminate GAMETOCYTES — the sexual stages that are taken up by mosquitoes during feeding — thereby REDUCING TRANSMISSION. This is distinct from the RADICAL CURE use of primaquine (14-day course) which targets HYPNOZOITES to prevent relapse. The low single dose causes minimal haemolysis even in G6PD-heterozygous individuals. G6PD status should still guide administration. This strategy helps interrupt the transmission cycle in low-endemicity settings."},
  {q:"Severe falciparum malaria in an adult is defined by impaired consciousness with a Glasgow Coma Score of:",opts:["Less than 15","Less than 13","Less than 11","Less than 8","Less than 5"],ans:2,exp:"The WHO criterion for impaired consciousness in severe falciparum malaria is a GCS LESS THAN 11 in adults. In CHILDREN, the equivalent is a Blantyre Coma Score LESS THAN 3. Cerebral malaria specifically requires coma persisting MORE THAN 30 MINUTES after a convulsion, to exclude post-ictal confusion. GCS <8 is the general anaesthetic threshold for airway protection but is NOT the defined cut-off for severe malaria. GCS <11 captures a broader group of patients with meaningful impairment who require urgent parenteral treatment."},
  {q:"The threshold blood glucose level defining severe hypoglycaemia in severe falciparum malaria is:",opts:["Less than 4.0 mmol/L","Less than 3.5 mmol/L","Less than 3.0 mmol/L","Less than 2.2 mmol/L (<40 mg/dL)","Less than 1.5 mmol/L"],ans:3,exp:"SEVERE HYPOGLYCAEMIA in severe malaria is defined as blood or plasma glucose LESS THAN 2.2 MMOL/L (<40 mg/dL). It is most dangerous because adrenergic signs may be absent in already-obtunded patients, making clinical diagnosis unreliable. It is most common in YOUNG CHILDREN and PREGNANT WOMEN. Quinine itself worsens hypoglycaemia by stimulating pancreatic insulin secretion — blood glucose monitoring is mandatory with quinine infusions. Treatment: children receive 0.5 ml/kg of 50% dextrose diluted to 10–15% IV; adults receive 25 ml of 50% dextrose IV."},
  {q:"Which serum creatinine value meets the WHO criterion for acute kidney injury in severe falciparum malaria?",opts:["Greater than 150 µmol/L","Greater than 177 µmol/L","Greater than 200 µmol/L","Greater than 265 µmol/L (3 mg/dL)","Greater than 350 µmol/L"],ans:3,exp:"The WHO criterion for AKI in severe falciparum malaria is serum creatinine >265 µmol/L (>3 mg/dL) OR blood urea >20 mmol/L. AKI occurs in up to 30% of non-immune adults with P. falciparum, driven by microvascular obstruction, haemoglobinuria, and reduced renal perfusion. Management: IV fluids if dehydrated (20 ml/kg NS), frusemide challenge 1–2 mg/kg IV, and if oliguria persists beyond 24 hours, referral for peritoneal or haemodialysis. Other severe malaria laboratory thresholds: bilirubin >50 µmol/L for jaundice, bicarbonate <15 mmol/L for acidosis."},
  {q:"Blackwater fever is characterised by dark 'Madeira wine-coloured' urine and is classically associated with use of:",opts:["Artemether","Lumefantrine","Quinine","Primaquine","Atovaquone"],ans:2,exp:"BLACKWATER FEVER is massive intravascular haemolysis causing haemoglobinaemia and HAEMOGLOBINURIA — the dark Madeira wine-coloured urine — and is classically associated with QUININE USE. The mechanism involves immune-mediated haemolysis triggered by quinine in the context of P. falciparum infection. Features include dark urine, haemolysis, anaemia, and haemozoinuria; jaundice and AKI may follow. Primaquine causes haemolysis in G6PD deficiency but is not the classic blackwater fever association. Artemisinins are not linked to blackwater fever."},
  {q:"In severe falciparum malaria, lactic acidosis is associated with a very poor prognosis when venous lactate reaches:",opts:["15 mg/dL (1.7 mmol/L)","25 mg/dL (2.8 mmol/L)","35 mg/dL (3.9 mmol/L)","45 mg/dL (5 mmol/L)","60 mg/dL (6.7 mmol/L)"],ans:3,exp:"A venous lactate of ≥45 MG/DL (approximately 5 MMOL/L) is associated with very poor prognosis in severe malaria. Lactic acidosis results from microvascular obstruction by P. falciparum-parasitised erythrocytes causing tissue hypoxia and anaerobic metabolism. Clinically it manifests as RESPIRATORY DISTRESS — deep, rapid, laboured breathing (Kussmaul breathing) as the body compensates by excreting CO₂. The acidosis criterion for severe malaria is a base deficit >8 meq/L, HCO₃ <15 mmol/L, or lactate >5 mmol/L. Management requires parenteral artesunate plus correction of hypovolaemia and hypoglycaemia."},
  {q:"In an adult patient with severe malaria and convulsions that persist after initial management, which drug is given first?",opts:["Intravenous phenobarbitone 15 mg/kg","Intravenous diazepam 10 mg","Rectal diazepam 0.5 mg/kg","Intramuscular paraldehyde 0.1 ml/kg","Intravenous sodium valproate 400 mg"],ans:1,exp:"In ADULTS with malaria-related convulsions, the first-line anticonvulsant is IV DIAZEPAM 10 MG after ensuring airway patency and correcting hypoglycaemia. For CHILDREN, the equivalent first-line options are RECTAL DIAZEPAM 0.5 mg/kg or IM PARALDEHYDE 0.1 ml/kg; if convulsions persist, IM PHENOBARBITONE 10–15 mg/kg is given next. Rectal diazepam and paraldehyde are paediatric options. If a seizure does not resolve within 30 minutes, cerebral malaria should be suspected. IV phenobarbitone is not the first-choice anticonvulsant in adults per the guideline."},
  {q:"What is the recommended IV artesunate dose for severe malaria in a 70 kg adult?",opts:["1.2 mg/kg at 0, 12, and 24 hours then daily","1.6 mg/kg at 0, 12, and 24 hours then daily","2.4 mg/kg at 0, 12, and 24 hours then daily","3.0 mg/kg at 0, 12, and 24 hours then daily","3.2 mg/kg loading then 1.6 mg/kg daily"],ans:2,exp:"For ADULTS and CHILDREN ≥20 kg, IV or IM artesunate is given at 2.4 MG/KG BODY WEIGHT at admission (T=0), then at 12 hours, then at 24 hours, then ONCE DAILY. For children <20 kg, the dose is 3 mg/kg to ensure adequate exposure. There is NO upper limit to the total artesunate dose. The 3.2 mg/kg loading then 1.6 mg/kg daily schedule is for IM ARTEMETHER (used only when artesunate is unavailable). Parenteral therapy must continue for a MINIMUM OF 24 HOURS regardless of early clinical improvement."},
  {q:"After 24 hours of parenteral artesunate for severe malaria, the patient tolerates oral medication. What should follow?",opts:["Continue parenteral artesunate for 5 days total","Oral quinine monotherapy for 7 days","Complete a full 3-day course of a recommended oral ACT","Give primaquine 0.5 mg/kg/day for 14 days","Switch to chloroquine based on species identification"],ans:2,exp:"Once a patient has received AT LEAST 24 HOURS of parenteral artesunate and can tolerate oral therapy, treatment should be completed with a FULL 3-DAY COURSE of a recommended oral ACT. The step-down strategy ensures complete parasite clearance while minimising time on IV therapy. The oral ACT used follows the same recommendations as for uncomplicated malaria. Mefloquine-containing ACTs should be AVOIDED in post-cerebral malaria patients due to heightened neuropsychiatric risk. Primaquine for radical cure applies only to P. vivax/P. ovale."},
  {q:"Which ACT should be specifically avoided when completing oral treatment after cerebral malaria?",opts:["Artemether-lumefantrine","Artesunate-amodiaquine","Artesunate-mefloquine","Dihydroartemisinin-piperaquine","Artesunate-sulfadoxine/pyrimethamine"],ans:2,exp:"ARTESUNATE-MEFLOQUINE should be avoided after cerebral malaria because MEFLOQUINE causes NEUROPSYCHIATRIC adverse effects — seizures, encephalopathy, anxiety, hallucinations, and psychosis — which are substantially amplified in patients whose brain has already been insulted by cerebral malaria. Mefloquine is also contraindicated in patients with pre-existing seizure disorders or neuropsychiatric illness. The preferred choices for completing treatment are artemether-lumefantrine or artesunate-amodiaquine. Mefloquine should also be avoided in the prophylaxis of patients with neuropsychiatric or cardiac conduction disorders."},
  {q:"Management of pulmonary oedema complicating severe falciparum malaria includes:",opts:["Supine positioning, IV morphine, and increased maintenance fluids","Sitting upright at 45°, oxygen, IV frusemide, and stopping intravenous fluids","Prone positioning, CPAP, and high-volume crystalloid resuscitation","Head-down tilt, nebulised salbutamol, and packed cell transfusion","Supine positioning, digoxin, and forced diuresis with mannitol"],ans:1,exp:"Non-cardiogenic pulmonary oedema in severe malaria (analogous to ARDS) is managed with: PATIENT PROPPED AT 45 DEGREES (upright position reduces venous return), SUPPLEMENTAL OXYGEN, IV FRUSEMIDE 2–4 mg/kg, and STOPPING IV fluids to prevent fluid overload worsening the oedema. This complication carries 80% mortality, is most common in pregnant women, and requires urgent management. Supine positioning worsens the condition. High-volume IV fluids are contraindicated. CPAP may be used in selected cases but is not the first-line measure listed. Digoxin is not indicated in non-cardiogenic pulmonary oedema."},
  {q:"IPTp-SP should be initiated at which gestational age?",opts:["Week 6 (first trimester, as early as possible)","Week 10 of pregnancy","Week 13 (start of second trimester)","Week 20 of pregnancy","Week 28 (third trimester)"],ans:2,exp:"IPTp-SP starts as early as possible in the SECOND TRIMESTER but NOT BEFORE WEEK 13. This timing avoids the period of active organogenesis in the first trimester when SP (an antifolate) carries teratogenic risk. Doses must be AT LEAST ONE MONTH APART, with the goal of achieving AT LEAST THREE DOSES during pregnancy. SP is given as directly observed therapy. IPTp-SP significantly reduces malarial illness, severe anaemia, and adverse birth outcomes (low birth weight, prematurity) regardless of whether the woman has symptoms at the time of the visit."},
  {q:"Seasonal malaria chemoprevention (SMC) uses which drug combination in children under 5?",opts:["Primaquine plus chloroquine monthly","Artemether-lumefantrine monthly","Sulfadoxine-pyrimethamine plus amodiaquine monthly","Atovaquone-proguanil monthly","Mefloquine plus doxycycline monthly"],ans:2,exp:"SMC uses monthly cycles of SULFADOXINE-PYRIMETHAMINE PLUS AMODIAQUINE (SP+AQ) in children under 5 during the transmission season. In Nigeria, SMC is deployed in northern states with defined seasonal malaria transmission: Kebbi, Sokoto, Zamfara, Katsina, Kano, Jigawa, Bauchi, Yobe, and Borno. SP+AQ is given together to provide synergistic protection throughout the season — typically 3–4 monthly cycles. This is distinct from IPTp (pregnant women) and PMC/IPTi (infants in perennial areas). SMC has been shown to reduce clinical malaria episodes substantially in the target population."},
  {q:"Which malaria vaccine was first recommended by WHO for broad use in sub-Saharan African children and was integrated into Nigeria's National Immunization Schedule in December 2024?",opts:["R21/Matrix-M (Oxford–Serum Institute)","PfSPZ (Sanaria whole-sporozoite)","BioNTech mRNA malaria vaccine","RTS,S/AS01 (Mosquirix)","ME-TRAP"],ans:3,exp:"RTS,S/AS01 (MOSQUIRIX) was the first malaria vaccine recommended by WHO (October 2021) for broad use in sub-Saharan African children in moderate-to-high P. falciparum transmission areas. It was integrated into Nigeria's National Immunization Schedule in DECEMBER 2024, initially in KEBBI and BAYELSA states (high malaria burden), targeting children under one year. It is given in a FOUR-DOSE schedule from 5 months of age; a FIFTH dose may be given in highly seasonal areas. R21/Matrix-M received WHO recommendation in 2023 and is the second approved vaccine. Both provide partial protection and are most effective when combined with other control interventions."},
  {q:"Which antimalarial drug class is specifically contraindicated in G6PD deficiency due to risk of haemolytic anaemia?",opts:["4-aminoquinolines (chloroquine, amodiaquine)","Amino alcohols (quinine, mefloquine)","8-aminoquinolines (primaquine, tafenoquine)","Endoperoxides (artesunate, artemether)","Naphthoquinones (atovaquone)"],ans:2,exp:"8-AMINOQUINOLINES — PRIMAQUINE and TAFENOQUINE — are contraindicated in G6PD DEFICIENCY. These oxidant drugs generate reactive oxygen species that overwhelm the reduced NADPH reserves in G6PD-deficient RBCs, causing haemolysis. G6PD status must always be assessed before prescribing these drugs, especially for radical cure (14-day primaquine) or relapse prevention (single-dose tafenoquine). The 4-aminoquinolines, artemisinins, and atovaquone do not carry this specific risk. Halofantrine (amino alcohol) is contraindicated in long QTc and pregnancy, not G6PD deficiency."},
  {q:"Artemisinin resistance in Plasmodium falciparum is mediated by mutations in which molecular target?",opts:["pfcrt gene (chloroquine resistance transporter)","pfdhfr gene (dihydrofolate reductase)","pfmdr1 gene (multi-drug resistance protein)","Kelch 13 (K13) protein","cytb gene (cytochrome b)"],ans:3,exp:"Resistance to artemisinin derivatives is associated with POLYMORPHISMS IN THE KELCH 13 (K13) PROTEIN (pfkelch13 gene). K13 mutations — particularly C580Y in the Greater Mekong Subregion and R561H in Africa — cause PARTIAL ARTEMISININ RESISTANCE characterised by delayed parasite clearance (slow clearance syndrome). In Nigeria, there is currently NO EVIDENCE of established artemisinin resistance, but partial resistance has been documented in Eritrea, Rwanda, and Uganda. pfcrt/pfmdr1 mutations mediate chloroquine resistance; pfdhfr mediates pyrimethamine resistance; cytb mutations mediate atovaquone resistance."},
  {q:"Mefloquine is specifically contraindicated in patients with a history of:",opts:["G6PD deficiency","Sulfonamide allergy","Impaired glucose tolerance","Seizure disorder or neuropsychiatric illness","Chronic kidney disease stage 3"],ans:3,exp:"MEFLOQUINE (an amino alcohol quinoline) is contraindicated in patients with SEIZURE DISORDERS or NEUROPSYCHIATRIC ILLNESS because it causes serious neuropsychiatric adverse effects — anxiety, paranoia, vivid dreams, hallucinations, psychosis, and seizures — even at standard therapeutic doses. These risks are substantially amplified in individuals with pre-existing neurological or psychiatric conditions. This is also why mefloquine-containing ACTs are avoided after cerebral malaria. Halofantrine is contraindicated in long QTc and pregnancy. G6PD deficiency is the key contraindication for 8-aminoquinolines (primaquine, tafenoquine)."},
  {q:"Which antimalarial has the longest half-life, accounting for its suitability for once-weekly dosing?",opts:["Artesunate (0.5–1.4 hours)","Quinine (10–12 hours)","Lumefantrine (3–6 days)","Mefloquine (14–18 days)","Chloroquine (41±14 days)"],ans:4,exp:"CHLOROQUINE has the longest half-life of all antimalarials at approximately 41±14 DAYS (~6 weeks), due to its extensive distribution into tissues (particularly liver) with slow release — explaining once-weekly prophylaxis dosing. MEFLOQUINE has a half-life of 14–18 days, also very long, supporting once-weekly dosing. ARTESUNATE has a very short half-life of 0.5–1.4 hours — this is why artemisinin derivatives must be combined with longer-acting partner drugs in ACTs, as artesunate alone would leave a large residual parasite burden. Quinine is 10–12 hours; lumefantrine is 3–6 days."},
  {q:"Atovaquone-proguanil (Malarone) chemoprophylaxis for a traveller to Nigeria should be started and continued for how long after departure?",opts:["2 weeks before and 4 weeks after departure","1 day before and for 4 weeks after departure","1–2 days before and 7 days after departure","4 weeks before and stopped on departure day","2 weeks before and 2 weeks after departure"],ans:2,exp:"ATOVAQUONE-PROGUANIL should be started 1–2 DAYS BEFORE travel and continued for only 7 DAYS AFTER LEAVING the malarious area. This shorter post-travel duration (compared to mefloquine's 4 weeks and doxycycline's 4 weeks) makes compliance better and is preferred for short trips. It is contraindicated in pregnancy, breastfeeding, children <5 kg weight, and severe kidney disease. Mefloquine requires 1–2 weeks before and 4 weeks after; doxycycline requires 1–2 days before and 4 weeks after. Doses should be taken consistently at the same time each day."},
  {q:"A 30-year-old woman who is HIV-positive and on efavirenz-based ART develops uncomplicated P. falciparum malaria. Which ACT should be AVOIDED?",opts:["Artemether-lumefantrine","Dihydroartemisinin-piperaquine","Artesunate-amodiaquine","Artesunate-mefloquine","Artesunate-pyronaridine"],ans:2,exp:"ARTESUNATE-AMODIAQUINE should be AVOIDED in patients on EFAVIRENZ or ZIDOVUDINE. Amodiaquine is metabolised by CYP2C8 — efavirenz is a potent CYP inducer that reduces amodiaquine levels, risking treatment failure. Additionally, both amodiaquine and zidovudine can cause overlapping haematological toxicity (neutropenia, agranulocytosis). Separately, artesunate-SP is not recommended if the patient is on co-trimoxazole (overlapping antifolate mechanism + increased toxicity). Artemether-lumefantrine remains the preferred ACT in most HIV patients on ART. Always review drug-drug interactions before prescribing ACTs in patients on antiretrovirals."},
  {q:"Recrudescence differs from relapse in malaria in that recrudescence:",opts:["Arises from hypnozoites reactivating in the liver weeks to months after treatment","Occurs only in P. vivax and P. ovale infections","Is a recurrence of the same parasite genotype from incomplete blood-stage clearance after treatment","Represents a new infection with a different Plasmodium strain","Is prevented by adding primaquine to an ACT"],ans:2,exp:"RECRUDESCENCE is recurrence of asexual parasitaemia of the SAME GENOTYPE after treatment — caused by INCOMPLETE CLEARANCE of blood-stage parasites due to inadequate dosing, poor compliance, drug resistance, or impaired absorption. It is a treatment FAILURE, distinguishable from re-infection (new genotype, usually by molecular typing). RELAPSE is different — it is specific to P. VIVAX and P. OVALE, arising from reactivation of HYPNOZOITES in the liver after the blood-stage infection has been cleared. Primaquine prevents relapse by eliminating hypnozoites; it does not prevent recrudescence, which requires effective blood-stage treatment."},
  {q:"A 25-year-old woman returns to Lagos after living in the UK for 3 years. She develops fever after visiting her family in Kebbi. Blood film shows P. vivax; she is from a chloroquine-susceptible area. What is the most complete treatment?",opts:["Artemether-lumefantrine only for 3 days","Chloroquine 3 days only","ACT or chloroquine, plus primaquine or tafenoquine after G6PD testing","Quinine plus doxycycline for 7 days","Artesunate-mefloquine for 3 days"],ans:2,exp:"For uncomplicated P. vivax in chloroquine-SUSCEPTIBLE areas, blood-stage treatment is with either ACT or CHLOROQUINE. However, to achieve RADICAL CURE and prevent RELAPSE, primaquine or tafenoquine must also be given — but only AFTER CHECKING G6PD STATUS to avoid haemolytic anaemia. G6PD non-deficient patients can receive primaquine 0.5 mg/kg/day for 14 days (or 1 mg/kg/day for 7 days in those with >70% G6PD activity). Single-dose tafenoquine is an alternative in patients ≥2 years with ≥70% G6PD activity. This patient is non-immune (returning from UK) and at high risk of relapse if radical cure is omitted."},
  {q:"Which of the following individuals is at highest risk of severe malaria?",opts:["A 28-year-old male farmer in a holo-endemic area of Borno","A 15-year-old student in a holo-endemic area of Rivers State","A 40-year-old woman who underwent splenectomy 2 years ago","A 60-year-old male hypertensive on amlodipine in Abuja","A 22-year-old woman in her third trimester in a hypo-endemic area"],ans:2,exp:"SPLENECTOMY removes a critical organ for filtering parasitised RBCs and mounting anti-malarial immunity, making asplenic patients at very high risk of overwhelming parasitaemia and severe disease. Other high-risk groups include: children <5 years, pregnant women (especially first and second pregnancies), people with sickle cell disease, non-immune visitors returning to endemic areas, and the immunocompromised. Adults living in holo-endemic areas typically have acquired partial immunity from repeated exposure. The third-trimester woman has risk from immunological changes of pregnancy, but splenectomy represents the most categorical high-risk status among these options."},
  {q:"For chemoprophylaxis in a patient with sickle cell anaemia in Nigeria, the current recommended drug is:",opts:["Monthly artesunate-amodiaquine during the rainy season","Daily proguanil with consistent use of long-lasting insecticidal nets","Weekly chloroquine throughout the year","IPTp-SP every 4 weeks","Daily doxycycline year-round"],ans:1,exp:"Current practice for SICKLE CELL ANAEMIA (SCA) patients in Nigeria is daily PROGUANIL combined with LONG-LASTING INSECTICIDAL NETS (LLINs). Proguanil is well-tolerated, lacks significant haematological toxicity relevant to SCA, and is appropriate for long-term prophylaxis. However, the evidence specifically supporting proguanil as the optimal choice in SCA is described as EQUIVOCAL — other strategies are being evaluated. SCA patients with suspected malaria should seek prompt parasitological diagnosis and treatment. IPTp-SP is exclusively for pregnant women. Weekly chloroquine is used in chloroquine-susceptible areas but P. falciparum in Nigeria is largely chloroquine-resistant."},
  {q:"Which of the following is NOT a recognised cause of antimalarial treatment failure?",opts:["Inadequate drug dosing","Poor patient compliance with the treatment course","Sickle cell trait (HbAS)","Drug resistance in the parasite","Poor drug quality or degraded medicines"],ans:2,exp:"SICKLE CELL TRAIT (HbAS) is NOT a cause of antimalarial treatment failure — in fact, it confers relative PROTECTION against P. falciparum by reducing intracellular parasite growth and parasitaemia. Recognised causes of treatment failure include: inadequate dosing, poor compliance, poor drug quality (degraded or counterfeit), compromised absorption (persistent vomiting, malabsorption), drug-drug interactions, incorrect diagnosis, and true drug RESISTANCE. Sickle cell DISEASE (HbSS) increases risk of severe malaria, but does not impair drug efficacy. Misdiagnosis (treating a non-malaria febrile illness as malaria) is also an important cause of 'treatment failure'."},
  {q:"A 32-year-old woman is in her 32nd week of pregnancy with confirmed uncomplicated P. falciparum malaria. The appropriate treatment is:",opts:["Quinine plus clindamycin for 7 days","Artemether-lumefantrine twice daily for 3 days","Artesunate-sulfadoxine/pyrimethamine for 3 days","Defer treatment until delivery to avoid fetal exposure","Chloroquine monotherapy for 3 days"],ans:1,exp:"In the SECOND AND THIRD TRIMESTERS, pregnant women receive recommended ACTs — ARTEMETHER-LUMEFANTRINE is safe and appropriate. The WHO 2025 guideline now recommends AL even in the first trimester, replacing the previous approach of quinine + clindamycin in early pregnancy. A-SP is NOT recommended in the first trimester due to antifolate teratogenicity. Deferring treatment is dangerous — untreated malaria in pregnancy causes maternal anaemia, placental sequestration, premature delivery, low birth weight, and fetal death. Chloroquine monotherapy is ineffective against P. falciparum in Nigeria due to widespread resistance."},
  {q:"Malaria endemicity based on splenomegaly prevalence in children aged 2–9 years is classified as holo-endemic when splenomegaly prevalence is:",opts:["Below 11%","Between 11% and 50%","Between 51% and 75%","Above 75%","Exactly 50%"],ans:3,exp:"Malariometric endemicity classifications based on SPLEEN RATE (SR) in children aged 2–9 years: HYPO-endemic: SR <11%; MESO-endemic: SR 11–50%; HYPER-endemic: SR 51–75%; HOLO-endemic: SR >75%. Holo-endemic areas have intense perennial transmission where virtually all children have been exposed. In such areas, children and pregnant women bear the highest burden. Nigeria's northern states with seasonal transmission tend towards meso/hyper-endemic, while parts of southern Nigeria with year-round transmission approach holo-endemic classification. The spleen enlarges as a haematological response to repeated haemolysis and immune stimulation from malaria infection."}
];

const SLE_Qs = [
  {q:"Systemic lupus erythematosus (SLE) is best defined as:",opts:["A bacterial infection causing multisystem granuloma formation","An autoimmune disorder with antibodies to nuclear and cytoplasmic antigens, multisystem inflammation, and a relapsing-remitting course","A vasculitis confined to medium-sized arteries with immune complex deposition","A hereditary complement deficiency causing recurrent bacterial infections","A drug-induced hypersensitivity reaction mediated by type IV immune mechanisms"],ans:1,exp:"SLE is an AUTOIMMUNE DISORDER characterised by the production of antibodies against NUCLEAR AND CYTOPLASMIC ANTIGENS, causing MULTISYSTEM INFLAMMATION with a characteristic RELAPSING AND REMITTING course. More than 90% of cases occur in WOMEN, frequently starting at childbearing age — this female predominance is one of the strongest sex differences in any autoimmune disease. The aetiology involves multiple genetic predispositions and gene-environment interactions, explaining the variable clinical manifestations. It is not a granulomatous, infectious, or single-gene disorder."},
  {q:"Which demographic group bears the highest burden of SLE?",opts:["Elderly men over 65 years","Prepubertal children of either sex","Women of childbearing age","Men aged 30–50 years","Postmenopausal women"],ans:2,exp:"More than 90% of SLE cases occur in WOMEN, predominantly during the CHILDBEARING YEARS — typically between the ages of 15 and 45. This strongly implicates oestrogen and sex hormones in disease pathogenesis or modulation. The female-to-male ratio is approximately 9:1 during reproductive years, narrowing to 2:1 in childhood and after menopause. This clinical fact is not just epidemiology — it informs monitoring recommendations (e.g., contraception, pregnancy planning, monitoring for disease flares during pregnancy) and pathophysiological understanding."},
  {q:"Which of the following is a recognised skin manifestation of SLE?",opts:["Erythema nodosum","Pyoderma gangrenosum","Malar (butterfly) rash","Livedo reticularis alone","Leukocytoclastic vasculitis only"],ans:2,exp:"The MALAR (BUTTERFLY) RASH is one of the most characteristic skin features of SLE — a fixed erythematous rash over the cheeks and nasal bridge sparing the nasolabial folds. Other skin manifestations include DISCOID RASH (scarring, hyperpigmentation, follicular plugging) and PHOTOSENSITIVE RASH (exacerbated by UV light). The skin findings are captured in the 'R' (Rash) component of the diagnostic mnemonic. Erythema nodosum suggests sarcoidosis or streptococcal infection. Pyoderma gangrenosum is associated with IBD. Livedo reticularis can occur in SLE (especially with antiphospholipid syndrome) but is not among the defining rashes."},
  {q:"The arthritis of SLE is characteristically:",opts:["Erosive and deforming with pannus formation on X-ray","Monoarticular affecting large joints only","Non-erosive and typically does not cause joint destruction","Septic with purulent joint aspirate","Associated with sacroiliitis and HLA-B27 positivity"],ans:2,exp:"The ARTHRITIS of SLE is characteristically NON-EROSIVE — it causes pain, swelling, and synovitis but does NOT produce the joint destruction, erosions, or pannus formation seen in rheumatoid arthritis. This is an important distinguishing feature. It can affect multiple joints (oligo- or polyarticular), is often migratory, and may cause Jaccoud's arthropathy (reducible deformities from capsular/tendon laxity, not bone erosion). Erosive, deforming arthritis with pannus = rheumatoid arthritis. Septic arthritis has systemic sepsis features and positive joint culture. Sacroiliitis + HLA-B27 = seronegative spondyloarthropathy (e.g. ankylosing spondylitis)."},
  {q:"Which antibody is most SPECIFIC for SLE?",opts:["Anti-nuclear antibody (ANA)","Anti-double-stranded DNA (anti-dsDNA)","Anti-histone antibody","Anti-Ro/SS-A antibody","Rheumatoid factor"],ans:1,exp:"ANTI-dsDNA is the most SPECIFIC antibody for SLE — it is positive in ~70% of SLE patients but rarely found in other conditions, making it diagnostically valuable. ANA is highly SENSITIVE (positive in >95% of SLE) but not specific — it is positive in many other conditions (Sjögren's, systemic sclerosis, RA, and even normal individuals). ANTI-HISTONE antibodies are associated with DRUG-INDUCED LUPUS (not idiopathic SLE). ANTI-Ro/SS-A antibodies are associated with NEONATAL LUPUS and congenital heart block (in babies born to anti-Ro-positive mothers), as well as subacute cutaneous lupus. Anti-dsDNA titres also correlate with SLE disease activity."},
  {q:"Which antibody is associated with drug-induced lupus?",opts:["Anti-double-stranded DNA (anti-dsDNA)","Anti-Sm (anti-Smith)","Anti-histone","Anti-ribosomal P","Anti-Ro/SS-A"],ans:2,exp:"ANTI-HISTONE antibodies are the serological hallmark of DRUG-INDUCED LUPUS (DIL). DIL is caused by various drugs — classically hydralazine, procainamide, isoniazid, methyldopa, and quinidine — which induce an SLE-like syndrome. Anti-dsDNA is characteristic of IDIOPATHIC SLE. Anti-Sm (Smith) is highly specific for SLE but less sensitive. Anti-ribosomal P antibodies are associated with neuropsychiatric SLE and lupus psychosis. Anti-Ro/SS-A is associated with neonatal lupus and congenital heart block, Sjögren's syndrome, and subacute cutaneous lupus. DIL typically resolves when the causative drug is withdrawn."},
  {q:"A pregnant woman with SLE has anti-Ro/SS-A antibodies. The most important fetal complication to monitor for is:",opts:["Intrauterine growth restriction from placental thrombosis","Congenital neonatal lupus with complete heart block","Neonatal thrombocytopenia from anti-platelet antibodies","Fetal hydrops from immune haemolytic anaemia","Congenital nephrotic syndrome from immune complex deposition"],ans:1,exp:"Anti-Ro/SS-A (and anti-La/SS-B) antibodies cross the placenta and can cause NEONATAL LUPUS — including CONGENITAL HEART BLOCK, the most serious complication. Anti-Ro antibodies bind to cardiac conduction tissue in the developing fetus, causing permanent AV block (typically third degree) which may require pacemaker implantation after birth. Fetal echocardiography monitoring is recommended in all anti-Ro-positive pregnancies from 16–24 weeks. The skin manifestations of neonatal lupus (discoid rash) typically resolve as maternal antibodies clear. Neonatal lupus heart block is distinct from SLE-related adult cardiac involvement."},
  {q:"The seronegative anti-nuclear antibody (ANA) result makes SLE:",opts:["Highly likely if anti-dsDNA is also positive","Definitively ruled out regardless of clinical features","Unlikely but not impossible, as ANA negativity occurs in a small minority of SLE patients","Only possible if anti-Sm is positive","Consistent with drug-induced lupus specifically"],ans:2,exp:"ANA is the most SENSITIVE screening test for SLE, positive in >95% of patients. A NEGATIVE ANA makes SLE UNLIKELY — but does NOT exclude it entirely, as a small minority (<5%) of SLE patients are ANA-negative. In practice, ANA negativity in a patient with typical clinical features of SLE should prompt testing for anti-Ro antibodies (ANA-negative lupus is often Ro-positive), and the diagnosis may still be made on clinical and other serological grounds. ANA alone is not specific — many rheumatological conditions and even healthy individuals may be weakly ANA-positive. The combination of clinical features + serology guides diagnosis."},
  {q:"Which investigation is most useful for monitoring SLE disease activity?",opts:["Anti-nuclear antibody (ANA) titre","Erythrocyte sedimentation rate alone","Anti-double-stranded DNA (anti-dsDNA) titre and complement levels (C3, C4)","Full blood count showing lymphocyte count","Rheumatoid factor titre"],ans:2,exp:"ANTI-dsDNA TITRES and COMPLEMENT LEVELS (C3 and C4) are the most clinically useful markers of SLE disease activity. Rising anti-dsDNA titres and falling complement levels (consumed by immune complex formation — low C3, low C4) typically precede or accompany disease flares, particularly lupus nephritis. This combination is used to monitor therapy and anticipate flares. ANA titres do not correlate well with disease activity — ANA can remain positive even in remission. ESR is non-specific. Rheumatoid factor is not a SLE activity marker. Full blood count findings (cytopenias) reflect disease but are less predictive than anti-dsDNA/complement."},
  {q:"Which of the following drugs is used in the long-term management of SLE as a disease-modifying agent with anti-inflammatory and antimalarial properties?",opts:["Rituximab","Methotrexate","Hydroxychloroquine","High-dose prednisolone","Mycophenolate mofetil"],ans:2,exp:"HYDROXYCHLOROQUINE (an antimalarial) is a cornerstone of SLE management — used as a DISEASE-MODIFYING agent in virtually all SLE patients regardless of disease severity. Its benefits include reducing flare frequency, preventing organ damage, improving survival, reducing cardiovascular risk, and reducing risk of thrombosis (important in antiphospholipid syndrome-associated SLE). It also has a safety profile suitable for long-term use, including in pregnancy. RITUXIMAB (anti-CD20, depletes B cells) is a biologic reserved for refractory SLE. High-dose prednisolone/pulse methylprednisolone is used for acute severe flares, not long-term management. Mycophenolate is used for lupus nephritis."},
  {q:"Rituximab, used in refractory SLE, works by:",opts:["Blocking TNF-alpha to reduce systemic inflammation","Inhibiting T-cell co-stimulation via CTLA-4 pathway","Depleting CD20-positive B cells, reducing autoantibody production","Blocking the IL-6 receptor to prevent cytokine storm","Inhibiting JAK-STAT signalling to reduce interferon response"],ans:2,exp:"RITUXIMAB is a monoclonal antibody that targets CD20 — a surface antigen expressed on B cells (from pro-B cells to mature B cells, but not plasma cells). By depleting CD20-POSITIVE B CELLS, rituximab reduces the production of autoantibodies (anti-dsDNA, anti-Sm) that drive SLE pathogenesis. It is used in REFRACTORY SLE — cases not responding to standard immunosuppression (hydroxychloroquine, steroids, mycophenolate, azathioprine). Infliximab/adalimumab block TNF-α (used in RA). Abatacept targets CTLA-4 (T-cell co-stimulation). Tocilizumab blocks IL-6. Baricitinib/tofacitinib inhibit JAK-STAT."},
  {q:"Serositis as a manifestation of SLE includes:",opts:["Endocarditis with vegetations on cardiac valves","Peritoneal dialysis membrane fibrosis","Pleuritis or pericarditis causing pleuritic chest pain","Granulomatous hepatitis with elevated liver enzymes","Oesophageal dysmotility from smooth muscle involvement"],ans:2,exp:"SEROSITIS in SLE refers to inflammation of the serous membranes — specifically PLEURITIS (causing pleuritic chest pain, pleural effusion) and PERICARDITIS (causing pericarditic chest pain, pericardial effusion, friction rub). These are among the diagnostic criteria for SLE. Pleuritic pain is positional (worse on inspiration) and sharp. Libman-Sacks ENDOCARDITIS (sterile vegetations) occurs in SLE but is not classified as serositis. Granulomatous hepatitis is associated with sarcoidosis. Oesophageal dysmotility is characteristic of systemic sclerosis (scleroderma), not SLE."}
];

const IHD_Qs = [
  {q:"Stable angina is caused by:",opts:["Acute plaque rupture with superimposed thrombosis causing complete coronary occlusion","Dynamic coronary artery spasm in the absence of atherosclerosis","Fixed atheromatous stenosis causing ischaemia when myocardial oxygen demand exceeds supply","Microemboli from atrial fibrillation lodging in coronary arterioles","Coronary vasculitis from immune complex deposition"],ans:2,exp:"STABLE ANGINA results from FIXED atheromatous coronary stenosis. At rest, flow is adequate, but during EXERTION — when heart rate, blood pressure, and contractility rise — oxygen demand exceeds what the stenosis allows, producing ischaemia and chest pain. Pain is central, radiates to the neck/jaw/left arm, and is promptly RELIEVED BY REST or sublingual nitrate. Unstable angina involves DYNAMIC obstruction from plaque rupture/erosion plus thrombus. Coronary vasospasm without atherosclerosis describes Prinzmetal's (variant) angina."},
  {q:"The pathological basis of unstable angina is:",opts:["Fixed atherosclerotic stenosis exceeding 70% of vessel diameter","Dynamic obstruction from plaque rupture or erosion with superimposed thrombus formation","Myocardial necrosis from complete coronary occlusion for more than 20 minutes","Microvascular dysfunction in the absence of epicardial coronary stenosis","Left ventricular hypertrophy increasing myocardial oxygen demand beyond supply"],ans:1,exp:"UNSTABLE ANGINA results from DYNAMIC obstruction — plaque rupture or erosion exposes the subendothelial matrix, triggering platelet aggregation and thrombus formation that critically reduces (but does not completely occlude) coronary flow. Unlike stable angina, it occurs at REST, with increasing frequency, or with minimal exertion. Troponin is NOT elevated, distinguishing it from NSTEMI (which also involves plaque rupture/thrombus but causes myocardial necrosis). Both unstable angina and NSTEMI are termed 'acute coronary syndrome without ST elevation.'"},
  {q:"Which of the following does NOT increase myocardial oxygen demand?",opts:["Increased heart rate","Elevated systolic blood pressure","Left ventricular hypertrophy","Aortic stenosis","Reduced myocardial contractility"],ans:4,exp:"REDUCED contractility DECREASES myocardial oxygen demand — a less forcefully contracting heart does less work and requires less oxygen. This is the basis of beta blocker therapy in angina. Factors that INCREASE demand: heart rate (the most important determinant), blood pressure (afterload), myocardial contractility, left ventricular hypertrophy (increased muscle mass), and valve disease like AORTIC STENOSIS (enormously increases LV pressure work). Beta blockers reduce demand primarily by slowing heart rate and reducing contractility."},
  {q:"The universal definition of acute MI requires elevated troponin PLUS at least one of the following EXCEPT:",opts:["Symptoms suggestive of myocardial ischaemia","New or presumed new significant ST-T wave changes or new LBBB on ECG","Onset of pathological Q waves on ECG","Elevated CRP above 10 mg/L","Imaging evidence of new regional wall motion abnormality"],ans:3,exp:"The universal MI definition requires ELEVATED TROPONIN (rise or fall with ≥1 value >99th percentile ULN) PLUS at least ONE of: ischaemic symptoms, new ECG changes (ST-T variation or new LBBB), pathological Q waves, imaging evidence of new wall motion abnormality or myocardial loss, or intracoronary thrombus on angiography/autopsy. ELEVATED CRP is not included — it is a non-specific inflammatory marker useful for cardiovascular risk stratification but it does not diagnose MI and is not part of the universal definition."},
  {q:"A 12-lead ECG in suspected STEMI should be obtained within:",opts:["30 minutes of first medical contact","20 minutes of first medical contact","10 minutes of first medical contact","5 minutes of arrival at hospital","60 minutes of symptom onset"],ans:2,exp:"The ECG must be obtained within 10 MINUTES of FIRST MEDICAL CONTACT — the international STEMI triage standard. Early ECG acquisition enables rapid diagnosis and catheterisation lab activation. If the initial ECG is non-diagnostic but clinical suspicion remains high, it should be repeated at 5–10 minute intervals while the patient is symptomatic. ST elevation criteria: >2.5mm in men <40yr, >2mm in men ≥40yr, >1.5mm in women, or >1mm in limb leads in ≥2 contiguous leads."},
  {q:"ST depression in leads V1–V3 on a 12-lead ECG in a patient with chest pain most likely represents:",opts:["Right ventricular infarction","Anterior STEMI","Myocardial ischaemia or posterior MI","Pericarditis","Left bundle branch block pattern"],ans:2,exp:"ST DEPRESSION in V1–V3 represents either SUBENDOCARDIAL ISCHAEMIA or a TRUE POSTERIOR MI — in posterior MI, the ECG shows a mirror image of what would be ST elevation: horizontal ST depression and tall R waves in V1–V3 (equivalent to ST elevation and Q waves if the posterior wall were directly visible). ST elevation in V1–V4 = anterior STEMI. ST elevation in V4R = right ventricular infarction. Global saddle-shaped ST elevation = pericarditis. LBBB causes secondary repolarisation changes."},
  {q:"Which cardiac biomarker rises EARLIEST after acute myocardial infarction?",opts:["Troponin I","Troponin T","CK-MB","Myoglobin","Lactate dehydrogenase"],ans:3,exp:"MYOGLOBIN rises earliest — onset 1–4 hours, peak 6–7 hours, duration 24 hours. However, it is non-specific (also released from skeletal muscle injury). TROPONINS rise at 3–12 hours, peak 18–24 hours, and persist for UP TO 10 DAYS — the gold standard for diagnosis, especially useful in late presenters. CK-MB rises 3–12 hours, peaks 18–24 hours, normalises at 36–48 hours — its shorter window than troponin makes it useful for detecting REINFARCTION (a new CK-MB rise after initial normalisation). LDH rises 6–12 hours and persists 6–8 days."},
  {q:"Which cardiac biomarker persists the LONGEST after MI and is most useful for late-presenting patients?",opts:["Myoglobin (24 hours)","CK-MB (36–48 hours)","AST (48–72 hours)","Troponin T or I (up to 10 days)","Lactate dehydrogenase (6–8 days)"],ans:3,exp:"TROPONINS (T and I) persist for UP TO 10 DAYS after acute MI — making them the preferred biomarker for late presenters. They are also the most SPECIFIC cardiac biomarkers, highly sensitive for even micro-infarction. LDH persists 6–8 days and was historically used for late diagnosis. CK-MB normalises at 36–48 hours and is used to detect REINFARCTION (a second rise after the first peak falls). Myoglobin is the earliest but clears within 24 hours and is not specific. Troponin is the standard for universal MI definition."},
  {q:"Regional hypokinesia on echocardiography in a patient with chest pain indicates:",opts:["Global LV dysfunction from dilated cardiomyopathy","Pericardial effusion compressing the right ventricle","Critical ischaemia or infarction in a specific coronary territory","Hypertrophic cardiomyopathy with outflow tract obstruction","Pulmonary hypertension causing right heart strain"],ans:2,exp:"REGIONAL (territory-specific) hypokinesia — reduced contractility of a specific myocardial segment — implies CRITICAL ISCHAEMIA OR INFARCTION of the coronary artery supplying that territory. This contrasts with global hypokinesia seen in dilated cardiomyopathy or myocarditis. MYOCARDIAL THINNING of a wall segment suggests an OLD infarct with remodelling. Echocardiography is especially useful in patients with persisting chest pain and non-diagnostic ECGs. It can also reveal MI complications: VSD, LV aneurysm, intracardiac thrombus, pericardial effusion, and myocardial rupture."},
  {q:"Sublingual GTN is CONTRAINDICATED in a patient with STEMI if:",opts:["The patient has anterior ST elevation in V1–V4","The patient took sildenafil 30 hours ago","The patient has confirmed right ventricular infarction","The patient has already taken aspirin","The patient's pain has been present for more than 20 minutes"],ans:2,exp:"GTN is contraindicated in RIGHT VENTRICULAR INFARCTION because the RV is preload-dependent. GTN causes venodilation, reduces venous return (preload), and can cause catastrophic hypotension when the RV cannot generate adequate forward output. GTN is also contraindicated in HYPOTENSION and when a PDE-5 inhibitor (sildenafil, tadalafil, vardenafil) has been taken in the LAST 24–36 HOURS — dangerous additive hypotension. Sildenafil taken 30 hours ago falls within the 36-hour exclusion window. Anterior ST elevation, prior aspirin use, and prolonged pain duration are not contraindications to GTN."},
  {q:"Primary PCI for STEMI should ideally be performed within how long of first medical contact?",opts:["30 minutes","60 minutes","90 minutes","120 minutes","180 minutes"],ans:2,exp:"PRIMARY PCI is recommended within 90 MINUTES of FIRST MEDICAL CONTACT — this is the 'door-to-balloon time' target. Primary PCI is the preferred reperfusion strategy when a capable catheterisation lab is available within this timeframe, as it is superior to thrombolysis in reducing mortality, reinfarction, and stroke. If primary PCI cannot be achieved within 120 MINUTES of first medical contact (i.e., at a hospital without cath lab capability or when transfer delays are too long), FIBRINOLYTIC THERAPY should be administered instead (door-to-needle time <30 minutes)."},
  {q:"Streptokinase for STEMI thrombolysis is given as:",opts:["0.75 MU IV bolus over 5 minutes","1.5 MU in 100 ml saline infused over 30–60 minutes","2 MU in 250 ml saline over 2 hours","0.5 MU IM injection","1.5 MU orally dissolved in 200 ml water"],ans:1,exp:"IV STREPTOKINASE is administered as 1.5 MU dissolved in 100 ML of physiological saline or 5% dextrose, infused over 30–60 MINUTES. Fibrinolysis is indicated when primary PCI cannot be achieved within 120 minutes of first medical contact. The DOOR-TO-NEEDLE time target is LESS THAN 30 MINUTES. Contraindications include high risk for intracranial haemorrhage, recent stroke, active bleeding, and previous streptokinase use (anti-streptokinase antibodies may reduce efficacy — use alteplase instead). Fibrinolysis is given within 12 hours of symptom onset."},
  {q:"After STEMI, ACE inhibitors are prescribed primarily to:",opts:["Prevent coronary re-thrombosis at the culprit plaque site","Reduce heart rate and prevent ventricular arrhythmias","Prevent left ventricular remodelling after infarction","Lower LDL cholesterol and stabilise atheromatous plaques","Reduce preload and relieve acute dyspnoea"],ans:2,exp:"ACE INHIBITORS prevent LEFT VENTRICULAR REMODELLING — the progressive LV dilation and dysfunction that follows large MIs, driven by angiotensin II-mediated myocyte hypertrophy and interstitial fibrosis. By blocking this pathway, ACE inhibitors preserve LV function and reduce progression to heart failure. BETA BLOCKERS prevent recurrent ischaemia and life-threatening arrhythmias by reducing heart rate and sympathetic activation. ANTIPLATELET therapy (aspirin + P2Y12 inhibitor) prevents rethrombosis and stent thrombosis. STATINS lower cholesterol and stabilise plaques. Each drug class targets a distinct post-MI mechanism."},
  {q:"Subcutaneous enoxaparin is given in STEMI at a dose of:",opts:["0.5 mg/kg once daily","1 mg/kg every 12 hours","1.5 mg/kg once daily","2 mg/kg every 8 hours","0.1 mg/kg every 6 hours"],ans:1,exp:"ENOXAPARIN in STEMI is given SC at 1 MG/KG EVERY 12 HOURS. This low-molecular-weight heparin provides anticoagulation to prevent rethrombosis at the culprit lesion and reduce LV thrombus formation. Advantages over unfractionated heparin: fixed weight-based dosing, no aPTT monitoring required, and more predictable pharmacokinetics. Dose adjustment is needed in renal impairment (CrCl <30 ml/min: 1 mg/kg once daily) and in patients >75 years. It is given alongside aspirin as part of dual antithrombotic therapy."},
  {q:"A 52-year-old man has central chest pain of 50 minutes, diaphoresis, and ST elevation in V1–V4. He took sildenafil last night. Initial management should include all EXCEPT:",opts:["Aspirin 300 mg chewed immediately","Cardiac monitoring and IV access","Supplemental oxygen if SpO₂ below 90%","Sublingual GTN 0.4 mg every 5 minutes","Immediate 12-lead ECG"],ans:3,exp:"SUBLINGUAL GTN is CONTRAINDICATED because the patient took sildenafil within the last 24–36 hours — the combination causes life-threatening hypotension via additive nitric oxide-mediated vasodilatation. ASPIRIN 162–325 mg chewed is given immediately to all STEMI patients without compelling contraindication. CARDIAC MONITORING and IV ACCESS are immediate priorities. OXYGEN is given to maintain SpO₂ >90% (not given routinely to normoxic patients — hyperoxia may worsen ischaemia). A 12-LEAD ECG must be done within 10 minutes of first medical contact. Morphine 2–4 mg IV can be given for pain (alternatives: pethidine, tramadol)."}
];

const IE_Qs = [
